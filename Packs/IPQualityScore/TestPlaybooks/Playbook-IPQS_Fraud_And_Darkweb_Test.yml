id: IPQS Fraud and Darkweb Test
version: 2
vcShouldKeepItemLegacyProdMachine: false
name: IPQS Fraud and Darkweb Test
description: The playbook analyzes IP addresses, URLs, email addresses, and phone
  numbers using IPQS fraud scoring to assess risk based on reputation, abuse patterns,
  and fraud signals. It also checks usernames, passwords, and email addresses against
  IPQS leaked data endpoints to identify potential exposure in known data breaches.
