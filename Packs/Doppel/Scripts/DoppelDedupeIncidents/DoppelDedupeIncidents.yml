args:
- name: action
  auto: PREDEFINED
  predefined:
  - close
  - delete
  default: true
  defaultValue: close
  description: Whether to close (default, reversible) or permanently delete the duplicate incidents.
- name: dry_run
  auto: PREDEFINED
  predefined:
  - 'true'
  - 'false'
  default: true
  defaultValue: 'true'
  description: When true (default), only report the planned actions without changing anything.
- name: query
  description: Incident search query used to find candidate Doppel incidents. Leave empty to use the built-in Doppel Alert type query.
- name: page_size
  defaultValue: '100'
  description: Number of incidents to fetch per search page (keep at or below 100).
- name: max_pages
  defaultValue: '1000'
  description: Safety ceiling on the number of search pages to scan.
- name: limit
  defaultValue: '0'
  description: Maximum number of incidents to close/delete in a single run (0 = no limit). Use to process a large backlog in safe batches; re-run until the report shows 0 remaining.
comment: |-
  Cleans up duplicate Doppel incidents created by the fetch duplication bug.

  Incidents are grouped by the Doppel alert id (dbotMirrorId). Within each group only OPEN incidents are considered: the survivor kept as canonical is the oldest open incident that has an owner (analyst work in progress), or the oldest open incident if none are owned. The remaining OPEN duplicates are CLOSED as "Duplicate" (default, reversible) or DELETED (explicit opt-in).

  Already-closed incidents are NEVER touched - regardless of their close reason (Duplicate, False Positive, Resolved, ...). An analyst's disposition is never overwritten, and incidents already closed as Duplicate are never chosen as the canonical survivor and never re-processed, so re-runs / batched runs are idempotent.

  Safety model: defaults to a dry run that only reports what it would do; defaults to close (not delete) so any incident is fully recoverable by reopening it; and the report flags any open duplicate that has an owner for human review before a non-dry run.
commonfields:
  id: DoppelDedupeIncidents
  version: -1
name: DoppelDedupeIncidents
script: '-'
outputs:
- contextPath: Doppel.Dedupe.scanned
  description: Number of incidents scanned.
  type: Number
- contextPath: Doppel.Dedupe.dry_run
  description: Whether the run was a dry run (no changes made).
  type: Boolean
- contextPath: Doppel.Dedupe.action
  description: The action applied to duplicates (close or delete).
  type: String
- contextPath: Doppel.Dedupe.limit
  description: The per-run cap on the number of incidents actioned (0 = no limit).
  type: Number
- contextPath: Doppel.Dedupe.duplicate_groups
  description: Number of Doppel alert groups that had open redundant incidents.
  type: Number
- contextPath: Doppel.Dedupe.skipped_closed
  description: Number of already-closed incidents left untouched.
  type: Number
- contextPath: Doppel.Dedupe.total_actions
  description: Total number of open duplicate incidents planned for action.
  type: Number
- contextPath: Doppel.Dedupe.remaining
  description: Number of planned actions not performed in this run (re-run to continue).
  type: Number
- contextPath: Doppel.Dedupe.actions
  description: The full list of planned close/delete actions.
- contextPath: Doppel.Dedupe.flagged
  description: Open duplicates that have an owner and warrant review.
- contextPath: Doppel.Dedupe.performed
  description: The actions performed in this run (empty on a dry run).
tags:
- doppel
timeout: '1800'
comment_out: false
scripttarget: 0
type: python
subtype: python3
dockerimage: demisto/python3:3.12.13.8428455
enabled: true
runonce: false
fromversion: 6.10.0
tests:
- No tests (auto formatted)
