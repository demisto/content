display: SOC Framework Pack Manager
name: SOCFWPackManager
description: Downloads a SOC Framework content pack from a ZIP URL and installs it on the tenant as system content. Used internally by the SOCFWPackManager script — end users invoke the script, not this integration directly.
category: Utilities
fromversion: 8.0.0
system: true
configuration:
- section: Connect
  display: Server URL
  name: url
  defaultvalue: ''
  type: 0
  required: true
- section: Connect
  display: API Key ID
  displaypassword: API Key
  name: credentials
  type: 9
  required: true
- section: Connect
  advanced: true
  display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
- section: Connect
  advanced: true
  display: Use system proxy settings
  name: proxy
  type: 8
  required: false
script:
  script: ''
  type: python
  subtype: python3
  dockerimage: demisto/xsoar-tools:1.0.0.4887903
  runonce: false
  commands:
  - name: socfw-install-pack
    description: Download and install a SOC Framework pack ZIP as system content. Called by the SOCFWPackManager script — do not invoke directly.
    arguments:
    - name: url
      required: true
      description: URL of the pack ZIP to install (typically a GitHub release asset).
    - name: filename
      required: false
      description: Asset filename, including the .zip extension. Derived from the URL when omitted.
    outputs:
    - contextPath: SOCFramework.PackInstall.filename
      description: Installed pack filename.
      type: String
    - contextPath: SOCFramework.PackInstall.url
      description: Source URL the pack was downloaded from.
      type: String
    - contextPath: SOCFramework.PackInstall.status
      description: Install status (success on completion).
      type: String
    - contextPath: SOCFramework.PackInstall.response
      description: Raw response from demisto-sdk upload_content_entity.
      type: Unknown
commonfields:
  id: SOCFWPackManager
  version: -1
