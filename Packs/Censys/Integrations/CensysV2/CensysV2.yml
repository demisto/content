  - name: cen-rescan
    polling: true
    arguments:
    - name: ioc_type
      description: Specify the type of IOC.
      required: true
      defaultValue: Service
      auto: PREDEFINED
      predefined:
      - Service
      - Web Property
    - name: ioc_value
      description: Specify the value of IOC.
      required: true
    - name: port
      description: Specify the port number associated with the IOC.
      required: true
      defaultValue: '443'
    - name: protocol
      description: "Specify the service protocol.\n\nNote:This argument is required only if the IOC type is Service."
      required: false
    - name: transport_protocol
      description: "Specify the transport protocol.\n\nNote: This argument is required only if the IOC type is Service."
      required: false
      defaultValue: Unknown
      auto: PREDEFINED
      predefined:
      - Unknown
      - TCP
      - UDP
      - ICMP
      - QUIC
    - name: scan_id
      description: The ID of the scan. This argument is used internally by the scheduled command for polling and should not be provided manually.
      hidden: true
    - name: polling
      description: Whether to poll for the command.
      hidden: true
    description: Initiate a live rescan for a known host service at a specific IP and port (ip:port) or hostname and port (hostname:port).
    outputs:
    - contextPath: Censys.Rescan.scan_id
      description: The unique identifier for the rescan operation.
      type: String
    - contextPath: Censys.Rescan.status
