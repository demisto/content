category: Data Enrichment & Threat Intelligence
provider: Censys
sectionorder:
- Connect
- Collect
commonfields:
  id: CensysV2
  version: -1
configuration:
- display: Server URL
  name: server_url
  required: true
  type: 0
  defaultvalue: https://api.platform.censys.io
  additionalinfo: The URL of the Censys API server.
  section: Connect
- display: ""
  displaypassword: API Token
  name: api_token
  hiddenusername: true
  type: 9
  required: true
  additionalinfo: Personal access token from the Censys platform.
  section: Connect
- display: Organization ID
  name: organization_id
  type: 0
  required: true
  additionalinfo: The unique identifier for your Censys organization.
  section: Connect
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
  section: Connect
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
  section: Connect
- display: Determine IP score by labels (for paid subscribers)
  name: premium_access
  type: 8
  required: false
  section: Collect
  additionalinfo: |-
    Censys API provides reputation data exclusively to paid subscribers. 
    When set to True, the integration will use labels to determine the IP score. 
