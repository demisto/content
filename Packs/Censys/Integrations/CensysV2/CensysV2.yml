  - HONEYPOT
  - HOSTING_WEB_UI
  - ICS
  - IOT
  - IPV6
  - KVM
  - LOAD_BALANCER
  - LOGIN_PAGE
  - MEDIA_SERVER
  - MEDICAL
  - MEDICAL_DEVICE
  - NAS
  - NETWORK
  - NVR
  - OPEN_DIRECTORY
  - P2P_SHARING
  - PLC
