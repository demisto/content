category: Network Security
provider: Zscaler
sectionorder:
- Connect
- Collect
commonfields:
  id: ZscalerZIdentity
  version: -1
configuration:
- display: Domain
  name: domain
  additionalinfo: The domain assigned to your organization. For example, if your domain is "acme", the token endpoint will be https://acme.zslogin.net/oauth2/v1/token.
  required: true
  type: 0
  section: Connect
- display: Client ID
  displaypassword: Client Secret
  name: credentials
  required: true
  type: 9
  section: Connect
- additionalinfo: Reliability of the source providing the intelligence data.
  defaultvalue: C - Fairly reliable
  display: Source Reliability
  name: reliability
  type: 15
  options:
  - A+ - 3rd party enrichment
  - A - Completely reliable
  - B - Usually reliable
  - C - Fairly reliable
  - D - Not usually reliable
  - E - Unreliable
  - F - Reliability cannot be judged
  section: Collect
  advanced: true
