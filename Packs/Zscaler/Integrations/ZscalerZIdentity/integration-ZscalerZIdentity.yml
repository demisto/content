  required: false
- additionalinfo: 'Suspicious URL categories for security alerts. Default: SUSPICIOUS_DESTINATION, SPYWARE_OR_ADWARE'
  defaultvalue: SUSPICIOUS_DESTINATION,SPYWARE_OR_ADWARE
