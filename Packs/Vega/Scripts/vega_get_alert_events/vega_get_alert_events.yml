comment: Fetches Vega alert events and persists the rendered markdown table on Vega Alert incidents for the Alert Events layout section.
commonfields:
  id: vega-get-alert-events
  version: -1
dockerimage: demisto/python3:3.12.8.3296088
enabled: true
name: vega-get-alert-events
runas: DBotWeakRole
script: ""
scripttarget: 0
subtype: python3
tags:
- widget
type: python
fromversion: 6.10.0
tests:
- No tests (auto formatted)
args:
- name: alert_id
  description: Vega alert ID. When omitted, uses vegaalertid from the current incident.
- name: limit
  description: Number of alert events to display per page. All events are fetched from Vega automatically.
  defaultValue: "200"
- name: offset
  description: Pagination offset for alert events.
