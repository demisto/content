    taskid: 1628d981-63c2-4d1b-b4b7-ec6f02a2af82
    type: regular
    task:
      id: 1628d981-63c2-4d1b-b4b7-ec6f02a2af82
      version: -1
      name: vega-update-incident
      description: Immediately update Vega incident status, verdict, verdict reasoning, severity, assignee emails, and/or comment on the Vega platform and sync the open XSOAR investigation when run from a Vega Incident investigation.
      script: Vega|||vega-update-incident
      type: regular
      iscommand: true
      brand: Vega
    scriptarguments:
