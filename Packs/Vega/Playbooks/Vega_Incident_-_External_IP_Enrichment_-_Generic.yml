    type: playbook
    task:
      id: 7ac05d91-2c4e-47fa-b3c7-236406fc5d0b
      version: -1
      name: IP Enrichment - External - Generic v2
      description: |-
        Enrich IP addresses using one or more integrations.

        - Resolve IP addresses to hostnames (DNS).
        - Provide threat information.
        - IP address reputation using !ip command.
        - Separate internal and external addresses.
      playbookName: IP Enrichment - External - Generic v2
      type: playbook
      iscommand: false
      brand: ""
    nexttasks:
      "#none#":
        - "4"
    scriptarguments:
      ExecutedFromParent:
        simple: "False"
      IP:
        complex:
          root: inputs.IP_Address
          transformers:
            - operator: uniq
      InternalRange:
        complex:
          root: lists
          accessor: PrivateIPs
          transformers:
            - operator: RegexExtractAll
              args:
                error_if_no_match: {}
                ignore_case: {}
                multi_line: {}
                period_matches_newline: {}
                regex:
                  value:
                    simple: (\b(?:\d{1,3}\.){3}\d{1,3}\b/\d{1,2})
                unpack_matches: {}
            - operator: join
              args:
                separator:
                  value:
                    simple: ","
      ResolveIP:
        simple: "True"
      UseReputationCommand:
        simple: "False"
      extended_data:
        simple: "False"
      threat_model_association:
        simple: "False"
    separatecontext: true
    continueonerrortype: ""
    loop:
      iscommand: false
      exitCondition: ""
      wait: 1
      max: 100
    view: |-
      {
        "position": {
          "x": 450,
