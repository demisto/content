commonfields:
  id: Cyber Triage
  version: -1
name: Cyber Triage
display: Cyber Triage
category: Forensics & Malware Analysis
provider: Sleuth Kit Labs
description: This integration allows you to collect and analyze endpoint data using Cyber Triage so that you can investigate what happened on the endpoint. The integration will send an agentless collection tool to the remote endpoint, retrieve volatile and file system data, and analyze it for evidence of an intrusion.
configuration:
- display: Cyber Triage Server Hostname (e.g. 192.168.1.2)
  name: server
  type: 0
  required: true
  additionalinfo: IP address or hostname of the Cyber Triage server.
- display: REST Port
  name: rest_port
  defaultvalue: "9443"
  type: 0
  required: true
  additionalinfo: REST API port of the Cyber Triage server. Default is 9443.
- displaypassword: API Key
  name: api_auth_token
  type: 9
  hiddenusername: true
  required: true
  additionalinfo: "REST API token for the Cyber Triage API. Retrieve it from the Cyber Triage server: Options → User Accounts.  Click the three dots next to api-user and select View Details. Under API Authentication Token, copy or create a new authentication token."
- display: Windows Admin Credentials
  name: credentials
  type: 9
  required: true
  additionalinfo: Username and password of a Windows administrative account used to push the collection tool to endpoints.
- display: Trust any certificate (not secure)
  name: insecure
  defaultvalue: "true"
  type: 8
  required: false
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
script:
  script: ''
  type: python
  subtype: python3
  commands:
  - name: ct-triage-endpoint
    arguments:
    - name: host_name
      required: true
      default: true
      description: IP address or hostname of the Windows endpoint to triage.
    - name: scan_options
      description: >
        Comma-separated list of data types for Cyber Triage to collect.
        Valid options: Accounts (us), Logons (lo), Network Shares (ns), 
        Web Artifacts (wb), Data Accessed (ud), Triggered Tasks (sc), 
        Processes (pr), Network (nw), Network Caches (nc), OS Settings (co),
        Full file system scan (fs).
      defaultValue: us,lo,ns,wb,ud,sc,pr,nw,nc,co,fs
    - name: malware_scan_requested
      auto: PREDEFINED
      predefined:
      - "yes"
      - "no"
      description: Send MD5 hashes to an external malware analysis service.
      defaultValue: "yes"
    - name: send_content
      auto: PREDEFINED
      predefined:
      - "yes"
      - "no"
      description: Send unknown files to an external malware analysis service. Hash upload must be enabled for file uploads to occur.
      defaultValue: "no"
    - name: incident_name
      description: Cyber Triage incident name that the collection will be grouped under.
      defaultValue: Default
    outputs:
    - contextPath: CyberTriage.SessionId
      description: The session ID for the newly created triage session.
      type: String
    - contextPath: Endpoint.IPAddress
      description: The IP address of the endpoint that was triaged.
      type: String
    - contextPath: Endpoint.Hostname
      description: The hostname of the endpoint that was triaged.
      type: String
    description: Initiates a Cyber Triage collection on a Windows endpoint.
  dockerimage: demisto/python3:3.12.8.3296088
fromversion: 6.5.0
tests:
- No tests (auto formatted)
