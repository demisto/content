commonfields:
  id: Menlo Security
  version: -1
name: Menlo Security
#TODO remove Beta
display: Menlo Security Beta
category: Network Security
provider: Menlo Security
sectionorder:
- Connect
- Collect
description: Collects web, email, audit, SMTP, attachment, DLP, and iSOC logs from the Menlo Security Isolation Platform (MSIP).
configuration:
- display: Server URL
  name: url
  type: 0
  defaultvalue: https://logs.menlosecurity.com
  required: true
  section: Connect
- display: ""
  displaypassword: Auth Token
  name: credentials
  type: 9
  required: true
  hiddenusername: true
  section: Connect
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
  section: Connect
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
  section: Connect
- display: Log types
  name: log_types
  type: 16
  required: true
  defaultvalue: web,safemail,audit,smtp,attachment,dlp,isoc
  options:
  - web
  - safemail
  - audit
  - smtp
  - attachment
  - dlp
  - isoc
  section: Collect
  additionalinfo: Select the log types to collect.
- display: Fetch events
  name: isFetchEvents
  type: 8
  required: false
  section: Collect
- display: Maximum number of events per fetch per log type
  name: max_events_per_fetch
  type: 0
  defaultvalue: "5000"
  required: false
  section: Collect
  additionalinfo: Maximum number of events to fetch per log type per fetch cycle.
script:
  script: ""
  type: python
  commands:
  - name: menlo-security-get-events
    description: Manually fetch events from the Menlo Security Isolation Platform. Use this command to test the integration or retrieve events on demand.
    arguments:
    - name: start_time
      description: Start time for the event query (e.g. "1 hour", "2021-01-01T00:00:00Z"). Defaults to 1 hour ago.
      required: false
      defaultValue: "1 hour"
    - name: end_time
      description: End time for the event query (e.g. "now", "2021-01-02T00:00:00Z"). Defaults to now.
      required: false
      defaultValue: "now"
    - name: log_types
      description: Comma-separated list of log types to fetch (e.g. "web,audit"). Defaults to all configured log types.
      required: false
      isArray: true
    - name: limit
      description: Maximum number of events to return per log type.
      required: false
      defaultValue: "100"
    - name: should_push_events
      description: Set to True to push the fetched events to XSIAM. Set to False to only display them.
      required: true
      defaultValue: "False"
      auto: PREDEFINED
      predefined:
      - "True"
      - "False"
  dockerimage: demisto/python3:3.12.8.3296088
  isfetchevents: true
  subtype: python3
fromversion: 6.8.0
marketplaces:
- marketplacev2
- platform
tests:
- No tests
