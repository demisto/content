description: Fetches threat incidents from iZOOlogic for automated ingestion into Cortex.
script:
  commands:
  - name: izoologic-get-incidents
    description: Gets incidents from iZOOlogic. Use this command for development and debugging only, as it may exceed API rate limits.
    arguments:
    - name: limit
      description: The maximum number of incidents to return per type.
      defaultValue: '50'
    - name: start_time
      description: 'The time to filter incidents detected at or after. Supports ISO 8601 format or relative time expressions (e.g., "3 days ago", "2024-01-01T00:00:00Z").'
    - name: end_time
      description: 'The time to filter incidents detected at or before. Supports ISO 8601 format or relative time expressions (e.g., "now", "2024-01-01T00:00:00Z").'
    - name: incident_type
      description: 'Filter by incident type(s). If not specified, uses the types configured in the integration parameters.'
      isArray: true
      auto: PREDEFINED
      predefined:
      - brand abuse
      - phishing
      - malware
      - pharming
      - smishing
      - vishing
      - mobile apps
      - social media
      - other
      - email
      - executive
    outputs:
    - contextPath: iZOOlogic.Incident.incidentID
      description: The unique identifier of the incident.
      type: String
    - contextPath: iZOOlogic.Incident.incidentType
      description: The type and subtype of the incident.
      type: String
    - contextPath: iZOOlogic.Incident.subIncidentType
      description: The subtype of the incident.
      type: String
    - contextPath: iZOOlogic.Incident.detectionDate
      description: The detection date of the incident as a Unix timestamp.
      type: String
    - contextPath: iZOOlogic.Incident.url
      description: The URL associated with the incident.
      type: String
    - contextPath: iZOOlogic.Incident.status
      description: The current status of the incident.
      type: String
    - contextPath: iZOOlogic.Incident.statusCode
      description: The numeric status code of the incident.
      type: Number
    - contextPath: iZOOlogic.Incident.brand
      description: The brand associated with the incident.
      type: String
    - contextPath: iZOOlogic.Incident.threatType
      description: The threat level of the incident.
      type: String
    - contextPath: iZOOlogic.Incident.createdOn
      description: The creation date of the incident as a Unix timestamp.
      type: String
    - contextPath: iZOOlogic.Incident.closedOn
      description: The closing date of the incident as a Unix timestamp.
      type: String
    - contextPath: iZOOlogic.Incident.detectedBy
      description: The entity that detected the incident.
      type: String
  - name: izoolabs-incident-create
    description: Creates a new security incident in iZOOlogic.
    arguments:
    - name: incident_url
      description: URL, email, or target of the security incident (max 1000 characters).
      required: true
    - name: incident_type
      description: Type of incident.
      required: true
      auto: PREDEFINED
      predefined:
      - brand abuse
      - phishing
      - malware
      - pharming
      - smishing
      - vishing
      - mobile apps
      - social media
      - other
      - email
      - executive
    - name: brand_code
      description: Brand identifier associated with the incident.
      required: true
    - name: threat_type
      description: Threat level. Defaults to moderate threat if not specified.
      auto: PREDEFINED
      predefined:
      - low threat
      - moderate threat
      - substantial threat
      - high threat
      - critical threat
      - redirect to whitelist
    - name: case_type
      description: Desired case type for processing. Defaults to incident if not specified.
      auto: PREDEFINED
      predefined:
      - incident
      - brand abuse monitoring
      - domain monitoring
      - social media monitoring
      - mobile app monitoring
      - executive monitoring
    - name: comment
      description: Comments about the incident (max 2500 characters).
    - name: executive_name
      description: Executive name. Required for executive-related incidents (max 2500 characters).
    - name: client_code
      description: Client identifier for validation and access control.
    outputs:
    - contextPath: iZOOlabs.Incident.reportedincidentid
      description: Unique identifier for the created incident case.
      type: String
    - contextPath: iZOOlabs.Incident.statuscode
      description: Numeric status code (1 = under review).
      type: Number
    - contextPath: iZOOlabs.Incident.statusdescription
      description: Human-readable status description.
      type: String
    - contextPath: iZOOlabs.Incident.casetype
      description: Case type code (6 = incident).
      type: Number
    - contextPath: iZOOlabs.Incident.casetypedescription
      description: Human-readable case type description.
      type: String
    - contextPath: iZOOlabs.Incident.success
      description: Whether the incident was successfully created.
      type: Boolean
  - name: izoolabs-incident-fetch
    description: Fetches incidents from iZOOlogic based on specified filters including date range, brand, incident type, and other criteria.
    arguments:
    - name: from_date
      description: 'Start date for filtering incidents. Supports ISO 8601 format or relative time expressions (e.g., "1 day ago", "2024-01-01T00:00:00Z"). Maximum date range is 31 days. Default is 1 day ago.'
    - name: to_date
      description: 'End date for filtering incidents. Supports ISO 8601 format or relative time expressions (e.g., "now", "2024-01-01T00:00:00Z"). Maximum date range is 31 days. Default is now.'
    - name: incident_type
      description: Type of incident to filter by.
      auto: PREDEFINED
      predefined:
      - brand abuse
      - phishing
      - malware
      - pharming
      - smishing
      - vishing
      - mobile apps
      - social media
      - other
      - email
      - executive
    - name: threat_type
      description: Threat level to filter by.
      auto: PREDEFINED
      predefined:
      - low threat
      - moderate threat
      - substantial threat
      - high threat
      - critical threat
      - redirect to whitelist
    - name: brand_code
      description: Brand identifier to filter incidents by.
    - name: executive_name
      description: Executive name for filtering executive-related incidents (max 100 characters).
    - name: client_ref_id
      description: Client reference ID for specific incident lookup.
    - name: client_code
      description: Client identifier for filtering incidents.
    outputs:
    - contextPath: iZOOlabs.Incident.incidentID
      description: The unique identifier of the incident.
      type: String
    - contextPath: iZOOlabs.Incident.incidentType
      description: The type and subtype of the incident.
      type: String
    - contextPath: iZOOlabs.Incident.subIncidentType
      description: The subtype of the incident.
      type: String
    - contextPath: iZOOlabs.Incident.detectionDate
      description: The detection date of the incident as a Unix timestamp.
      type: String
    - contextPath: iZOOlabs.Incident.url
      description: The URL associated with the incident.
      type: String
    - contextPath: iZOOlabs.Incident.status
      description: The current status of the incident.
      type: String
    - contextPath: iZOOlabs.Incident.statusCode
      description: The numeric status code of the incident.
      type: Number
    - contextPath: iZOOlabs.Incident.brand
      description: The brand associated with the incident.
      type: String
    - contextPath: iZOOlabs.Incident.threatType
      description: The threat level of the incident.
      type: String
    - contextPath: iZOOlabs.Incident.createdOn
      description: The creation date of the incident as a Unix timestamp.
      type: String
    - contextPath: iZOOlabs.Incident.closedOn
      description: The closing date of the incident as a Unix timestamp.
      type: String
    - contextPath: iZOOlabs.Incident.detectedBy
      description: The entity that detected the incident.
      type: String
