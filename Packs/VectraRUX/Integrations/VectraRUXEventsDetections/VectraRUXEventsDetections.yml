category: Network Security
sectionorder:
- Connect
- Collect
commonfields:
  id: VectraRUXEventsDetections
  version: -1
configuration:
- additionalinfo: URL of the Vectra AI platform.
  display: Server URL
  name: server_url
  required: true
  type: 0
  section: Connect
- display: Client ID
  displaypassword: Client Secret Key
  name: credentials
  type: 9
  required: true
  section: Connect
- display: Fetch incidents
  name: isFetch
  required: false
  type: 8
  section: Collect
- additionalinfo: The maximum number of events detections to fetch each time. If the value is greater than 200, it will be considered as 200. The maximum is 200.
  defaultvalue: '50'
  display: Max Fetch
  name: max_fetch
  required: false
  type: 0
  section: Collect
- additionalinfo: "The date or relative timestamp from which to begin fetching events detections.\n\nSupported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ.\n\nFor example: 01 Oct 2025, 01 Mar 2021 04:45:33, 2025-12-17T14:05:44Z."
  defaultvalue: 1 hour
  display: First Fetch Time
  name: first_fetch
  required: false
  type: 0
  section: Collect
- additionalinfo: Filter by entity type. If not selected, it will fetch all events detections.
  display: Entity Types
  name: entity_types
  defaultvalue: Host,Account
  options:
  - Host
  - Account
  required: false
  type: 16
  section: Collect
- additionalinfo: Enabling this checkbox generates incidents for prioritized events detections. If not selected, incidents are created for all events detections.
  display: Create Incidents for Prioritized Detections
  name: only_prioritized_detections
  required: false
  type: 8
  section: Collect
- additionalinfo: Enabling this checkbox generates incidents for escalated events detections. If not selected, incidents are created for all events detections.
  display: Create Incidents for Escalated Detections
  name: only_escalated_detections
  required: false
  type: 8
  section: Collect
- additionalinfo: The mirroring direction in which to mirror the detections. You can mirror 'Incoming' (from Vectra to XSOAR), 'Outgoing' (from XSOAR to Vectra), or in both directions.
  display: Mirroring Direction
  name: mirror_direction
  options:
  - Incoming
  - Outgoing
  - Incoming And Outgoing
  required: false
  type: 15
  section: Collect
- additionalinfo: The tag value should be used to mirror the detection note by adding the same tag in the notes.
  defaultvalue: note
  display: Mirror tag for notes
  hidden: false
  name: note_tag
  required: false
  type: 0
  section: Collect
- additionalinfo: "Enabling this checkbox opens the detection in Vectra when the incident is reopened in XSOAR.\n\nNote: This parameter is only used when the mirroring direction is set to 'Outgoing' or 'Incoming And Outgoing'."
  display: Open Detection on Incident Reopen
  name: open_detection_on_incident_reopen
  defaultvalue: 'true'
  required: false
  type: 8
  section: Collect
- additionalinfo: "Detection status to set in Vectra when incident is reopened in XSOAR. Default value is 'Escalated'.\n\nNote: This parameter is only used when open detection on incident reopen is 'checked' and the mirroring direction is set to 'Outgoing' or 'Incoming And Outgoing'."
  display: Detection Status for Incident Reopen
  name: detection_status_for_reopen
  type: 15
  options:
  - Open
  - Escalated
  defaultvalue: Escalated
  required: false
  section: Collect
- additionalinfo: "Enabling this checkbox closes the detection in Vectra when the incident is closed in XSOAR.\n\nNote: This parameter is only used when the mirroring direction is set to 'Outgoing' or 'Incoming And Outgoing'."
  display: Close Detection on Incident Closure
  name: close_detection_on_incident_closure
  defaultvalue: 'true'
  required: false
  type: 8
  section: Collect
- additionalinfo: "Detection close reason to set in Vectra when closing incidents in XSOAR. Default value is 'Benign'.\n\nNote: This parameter is only used when close detection on incident closer is 'checked' and the mirroring direction is set to 'Outgoing' or 'Incoming And Outgoing'."
  display: Detection Close Reason for Incident Closure
  name: close_reason_of_detection
  type: 15
  options:
  - Benign
  - Remediated
  defaultvalue: Remediated
  required: false
  section: Collect
- display: Incident type
  defaultvalue: Vectra RUX Events Detection
  name: incidentType
  required: false
  type: 13
  section: Collect
- additionalinfo: When checked, no SSL certificates check will be done when interacting with the Vectra RUX API. It's insecure. (Default - unchecked)
  display: Trust any certificate (not secure)
  name: insecure
  required: false
  type: 8
  section: Connect
- additionalinfo: Use the system proxy settings to reach with the Vectra RUX API.
  display: Use system proxy settings
  name: proxy
  required: false
  type: 8
  section: Connect
description: This integration allows the security operations center to create and manage incidents based on Vectra Events Detections.
display: Vectra RUX - Network Detection & Response
name: VectraRUXEventsDetections
defaultmapperin: Vectra RUX - Incoming Mapper
script:
  commands:
  - name: vectra-detections-mark-asclosed
    description: Mark detections as closed with provided detection IDs in the argument.
    execution: true    # This command modifies the Vectra system
    arguments:
    - name: detection_ids
      required: true
      description: Provide a list of detection IDs separated by commas or a single detection ID.
      isArray: true
    - name: close_reason
      required: true
      description: Provide the close reason.
      auto: PREDEFINED
      predefined:
      - benign
      - remediated
  - arguments:
    - default: false
      description: Filter by email.
      isArray: false
      name: email
      required: false
      secret: false
    - auto: PREDEFINED
      default: false
      description: Filter users with the specified role. Use the role standardized name.
      isArray: false
      name: role
      predefined:
      - Admin
      - Auditor
      - Global Analyst
      - Read-Only
      - Restricted Admin
      - Security Analyst
      - Setting Admin
      - Super Admin
      required: false
      secret: false
    - default: false
      description: |-
        Return only the users which have a last login timestamp equal to or after the given timestamp.

        Supported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ.

        For example: 01 May 2023, 01 Mar 2021 04:45:33, 2022-04-17T14:05:44Z.
      isArray: false
      name: last_login_timestamp
      required: false
      secret: false
    deprecated: false
    description: Returns a list of users.
    execution: false
    name: vectra-user-list
    outputs:
    - contextPath: Vectra.User.id
      description: The ID of the User.
      type: Number
    - contextPath: Vectra.User.user_id
      description: The ID of the User.
      type: Number
    - contextPath: Vectra.User.name
      description: Username of the user.
      type: String
    - contextPath: Vectra.User.email
      description: The email associated with the user.
      type: String
    - contextPath: Vectra.User.role
      description: The role associated with the user.
      type: String
    - contextPath: Vectra.User.last_login_timestamp
      description: Last login timestamp in UTC format of the user.
      type: String
    - contextPath: Vectra.User.last_login
      description: Last login timestamp of the user.
      type: String
  - arguments:
    - auto: PREDEFINED
      default: false
      description: Fetch only entities whose priority score is above the configured priority threshold will be included in the response.
      isArray: false
      name: prioritized
      predefined:
      - 'true'
      - 'false'
      required: false
      secret: false
    - auto: PREDEFINED
      default: false
      description: Specify the type of the entity.
      isArray: false
      name: entity_type
      predefined:
      - account
      - host
      required: false
      secret: false
    - description: Filter by matching entity name.
      name: name
    - default: false
      description: Filter by a tag or a comma-separated list of tags.
      isArray: false
      name: tags
      required: false
      secret: false
    - auto: PREDEFINED
      default: false
      description: Filter on entity activation state.
      isArray: false
      name: state
      predefined:
      - active
      - inactive
      required: false
      secret: false
    - default: false
      description: Orders records by last timestamp or urgency score. Default sorting is by urgency score in descending order. Use the minus symbol (-) to sort scores in descending order. Multiple ordering fields can be specified with a comma-separated list (e.g., ordering=urgency_score,-name).
      isArray: false
      name: ordering
      required: false
      secret: false
    - default: false
      description: |-
        Return only the entities which have a last detection timestamp equal to or after the given timestamp.

        Supported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ.

        For example: 01 May 2023, 01 Mar 2021 04:45:33, 2022-04-17T14:05:44Z.
      isArray: false
      name: last_detection_timestamp
      required: false
      secret: false
    - default: false
      defaultValue: '1'
      description: Enables the caller to specify a particular page of results.
      isArray: false
      name: page
      required: false
      secret: false
    - default: false
      defaultValue: '50'
      description: Specify the desired page size for the request. Maximum is 5000.
      isArray: false
      name: page_size
      required: false
      secret: false
    - default: false
      description: |-
        Return only the entities which have a last modified timestamp equal to or after the given timestamp.

        Supported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ.

        For example: 01 May 2023, 01 Mar 2021 04:45:33, 2022-04-17T14:05:44Z.
      isArray: false
      name: last_modified_timestamp
      required: false
      secret: false
    deprecated: false
    description: Returns a list of entities.
    execution: false
    name: vectra-entity-list
    outputs:
    - contextPath: Vectra.Entity.id
      description: ID of the entity.
      type: Number
    - contextPath: Vectra.Entity.name
      description: Name of the entity.
      type: String
    - contextPath: Vectra.Entity.breadth_contrib
      description: Breadth contribution of the entity.
      type: Number
    - contextPath: Vectra.Entity.importance
      description: Entity importance.
      type: Number
    - contextPath: Vectra.Entity.type
      description: Type of the entity.
      type: String
    - contextPath: Vectra.Entity.is_prioritized
      description: Entity is prioritized or not.
      type: Boolean
    - contextPath: Vectra.Entity.severity
      description: Severity of the entity.
      type: String
    - contextPath: Vectra.Entity.urgency_score
      description: Urgency score of the entity.
      type: Number
    - contextPath: Vectra.Entity.velocity_contrib
      description: Velocity contribution of the entity.
      type: Number
    - contextPath: Vectra.Entity.detection_set
      description: Set of detections related to entity.
      type: String
    - contextPath: Vectra.Entity.last_detection_timestamp
      description: Time of the last detection activity related to entity.
      type: Date
    - contextPath: Vectra.Entity.notes.id
      description: Notes of the entity.
      type: String
    - contextPath: Vectra.Entity.notes.dateCreated
      description: Created date of the Note.
      type: String
    - contextPath: Vectra.Entity.notes.dateModified
      description: Modified date of the Note.
      type: String
    - contextPath: Vectra.Entity.notes.createdBy
      description: Created user of the Note.
      type: String
    - contextPath: Vectra.Entity.notes.ModifiedBy
      description: Modified user of the Note.
      type: String
    - contextPath: Vectra.Entity.notes.note
      description: Note of the entity.
      type: String
    - contextPath: Vectra.Entity.attack_rating
      description: Attack Ratting of the entity.
      type: Number
    - contextPath: Vectra.Entity.privilege_level
      description: Privilege Level of the entity.
      type: String
    - contextPath: Vectra.Entity.privilege_category
      description: Privilege Category of the entity.
      type: String
    - contextPath: Vectra.Entity.attack_profile
      description: Attack Profile of the entity.
      type: String
    - contextPath: Vectra.Entity.sensors
      description: Sensors of the entity.
      type: Unknown
    - contextPath: Vectra.Entity.state
      description: State of the entity.
      type: String
    - contextPath: Vectra.Entity.tags
      description: Tags of the entity.
      type: Unknown
    - contextPath: Vectra.Entity.url
      description: Url link of the entity.
      type: String
    - contextPath: Vectra.Entity.host_type
      description: Host type of the entity.
      type: Unknown
    - contextPath: Vectra.Entity.account_type
      description: Account type of the entity.
      type: String
  - arguments:
    - default: false
      description: Specify the id of the entity.
      isArray: false
      name: entity_id
      required: true
      secret: false
    - auto: PREDEFINED
      default: false
      description: Specify the type of the entity.
      isArray: false
      name: entity_type
      predefined:
      - host
      - account
      required: true
      secret: false
    deprecated: false
    description: Describes an entity by ID.
    execution: false
    name: vectra-entity-describe
    outputs:
    - contextPath: Vectra.Entity.id
      description: ID of the entity.
      type: Number
    - contextPath: Vectra.Entity.name
      description: Name of the entity.
      type: String
    - contextPath: Vectra.Entity.breadth_contrib
      description: Breadth contribution of the entity.
      type: Number
    - contextPath: Vectra.Entity.importance
      description: Entity importance.
      type: Number
    - contextPath: Vectra.Entity.type
      description: Type of the entity.
      type: String
    - contextPath: Vectra.Entity.is_prioritized
      description: Entity is prioritized or not.
      type: Boolean
    - contextPath: Vectra.Entity.severity
      description: Severity of the entity.
      type: String
    - contextPath: Vectra.Entity.urgency_score
      description: Urgency score of the entity.
      type: Number
    - contextPath: Vectra.Entity.velocity_contrib
      description: Velocity contribution of the entity.
      type: Number
    - contextPath: Vectra.Entity.detection_set
      description: Set of detections related to the entity.
      type: String
    - contextPath: Vectra.Entity.last_detection_timestamp
      description: Time of the last detection activity related to the entity.
      type: Date
    - contextPath: Vectra.Entity.last_modified_timestamp
      description: Time of the last modification activity related to the entity.
      type: Date
    - contextPath: Vectra.Entity.notes.id
      description: Notes of the entity.
      type: String
    - contextPath: Vectra.Entity.notes.dateCreated
      description: Created date of the Note.
      type: String
    - contextPath: Vectra.Entity.notes.dateModified
      description: Modified date of the Note.
      type: String
    - contextPath: Vectra.Entity.notes.createdBy
      description: Created user of the Note.
      type: String
    - contextPath: Vectra.Entity.notes.ModifiedBy
      description: Modified user of the Note.
      type: String
    - contextPath: Vectra.Entity.notes.note
      description: Note of the entity.
      type: String
    - contextPath: Vectra.Entity.attack_rating
      description: Attack Ratting of the entity.
      type: Number
    - contextPath: Vectra.Entity.privilege_level
      description: Privilege Level of the entity.
      type: String
    - contextPath: Vectra.Entity.privilege_category
      description: Privilege Category of the entity.
      type: String
    - contextPath: Vectra.Entity.attack_profile
      description: Attack Profile of the entity.
      type: String
    - contextPath: Vectra.Entity.sensors
      description: Sensors of the entity.
      type: Unknown
    - contextPath: Vectra.Entity.state
      description: State of the entity.
      type: String
    - contextPath: Vectra.Entity.tags
      description: Tags of the entity.
      type: Unknown
    - contextPath: Vectra.Entity.url
      description: Url link of the entity.
      type: String
    - contextPath: Vectra.Entity.host_type
      description: Host type of the entity.
      type: Unknown
    - contextPath: Vectra.Entity.account_type
      description: Account type of the entity.
      type: Unknown
  - arguments:
    - default: false
      description: Specify the id of the entity.
      isArray: false
      name: entity_id
      required: true
      secret: false
    - auto: PREDEFINED
      default: false
      description: Specify the type of the entity.
      isArray: false
      name: entity_type
      predefined:
      - account
      - host
      required: true
      secret: false
    - default: false
      defaultValue: '1'
      description: Enables the caller to specify a particular page of results.
      isArray: false
      name: page
      required: false
      secret: false
    - default: false
      defaultValue: '50'
      description: Specify the desired page size for the request. Maximum is 5000.
      isArray: false
      name: page_size
      required: false
      secret: false
    - auto: PREDEFINED
      default: false
      description: The category of the detection.
      isArray: false
      name: detection_category
      predefined:
      - Command & Control
      - Botnet
      - Reconnaissance
      - Lateral Movement
      - Exfiltration
      - Info
      required: false
      secret: false
    - default: false
      description: Filter by detection type.
      isArray: false
      name: detection_type
      required: false
      secret: false
    - default: false
      description: "Return only the detections which have a last timestamp equal to or after the given timestamp. \nFormats: YYYY-MM-ddTHH:mm:ssZ, YYYY-MM-dd, N days, N hours.\nExample: 2023-04-25T00:00:00Z, 2023-04-25, 2 days, 5 hours, 01 Mar 2023, 01 Feb 2023 04:45:33, 15 Jun."
      isArray: false
      name: last_timestamp
      required: false
      secret: false
    - default: false
      description: Filter by detection name.
      isArray: false
      name: detection_name
      required: false
      secret: false
    - default: false
      defaultValue: active
      description: Filter by state.
      isArray: false
      name: state
      required: false
      secret: false
    - default: false
      description: Filter by a tag or a comma-separated list of tags.
      isArray: false
      name: tags
      required: false
      secret: false
    deprecated: false
    description: Returns a list of detections for a specified entity.
    execution: false
    name: vectra-entity-detection-list
    outputs:
