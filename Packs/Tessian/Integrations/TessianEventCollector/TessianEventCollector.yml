- name: max_fetch
  display: Maximum number of security events per fetch
  type: 0
  defaultvalue: '1000'
  additionalinfo: 'Maximum number of security events to fetch per cycle. Each cycle makes up to 10 API calls of 100 events each (max 1000).'
  section: Collect
  required: false
- defaultvalue: 1
  display: Events Fetch Interval
  name: eventFetchInterval
