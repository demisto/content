description: Collects security events from Proofpoint Tessian for XSIAM ingestion.
display: Tessian Event Collector
name: TessianEventCollector
script:
  commands:
  - name: tessian-get-events
    description: This command is used for developing/debugging and is to be used with caution, as it can create events, leading to event duplication and API request limitation exceeding.
    arguments:
    - name: limit
      description: The maximum number of events to return. Default is 100. Maximum is 1000.
      defaultValue: '100'
    - name: created_after
      description: 'Only include events created after this time. ISO 8601 format (e.g., 2024-01-01T00:00:00Z).'
    - name: should_push_events
      auto: PREDEFINED
      defaultValue: 'false'
      description: If true, the command creates events in XSIAM; otherwise, it only displays them.
      predefined:
      - 'true'
      - 'false'
    outputs: []
  runonce: false
  script: '-'
  type: python
  subtype: python3
  isfetchevents: true
  dockerimage: demisto/fastapi:0.125.0.7178097
fromversion: 8.2.0
tests:
- No tests (auto formatted)
