configuration:
- name: url
  display: Server URL
  required: true
  type: 0
  additionalinfo: 'Proofpoint Tessian portal URL (e.g., https://{subdomain}.tessian-platform.com or https://{subdomain}.tessian-app.com).'
  section: Connect
- displaypassword: API Token
