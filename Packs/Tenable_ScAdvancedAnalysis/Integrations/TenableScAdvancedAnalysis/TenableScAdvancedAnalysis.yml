category: Vulnerability Management
commonfields:
  id: Tenable.sc Advanced Analysis
  version: -1
configuration:
- additionalinfo: Tenable.sc base URL, for example https://tenable.example.com
  display: Tenable.sc Server URL
  name: url
  required: true
  section: Connect
  type: 0
- display: Access Key
  name: access_key
  required: true
  section: Collect
  type: 4
- display: Secret Key
  displaypassword: API Key
  hiddenusername: true
  name: secret_key
  required: true
  section: Connect
  type: 4
- advanced: true
  defaultvalue: 'false'
  display: Trust any certificate (not secure)
  name: insecure
  required: false
  section: Collect
  type: 8
- defaultvalue: '120'
  display: Request Timeout
  name: request_timeout
  required: false
  section: Collect
  type: 0
description: Custom Tenable.sc integration for retrieving detailed vulnerability analysis data, including plugin output, first seen, last seen, mitigation status, and SLA summary.
display: Tenable.sc Advanced Analysis
name: Tenable.sc Advanced Analysis
script:
  commands:
  - arguments:
    - name: plugin_id
      required: true
    - name: repository_ids
    - name: severity
    - defaultValue: '5'
      name: limit
    - defaultValue: cumulative
      name: source_type
    description: Tests the Tenable.sc Analysis API and returns detailed vulnerability fields for one plugin.
    name: tenable-sc-analysis-test
  - arguments:
    - name: plugin_id
      required: true
    - name: repository_ids
    - name: severity
    - defaultValue: '50'
      name: limit
    - defaultValue: cumulative
      name: source_type
    description: Retrieves detailed Tenable.sc vulnerability records including plugin output, first seen, last seen, and mitigation status.
    name: tenable-sc-vulnerability-details
  - arguments:
    - description: 'Comma-separated Tenable.sc repository IDs, for example: 17,14.'
      name: repository_ids
      required: true
    - defaultValue: '30'
      name: lookback_days
    - defaultValue: '3'
      name: critical_sla_days
    - defaultValue: '10'
      name: high_sla_days
    - defaultValue: '17'
      name: medium_sla_days
    - defaultValue: '50'
      description: Low vulnerability SLA threshold in days.
      name: low_sla_days
    - defaultValue: 0:1
      description: Tenable.sc Last Observed range used for all SLA calculations. Use 0:1 for findings observed within the last day.
      name: last_seen_range
    description: Retrieves the Tenable.sc SLA summary for active external vulnerabilities, including total, within-SLA, and overdue counts.
    name: tenable-sc-get-external-sla-summary
    outputs:
    - contextPath: TenableSC.ExternalSLA.Severity
      type: string
    - contextPath: TenableSC.ExternalSLA.SLADays
      type: number
    - contextPath: TenableSC.ExternalSLA.TotalVulnerabilities
      type: number
    - contextPath: TenableSC.ExternalSLA.WithinSLA
      type: number
    - contextPath: TenableSC.ExternalSLA.Overdue
      type: number
    - contextPath: TenableSC.ExternalSLA.TotalRange
      type: string
    - contextPath: TenableSC.ExternalSLA.WithinSLARange
      type: string
    - contextPath: TenableSC.ExternalSLA.OverdueRange
      type: string
    - contextPath: TenableSC.ExternalSLA.RepositoryIDs
      type: string
    - contextPath: TenableSC.ExternalSLA.SourceType
      type: string
    - contextPath: TenableSC.ExternalSLA.LastUpdated
      type: date
    - contextPath: TenableSC.ExternalSLA.LastSeenRange
      type: string
  - arguments:
    - name: repository_ids
      required: true
    - defaultValue: Critical,High,Medium,Low
      name: severity
    - defaultValue: '200'
      name: page_size
    - defaultValue: '30'
      name: max_pages
    - defaultValue: cumulative
      name: source_type
    - defaultValue: 'true'
      name: save_to_list
    - defaultValue: Tenable_SC_Daily_Advanced_Dataset_JSON
      name: output_list
    - defaultValue: '5'
      name: preview_rows
    - description: Optional Tenable.sc Last Seen Analysis range. Use 0:1 for findings observed within the last day. Leave empty to disable this filter.
      name: last_seen_range
    description: Retrieves a paginated detailed vulnerability dataset from Tenable.sc and saves it to an XSOAR list for CSV enrichment.
    name: tenable-sc-get-vulnerability-dataset
    outputs:
    - contextPath: TenableSC.VulnerabilityDataset.GeneratedAt
    - contextPath: TenableSC.VulnerabilityDataset.RepositoryIDs
    - contextPath: TenableSC.VulnerabilityDataset.Severity
    - contextPath: TenableSC.VulnerabilityDataset.SourceType
    - contextPath: TenableSC.VulnerabilityDataset.CollectedRecords
    - contextPath: TenableSC.VulnerabilityDataset.PaginationLimitReached
    - contextPath: TenableSC.VulnerabilityDataset.SavedToList
    - contextPath: TenableSC.VulnerabilityDataset.OutputList
    - contextPath: TenableSC.VulnerabilityDataset.SeverityStats
    - contextPath: TenableSC.VulnerabilityDataset.Preview
    - contextPath: TenableSC.VulnerabilityDataset.Records
  dockerimage: demisto/python3:3.12.13.10404775
  runonce: false
  script: ''
  subtype: python3
  type: python
sectionorder:
- Connect
- Collect
fromversion: 6.0.0
tests:
- No tests (auto formatted)
