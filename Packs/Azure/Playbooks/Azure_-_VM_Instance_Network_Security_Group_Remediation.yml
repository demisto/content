contentitemexportablefields:
  contentitemfields: {}
description: |-
  This playbook adds new Azure Network Security Group (NSG) rules to NSGs attached to a NIC. The new rules will give access only to a private IP address range and block traffic that's exposed to the public internet ([using the private IP of the VM as stated in Azure documentation](https://learn.microsoft.com/en-us/azure/virtual-network/network-security-groups-overview)). For example, if RDP is exposed to the public internet, this playbook adds new firewall rules that only allow traffic from private IP addresses and blocks the rest of the RDP traffic.

  Conditions and limitations:
  - Limited to one resource group.
  - 2 priorities lower than the offending rule priority must be available.
  - Adds rules to NSGs associated to NICs.
id: 'Azure - VM Instance Network Security Group Remediation'
inputSections:
- description: Generic group for inputs
  inputs:
  - AssetID
  - PublicIP
  - RemoteProtocol
  - RemotePort
  - IntegrationInstance
  - RemediationAllowRanges
  name: General (Inputs group)
inputs:
- description: The Asset ID of the VM Instance
  key: AssetID
  playbookInputQuery:
  required: true
  value: {}
- description: The Public IP whose exposure to remediate.
  key: PublicIP
  playbookInputQuery:
  required: true
  value: {}
- description: The remote protocol that is publicly exposed.
  key: RemoteProtocol
  playbookInputQuery:
  required: true
  value: {}
- description: The remote port that is publicly exposed.
  key: RemotePort
  playbookInputQuery:
  required: true
  value: {}
- description: Azure Network Security Groups integration instance to use if you have multiple instances configured (optional).
  key: IntegrationInstance
  playbookInputQuery:
  required: false
  value: {}
- description: Comma-separated list of IPv4 network ranges to be used as source addresses for the `cortex-remediation-allow-port-<port#>-<tcp|udp>` rule to be created.  Typically this will be private IP ranges (to allow access within the vnet and bastion hosts) but other networks can be added as needed.
  key: RemediationAllowRanges
  playbookInputQuery:
  required: false
  value:
    simple: 172.16.0.0/12,10.0.0.0/8,192.168.0.0/16
name: Azure - VM Instance Network Security Group Remediation
outputSections:
- description: Generic group for outputs
  name: General (Outputs group)
  outputs:
  - remediatedFlag
  - remediation_action
outputs:
- contextPath: remediatedFlag
  description: Output key to determine if remediation was successfully done.
  type: boolean
- contextPath: remediation_action
  description: Textual summary of remediation action(s) that were performed.
  type: string
