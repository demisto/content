id: Azure - VM Instance Network Security Group Remediation
version: -1
contentitemexportablefields:
  contentitemfields: {}
name: Azure - VM Instance Network Security Group Remediation
description: "This playbook adds new Azure Network Security Group (NSG) rules to NSGs attached to a NIC. The new rules will give access only to a private IP address range and block traffic that's exposed to the public internet ([using the private IP of the VM as stated in Azure documentation](https://learn.microsoft.com/en-us/azure/virtual-network/network-security-groups-overview)). For example, if RDP is exposed to the public internet, this playbook adds new firewall rules that only allow traffic from private IP addresses and blocks the rest of the RDP traffic.\n\nConditions and limitations:\n- Limited to one resource group.\n- 2 priorities lower than the offending rule priority must be available.\n- Adds rules to NSGs associated to NICs."
