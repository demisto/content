commonfields:
  id: SpecterOpsBHE
  version: -1
vcShouldKeepItemLegacyProdMachine: false
name: SpecterOpsBHE
display: SpecterOpsBHE
category: Network Security
image: data:image/png;base64,
description: Use the SpecterOpsBHE integration to retrieve attack path findings 
  from BloodHound Enterprise to streamline incident creation and investigation.
detaileddescription: "## BloodHound Enterprise\nBloodHound Enterprise reduces risk
  in Active Directory and Microsoft Azure environments by continuously identifying
  and quantifying attack paths that attackers use to escalate privileges.### Set up
  a SpecterOpsBHE integration instance\n\n The SpecterOpsBHE integration automatically
  ingests attack path findings from BloodHound into Cortex XSOAR, streamlining incident
  creation and investigation.\n\n### Details Configure a SpecterOpsBHE integration
  instance by providing the following details:\n - **(Required)** BloodHound Enterprise
  Domain (for example, https://example.bloodhoundenterprise.io)\n- **(Required)**
  Token ID \n - **(Required)** Token Key\n- Proxy URL\n- Proxy URL Username\n- Proxy
  URL Password\n- Finding Environment\n- Finding category\n\n ### Configure the Instance
  to Fetch Attack Paths from BHE:\n - **(Required)** Select the **Fetches incidents**
  checkbox.\n- Set the **Incident Type** to SpecterOpsBHE Attack Path.\n - **(Required)**
  Choose an **Incidents Fetch Interval** for fetching attack paths (Default is 10
  mins) .\n\n ### Get the BloodHound Enterprise API Token ID and Token Key\n - Log
  in to your BloodHound Enterprise (BHE) tenant.\n - From the left sidebar, navigate
  to **My Profile**.\n- Select **API Key Management**.\n - Click **Create Token**.\n-
  Enter a descriptive name for the token and click **Save**.\n - Copy and securely
  store the displayed API Key/ID pair, then click **Close**.\n\n\n"
