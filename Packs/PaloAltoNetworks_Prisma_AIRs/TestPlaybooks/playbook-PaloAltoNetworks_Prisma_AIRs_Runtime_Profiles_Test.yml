description: Test playbook for Prisma AIRs Runtime security profiles and topics. Tests profile + topic CRUD and topic-apply, ensuring only the profile and topic created by this playbook are modified, applied, and deleted.
id: PaloAltoNetworks_Prisma_AIRs_Runtime_Profiles_Test
inputs:
- key: ProfileName
  value:
    simple: test-runtime-profile
  required: false
  description: Name of the test security profile to create (unique so only this profile is operated on)
  playbookInputQuery:
- key: TopicName
  value:
    simple: test-runtime-topic
  required: false
  description: Name of the test custom topic to create (unique so only this topic is operated on)
  playbookInputQuery:
- key: TopicDescription
  value:
    simple: Test topic created by test playbook
  required: false
  description: Description of the test custom topic
  playbookInputQuery:
- key: TopicExamples
  value:
    simple: example prompt one,example prompt two
  required: false
  description: Comma-separated examples for the custom topic
  playbookInputQuery:
- key: UpdatedTopicDescription
  value:
    simple: Updated test topic description
  required: false
  description: Updated description for the custom topic
  playbookInputQuery:
- key: ApplyAction
  value:
    simple: block
  required: false
  description: Action to apply for the topic on the profile (block or allow)
  playbookInputQuery:
- key: ProfilePolicy
  value:
    simple: '{"ai-security-profiles":[{"model-type":"default","model-configuration":{"app-protection":{"default-url-category":{"member":null},"url-detected-action":""},"data-protection":{"data-leak-detection":{"action":"","member":null},"database-security":null},"latency":{"inline-timeout-action":"block","max-inline-latency":5},"mask-data-in-storage":false,"model-protection":[],"agent-protection":[]}}],"dlp-data-profiles":[]}'
  required: false
  description: JSON policy for the security profile. The API requires a non-empty default policy. Override with your tenant's policy if needed.
  playbookInputQuery:
name: PaloAltoNetworks_Prisma_AIRs_Runtime_Profiles_Test
