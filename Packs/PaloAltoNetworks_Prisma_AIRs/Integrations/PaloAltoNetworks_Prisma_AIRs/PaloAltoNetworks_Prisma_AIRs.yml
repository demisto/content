category: Network Security
commonfields:
  id: Palo Alto Networks - Prisma AIRs AI Security
  version: -1
configuration:
- defaultvalue: https://api.sase.paloaltonetworks.com
  display: Server URL
  name: url
  required: true
  type: 0
  section: Connect
- display: API Client ID
  section: Connect
  name: credentials
  required: true
  type: 9
  displaypassword: API Client Secret
- additionalinfo: 'Default Tenant Services Group ID to use for API calls. Example: 1234567890.'
  display: Tenant Services Group ID
  name: tsg_id
  required: true
  type: 0
  section: Connect
- display: Runtime API Key
  section: Connect
  name: runtime_api_key
  required: true
  type: 9
  additionalinfo: 'Runtime API Key for Prisma AIRs Scanner API. This is used exclusively for runtime scanning operations and is different from the OAuth2 Client ID/Secret used for management operations.'
  hiddenusername: true
  displaypassword: Runtime API Key
- display: Scanner API Base URL
  section: Connect
  name: scanner_base_url
  required: false
  type: 0
  defaultvalue: 'https://service.api.aisecurity.paloaltonetworks.com'
  additionalinfo: 'Scanner API base URL for runtime scanning operations. Default is US region. For other regions: EU: https://service-de.api.aisecurity.paloaltonetworks.com, IN: https://service-in.api.aisecurity.paloaltonetworks.com, SG: https://service-sg.api.aisecurity.paloaltonetworks.com. This must match the region selected during deployment profile creation.'
  advanced: true
- display: DLP API Base URL
  section: Connect
  name: dlp_base_url
  required: false
  type: 0
  defaultvalue: 'https://api.dlp.paloaltonetworks.com'
  additionalinfo: 'DLP API base URL for DLP management operations (dictionaries, patterns, filtering profiles). Default is the global DLP endpoint. Change only if using a regional or custom DLP endpoint.'
  advanced: true
- defaultvalue: 'false'
  display: Trust any certificate (not secure)
  name: insecure
  type: 8
  section: Connect
  advanced: true
  required: false
- defaultvalue: 'false'
  display: Use system proxy settings
  name: proxy
  type: 8
  section: Connect
  advanced: true
  required: false
description: Integrate with Palo Alto Networks Prisma AIRs for AI security capabilities including runtime scanning, red teaming, model security, and DLP configuration.
display: Palo Alto Networks - Prisma AIRs AI Security
name: Palo Alto Networks - Prisma AIRs AI Security
script:
  commands:
  - name: prisma-airs-runtime-scan
    description: Scan a single prompt against a security profile for AI security threats.
    arguments:
    - name: profile_name
      required: true
      description: The name of the security profile to use for scanning.
    - name: prompt
      required: true
      description: The prompt text to scan.
    - name: response
      required: false
      description: Optional response text to scan alongside the prompt.
    - name: tr_id
      required: false
      description: Unique identifier string for correlating the prompt and response transactions. Returned in the scan response.
    - name: session_id
      required: false
      description: Unique identifier string for tracking sessions. Returned in the scan response.
    - name: app_name
      required: false
      description: AI application requesting the content scan.
    - name: app_user
      required: false
      description: End user using the AI application.
    - name: ai_model
      required: false
      description: AI model serving the AI application.
    - name: user_ip
      required: false
      description: End user IP address using the AI application.
    - name: agent_id
      required: false
      description: Agent identifier for metadata tracking.
    - name: agent_version
      required: false
      description: Agent version for metadata tracking.
    - name: agent_arn
      required: false
      description: Agent ARN for metadata tracking.
    outputs:
    - contextPath: PrismaAIRs.RuntimeScan.scan_id
      description: Unique scan identifier.
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.report_id
      description: Report identifier for this scan.
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.tr_id
      description: Transaction ID passed in the request and returned in the response.
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.session_id
      description: Session ID passed in the request and returned in the response.
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.prompt
      description: The scanned prompt text.
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.response
      description: The scanned response text.
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.action
      description: Action taken (allow or block).
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.category
      description: Threat category (benign, malicious, etc.).
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.detected
      description: Whether any threat was detected across prompt or response.
      type: Boolean
    - contextPath: PrismaAIRs.RuntimeScan.prompt_detected
      description: Object containing all detection types for the prompt (e.g., injection, dlp, toxic_content, topic_violation, url_cats, malicious_code, agent).
      type: Unknown
    - contextPath: PrismaAIRs.RuntimeScan.response_detected
      description: Object containing all detection types for the response (e.g., dlp, toxic_content, topic_violation, url_cats, malicious_code, agent, db_security, ungrounded).
      type: Unknown
    - contextPath: PrismaAIRs.RuntimeScan.profile_id
      description: Profile ID used for scanning.
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.profile_name
      description: Profile name used for scanning.
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.source
      description: Source of the scan request.
      type: String
    - contextPath: PrismaAIRs.RuntimeScan.timeout
      description: Whether any detection service timed out.
      type: Boolean
    - contextPath: PrismaAIRs.RuntimeScan.error
      description: Whether any detection service encountered an error.
      type: Boolean
    - contextPath: PrismaAIRs.RuntimeScan.errors
      description: List of detection service errors or timeouts.
      type: Unknown
  - name: prisma-airs-runtime-api-keys-list
    description: List all Runtime API Keys configured in Prisma AIRs.
    arguments:
    - name: limit
      required: false
      description: Maximum number of API keys to return.
      defaultValue: '50'
    outputs:
    - contextPath: PrismaAIRs.ApiKey.id
      description: API Key ID (UUID).
      type: String
    - contextPath: PrismaAIRs.ApiKey.name
      description: API Key name.
      type: String
    - contextPath: PrismaAIRs.ApiKey.last8
      description: Last 8 characters of the API key (for identification).
      type: String
    - contextPath: PrismaAIRs.ApiKey.created_at
      description: API Key creation timestamp.
      type: Date
    - contextPath: PrismaAIRs.ApiKey.expires_at
      description: API Key expiration timestamp.
      type: Date
    - contextPath: PrismaAIRs.ApiKey.revoked
      description: Whether the API key has been revoked.
      type: Boolean
  - name: prisma-airs-runtime-api-keys-create
    description: Create a new Runtime API Key. WARNING - The full API key secret is only shown once during creation. Save it securely.
    arguments:
    - name: api_key_name
      required: true
      description: Name for the new API key.
    - name: auth_code
      required: true
      description: Deployment profile auth code (obtained from deployment profile).
    - name: cust_app
      required: true
      description: Customer application name using this API key.
    - name: rotation_time_interval
      required: true
      description: Rotation time interval (number).
    - name: rotation_time_unit
      required: true
      description: Rotation time unit.
      auto: PREDEFINED
      predefined:
      - 'hours'
      - 'days'
      - 'months'
    - name: created_by
      required: true
      description: Email of the user creating the API key.
    - name: dp_name
      required: false
      description: Deployment profile name (optional).
    - name: cust_env
      required: false
      description: Customer environment (optional).
    - name: cust_cloud_provider
      required: false
      description: Customer cloud provider (optional).
    - name: cust_ai_agent_framework
      required: false
      description: Customer AI agent framework (optional).
    outputs:
    - contextPath: PrismaAIRs.ApiKey.id
      description: Created API Key ID (UUID).
      type: String
    - contextPath: PrismaAIRs.ApiKey.name
      description: API Key name.
      type: String
    - contextPath: PrismaAIRs.ApiKey.api_key
      description: FULL API KEY SECRET - Only shown once! Save this securely.
      type: String
    - contextPath: PrismaAIRs.ApiKey.last8
      description: Last 8 characters of the API key.
      type: String
    - contextPath: PrismaAIRs.ApiKey.auth_code
      description: Auth code associated with the key.
      type: String
    - contextPath: PrismaAIRs.ApiKey.expires_at
      description: API Key expiration timestamp.
      type: Date
    - contextPath: PrismaAIRs.ApiKey.revoked
      description: Whether the API key has been revoked.
      type: Boolean
    - contextPath: PrismaAIRs.ApiKey.created_at
      description: Creation timestamp.
      type: Date
    - contextPath: PrismaAIRs.ApiKey.created_by
      description: User who created the key.
      type: String
    - contextPath: PrismaAIRs.ApiKey.cust_app
      description: Customer application name.
      type: String
  - name: prisma-airs-runtime-api-keys-regenerate
    description: Regenerate an existing Runtime API Key. WARNING - This creates a NEW key with a NEW UUID and invalidates the old key. The new secret is only shown once.
    arguments:
    - name: api_key_id
      required: true
      description: UUID of the API key to regenerate.
    - name: rotation_time_interval
      required: true
      description: New rotation time interval (number).
    - name: rotation_time_unit
      required: true
      description: New rotation time unit.
      auto: PREDEFINED
      predefined:
      - 'hours'
      - 'days'
      - 'months'
    - name: updated_by
      required: false
      description: Email of the user performing regeneration (optional).
    outputs:
    - contextPath: PrismaAIRs.ApiKey.id
      description: NEW API Key ID (UUID) - different from the old one.
      type: String
    - contextPath: PrismaAIRs.ApiKey.name
      description: API Key name (same as before).
      type: String
    - contextPath: PrismaAIRs.ApiKey.api_key
      description: NEW FULL API KEY SECRET - Only shown once! The old key is now invalid.
      type: String
    - contextPath: PrismaAIRs.ApiKey.last8
      description: Last 8 characters of the new API key.
      type: String
    - contextPath: PrismaAIRs.ApiKey.auth_code
      description: Auth code associated with the key.
      type: String
    - contextPath: PrismaAIRs.ApiKey.expires_at
      description: New expiration timestamp.
      type: Date
    - contextPath: PrismaAIRs.ApiKey.revoked
      description: Whether the API key has been revoked.
      type: Boolean
    - contextPath: PrismaAIRs.ApiKey.updated_at
      description: Update timestamp.
      type: Date
    - contextPath: PrismaAIRs.ApiKey.updated_by
      description: User who regenerated the key.
      type: String
    - contextPath: PrismaAIRs.ApiKey.cust_app
      description: Customer application name.
      type: String
  - name: prisma-airs-runtime-profiles-list
    description: List all runtime security profiles.
    arguments:
    - name: limit
      required: false
      description: Maximum number of profiles to return.
      defaultValue: '50'
    outputs:
    - contextPath: PrismaAIRs.SecurityProfile.id
      description: Profile ID (UUID).
      type: String
    - contextPath: PrismaAIRs.SecurityProfile.name
      description: Profile name.
      type: String
    - contextPath: PrismaAIRs.SecurityProfile.revision
      description: Profile revision number.
      type: Number
    - contextPath: PrismaAIRs.SecurityProfile.active
      description: Whether the profile is active.
      type: Boolean
    - contextPath: PrismaAIRs.SecurityProfile.created_by
      description: User who created the profile.
      type: String
    - contextPath: PrismaAIRs.SecurityProfile.updated_by
      description: User who last updated the profile.
      type: String
    - contextPath: PrismaAIRs.SecurityProfile.last_modified_ts
      description: Last modification timestamp.
      type: Date
    - contextPath: PrismaAIRs.SecurityProfile.tsg_id
      description: Tenant Service Group ID.
      type: String
  - name: prisma-airs-runtime-customer-apps-list
    description: List all customer applications.
    arguments:
    - name: limit
      required: false
      description: Maximum number of customer apps to return.
      defaultValue: '50'
    outputs:
    - contextPath: PrismaAIRs.CustomerApp.id
      description: Customer App ID.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.name
      description: Customer App name.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.model_name
      description: Model name used by the app.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.cloud_provider
      description: Cloud provider.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.environment
      description: Environment (prod, staging, dev).
      type: String
    - contextPath: PrismaAIRs.CustomerApp.ai_agent_framework
      description: AI agent framework used.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.tsg_id
      description: Tenant Service Group ID.
      type: String
  - name: prisma-airs-runtime-customer-apps-get
    description: Get customer application details by name.
    arguments:
    - name: app_name
      required: true
      description: Name of the customer application to retrieve.
    outputs:
    - contextPath: PrismaAIRs.CustomerApp.id
      description: Customer App ID (UUID).
      type: String
    - contextPath: PrismaAIRs.CustomerApp.name
      description: Customer App name.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.model_name
      description: Model name used by the app.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.cloud_provider
      description: Cloud provider (aws, azure, gcp, other).
      type: String
    - contextPath: PrismaAIRs.CustomerApp.environment
      description: Environment (prod, staging, dev).
      type: String
    - contextPath: PrismaAIRs.CustomerApp.ai_agent_framework
      description: AI agent framework used.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.tsg_id
      description: Tenant Service Group ID.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.status
      description: Customer App status.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.created_by
      description: Email of user who created the app.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.updated_by
      description: Email of user who last updated the app.
      type: String
  - name: prisma-airs-runtime-customer-apps-update
    description: Update a customer application configuration.
    arguments:
    - name: customer_app_id
      required: true
      description: UUID of the customer application to update.
    - name: app_name
      required: true
      description: Application name.
    - name: cloud_provider
      required: true
      description: Cloud provider.
      auto: PREDEFINED
      predefined:
      - aws
      - azure
      - gcp
      - other
    - name: environment
      required: true
      description: Environment.
      auto: PREDEFINED
      predefined:
      - prod
      - staging
      - dev
    - name: tsg_id
      required: false
      description: Tenant Service Group ID (defaults to configured TSG ID if not provided).
    - name: model_name
      required: false
      description: Model name used by the application.
    - name: ai_agent_framework
      required: false
      description: AI agent framework used by the application.
    - name: updated_by
      required: false
      description: Email of user performing the update.
    outputs:
    - contextPath: PrismaAIRs.CustomerApp.id
      description: Customer App ID (UUID).
      type: String
    - contextPath: PrismaAIRs.CustomerApp.name
      description: Customer App name.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.model_name
      description: Model name used by the app.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.cloud_provider
      description: Cloud provider (aws, azure, gcp, other).
      type: String
    - contextPath: PrismaAIRs.CustomerApp.environment
      description: Environment (prod, staging, dev).
      type: String
    - contextPath: PrismaAIRs.CustomerApp.ai_agent_framework
      description: AI agent framework used.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.tsg_id
      description: Tenant Service Group ID.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.status
      description: Customer App status.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.created_by
      description: Email of user who created the app.
      type: String
    - contextPath: PrismaAIRs.CustomerApp.updated_by
      description: Email of user who last updated the app.
      type: String
  - name: prisma-airs-runtime-customer-apps-consumption
    description: Get per-application token consumption and session statistics over the requested time window.
    arguments:
    - name: app_id
      required: true
      description: Customer Application UUID (from customer-apps-list or customer-apps-get).
    - name: app_name
      required: true
      description: Application display name (literal metadata.app_name value from scan payloads).
    - name: time_interval
      required: false
      description: Look-back window in days (7, 30, or 60).
      defaultValue: '30'
      auto: PREDEFINED
      predefined:
      - '7'
      - '30'
      - '60'
    - name: time_unit
      required: false
      description: Time unit (only 'days' is supported by API).
      defaultValue: 'days'
    outputs:
    - contextPath: PrismaAIRs.CustomerAppConsumption.id
      description: Customer App ID.
      type: String
    - contextPath: PrismaAIRs.CustomerAppConsumption.name
      description: Application name.
      type: String
    - contextPath: PrismaAIRs.CustomerAppConsumption.cloud
      description: Cloud provider.
      type: String
    - contextPath: PrismaAIRs.CustomerAppConsumption.source
      description: Source (api, sdk, etc.).
      type: String
    - contextPath: PrismaAIRs.CustomerAppConsumption.created_at
      description: Creation timestamp.
      type: Date
    - contextPath: PrismaAIRs.CustomerAppConsumption.updated_at
      description: Last update timestamp.
      type: Date
    - contextPath: PrismaAIRs.CustomerAppConsumption.profiles
      description: Attached security profiles.
      type: Unknown
    - contextPath: PrismaAIRs.CustomerAppConsumption.average_daily_tokens
      description: Average daily token consumption.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppConsumption.average_daily_tokens_scale
      description: Scale for daily tokens (K, M, etc.).
      type: String
    - contextPath: PrismaAIRs.CustomerAppConsumption.monthly_total_tokens
      description: Monthly total token consumption.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppConsumption.monthly_total_tokens_scale
      description: Scale for monthly tokens (K, M, etc.).
      type: String
    - contextPath: PrismaAIRs.CustomerAppConsumption.sessions_total
      description: Total sessions in time window.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppConsumption.sessions_violating
      description: Number of violating sessions.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppConsumption.last_session_id
      description: Last session ID.
      type: String
    - contextPath: PrismaAIRs.CustomerAppConsumption.most_recent_session_time
      description: Most recent session timestamp.
      type: Date
    - contextPath: PrismaAIRs.CustomerAppConsumption.violations_critical
      description: Critical violations count.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppConsumption.violations_high
      description: High violations count.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppConsumption.violations_medium
      description: Medium violations count.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppConsumption.violations_low
      description: Low violations count.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppConsumption.violations_total
      description: Total violations count.
      type: Number
  - name: prisma-airs-runtime-customer-apps-violations
    description: Get per-detector violation severity breakdown for an application over the requested time window.
    arguments:
    - name: app_id
      required: true
      description: Customer Application UUID (from customer-apps-list or customer-apps-get).
    - name: app_name
      required: true
      description: Application display name (literal metadata.app_name value from scan payloads).
    - name: time_interval
      required: false
      description: Look-back window in days (7, 30, or 60).
      defaultValue: '30'
      auto: PREDEFINED
      predefined:
      - '7'
      - '30'
      - '60'
    - name: time_unit
      required: false
      description: Time unit (only 'days' is supported by API).
      defaultValue: 'days'
    outputs:
    - contextPath: PrismaAIRs.CustomerAppViolations.app_id
      description: Customer App ID.
      type: String
    - contextPath: PrismaAIRs.CustomerAppViolations.app_name
      description: Application name.
      type: String
    - contextPath: PrismaAIRs.CustomerAppViolations.total_violating
      description: Total number of violating sessions.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppViolations.time_interval
      description: Time window in days.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppViolations.time_unit
      description: Time unit used.
      type: String
    - contextPath: PrismaAIRs.CustomerAppViolations.detectors
      description: Per-detector violation breakdown array.
      type: Unknown
    - contextPath: PrismaAIRs.CustomerAppViolations.detectors.detection_type
      description: Detector type (agent_security, dbs, dlp, malicious_code, pi, source_code, tc, topic_guardrails, uf, contextual_grounding).
      type: String
    - contextPath: PrismaAIRs.CustomerAppViolations.detectors.critical
      description: Critical violations count for this detector.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppViolations.detectors.high
      description: High violations count for this detector.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppViolations.detectors.medium
      description: Medium violations count for this detector.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppViolations.detectors.low
      description: Low violations count for this detector.
      type: Number
    - contextPath: PrismaAIRs.CustomerAppViolations.detectors.total
      description: Total violations count for this detector.
      type: Number
  - name: prisma-airs-runtime-deployment-profiles-list
    description: List all deployment profiles.
    arguments:
    - name: limit
      required: false
      description: Maximum number of deployment profiles to return.
      defaultValue: '50'
    - name: unactivated
      required: false
      description: Filter to show only unactivated profiles.
      defaultValue: 'false'
      auto: PREDEFINED
      predefined:
      - 'true'
      - 'false'
    outputs:
    - contextPath: PrismaAIRs.DeploymentProfile.name
      description: Deployment Profile name.
      type: String
    - contextPath: PrismaAIRs.DeploymentProfile.auth_code
      description: Authentication code.
      type: String
    - contextPath: PrismaAIRs.DeploymentProfile.tsg_id
      description: Tenant Service Group ID.
      type: String
    - contextPath: PrismaAIRs.DeploymentProfile.status
      description: Profile status.
      type: String
    - contextPath: PrismaAIRs.DeploymentProfile.expiration_date
      description: Expiration date.
      type: Date
    - contextPath: PrismaAIRs.DeploymentProfile.ave_text_records
      description: Average text records.
      type: Number
  - name: prisma-airs-runtime-dlp-profiles-list
    description: List all DLP data profiles (v2 API).
    arguments:
    - name: page
      required: false
      description: Page number for pagination.
      defaultValue: '0'
    - name: size
      required: false
      description: Number of results per page.
      defaultValue: '50'
    outputs:
    - contextPath: PrismaAIRs.DlpProfile.id
      description: DLP Profile ID.
      type: String
    - contextPath: PrismaAIRs.DlpProfile.name
      description: DLP Profile name.
      type: String
    - contextPath: PrismaAIRs.DlpProfile.description
      description: DLP Profile description.
      type: String
    - contextPath: PrismaAIRs.DlpProfile.tenant_id
      description: Tenant ID.
      type: String
    - contextPath: PrismaAIRs.DlpProfile.type
      description: Profile type (custom or predefined).
      type: String
    - contextPath: PrismaAIRs.DlpProfile.profile_status
      description: Profile status (active, disabled, deleted).
      type: String
    - contextPath: PrismaAIRs.DlpProfile.profile_type
      description: Profile type (basic or advanced).
      type: String
    - contextPath: PrismaAIRs.DlpProfile.is_granular_data_profile
      description: Whether this is a granular data profile.
      type: Boolean
    - contextPath: PrismaAIRs.DlpProfile.is_parent_managed
      description: Whether the profile is parent-managed.
      type: Boolean
    - contextPath: PrismaAIRs.DlpProfile.version
      description: DLP Profile version.
      type: Number
    - contextPath: PrismaAIRs.DlpProfile.created_at
      description: Creation timestamp.
      type: Date
    - contextPath: PrismaAIRs.DlpProfile.updated_at
      description: Last update timestamp.
      type: Date
    - contextPath: PrismaAIRs.DlpProfile.created_by
      description: User who created the profile.
      type: String
    - contextPath: PrismaAIRs.DlpProfile.updated_by
      description: User who last updated the profile.
      type: String
  - name: prisma-airs-runtime-dlp-dictionaries-list
    description: List DLP dictionaries.
    arguments:
    - name: page
      required: false
      description: Page number for pagination.
      defaultValue: '0'
    - name: size
      required: false
      description: Number of results per page.
      defaultValue: '50'
    - name: include_keywords
      required: false
      description: Include keyword list in response.
      auto: PREDEFINED
      predefined:
      - 'true'
      - 'false'
