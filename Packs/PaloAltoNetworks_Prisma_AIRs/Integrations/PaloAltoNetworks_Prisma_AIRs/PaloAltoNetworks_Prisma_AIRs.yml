  - name: prisma-airs-runtime-topics-apply
    description: Apply a topic to a security profile (additive - preserves existing topics). This command orchestrates multiple API calls to assign a custom topic to a profile's topic-guardrails configuration.
    arguments:
    - name: profile_name
      required: true
      description: Security profile name to apply the topic to.
    - name: topic_name
      required: true
      description: Topic name to apply. The topic must already exist (create with prisma-airs-runtime-topics-create).
    - name: action
      required: false
      auto: PREDEFINED
      predefined:
      - allow
      - block
      defaultValue: block
      description: Topic action. 'block' = block prompts matching this topic. 'allow' = allow prompts matching this topic. Default is 'block'.
    - name: guardrail_action
      required: false
      auto: PREDEFINED
      predefined:
      - allow
      - block
      defaultValue: block
      description: Guardrail-level default action. 'block' = block all unless explicitly allowed (requires allow topics). 'allow' = allow all unless explicitly blocked (only block topics needed). Default is 'block'.
    outputs:
    - contextPath: PrismaAIRs.TopicApplied.profile_name
      description: Security profile name.
      type: String
    - contextPath: PrismaAIRs.TopicApplied.profile_id
      description: Security profile UUID.
      type: String
    - contextPath: PrismaAIRs.TopicApplied.topic_name
