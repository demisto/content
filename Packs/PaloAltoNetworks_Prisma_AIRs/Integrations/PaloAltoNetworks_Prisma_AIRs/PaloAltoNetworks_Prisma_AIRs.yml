  - name: prisma-airs-redteam-scan-create
    description: Create a new Red Team scan job. This command submits the scan and returns immediately without polling. Use prisma-airs-redteam-scan-get to check status.
    arguments:
    - name: name
      required: true
      description: Scan name for identification.
    - name: target_uuid
      required: true
      description: UUID of the target to scan.
    - name: job_type
      required: false
      description: Scan type - STATIC (attack library), DYNAMIC (agent-driven), or CUSTOM (prompt sets).
      defaultValue: 'STATIC'
      auto: PREDEFINED
      predefined:
      - 'STATIC'
      - 'DYNAMIC'
      - 'CUSTOM'
    - name: categories
      required: false
      description: 'JSON object for category filtering (STATIC scans only). Example: {"category": {"subcategory": true}}. Empty {} means all categories.'
    - name: stream_breadth
      required: false
      description: Parallel agents per goal (DYNAMIC scans only). Default is 6.
      defaultValue: '6'
    - name: stream_depth
      required: false
      description: Maximum conversation turns per goal (DYNAMIC scans only). Default is 10.
      defaultValue: '10'
    - name: attack_goals
      required: false
      description: 'JSON array of attack goal strings (DYNAMIC scans only). Example: ["Extract PII", "Bypass content filter"].'
    - name: custom_prompt_sets
      required: false
      description: Comma-separated list of prompt set UUIDs (CUSTOM scans only). Required for CUSTOM type.
    outputs:
    - contextPath: PrismaAIRs.RedTeamScanCreate.uuid
      description: Created scan job UUID.
      type: String
    - contextPath: PrismaAIRs.RedTeamScanCreate.tsg_id
      description: Tenant Service Group ID.
      type: String
    - contextPath: PrismaAIRs.RedTeamScanCreate.name
      description: Scan name.
      type: String
    - contextPath: PrismaAIRs.RedTeamScanCreate.job_type
      description: Job type (STATIC, DYNAMIC, CUSTOM).
      type: String
    - contextPath: PrismaAIRs.RedTeamScanCreate.status
      description: Initial scan status (typically QUEUED).
      type: String
    - contextPath: PrismaAIRs.RedTeamScanCreate.target_id
      description: Target UUID being scanned.
      type: String
    - contextPath: PrismaAIRs.RedTeamScanCreate.target_type
      description: Target type.
      type: String
    - contextPath: PrismaAIRs.RedTeamScanCreate.total
      description: Total number of attacks in the scan.
      type: Number
    - contextPath: PrismaAIRs.RedTeamScanCreate.completed
      description: Number of completed attacks (initially 0).
      type: Number
    - contextPath: PrismaAIRs.RedTeamScanCreate.score
      description: Risk score (null until scan completes).
      type: Number
    - contextPath: PrismaAIRs.RedTeamScanCreate.asr
      description: Attack Success Rate (null until scan completes).
      type: Number
    - contextPath: PrismaAIRs.RedTeamScanCreate.created_at
      description: Creation timestamp.
      type: Date
    - contextPath: PrismaAIRs.RedTeamScanCreate.updated_at
