name: DiagnoseSyslogCollector
script: ''
type: python
tags:
- Utilities
comment: Diagnoses why the syslog collector on a specified Broker VM is failing by checking broker status and collection_auditing logs.
enabled: true
args:
- description: The name of the Broker VM to diagnose.
  name: broker_vm_name
  required: true
- description: Timeframe for error checking (e.g., "24 hours", "7 days").
  name: timeframe
  defaultValue: "24 hours"
outputs:
- contextPath: Core.SyslogCollectorDiagnostics.status
