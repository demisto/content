commonfields:
  id: SupportTicketClassification
  version: -1
name: SupportTicketClassification
isllm: true
promptConfig:
  temperature: 0
  maxOutputTokens: 2000
  webSearch: false
systemprompt: |-
  You are an expert Palo Alto Networks Cortex support ticket classifier. Your objective is to deterministically map technical support ticket details to the exact 'issue_category' and 'problem_concentration' from the provided taxonomy.

  CRITICAL RULES:
  1. STRICT COMPLIANCE: You MUST ONLY select values that exist verbatim in the provided taxonomy. Never invent, modify, or hallucinate categories or problem concentrations.
  2. VALID COMBINATIONS: You MUST select a `problem_concentration` that strictly belongs to the list of options for your chosen `issue_category`. Do not mix categories and concentrations.
  3. ADMINISTRATIVE DEFAULT: If the ticket description is a single word, a name, or lacks technical context (e.g., "test", "help", "broken"), you MUST output exactly: Tenant Administration and Access Control|||Support Case Creation
  4. HANDLING AMBIGUITY: If the description is technical but ambiguous, select the category/concentration that covers the broadest relevant area. If no concentration clearly fits, select the closest match or "Option not available" (ONLY if that option exists within your selected category's list).
  5. SECONDARY SIGNALS: Use issue impact, issue frequency, and timing (if discernible from the text) to refine your choice, but the primary driver is the description.
  6. STRICT OUTPUT FORMAT: 
     - You MUST output EXACTLY ONE LINE.
     - The line must be formatted as: Issue Category|||Problem Concentration
     - DO NOT include markdown formatting, code blocks (e.g., ```), quotation marks, reasoning, or any other text.

  EXAMPLE OUTPUT:
  XDR Agent|||XDR Agent for Enterprise - Linux

userprompt: |-
  Process the following ticket using the provided taxonomy.

  <taxonomy>
  ${taxonomy}
  </taxonomy>

  <ticket_description>
  ${description}
  </ticket_description>

  Output the classification strictly as Category|||Concentration.

type: python
tags: []
outputs:
- contextPath: Core.SupportTicketClassification.result
  description: 'The classification result as a delimited string in the format: issue_category|||problem_concentration. Use the Split transformer with delimiter ||| to parse.'
  type: string
args:
- name: description
  required: true
  description: The user-provided description of the support issue.
- name: taxonomy
  required: true
  description: 'The support ticket taxonomy as a single string. Structure: a list of dictionaries where each dictionary has one key (the issue_category) mapped to a list of its allowed problem_concentrations. Example: [{"Agent": ["Communication", "Device Control"]}, {"Modules": ["AI Security", "Identity Security"]}]. Obtained from the core-get-support-ticket-taxonomy command output.'
comment: Classifies a support ticket by selecting the most appropriate issue category and problem concentration from a dynamically provided taxonomy, based on user-provided ticket details. The taxonomy argument expects the string output of core-get-support-ticket-taxonomy (a list of dicts mapping each issue_category to its problem_concentrations). Returns a delimited string parseable with the Split transformer using delimiter |||.
subtype: python3
runonce: false
dockerimage: demisto/python3:3.12.12.6391686
fromversion: 8.13.0
tests:
- No tests
marketplaces:
- platform
supportedModules:
- agentix
- xsiam
- edr
