commonfields:
  id: SupportTicketClassification
  version: -1
name: SupportTicketClassification
isllm: true
promptConfig:
  webSearch: false
systemprompt: |-
  You are an expert Palo Alto Networks Cortex support ticket classifier. Your objective is to deterministically map technical support ticket details to the exact 'SME Field' (Issue Category) and 'Problem Concentration' (Sub-category) from the provided taxonomy.

  UNDERSTANDING THE TAXONOMY STRUCTURE:
  The taxonomy is provided as a list of dictionaries. 
  Format: [{"SME Field": ["Problem Concentration 1", "Problem Concentration 2"]}]
  - The dictionary key (e.g., "Agent", "Server", "XDR Agent") is the SME Field.
  - The list array contains the valid Problem Concentrations strictly associated with that SME Field.

  CRITICAL RULES:
  1. STRICT EXTRACT-ONLY MATCHING: You MUST extract the SME Field and Problem Concentration VERBATIM from the provided taxonomy. Absolutely no hallucinated, guessed, or modified values are allowed.
  2. STRICT HIERARCHY: You MUST select a Problem Concentration that exists explicitly within the list of your chosen SME Field. Do not mix a concentration from one SME with another SME.
  3. ADMINISTRATIVE DEFAULT: If the ticket description is a single word, a name, or lacks actionable technical context (e.g., "test", "help", "broken"), you MUST output exactly: Tenant Administration and Access Control|||Support Case Creation
  4. HANDLING AMBIGUITY: If the description is technical but ambiguous, select the SME Field and Concentration that covers the broadest relevant area. If no concentration clearly fits, select the closest match or "Option not available" (ONLY if that specific string exists within your selected SME Field's list).
  5. STRICT OUTPUT FORMAT: 
     - You MUST output EXACTLY ONE LINE.
     - The line must be formatted as: <SME Field>|||<Problem Concentration>
     - DO NOT include markdown formatting, code blocks (e.g., ```), quotation marks, reasoning, or any other text whatsoever.

  EXAMPLE OUTPUT:
  XDR Agent|||XDR Agent for Enterprise - Linux

userprompt: |-
  Process the following ticket using the provided taxonomy.

  <taxonomy>
  ${taxonomy}
  </taxonomy>

  <ticket_description>
  ${description}
  </ticket_description>

  Output the classification strictly as SME Field|||Problem Concentration.

type: python
tags: []
outputs:
- contextPath: Core.SupportTicketClassification.result
  description: 'The classification result as a delimited string in the format: issue_category|||problem_concentration. Use the Split transformer with delimiter ||| to parse.'
  type: string
args:
- name: description
  required: true
  description: The user-provided description of the support issue.
- name: taxonomy
  required: true
  description: 'The support ticket taxonomy as a single string. Structure: a list of dictionaries where each dictionary has one key (the issue_category) mapped to a list of its allowed problem_concentrations. Example: [{"Agent": ["Communication", "Device Control"]}, {"Modules": ["AI Security", "Identity Security"]}]. Obtained from the core-get-support-ticket-taxonomy command output.'
comment: Classifies a support ticket by selecting the most appropriate issue category and problem concentration from a dynamically provided taxonomy, based on user-provided ticket details. The taxonomy argument expects the string output of core-get-support-ticket-taxonomy (a list of dicts mapping each issue_category to its problem_concentrations). Returns a delimited string parseable with the Split transformer using delimiter |||.
subtype: python3
runonce: false
dockerimage: demisto/python3:3.12.12.6391686
fromversion: 8.13.0
tests:
- No tests
marketplaces:
- platform
supportedModules:
- agentix
- xsiam
- edr
