commonfields:
  id: FillSupportTicket
  version: -1
name: FillSupportTicket
script: ''
type: python
tags:
- Utility
comment: Returns fields for the completion of the support ticket.
enabled: true
args:
- name: description
  description: A detailed description of the issue. Include error messages/codes or other identifying details. Limited to 25-32000 chars.
- name: contact_number
  description: The preferred contact number for follow-up.
- name: issue_frequency
  auto: PREDEFINED
  predefined:
    - "Yes - Consistent"
    - "Yes - Intermittent"
    - "Not Applicable"
  description: "The frequency of the issue."
- name: most_recent_issue_start_time
  description: The start date and time of the most recent occurrence of the issue. Flexible formats are supported (e.g., "7 days ago", "2023-01-01T00:00:00Z").
- name: issue_impact
  auto: PREDEFINED
  predefined:
    - P4
    - P3
    - P2
    - P1
    - P0
  description: |
    The impact of the issue on the system or business.
    - P4: Low - Use for inquiries or a minor issue. Product function not impaired, no impact to business.
    - P3: Minor - Production system not affected, but a function has failed. A workaround is available.
    - P2: Major - Major functionality or performance degradation of the product. Operations are severely impaired. No workaround exists.
    - P1: Critical - Production system is down or a critical issue severely impacts the product. Business operations have stopped. No workaround exists.
    - P0: Critical & Life/Operations at Risk - Imminent risk to life or our organization's finances, brand, or security. Requires urgent restoration.
- name: issue_category
  description: |
    The category of the issue.
- name: problem_concentration
  description: |
    The specific problem concentration. Valid values vary based on the selected issue_category (smeArea) such as Communication, Device Control, Dashboard and Reports, etc.
outputs:
- contextPath: Core.SupportTicket.description
  description: The description of the Filed support ticket.
  type: String
- contextPath: Core.SupportTicket.contactNumber
  description: The contact number associated with the ticket.
  type: String
- contextPath: Core.SupportTicket.OngoingIssue
  description: The frequency status of the issue.
  type: String
- contextPath: Core.SupportTicket.DateTimeOfIssue
  description: The timestamp of the issue occurrence.
  type: Number
- contextPath: Core.SupportTicket.IssueImpact
  description: The impact level of the ticket.
  type: String
- contextPath: Core.SupportTicket.smeArea
  description: The category of the issue.
  type: String
- contextPath: Core.SupportTicket.subGroupName
  description: The specific problem concentration.
  type: String

scripttarget: 0
subtype: python3
dockerimage: demisto/python3:3.12.12.6391686
fromversion: 8.14.0
tests:
- No tests (auto formatted)
marketplaces:
- platform
supportedModules:
