description: "This feed pulls CVE information from the NIST National Vulnerability Database using v2.0 of the API.\n\nBy default, CVEs with a REJECTED status are excluded. Enable 'Include Rejected CVEs' to ingest them.\n\nThis integration/feed deprecates the original National Vulnerability Database Feed integraiton as v1.0 of the API is being sunsetted in 2023."
display: National Vulnerability Database Feed v2
image: ''
name: FeedNVDv2
script:
  commands:
  - description: Manually retrieve CVEs from NVD using the history parameter for the duration back to fetch. CVSS severity and version filters can be overridden for this command.
    name: nvd-get-indicators
    arguments:
    - auto: PREDEFINED
      description: Time back to retrieve CVEs, e.g. `7 days`.
      name: history
      predefined:
      - "7 days"
      required: true
    - name: keyword
      description: Keywords to query CVEs by.
    - name: limit
      description: The maximum number of CVEs to return. Use a lower value to avoid timeouts due to large lookback windows.
      defaultValue: '50'
    - auto: PREDEFINED
      name: cvss_severity
      description: A comma-separated list of CVSS severities to use for this command. This overrides the instance-level CVSS Severity Filter. If left blank, the instance-level filter is used.
      isArray: true
      predefined:
      - CRITICAL
      - HIGH
      - MEDIUM
      - LOW
    - auto: PREDEFINED
      name: cvss_versions
      description: Override the instance-level CVSS Versions for this command. Comma-separated list. Note that the CVSS SeverityFilter only filters on Primary scores.
      isArray: true
      predefined:
      - CVSS v4
      - CVSS v3
      - CVSS v2
    outputs:
    - contextPath: CVE.ID
      description: The ID of the CVE.
      type: String
    - contextPath: CVE.CVSS
      description: The CVSS score of the CVE.
      type: number
    - contextPath: CVE.Published
      description: The date the CVE was published.
      type: Date
    - contextPath: CVE.Modified
      description: The date that the CVE was last modified.
      type: Date
    - contextPath: CVE.Description
      description: The description of the CVE.
      type: String
    - contextPath: CVE.CVSSVersion
      description: The CVSS version used for scoring (e.g. 4.0, 3.1, 2.0).
      type: String
    - contextPath: CVE.Severity
      description: The CVSS severity level (e.g. CRITICAL, HIGH, MEDIUM, LOW).
      type: String
  dockerimage: demisto/python3:3.12.13.7444307
  feed: true
  runonce: false
  script: ''
  subtype: python3
  type: python
fromversion: 6.10.0
tests:
- No tests (auto formatted)
