inputs:
- key: NotificationTarget
  value:
    simple: ""
  required: false
  description: >-
    Recipient for Critical/High severity notifications (email address, Slack/Teams channel, or user - whichever
    matches the notification integration you have enabled). Leave empty to skip notification and rely on the
    manual remediation task alone.
  playbookInputQuery:
- key: CreateExternalTicket
  value:
    simple: "false"
  required: false
  description: >-
    Set to "true" to route Critical/High findings to an external ticketing system (after you customize the
    placeholder task). Defaults to "false", which keeps remediation entirely inside native Cortex XSOAR tasks.
  playbookInputQuery:
outputs: []
