      version: -1
      name: Close as duplicate
      description: Closes this incident as a duplicate of the already-open incident tracking the same finding.
      script: Builtin|||closeInvestigation
      type: regular
      iscommand: true
      brand: Builtin
    scriptarguments:
      closeReason:
        simple: Duplicate
      closeNotes:
        simple: Auto-closed by playbook - duplicate of an already-open incident for Panorays Finding ID ${incident.panoraysfindingid}.
    nexttasks:
      '#none#': []
    separatecontext: false
    view: |-
