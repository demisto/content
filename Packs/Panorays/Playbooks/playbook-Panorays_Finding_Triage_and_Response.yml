id: Panorays Finding - Triage and Response
version: -1
name: Panorays Finding - Triage and Response
description: |-
  Triages a Panorays "Self Company" finding incident end-to-end without depending on any specific external ITSM tool.

  Flow:
  1. Checks for an existing open incident on the same Panorays Finding ID and closes duplicates.
  2. Branches on finding severity.
     - Low / Informational: auto-closed, no action required.
     - Medium: a Cortex XSOAR task is created for an analyst to review.
     - Critical / High: a notification is sent (via whatever mail/chat integration implementing the generic
       send-notification command is enabled) and a remediation task with an SLA is created natively in Cortex XSOAR.
  3. Optionally routes Critical/High findings to an external ticketing system, controlled entirely by the
     CreateExternalTicket input - if left false (default), remediation is tracked with native Cortex XSOAR tasks only.
  4. Reminds the analyst to update the finding status back in Panorays once resolved (a future
     panorays-finding-update command can automate this step).
starttaskid: "0"
tasks:
