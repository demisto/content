    taskid: 82c18da9-78e5-4d8b-9106-ced25bf4ee49
    type: condition
    task:
      id: 82c18da9-78e5-4d8b-9106-ced25bf4ee49
      version: -1
      name: Is this a duplicate finding?
      description: Checks whether another open incident is already tracking this same Panorays Finding ID.
      type: condition
      iscommand: false
      brand: ""
    conditions:
    - label: "yes"
      condition:
      - - operator: isNotEmpty
          left:
            value:
              simple: foundIncidents
            iscontext: true
    nexttasks:
      "yes":
