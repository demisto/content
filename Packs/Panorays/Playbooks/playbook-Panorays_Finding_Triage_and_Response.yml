    id: "0"
    taskid: 0be978ad-7b37-4b50-89f5-9d4e66c44568
    type: start
    task:
      id: 0be978ad-7b37-4b50-89f5-9d4e66c44568
      version: -1
      name: ""
      iscommand: false
      brand: ""
      description: ''
    nexttasks:
      '#none#':
      - "1"
    separatecontext: false
    view: |-
      {
        "position": {
          "x": 450,
