      name: 'Manual task: remediate Critical/High finding'
      description: >-
        Investigate and remediate this finding. The incident is the system of record - no external ticket is
        required. Mark this task complete once remediation is underway or finished.
      type: regular
      iscommand: false
      brand: ""
    sla:
