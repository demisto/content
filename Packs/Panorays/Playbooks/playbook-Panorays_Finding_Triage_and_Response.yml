      version: -1
      name: Notification target configured?
      description: >-
        Only attempts send-notification if a NotificationTarget was actually provided. Prevents a hard stop
        when no mail/chat integration implementing the generic send-notification command is enabled - which is
        the default state for a fresh install.
      type: condition
      iscommand: false
      brand: ""
    conditions:
    - label: "yes"
      condition:
      - - operator: isNotEmpty
          left:
            value:
              simple: inputs.NotificationTarget
            iscontext: true
    nexttasks:
