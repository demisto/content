    task:
      id: b9d1f172-1cce-4d1e-841f-b1ca35a0eb28
      version: -1
      name: Search for existing open incidents on this Finding ID
      description: Looks for another open "Panorays Finding" incident already tracking this same finding.
      script: Builtin|||getIncidents
      type: regular
      iscommand: true
      brand: Builtin
    scriptarguments:
      query:
        simple: type:"Panorays Finding" and status:1 and panoraysfindingid:${incident.panoraysfindingid} and -id:${incident.id}
      size:
        simple: "1"
    continueonerror: true
    nexttasks:
      '#none#':
      - "2"
    separatecontext: false
    view: |-
      {
        "position": {
          "x": 450,
          "y": 220
        }
      }

  "2":
