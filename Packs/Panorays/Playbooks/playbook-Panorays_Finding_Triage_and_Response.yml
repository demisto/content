      type: condition
      iscommand: false
      brand: ""
    conditions:
    - label: "Critical"
      condition:
      - - operator: isEqualString
          left:
            value:
              simple: incident.panoraysfindingseverity
            iscontext: true
          right:
            value:
              simple: Critical
          ignorecase: true
    - label: "High"
      condition:
      - - operator: isEqualString
          left:
            value:
              simple: incident.panoraysfindingseverity
            iscontext: true
          right:
            value:
              simple: High
          ignorecase: true
    - label: "Medium"
      condition:
      - - operator: isEqualString
          left:
            value:
              simple: incident.panoraysfindingseverity
            iscontext: true
          right:
            value:
              simple: Medium
          ignorecase: true
    nexttasks:
      "Critical":
      - "12"
      "High":
      - "12"
      "Medium":
      - "8"
      '#default#':
      - "7"
    separatecontext: false
    view: |-
      {
        "position": {
          "x": 450,
          "y": 560
        }
      }

