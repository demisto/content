    taskid: 0a6a9842-87e9-4484-92ac-1291d69c4823
    type: regular
    task:
      id: 0a6a9842-87e9-4484-92ac-1291d69c4823
      version: -1
      name: Notify security team (Critical/High)
      description: >-
        Sends a notification via the generic send-notification command, so this works with whichever mail or
        chat integration (e.g. Gmail, EWS, MS Teams, Slack) is enabled - no specific product is required. If no
        such integration is enabled, this task fails gracefully and the playbook continues.
      script: '|||send-notification'
      type: regular
      iscommand: true
      brand: ""
    scriptarguments:
      to:
        simple: ${inputs.NotificationTarget}
      message:
        simple: >-
          Critical/High Panorays finding on ${incident.panoraysfindingassetname}: ${incident.panoraysfindingfindingtext}
          (Finding ID ${incident.panoraysfindingid}, Category ${incident.panoraysfindingcategory}). Incident #${incident.id}.
    continueonerror: true
    nexttasks:
      '#none#':
      - "6"
    separatecontext: false
    view: |-
      {
        "position": {
          "x": 100,
          "y": 740
        }
      }

  "6":
