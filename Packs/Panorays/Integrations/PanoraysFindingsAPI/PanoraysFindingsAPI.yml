sectionorder:
- Connect
- Collect
commonfields:
  id: PanoraysFindingsAPI
  version: -1
name: PanoraysFindingsAPI
display: Panorays Findings API
category: Vulnerability Management
description: Retrieve and monitor internal security findings for your organization from the Panorays platform to streamline self-assessment posture and automate internal incident response within Cortex XSOAR.
fromversion: "6.0.0"
provider: Panorays
configuration:
- display: Panorays PAPI base URL
  name: url
  defaultvalue: https://api.panoraysapp.com
  type: 0
  required: true
  section: Connect
- displaypassword: API Key
  name: apikey
  type: 9
  required: true
  section: Connect
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
  section: Connect
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
  section: Connect
- display: Maximum number of incidents to fetch per run
  name: max_fetch
  defaultvalue: "50"
  type: 0
  required: false
  section: Collect
- display: First fetch timestamp (e.g., 7 days)
  name: first_fetch
  defaultvalue: 7 days
  type: 0
  required: false
  section: Collect
- display: Incident type
  name: incidentType
  type: 13
  required: false
  section: Collect
- display: Fetch incidents
  name: isFetch
  type: 8
  required: false
  section: Collect
script:
  script: '-'
  type: python
  subtype: python3
  dockerimage: demisto/python3:3.12.13.8319994
  isfetch: true
  commands:
  - name: panorays-finding-list
    description: Lists the company findings as detected by Panorays.
    arguments:
    - name: limit
      defaultValue: "50"
      description: The maximum number of findings to return.
    - name: page
      defaultValue: "1"
      description: The page number of results to retrieve.
tests:
- No tests