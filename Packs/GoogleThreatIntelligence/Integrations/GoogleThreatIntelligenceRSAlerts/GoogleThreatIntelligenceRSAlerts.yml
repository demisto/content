commonfields:
  id: GoogleThreatIntelligenceRSAlerts
  version: -1
name: GoogleThreatIntelligenceRSAlerts
display: Google Threat Intelligence - Relevance System Alerts
fromversion: 6.10.0
category: Data Enrichment & Threat Intelligence
provider: Google
defaultmapperin: Google Threat Intelligence RS Alerts - Incoming Mapper
sectionorder:
- Connect
- Collect
description: This integration allows the creation of incidents based on RS Alerts from Google Threat Intelligence.
configuration:
- display: Server URL
  name: server_url
  type: 0
  required: true
  defaultvalue: https://threatintelligence.googleapis.com/
  additionalinfo: URL of the GTI platform.
  section: Connect
- displaypassword: API Key
  name: credentials
  type: 9
  required: true
  hiddenusername: true
  additionalinfo: Provide the API key for authentication.
  section: Connect
- display: Project ID
  name: project_id
  type: 0
  required: true
  additionalinfo: Specify the ID of the project.
  section: Connect
- display: Fetch incidents
  name: isFetch
  type: 8
  required: false
  section: Collect
- display: Incident type
  name: incidentType
  defaultvalue: Google Threat Intelligence RS Alert
  type: 13
  required: false
  section: Collect
- display: First Fetch Time
  name: first_fetch
  defaultvalue: '3 days'
  type: 0
  required: false
  additionalinfo: "The date or relative timestamp from which to begin fetching RS Alerts. Default value is '3 days'.\n\nSupported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ.\n\nFor example: 01 May 2026, 01 May 2026 04:45:33, 2026-05-17T14:05:44Z."
  section: Collect
- display: Max Fetch
  name: max_fetch
  defaultvalue: '100'
  type: 0
  required: false
  additionalinfo: "The maximum number of Alerts to fetch each time. Default value is 100. The maximum is 200.\n\nIf the value is greater than 200, it will be considered as 200."
  section: Collect
- display: Relevance Level
  name: relevance_level
  type: 16
  options:
  - Low
  - Medium
  - High
  required: false
  additionalinfo: Filter the alerts by the relevance level.
  section: Collect
  advanced: true
- display: Severity Level
  name: severity_level
  type: 16
  options:
  - Low
  - Medium
  - High
  required: false
  additionalinfo: Filter the alerts by the severity level.
  section: Collect
  advanced: true
- display: Priority Level
  name: priority_level
  type: 16
  options:
  - Low
  - Medium
  - High
  - Critical
  required: false
  additionalinfo: Filter the alerts by the priority level.
  section: Collect
  advanced: true
- display: Status
  name: status
  type: 16
  options:
  - New
  - Read
  - Triaged
  - Escalated
  - Resolved
  - Duplicate
  - False Positive
  - Not Actionable
  - Benign
  - Tracked Externally
  required: false
  additionalinfo: Filter the alerts by the status.
  section: Collect
  advanced: true
- display: Threat Scenarios
  name: threat_scenarios
  type: 16
  options:
  - Data Leak
  - Initial Access Broker
  - Insider Threat
  required: false
  additionalinfo: Filter the alerts by the threat scenarios.
  section: Collect
  advanced: true
- display: Mirroring Direction
  hidden: false
  name: mirror_direction
  type: 15
  options:
  - Incoming
  - Outgoing
  - Incoming And Outgoing
  required: false
  additionalinfo: The mirroring direction in which to mirror the alert. You can mirror 'Incoming' (from GTI to XSOAR), 'Outgoing' (from XSOAR to GTI), or in both directions.
  section: Collect
- display: Reopen Incident for Open Alert Status
  name: reopen_incident_for_open_alert_status
  type: 8
  required: false
  defaultvalue: 'true'
  additionalinfo: "Incident will reopen when the Alert status is 'Read', 'Triaged', 'Escalated'.\n\nNote: This parameter is only used when the mirroring direction is set to 'Incoming' or 'Incoming And Outgoing'."
  section: Collect
  advanced: true
- display: Close Incident for Close Alert Status
  name: close_incident_for_close_alert_status
  type: 8
  required: false
  defaultvalue: 'true'
  additionalinfo: "Incident will close when the Alert status is 'False Positive' or 'Resolved' or 'Duplicate' or 'Benign' or 'Not Actionable' or 'Tracked Externally'.\n\nNote: This parameter is only used when the mirroring direction is set to 'Incoming' or 'Incoming And Outgoing'."
  section: Collect
  advanced: true
- display: Alert Status for Incident Reopen
  name: alert_status_for_incident_reopen
  type: 15
  options:
  - Read
  - Triaged
  - Escalated
  required: false
  defaultvalue: Escalated
  additionalinfo: "Alert Status set in GTI when Reopen incidents in XSOAR. Default value is 'Escalated'.\n\nNote: This parameter is only used when the mirroring direction is set to 'Outgoing' or 'Incoming And Outgoing'."
  section: Collect
  advanced: true
- display: Alert Status for Incident Closure
  name: alert_status_for_incident_closure
  type: 15
  options:
  - Resolved
  - Duplicate
  - False Positive
  - Benign
  - Not Actionable
  - Tracked Externally
  required: false
  defaultvalue: Resolved
  additionalinfo: "Alert Status set in GTI when closing incidents in XSOAR. Default value is 'Resolved'.\n\nNote: This parameter is only used when the mirroring direction is set to 'Outgoing' or 'Incoming And Outgoing'."
  section: Collect
  advanced: true
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
  section: Connect
  advanced: true
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
  section: Connect
  advanced: true
script:
  script: ''
  type: python
  subtype: python3
  commands:
  - name: gti-rs-alert-list
    description: List the RS Alerts with provided filter arguments.
    arguments:
    - name: page_size
      description: Specify the desired page size for the request.
      defaultValue: '50'
      required: false
    - name: order_by
      description: Filter alerts by the provided sort order.
      auto: PREDEFINED
      predefined:
      - Asc
      - Desc
      defaultValue: Desc
      required: false
    - name: sort_by
      description: Filter alerts by the provided sort field.
      auto: PREDEFINED
      predefined:
      - Create Time
      - Update Time
      - Relevance Level
      - Severity Level
      - Priority Level
      defaultValue: Update Time
      required: false
    - name: create_time
      description: "Filter the alerts by created on or after the provided time. Supported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ."
      required: false
    - name: update_time
      description: "Filter the alerts by updated on or after the provided time. Supported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ."
      defaultValue: '3 days'
      required: false
    - name: relevance_level
      isArray: true
      auto: PREDEFINED
      predefined:
      - Low
      - Medium
      - High
      description: Filter the alerts by the relevance level.
      required: false
    - name: severity_level
      isArray: true
      auto: PREDEFINED
      predefined:
      - Low
      - Medium
      - High
      description: Filter the alerts by the severity level.
      required: false
    - name: priority_level
