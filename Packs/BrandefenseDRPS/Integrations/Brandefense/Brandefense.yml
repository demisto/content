script:
  script: '-'
  type: python
  subtype: python3
  dockerimage: demisto/python3:3.11.10.111039
  isfetch: true
  runonce: false
  isremotesyncin: true
  isremotesyncout: true
  commands:
  - name: ip
    arguments:
    - name: ip
      required: true
      default: true
      description: IP address to investigate.
      isArray: true
    outputs:
    - contextPath: IP.Address
      description: The IP address.
      type: String
    - contextPath: IP.Malicious.Vendor
      description: Vendor reporting the IP as malicious.
      type: String
    - contextPath: IP.Malicious.Description
      description: Description of the malicious IP.
      type: String
    - contextPath: DBotScore.Indicator
      description: The indicator that was tested.
      type: String
    - contextPath: DBotScore.Type
      description: The indicator type.
      type: String
    - contextPath: DBotScore.Vendor
      description: The vendor used to calculate the score.
      type: String
    - contextPath: DBotScore.Score
      description: The actual score.
      type: Number
    - contextPath: DBotScore.Reliability
      description: Reliability of the source.
      type: String
    - contextPath: Brandefense.IP.data
      description: The IP address value.
      type: String
    - contextPath: Brandefense.IP.severity
      description: Severity level.
      type: String
    - contextPath: Brandefense.IP.category
      description: Category of the threat.
      type: String
    - contextPath: Brandefense.IP.first_seen
      description: First seen date.
      type: Date
    - contextPath: Brandefense.IP.last_seen
      description: Last seen date.
      type: Date
    description: Investigate an IP address against Brandefense threat intelligence.
  - name: domain
    arguments:
    - name: domain
      required: true
      default: true
      description: Domain name to investigate.
      isArray: true
    outputs:
    - contextPath: Domain.Name
      description: The domain name.
      type: String
    - contextPath: Domain.Malicious.Vendor
      description: Vendor reporting the domain as malicious.
      type: String
    - contextPath: Domain.Malicious.Description
      description: Description of the malicious domain.
      type: String
    - contextPath: DBotScore.Indicator
      description: The indicator that was tested.
      type: String
    - contextPath: DBotScore.Type
      description: The indicator type.
      type: String
    - contextPath: DBotScore.Vendor
      description: The vendor used to calculate the score.
      type: String
    - contextPath: DBotScore.Score
      description: The actual score.
      type: Number
    - contextPath: DBotScore.Reliability
      description: Reliability of the source.
      type: String
    - contextPath: Brandefense.Domain.data
      description: The domain value.
      type: String
    - contextPath: Brandefense.Domain.severity
      description: Severity level.
      type: String
    - contextPath: Brandefense.Domain.category
      description: Category of the threat.
      type: String
    - contextPath: Brandefense.Domain.first_seen
      description: First seen date.
      type: Date
    - contextPath: Brandefense.Domain.last_seen
      description: Last seen date.
      type: Date
    description: Investigate a domain against Brandefense threat intelligence.
  - name: url
    arguments:
    - name: url
      required: true
      description: URL address to investigate.
      isArray: true
    outputs:
    - contextPath: URL.Data
      description: The URL.
      type: String
    - contextPath: URL.Malicious.Vendor
      description: Vendor reporting the URL as malicious.
      type: String
    - contextPath: URL.Malicious.Description
      description: Description of the malicious URL.
      type: String
    - contextPath: DBotScore.Indicator
      description: The indicator that was tested.
      type: String
    - contextPath: DBotScore.Type
      description: The indicator type.
      type: String
    - contextPath: DBotScore.Vendor
      description: The vendor used to calculate the score.
      type: String
    - contextPath: DBotScore.Score
      description: The actual score.
      type: Number
    - contextPath: DBotScore.Reliability
      description: Reliability of the source.
      type: String
    - contextPath: Brandefense.URL.data
      description: The URL value.
      type: String
    - contextPath: Brandefense.URL.severity
      description: Severity level.
      type: String
    - contextPath: Brandefense.URL.category
      description: Category of the threat.
      type: String
    - contextPath: Brandefense.URL.first_seen
      description: First seen date.
      type: Date
    - contextPath: Brandefense.URL.last_seen
      description: Last seen date.
      type: Date
    description: Investigate a URL against Brandefense threat intelligence.
  - name: file
    arguments:
    - name: file
      required: true
      default: true
      description: File hash to investigate (MD5, SHA1, or SHA256).
      isArray: true
    outputs:
    - contextPath: File.MD5
      description: The MD5 hash of the file.
      type: String
    - contextPath: File.SHA1
      description: The SHA1 hash of the file.
      type: String
    - contextPath: File.SHA256
      description: The SHA256 hash of the file.
      type: String
    - contextPath: File.Malicious.Vendor
      description: Vendor reporting the file as malicious.
      type: String
    - contextPath: File.Malicious.Description
      description: Description of the malicious file.
      type: String
    - contextPath: DBotScore.Indicator
      description: The indicator that was tested.
      type: String
    - contextPath: DBotScore.Type
      description: The indicator type.
      type: String
    - contextPath: DBotScore.Vendor
      description: The vendor used to calculate the score.
      type: String
    - contextPath: DBotScore.Score
      description: The actual score.
      type: Number
    - contextPath: DBotScore.Reliability
      description: Reliability of the source.
      type: String
    - contextPath: Brandefense.File.data
      description: The hash value.
      type: String
    - contextPath: Brandefense.File.severity
      description: Severity level.
      type: String
    - contextPath: Brandefense.File.category
      description: Category of the threat.
      type: String
    - contextPath: Brandefense.File.first_seen
      description: First seen date.
      type: Date
    - contextPath: Brandefense.File.last_seen
      description: Last seen date.
      type: Date
    description: Investigate a file hash against Brandefense threat intelligence.
  - name: brandefense_get_incidents
    arguments:
    - name: status
      auto: PREDEFINED
      predefined:
      - OPEN
      - IN_PROGRESS
      - CLOSED
      - RISK_ACCEPTED
      - REJECTED
      description: Filter incidents by status.
      defaultValue: OPEN
    - name: time_range
      auto: PREDEFINED
      predefined:
      - Last 24 Hours
      - Last 7 Days
      - Last 30 Days
      - Last 90 Days
      - Last 6 Months
      - Last 1 Year
      - Custom
      description: "Predefined time range. Overrides 'period' when set. Select 'Custom' to use created_at_range."
    - name: created_at_range
      description: "Custom date range (start,end). Example: 2020-10-10,2023-10-10. Used when time_range is 'Custom' or not set."
    - name: period
      default: true
      description: "Fetch period in hours. Used as fallback when time_range is not set."
      defaultValue: "1"
    - name: module
      auto: PREDEFINED
      predefined:
      - SENSITIVE_FILE_DISCLOSURE
      - BREACH_MONITORING
      - PHISHING_MONITORING
      - DARKWEB_INTELLIGENCE
      - SOCIAL_MEDIA_MONITORING
      - MALICIOUS_FILES
      - EXECUTIVE_PROTECTION
      - SUPPLY_CHAIN_SECURITY
      - VULNERABILITY_MANAGEMENT
      - ATTACK_SURFACE
      - VULNERABILITY_INTELLIGENCE
      - INTELLIGENCE
      - THREAT_INTELLIGENCE
      - CREDIT_CARD
      - FRAUD_PROTECTION
      - CUSTOM_INVESTIGATION
      - MALWARE_ANALYZE
      - INVESTIGATION
      description: Filter by incident module.
    - name: module_category
      auto: PREDEFINED
      predefined:
      - BRAND_MONITORING
      - EXECUTIVE_PROTECTION
      - SUPPLY_CHAIN_SECURITY
      - EXPOSURE_MANAGEMENT
      - INTELLIGENCE
      - FRAUD_MONITORING
      - INTELLIGENCE_SUPPORT
      - INVESTIGATION
      description: Filter by module category.
    - name: MaxResults
      description: Maximum number of incidents to return.
      defaultValue: "100"
    - name: search
      description: Search keywords within incident title or code.
    - name: severity
      auto: PREDEFINED
      predefined:
      - INFO
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
      description: Filter by incident severity.
    - name: tags
      description: Filter by tags (comma-separated).
    - name: network_type
      auto: PREDEFINED
      predefined:
      - DARK_WEB
      - SURFACE_WEB
      description: Filter by network type.
    - name: mitre_tactics
      auto: PREDEFINED
      predefined:
      - RECONNAISSANCE
      - RESOURCE_DEVELOPMENT
      - INITIAL_ACCESS
      - EXECUTION
      - PERSISTENCE
      - PRIVILEGE_ESCALATION
      - DEFENSE_EVASION
      - CREDENTIAL_ACCESS
      - DISCOVERY
      - LATERAL_MOVEMENT
      - COLLECTION
      - COMMAND_AND_CONTROL
      - EXFILTRATION
      - IMPACT
      description: Filter by MITRE ATT&CK tactics.
    - name: ordering
      auto: PREDEFINED
      predefined:
      - created_at
      - -created_at
      - severity
      - -severity
      description: Order results.
    - name: has_indicator
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Filter incidents that have indicators.
    - name: has_attachment
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Filter incidents that have attachments.
    - name: type
      auto: PREDEFINED
      predefined:
      - COMPROMISED_EMPLOYEE_ACCOUNT
      - COMPROMISED_CLIENT_ACCOUNT
      - EXECUTIVE_PERSON_EMAIL_LEAK
      - COMPROMISED_DEVICE
      - CONFIRMED_PHISHING_ADDRESS
      - POTENTIAL_PHISHING_ADDRESS
      - DARKWEB_INTELLIGENCE
      - SENSITIVE_FILE_DISCLOSURE
      - CONFIRMED_IMPERSONATED_ACCOUNT
      - POTENTIAL_IMPERSONATED_ACCOUNT
      - VULNERABLE_TECHNOLOGY_ASSESSMENT
      - CREDIT_CARD
      - ATTACK_SURFACE
      - CUSTOM_INVESTIGATION
      - MALWARE_ANALYZE
      - FRAUD_PROTECTION
      - VULNERABILITY_DETECTION
      - OTHER
      description: Filter by incident type.
    outputs:
    - contextPath: Brandefense.Incident.id
      description: Incident ID.
      type: Number
    - contextPath: Brandefense.Incident.code
      description: Incident code.
      type: String
    - contextPath: Brandefense.Incident.title
      description: Incident title.
      type: String
    - contextPath: Brandefense.Incident.created_at
      description: Incident creation date.
      type: Date
    - contextPath: Brandefense.Incident.status
      description: Incident status.
      type: String
    - contextPath: Brandefense.Incident.severity
      description: Incident severity.
      type: String
    - contextPath: Brandefense.Incident.reference_url
      description: URL to view the incident in Brandefense.
      type: String
    - contextPath: Brandefense.Incident.indicators
      description: List of indicators associated with the incident.
      type: Unknown
    description: Get Brandefense incidents with optional filtering by status, module, category, and time period.
  - name: brandefense_get_incident_detail
    arguments:
    - name: code
      required: true
      description: Incident code identifier.
    outputs:
    - contextPath: Brandefense.IncidentDetail.code
      description: Incident code.
      type: String
    - contextPath: Brandefense.IncidentDetail.title
      description: Incident title.
      type: String
    - contextPath: Brandefense.IncidentDetail.description
      description: Incident description.
      type: String
    - contextPath: Brandefense.IncidentDetail.severity
      description: Incident severity.
      type: String
    - contextPath: Brandefense.IncidentDetail.status
      description: Incident status.
      type: String
    - contextPath: Brandefense.IncidentDetail.created_at
      description: Creation date.
      type: Date
    - contextPath: Brandefense.IncidentDetail.reference_url
      description: URL to view in Brandefense.
      type: String
    description: Get detailed information for a specific Brandefense incident.
  - name: brandefense_change_incident_status
    arguments:
    - name: code
      required: true
      description: Incident code identifier.
    - name: status
      required: true
      auto: PREDEFINED
      predefined:
      - OPEN
      - IN_PROGRESS
      - CLOSED
      - RISK_ACCEPTED
      - REJECTED
      description: New incident status.
    outputs:
    - contextPath: Brandefense.ChangingStatus.code
      description: Incident code.
      type: String
    - contextPath: Brandefense.ChangingStatus.status
      description: Updated incident status.
      type: String
    description: Change the status of a Brandefense incident.
  - name: brandefense_incident_indicators
    arguments:
    - name: code
      required: true
      description: Incident code identifier.
    outputs:
    - contextPath: Brandefense.Incident.Indicators
      description: List of indicators for the incident.
      type: Unknown
    description: Get indicators associated with a Brandefense incident.
  - name: brandefense_get_incident_relatives
    arguments:
    - name: code
      required: true
      description: Incident code identifier.
    outputs:
    - contextPath: Brandefense.Incident.Relatives
      description: List of related incidents.
      type: Unknown
    description: Get related incidents for a specific Brandefense incident.
  - name: threat_search
    arguments:
    - name: value
      required: true
      description: Value to search for (domain, IP, hash, etc.).
    - name: waitingtime
      required: true
      description: Polling interval in seconds to wait for results.
      defaultValue: "20"
    outputs:
    - contextPath: Brandefense.ThreatSearch.uuid
      description: Threat search UUID.
      type: String
    - contextPath: Brandefense.ThreatSearch.result
      description: Threat search result data.
      type: Unknown
    description: Perform a CTI threat search and poll for results.
  - name: brandefense_get_intelligences
    arguments:
    - name: category
      auto: PREDEFINED
      predefined:
      - STRATEGIC_INTELLIGENCE
      - FRAUD_INTELLIGENCE
      - TACTICAL_INTELLIGENCE
      - OPERATIONAL_INTELLIGENCE
      - SECURITY_NEWS
      - THREAT_REPORTS
      description: Filter by intelligence category.
    - name: time_range
      auto: PREDEFINED
      predefined:
      - Last 24 Hours
      - Last 7 Days
      - Last 30 Days
      - Last 90 Days
      - Last 6 Months
      - Last 1 Year
      - Custom
      description: "Predefined time range. Overrides 'period' when set. Select 'Custom' to use created_at_range."
    - name: created_at_range
      description: "Custom date range (start,end). Example: 2020-10-10,2023-10-10. Used when time_range is 'Custom' or not set."
    - name: period
      description: "Fetch period in hours. Used as fallback when time_range is not set."
      defaultValue: "24"
    - name: search
      description: Keyword to filter intelligence by tag search.
    - name: MaxResults
      description: Maximum number of intelligence reports to return.
      defaultValue: "100"
    outputs:
    - contextPath: Brandefense.Intelligence.code
      description: Intelligence code.
      type: String
    - contextPath: Brandefense.Intelligence.title
      description: Intelligence title.
      type: String
    - contextPath: Brandefense.Intelligence.severity
      description: Intelligence severity.
      type: String
    - contextPath: Brandefense.Intelligence.created_at
      description: Creation date.
      type: Date
    - contextPath: Brandefense.Intelligence.reference_url
      description: URL to view in Brandefense.
      type: String
    description: Get Brandefense intelligence reports with optional filtering.
  - name: brandefense_get_intelligence_detail
    arguments:
    - name: code
      required: true
      description: Intelligence code identifier.
    outputs:
    - contextPath: Brandefense.IntelligenceDetail.code
      description: Intelligence code.
      type: String
    - contextPath: Brandefense.IntelligenceDetail.title
      description: Intelligence title.
      type: String
    - contextPath: Brandefense.IntelligenceDetail.description
      description: Intelligence description.
      type: String
    - contextPath: Brandefense.IntelligenceDetail.severity
      description: Intelligence severity.
      type: String
    - contextPath: Brandefense.IntelligenceDetail.created_at
      description: Creation date.
      type: Date
    - contextPath: Brandefense.IntelligenceDetail.reference_url
      description: URL to view in Brandefense.
      type: String
    description: Get detailed information for a specific intelligence report.
  - name: brandefense_intelligence_indicators
    arguments:
    - name: code
      required: true
      description: Intelligence code identifier.
    outputs:
    - contextPath: Brandefense.Intelligence.Indicators
      description: List of indicators for the intelligence report.
      type: Unknown
    description: Get indicators associated with a Brandefense intelligence report.
  - name: brandefense_get_intelligence_rules
    arguments:
    - name: code
      required: true
      description: Intelligence code identifier.
    outputs:
    - contextPath: Brandefense.Intelligence.Rules
      description: Rules associated with the intelligence report.
      type: Unknown
    description: Get rules associated with a Brandefense intelligence report.
  - name: brandefense_get_assets
    arguments:
    - name: type
      auto: PREDEFINED
      predefined:
      - DOMAIN
      - KEYWORD
      - URL
      - IP_ADDRESS
      - CIDR
      - EXECUTIVE_NAME
      - EXECUTIVE_EMAIL
      - EXECUTIVE_ACCOUNT
      - EXECUTIVE_NICKNAME
      - BIN_NUMBER
      - PRODUCT
      - GIT_REPO
      - GIT_ACCOUNT
      - PHISHING_RULE
      - LOGIN_PAGES
      - OFFICIAL_SOCIAL_MEDIA_ACCOUNTS
      - OFFICIAL_MOBILE_APPS
      - ADMIN_PAGES
      description: Filter by asset type.
    - name: severity
      auto: PREDEFINED
      predefined:
      - HIGH
      - MEDIUM
      - LOW
      description: Filter by severity.
    - name: status
