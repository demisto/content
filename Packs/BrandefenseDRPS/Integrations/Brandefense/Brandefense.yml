  - name: brandefense_get_indicators
    arguments:
    - name: indicator_type
      required: true
      auto: PREDEFINED
      predefined:
      - leak
      - phishing_site
      - credit_card
      - cve
      - social_media
      - sensitive_file_disclosure
      - malicious-file
      - malicious_ads
      description: "Type of indicator to retrieve. Each type has a different response body."
    - name: organization_code
      description: "Organization code(s), comma-separated. Example: brandefense,other."
    - name: time_range
      auto: PREDEFINED
      predefined:
      - Last 24 Hours
      - Last 7 Days
      - Last 30 Days
      - Last 90 Days
      - Last 6 Months
      - Last 1 Year
      - Custom
      description: "Predefined time range for filtering indicators. Select 'Custom' to use created_at_range instead."
    - name: created_at_range
      description: "Custom date range (comma-separated start,end). Example: 2020-10-10,2023-10-10. Only used when time_range is 'Custom' or not set."
    - name: incident_status
      description: "Filter by incident status(es), comma-separated."
      auto: PREDEFINED
      predefined:
      - OPEN
      - IN_PROGRESS
      - CLOSED
      - RISK_ACCEPTED
      - REJECTED
      isArray: true
    - name: page
      description: Page number within the paginated result set.
    - name: page_size
      description: "Number of results per page (default values: 10, 20, 50, 100)."
    - name: limit
      description: Maximum total number of results to return.
      defaultValue: "50"
    outputs:
    - contextPath: Brandefense.Indicator.id
      description: Indicator ID.
      type: Number
    - contextPath: Brandefense.Indicator.created_at
      description: Indicator creation date.
      type: Date
    - contextPath: Brandefense.Indicator.content_object
      description: Indicator content data (varies by indicator type).
      type: Unknown
    - contextPath: Brandefense.Indicator.content_object.data
      description: Primary indicator value (URL, email, hash, etc.).
      type: String
    - contextPath: Brandefense.Indicator.content_object.username
      description: Username associated with the indicator (leak type).
      type: String
    - contextPath: Brandefense.Indicator.content_object.password
      description: Password associated with the indicator (leak type).
      type: String
    - contextPath: Brandefense.Indicator.content_object.source_platform
      description: Source platform of the indicator.
      type: String
    - contextPath: Brandefense.Indicator.content_object.threat_actor
      description: Threat actor associated with the indicator.
      type: String
    - contextPath: Brandefense.Indicator.content_object.breached_date
      description: Date when the breach occurred.
      type: Date
    - contextPath: Brandefense.Indicator.threats
      description: Associated threats.
      type: Unknown
    - contextPath: Brandefense.Indicator.threats.title
      description: Threat title.
      type: String
    - contextPath: Brandefense.Indicator.threats.incidents.code
      description: Incident code associated with the threat.
      type: String
    - contextPath: Brandefense.Indicator.threats.incidents.organization.name
      description: Organization name associated with the incident.
      type: String
    description: "Get indicators from Brandefense. Retrieves Consolidated Data and Incident indicators by type and organization with optional date range and status filters."
