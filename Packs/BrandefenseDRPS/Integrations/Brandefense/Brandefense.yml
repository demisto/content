commonfields:
  id: BrandefenseDRPS
  version: -1
name: BrandefenseDRPS
display: Brandefense Digital Risk Protection Services
category: Data Enrichment & Threat Intelligence
description: 'Brandefense is a Cyber Intelligence Platform that responds directly
  and effectively to today''s complex cyber threats.'
detaileddescription: |-
  Brandefense is a leading SaaS platform that offers innovative Digital Risk Protection Services (DRPS), External Attack Surface Management (EASM), and Actionable Threat Intelligence solutions. Our AI-driven technology helps organizations to significantly enhance their security posture and decrease response time to breaches.

  Our next-generation technology continuously scans the online world, including the dark, deep, and surface web, to discover unknown events, automatically prioritize risks, and deliver actionable intelligence that can be used instantly to improve security. With our cutting-edge technology, you can rely on us to protect against cyber threats and safeguard your valuable digital assets.

  To learn more about how Brandefense can help protect your organization from cyber threats, visit our website at www.brandefense.io
defaultclassifier: Brandefense - Classifier
defaultmapperin: Brandefense - Incoming Mapper
configuration:
- display: Server URL (e.g. https://api.brandefense.io)
  name: url
  defaultvalue: https://api.brandefense.io
  type: 0
  required: true
- display: API Key
  name: apikey
  type: 4
  required: true
  additionalinfo: 'You can reach out your access token: https://brandefense.io/'
- display: Trust any certificate (not secure)
  name: insecure
  defaultvalue: "false"
  type: 8
  required: false
- display: Use system proxy settings
  name: proxy
  defaultvalue: "false"
  type: 8
  required: false
- display: Fetch incidents
  name: isFetch
  type: 8
  required: false
- display: Incidents Fetch Interval
  name: incidentFetchInterval
  defaultvalue: "30"
  type: 19
  required: false
  additionalinfo: Start fetching incidents from the specified time.
- display: First time fetching
  name: first_fetch
  defaultvalue: 3 days
  type: 0
  required: false
- display: Incident type
  name: incidentType
  type: 13
  required: false
- display: Max Results
  name: MaxResults
  defaultvalue: "30"
  type: 0
  required: false
- display: Incident Category
  name: IncidentCategory
  type: 16
  required: false
  options:
  - BRAND_MONITORING
  - EXECUTIVE_PROTECTION
  - EXPOSURE_MANAGEMENT
  - INTELLIGENCE
  - FRAUD_MONITORING
  - INTELLIGENCE_SUPPORT
  - INVESTIGATION
  - THIRD_PARTY_RISK_MANAGEMENT
  additionalinfo: This parameter will request and show the incident's related module
    category.
- display: Incident Module
  name: IncidentModule
  type: 16
  required: false
  options:
  - SENSITIVE_FILE_DISCLOSURE
  - BREACH_MONITORING
  - PHISHING_MONITORING
  - DARKWEB_INTELLIGENCE
  - SOCIAL_MEDIA_MONITORING
  - MALICIOUS_FILES
  - EXECUTIVE_PROTECTION
  - VULNERABILITY_MANAGEMENT
  - ATTACK_SURFACE
  - VULNERABILITY_INTELLIGENCE
  - INTELLIGENCE
  - THREAT_INTELLIGENCE
  - CREDIT_CARD
  - FRAUD_PROTECTION
  - CUSTOM_INVESTIGATION
  - MALWARE_ANALYZE
  - INVESTIGATION
  - THIRD_PARTY_RISK_MANAGEMENT
  additionalinfo: This parameter will request and show the incident's related module.
- display: Incident Status
  name: IncidentStatus
  defaultvalue: OPEN
  type: 16
  required: false
  options:
  - OPEN
  - IN_PROGRESS
  - CLOSED
  - RISK_ACCEPTED
  - REJECTED
  additionalinfo: This parameter will request incident's by status.
- display: Intelligence Category
  name: IntelligenceCategory
  type: 16
  required: false
  options:
  - FRAUD_INTELLIGENCE
  - STRATEGIC_INTELLIGENCE
  - TACTICAL_INTELLIGENCE
  - OPERATIONAL_INTELLIGENCE
  - SECURITY_NEWS
  - THREAT_REPORTS
  additionalinfo: This parameter allows you to filter intelligence values by categories.
- display: Intelligence Search
  name: IntelligenceSearch
  defaultvalue: CVE
  type: 0
  required: false
  additionalinfo: This parameter allows you to filter intelligence values with keyword
    search.
- display: Fetching Issue Types
  name: FetchingIssueTypes
  defaultvalue: Incident,Intelligence
  type: 16
  required: true
  options:
  - Incident
  - Intelligence
  additionalinfo: This parameter allows you to filter fetching by issue type.
- display: Incident Rules
  name: IncidentRules
  type: 16
  required: false
  options:
  - Compromised Employee Account Detection
  - Compromised Client Account Detection
  - Executive Person Email Leak
  - Compromised Device Detection
  - Confirmed Phishing Address
  - Potential Phishing Address
  - Dark Web Intelligence
  - Sensitive File Disclosure
  - Confirmed Impersonated Account
  - Potential Impersonated Account
  - Vulnerable Technology Assessment
  - Stolen Credit/Debit Card Detection
  - Attack Surface
  - Custom Investigation
  - Malware Analysis
  - Fraud Protection
  - Other
  - SSL/TLS Vulnerability Detection
  - Vulnerability Detection
  - Insecure Redirect Protocol (HTTP) Detection
  - SSL/TLS Certificate Missing Domain Inclusion
  - SSL/TLS Weak Cipher & Algorithm Detection
  - Executive's Cyber Risk Assessment
  - Open DNS Resolver Detection
  - Malicious File Detection
  - Unsecure Login Page Detection
  - Exposed Redis Server
  - Exposed Memcached System
  - Vulnerable SSH Protocol Detection
  - Externally Exploitable Vulnerability Detection
  - DNS Server Allows Cache Snooping
  - Disclosure of Important Technology Information
  - Compromised Supply Chain Device
  - Security Scan
  - SMTP Open Relay Detection for Supplier Systems
  - Expired Supply Chain Domain Detection
  - Detection of Torrent Download Activity
  - Potentially Exposed SCADA Services
  - Credit Card
  - Potentially Vulnerable Exposed Technology
  - Domain Registrar Transfer Protection Not Enabled
  - Suspected Dark Web Exposure of Organization Asset
  - Data Sale Detection of Brand Accounts
  - Your Company Attacked by a Ransomware Group
  - Ransomware Attack Detected for Related Supply Chain Asset
  - Daily Discovered Entity Updates
  - Suspected Dark Web Exposure of Supply Chain Asset
  - Entity Found in Threat Intelligence Feeds
  - Malicious File Identified on Compromised Device
  - Compromised Employee Accounts via Botnet Attack
  - Unidentified Management Port Detection
  - Filtered Statused Management Port Exposure
  - Sensitive File Disclosure on GitHub Repositories
  - Sensitive File Disclosure on Postman Collections
  - Misconfigured AWS S3 Bucket Leading to Data Exposure
  - Misconfigured Azure Blob Storage Container Leading to Data Exposure
  - Misconfigured Google Cloud Storage Bucket Leading to Data Exposure
  - Misconfigured IBM Cloud Object Storage Leading to Data Exposure
  - Misconfigured Alibaba Cloud OSS Leading to Data Exposure
  - Misconfigured Backblaze B2 Bucket Leading to Data Exposure
  - Misconfigured DigitalOcean Space Leading to Data Exposure
  - Misconfigured Oracle Cloud Object Storage Leading to Data Exposure
  - DNS Zone Transfer Detection
  - DNSSEC Not Found
  - Shared Hosting Detection
  - SPF Misconfiguration
  - DMARC Not Found
  - DMARC Policy Not Configured
  - Domain Expires in 30 Days
  - Expired Domain Detection
  - SSL Expires in 30 Days
  - LDAP Server Allows Anonymous Bindings
  - Anonymous FTP Detection
  - SSH Supports Weak MAC Algorithms
  - SSH Supports Weak Ciphers
  - Expired SSL/TLS Detection
  - Blacklisted IP Address Detection
  - Blacklisted Domain Address Detection
  - Vulnerable HTTP Security Headers Detection
  - SMTP Open Relay Detection
  - Subdomain Takeover Detection
  - Private IP Address Exposure
