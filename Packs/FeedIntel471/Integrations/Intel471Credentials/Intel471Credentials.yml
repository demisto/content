description: Fetches leaked credentials from the Intel 471 Credentials API and produces an indicator per credential. While building each indicator the integration also creates an associated incident.
script:
  commands:
  - arguments:
    - defaultValue: '50'
      description: The maximum number of indicators to return.
      name: limit
      type: number
    description: Gets a preview of indicators that the feed would pull on the next run (no state is persisted).
    name: intel471-credentials-get-indicators
    outputs:
    - contextPath: Intel471Credentials.Indicators.value
      description: The credential login value (email address or account username).
      type: String
    - contextPath: Intel471Credentials.Indicators.type
      description: The indicator type — Email or Account.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.firstseenbysource
      description: Timestamp when the credential was first observed by Intel 471.
      type: Date
    - contextPath: Intel471Credentials.Indicators.fields.lastseenbysource
      description: Timestamp when the credential was last observed by Intel 471.
      type: Date
    - contextPath: Intel471Credentials.Indicators.fields.tags
      description: Aggregated tags — malware families, affiliations, and configured feed tags.
      type: Unknown
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealerantivirussoftware
      description: Antivirus software detected on the machine infected by the info stealer.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealercomputerusername
      description: Operating-system username logged in on the infected machine.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealerinfectiontimestamp
      description: Timestamp when the info stealer infection was recorded.
      type: Date
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealerip
      description: IP address of the machine infected by the info stealer.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealerisp
      description: Internet service provider associated with the infected machine.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealermachineid
      description: Unique identifier fingerprinted by the info stealer for the infected host.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealermalwarefamily
      description: Family of info stealer malware that captured the credential.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealermalwareinstallpath
      description: Filesystem path where the info stealer malware was installed.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealeros
      description: Operating system reported for the machine infected by the info stealer.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealerpcname
      description: Hostname (PC name) of the machine infected by the info stealer.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealerscreenshotpath
      description: Path to the desktop screenshot captured by the info stealer.
      type: String
    - contextPath: Intel471Credentials.Indicators.fields.intel471infostealerversion
      description: Version identifier reported by the info stealer malware.
      type: String
  dockerimage: demisto/py3-tools:1.0.0.8544956
  feed: true
  runonce: false
  script: '-'
  subtype: python3
  type: python
tests:
- No tests
fromversion: 6.8.0
marketplaces:
- xsoar
- marketplacev2
