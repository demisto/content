description: Fetches leaked credentials from the Intel 471 Credentials API and produces an indicator per credential. While building each indicator the integration also creates an associated incident.
script:
  commands:
  - arguments:
    - defaultValue: '50'
      description: The maximum number of indicators to return.
      name: limit
      type: number
    description: Gets a preview of indicators that the feed would pull on the next run (no state is persisted).
    name: intel471-credentials-get-indicators
  dockerimage: demisto/py3-tools:1.0.0.8544956
  feed: true
  runonce: false
  script: '-'
  subtype: python3
  type: python
tests:
- No tests
fromversion: 6.1.0
marketplaces:
- xsoar
- marketplacev2
