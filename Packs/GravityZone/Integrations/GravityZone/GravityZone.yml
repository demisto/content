  - name: gz-incident-list
    description: Retrieves incidents from the last three days for all endpoints or for a specific endpoint.
    compliantpolicies:
    - EndPoint Isolation
    arguments:
    - name: from_date
      isArray: false
      description: The start date to retrieve incidents from. Default is three days ago.
      required: false
      secret: false
      default: false
    - name: to_date
      isArray: false
      description: The end date to retrieve incidents until. Default is the current date and time.
      required: false
      secret: false
      default: false
    - name: limit
      isArray: false
      description: The maximum number of incidents to retrieve.
      required: false
      secret: false
      default: false
    - name: endpoint_id
      isArray: false
      description: The ID of the endpoint to list incidents for.
      required: false
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.IncidentsList.ID
      description: The incident ID.
      type: String
    - contextPath: GravityZone.IncidentsList.Type
      description: The incident type ('incident' / 'extendedIncident').
      type: String
    - contextPath: GravityZone.IncidentsList.CompanyName
      description: The GravityZone company name where the incident is located.
      type: String
    - contextPath: GravityZone.IncidentsList.Number
      description: The incident number (specific to the company).
      type: Number
    - contextPath: GravityZone.IncidentsList.SeverityScore
      description: The incident severity score (0 - 100).
      type: Number
    - contextPath: GravityZone.IncidentsList.Status
      description: The incident status.
      type: Number
    - contextPath: GravityZone.IncidentsList.ActionTaken
      description: The action taken by the detecting technology ('reported' / 'blocked' / 'partially_blocked').
      type: String
    - contextPath: GravityZone.IncidentsList.Created
      description: The date the incident was detected on the endpoint / sensor.
      type: Date
    - contextPath: GravityZone.IncidentsList.LastUpdated
      description: The date the incident was last updated in GravityZone or by the endpoint / sensor.
      type: Date
    - contextPath: GravityZone.IncidentsList.LastProcessed
      description: The incident last processed date by GravityZone services.
      type: Date
    - contextPath: GravityZone.IncidentsList.Permalink
      description: The incident URL in the GravityZone Console.
      type: String
    - contextPath: GravityZone.IncidentsList.AssignedPriority
      description: The priority assigned to the incident ('unknown' / 'low' / 'medium' / 'high' / 'critical').
      type: String
    - contextPath: GravityZone.IncidentsList.AssignedUserId
      description: The ID of the user assigned to the incident.
      type: String
    - contextPath: GravityZone.IncidentsList.RawJSON
      description: The raw JSON response from the GravityZone API.
      type: JSON
    - contextPath: GravityZone.IncidentsList.EndpointID
      description: The endpoint ID. Available only for 'incident'-type incidents.
      type: String
    - contextPath: GravityZone.IncidentsList.EndpointHostname
      description: The endpoint hostname. Available only for 'incident'-type incidents.
      type: String
    - contextPath: GravityZone.IncidentsList.EndpointIP
      description: The endpoint IP address. Available only for 'incident'-type incidents.
