  - name: gz-endpoint-memory-dump-status
    description: Verifies the status of a task initiated via gz-endpoint-create-memory-dump.
    polling: true
    arguments:
    - name: task_id
      isArray: false
      description: The ID of the task started through gz-endpoint-create-memory-dump. This ID is returned upon task initiation.
      required: true
      secret: false
      default: false
    - name: endpoint_id
      isArray: false
      description: The ID of the endpoint for which the specified task was initiated.
      required: true
      secret: false
      default: false
    - name: polling
      isArray: false
      description: "Controls whether the command waits for the gz-endpoint-create-memory-dump task completion. If set to true, the command returns the final result after the task completes successfully or fails. If set to false, the command returns immediately, providing only the task status. Default and recommended value: true."
      required: false
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.MemoryDump.TaskID
      description: The ID of the task started through gz-endpoint-create-memory-dump.
      type: String
    - contextPath: GravityZone.MemoryDump.TaskType
      description: The task type.
      type: String
    - contextPath: GravityZone.MemoryDump.Status
      description: The status of the task started through gz-endpoint-create-memory-dump.
      type: String
    - contextPath: GravityZone.MemoryDump.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.MemoryDump.Hostname
      description: The endpoint hostname.
      type: String
    - contextPath: GravityZone.MemoryDump.StartDate
      description: The date and time when the memory dump creation task started.
      type: Date
    - contextPath: GravityZone.MemoryDump.EndDate
      description: The date and time when the memory dump creation task ended, if available.
      type: Date
    - contextPath: GravityZone.MemoryDump.ErrorCode
      description: An error code if the task started through gz-endpoint-create-memory-dump fails, or Success if the task completes successfully.
      type: String
    - contextPath: GravityZone.MemoryDump.Error
      description: An error message if the task started through gz-endpoint-create-memory-dump fails, or Success if the task completes successfully.
      type: String
    - contextPath: GravityZone.MemoryDump.DownloadURL
      description: The memory dump download URL, available after the memory dump creation task completes successfully.
      type: String
