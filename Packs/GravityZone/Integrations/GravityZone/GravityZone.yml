category: Endpoint
sectionorder:
- Connect
- Collect
commonfields:
  id: GravityZone
  version: -1
configuration:

- name: url
  display: Server URL
  type: 0
  required: true
  section: Connect
  options:
  - https://cloud.gravityzone.bitdefender.com/
  - https://cloudgz.gravityzone.bitdefender.com/
  - https://cloudap.gravityzone.bitdefender.com/
  additionalinfo: The URL of your GravityZone Cloud instance.

- name: credentials
  type: 9
  required: true
  displaypassword: API key
  hiddenusername: true
  section: Connect
  additionalinfo: API key to access the service REST API.

- name: insecure
  display: Trust any certificate (not secure)
  required: false
  advanced: true
  type: 8
  section: Connect
  additionalinfo: When selected, the server certificates are not verified.

- name: proxy
  display: Use system proxy settings
  required: false
  advanced: true
  type: 8
  section: Connect
  additionalinfo: Use the system proxy settings for connecting to the server.

- name: isFetch
  display: Fetch incidents
  type: 8
  required: false
  section: Collect
  additionalinfo: When selected, the integration will fetch incidents from the server.

- additionalinfo: The maximum number of incidents per fetch. Default is 50.
  defaultvalue: '50'
  display: Maximum incidents to fetch
  name: max_fetch
  section: Collect
  type: 0
  required: false

- name: first_fetch
  display: First fetch time
  type: 0
  required: false
  defaultvalue: 3 days
  section: Collect
  additionalinfo: The time period from which the first fetch starts. Default is three days.

- name: mirror_direction
  additionalinfo: The incident mirroring direction. You can mirror "Incoming" (from GravityZone to Cortex XSOAR), "Outgoing" (from Cortex XSOAR to GravityZone), or in both directions.
  display: Mirroring Direction
  type: 15
  options:
  - None
  - Incoming
  - Outgoing
  - Both
  section: Collect
  required: false

- display: Incident type
  name: incidentType
  type: 13
  required: false
  section: Collect
defaultmapperin: GravityZone - Incoming Mapper
defaultclassifier: GravityZone - Classifier
description: GravityZone provides secure access to incident and endpoint data and enables remediation actions through its APIs.
display: GravityZone
name: GravityZone
script:
  commands:

  - name: fetch-incidents
    description: Retrieves incidents from GravityZone Cloud.
    arguments: []

  - name: gz-endpoint-list
    description: Retrieves the list of managed endpoints.
    arguments:
    - name: limit
      isArray: false
      description: The maximum number of endpoints to retrieve.
      required: false
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.EndpointsList.ID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.EndpointsList.Hostname
      description: The endpoint hostname.
      type: String
    - contextPath: GravityZone.EndpointsList.IP
      description: The endpoint IP address.
      type: String
    - contextPath: GravityZone.EndpointsList.OS
      description: The endpoint operating system version.
      type: String
    - contextPath: GravityZone.EndpointsList.MAC
      description: The endpoint MAC address.
      type: String
    - contextPath: GravityZone.EndpointsList.Vendor
      description: The endpoint vendor.
      type: String

  - name: gz-endpoint-get
    description: Retrieves endpoint details by endpoint ID.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    arguments:
    - name: id
      isArray: false
      description: The ID of the endpoint to retrieve.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Endpoint.ID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Endpoint.Hostname
      description: The endpoint hostname.
      type: String
    - contextPath: GravityZone.Endpoint.IP
      description: The endpoint IP address.
      type: String
    - contextPath: GravityZone.Endpoint.OS
      description: The endpoint operating system version.
      type: String
    - contextPath: GravityZone.Endpoint.Status
      description: The endpoint status.
      type: String
    - contextPath: GravityZone.Endpoint.Vendor
      description: The endpoint vendor.
      type: String
    - contextPath: GravityZone.Endpoint.LastLoggedUsers
      description: The last users who logged in to the endpoint.
      type: String
    - contextPath: Endpoint.ID
      description: The endpoint ID.
      type: String
    - contextPath: Endpoint.Hostname
      description: The endpoint hostname.
      type: String
    - contextPath: Endpoint.IPAddress
      description: The endpoint IP address.
      type: String
    - contextPath: Endpoint.OS
      description: The endpoint operating system version.
      type: String
    - contextPath: Endpoint.Status
      description: The endpoint status.
      type: String
    - contextPath: Endpoint.Vendor
      description: The endpoint vendor.
      type: String

  - name: gz-endpoint-users-loggedin
    description: Retrieves details of all active user sessions on a specific managed endpoint.
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The target endpoint ID. The endpoint must be accessible to you.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Endpoint.ID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Endpoint.Hostname
      description: The endpoint hostname.
      type: String
    - contextPath: GravityZone.Endpoint.ActiveSessions.Username
      description: The username of the currently logged-in user.
      type: String
    - contextPath: GravityZone.Endpoint.ActiveSessions.ConnectionType
      description: The connection type for the session.
      type: String
    - contextPath: GravityZone.Endpoint.ActiveSessions.StartTime
      description: The session start time, if available.
      type: Date
    - contextPath: GravityZone.Endpoint.ActiveSessions.UserSID
      description: The Security Identifier (SID) of the logged-in user, if available.
      type: String
    - contextPath: GravityZone.Endpoint.ActiveSessions.DomainSID
      description: The Security Identifier (SID) of the logged-in user's domain, if available.
      type: String
    - contextPath: GravityZone.Endpoint.ActiveSessions.OrganizationalUnitDN
      description: The full distinguished name (DN) of the organizational unit, if available.
      type: String
    - contextPath: GravityZone.Endpoint.ActiveSessions.MemberOfSIDs
      description: The SIDs for the groups to which the logged-in user belongs, if available.
      type: Array

  - name: gz-endpoint-create-memory-dump
    description: Initiates the creation of a memory dump for the specified endpoint. Once the dump is successfully generated, the resulting archive is uploaded to the Bitdefender cloud.
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The target endpoint ID. The endpoint must be accessible and run a Windows operating system.
      required: true
      secret: false
      default: false
    - name: path
      isArray: false
      description: The path to the destination folder on the specified endpoint where the memory dump archive will be created.
      required: true
      secret: false
      default: false
    - name: password
      isArray: false
      description: The password used to secure the memory dump archive after it is created. It must contain at least 12 characters, including one uppercase letter, one lowercase letter, one digit, and one special character.
      required: true
      secret: true
      default: false
    - name: polling
      isArray: false
      description: "Controls whether the command waits for the memory dump task completion. If set to true, the command returns the final result after the task completes. If set to false, the command returns only the endpoint ID and task ID immediately after the task is initiated. Default and recommended value: true."
      required: false
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.MemoryDump.TaskID
      description: The memory dump task ID.
      type: String
    - contextPath: GravityZone.MemoryDump.TaskType
      description: The task type.
      type: String
    - contextPath: GravityZone.MemoryDump.Status
      description: The memory dump task status.
      type: String
    - contextPath: GravityZone.MemoryDump.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.MemoryDump.Hostname
      description: The endpoint hostname.
      type: String
    - contextPath: GravityZone.MemoryDump.StartDate
      description: The date and time when the memory dump task started.
      type: Date
    - contextPath: GravityZone.MemoryDump.EndDate
      description: The date and time when the memory dump task ended, if available.
      type: Date
    - contextPath: GravityZone.MemoryDump.ErrorCode
      description: An error code if the memory dump task fails, or Success if the task completes successfully.
      type: String
    - contextPath: GravityZone.MemoryDump.Error
      description: An error message if the memory dump task fails, or Success if the task completes successfully.
      type: String
    - contextPath: GravityZone.MemoryDump.DownloadURL
      description: The memory dump download URL, available after the task completes successfully.
      type: String

  - name: gz-endpoint-download-investigation-package
    description: Collects and downloads an investigation package from an endpoint.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The ID of the endpoint from which to collect the investigation package.
      required: true
      secret: false
      default: false
    - name: output_file
      isArray: false
      description: The output file name in Cortex XSOAR to save the collected package. For Windows and macOS use .zip, for Linux use .tgz.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Command.DownloadFile.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.Status
      description: The command status.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.ErrorCode
      description: The command error code.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.OutputFile
      description: The output file name.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.RemoteFile
      description: The remote file path.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.FileID
      description: The file ID.
      type: String
    - contextPath: File.SHA1
      description: The SHA1 hash of the downloaded file.
      type: String
    - contextPath: File.SHA256
      description: The SHA256 hash of the downloaded file.
      type: String
    - contextPath: File.SHA512
      description: The SHA512 hash of the downloaded file.
      type: String
    - contextPath: File.SSDeep
      description: The SSDeep hash of the downloaded file.
      type: String
    - contextPath: File.EntryID
      description: The EntryID hash of the downloaded file.
      type: String
    - contextPath: File.Info
      description: Information about the downloaded file.
      type: String
    - contextPath: File.Type
      description: The downloaded file type.
      type: String
    - contextPath: File.MD5
      description: The MD5 hash of the downloaded file.
      type: String
    - contextPath: File.Extension
      description: The downloaded file extension.
      type: String
    - contextPath: File.Size
      description: The downloaded file size.
      type: Number
    - contextPath: File.Name
      description: The downloaded file name.
      type: String

  - name: gz-endpoint-download-file
    description: Downloads a file from an endpoint.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The ID of the endpoint to download the file from.
      required: true
      secret: false
      default: false
    - name: remote_file
      isArray: false
      description: The full path of the remote file on the endpoint to download.
      required: true
      secret: false
      default: false
    - name: output_file
      isArray: false
      description: The output file name in Cortex XSOAR to save the downloaded file to.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Command.DownloadFile.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.Status
      description: The command status.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.ErrorCode
      description: The command error code.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.OutputFile
      description: The output file name.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.RemoteFile
      description: The remote file path.
      type: String
    - contextPath: GravityZone.Command.DownloadFile.FileID
      description: The file ID.
      type: String
    - contextPath: File.SHA1
      description: The SHA1 hash of the downloaded file.
      type: String
    - contextPath: File.SHA256
      description: The SHA256 hash of the downloaded file.
      type: String
    - contextPath: File.SHA512
      description: The SHA512 hash of the downloaded file.
      type: String
    - contextPath: File.SSDeep
      description: The SSDeep hash of the downloaded file.
      type: String
    - contextPath: File.EntryID
      description: The EntryID hash of the downloaded file.
      type: String
    - contextPath: File.Info
      description: Information about the downloaded file.
      type: String
    - contextPath: File.Type
      description: The downloaded file type.
      type: String
    - contextPath: File.MD5
      description: The MD5 hash of the downloaded file.
      type: String
    - contextPath: File.Extension
      description: The downloaded file extension.
      type: String
    - contextPath: File.Size
      description: The downloaded file size.
      type: Number
    - contextPath: File.Name
      description: The downloaded file name.
      type: String

  - name: gz-endpoint-isolate
    description: Isolates an endpoint from the network.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The ID of the endpoint to isolate.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Command.Isolate.TaskID
      description: The task ID.
      type: String
    - contextPath: GravityZone.Command.Isolate.TaskType
      description: The task type.
      type: String
    - contextPath: GravityZone.Command.Isolate.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Command.Isolate.Hostname
      description: The endpoint name.
      type: String
    - contextPath: GravityZone.Command.Isolate.Status
      description: The command status.
      type: String
    - contextPath: GravityZone.Command.Isolate.ErrorCode
      description: The command error code, or "Success".
      type: String
    - contextPath: GravityZone.Command.Isolate.Error
      description: The command error message, or "Success".
      type: String
    - contextPath: GravityZone.Command.Isolate.StartDate
      description: The start date of the command execution.
      type: Date
    - contextPath: GravityZone.Command.Isolate.EndDate
      description: The end date of the command execution.
      type: Date

  - name: gz-endpoint-deisolate
    description: Restores an isolated endpoint to the network.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The ID of the endpoint to restore from isolation.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Command.Deisolate.TaskID
      description: The task ID.
      type: String
    - contextPath: GravityZone.Command.Deisolate.TaskType
      description: The task type.
      type: String
    - contextPath: GravityZone.Command.Deisolate.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Command.Deisolate.Hostname
      description: The endpoint name.
      type: String
    - contextPath: GravityZone.Command.Deisolate.Status
      description: The command status.
      type: String
    - contextPath: GravityZone.Command.Deisolate.ErrorCode
      description: The command error code, or "Success".
      type: String
    - contextPath: GravityZone.Command.Deisolate.Error
      description: The command error message, or "Success".
      type: String
    - contextPath: GravityZone.Command.Deisolate.StartDate
      description: The start date of the command execution.
      type: Date
    - contextPath: GravityZone.Command.Deisolate.EndDate
      description: The end date of the command execution.
      type: Date

  - name: gz-endpoint-kill-process
    description: Terminates a process on an endpoint by process ID.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The endpoint ID.
      required: true
      secret: false
      default: false
    - name: pid
      isArray: false
      description: The ID of the process to kill.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Command.KillProcess.TaskID
      description: The task ID.
      type: String
    - contextPath: GravityZone.Command.KillProcess.TaskType
      description: The task type.
      type: String
    - contextPath: GravityZone.Command.KillProcess.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Command.KillProcess.Hostname
      description: The endpoint name.
      type: String
    - contextPath: GravityZone.Command.KillProcess.Status
      description: The command status.
      type: String
    - contextPath: GravityZone.Command.KillProcess.ErrorCode
      description: The command error code, or "Success".
      type: String
    - contextPath: GravityZone.Command.KillProcess.Error
      description: The command error message, or "Success".
      type: String
    - contextPath: GravityZone.Command.KillProcess.StartDate
      description: The start date of the command execution.
      type: Date
    - contextPath: GravityZone.Command.KillProcess.EndDate
      description: The end date of the command execution.
      type: Date
    - contextPath: GravityZone.Command.KillProcess.ProcessID
      description: The process ID.
      type: Number
    - contextPath: GravityZone.Command.KillProcess.ProcessPath
      description: The process path.
      type: String

  - name: gz-endpoint-run-command
    description: Runs a command on the endpoint. The applied policy must have remote shell enabled for this action to work.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    execution: true
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The ID of the endpoint on which to run the command.
      required: true
      secret: false
      default: false
    - name: command
      isArray: false
      description: The command to run on the endpoint.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Command.RunCommand.ActivityID
      description: The activity ID.
      type: String
    - contextPath: GravityZone.Command.RunCommand.ActivityType
      description: The activity type.
      type: String
    - contextPath: GravityZone.Command.RunCommand.Status
      description: The command status.
      type: String
    - contextPath: GravityZone.Command.RunCommand.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Command.RunCommand.ErrorCode
      description: The command error code, or "Success".
      type: String
    - contextPath: GravityZone.Command.RunCommand.Output
      description: The command output.
      type: String
    - contextPath: GravityZone.Command.RunCommand.FileID
      description: The stored file ID, when the command output cannot be extracted as an archive.
      type: String
    - contextPath: GravityZone.Command.RunCommand.FileName
      description: The stored file name, when the command output cannot be extracted as an archive.
      type: String

  - name: gz-endpoint-upload-file
    description: Uploads a file to an endpoint.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The ID of the target endpoint for the file upload.
      required: true
      secret: false
      default: false
    - name: entry_id
      isArray: false
      description: The entry ID of the file to upload. This file must exist in Cortex XSOAR.
      required: true
      secret: false
      default: false
    - name: remote_location
      isArray: false
      description: The full folder path on the endpoint where the file will be uploaded.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Command.UploadFile.TaskID
      description: The task ID.
      type: String
    - contextPath: GravityZone.Command.UploadFile.TaskType
      description: The task type.
      type: String
    - contextPath: GravityZone.Command.UploadFile.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Command.UploadFile.Hostname
      description: The endpoint name.
      type: String
    - contextPath: GravityZone.Command.UploadFile.Status
      description: The command status.
      type: String
    - contextPath: GravityZone.Command.UploadFile.ErrorCode
      description: The command error code, or "Success".
      type: String
    - contextPath: GravityZone.Command.UploadFile.Error
      description: The command error message, or "Success".
      type: String
    - contextPath: GravityZone.Command.UploadFile.StartDate
      description: The start date of the command execution.
      type: Date
    - contextPath: GravityZone.Command.UploadFile.EndDate
      description: The end date of the command execution.
      type: Date
    - contextPath: GravityZone.Command.UploadFile.EntryID
      description: The entry ID of the uploaded file.
      type: String
    - contextPath: GravityZone.Command.UploadFile.DestinationPath
      description: The destination path of the uploaded file.
      type: String

  - name: gz-endpoint-list-by-running-process-hash
    description: Retrieves endpoints that are running processes with a specified hash. The API key and the applied policy must allow Live Search and endpoints must be online. The command waits up to five minutes for responses before timing out.
    polling: true
    arguments:
    - name: process_hash
      isArray: false
      description: The process hash.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Command.EndpointsRunningProcessHash.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Command.EndpointsRunningProcessHash.Path
      description: The Live Search results.
      type: String
    - contextPath: GravityZone.Command.EndpointsRunningProcessHash.ProcessHash
      description: The process hash.
      type: String

  - name: gz-endpoint-get-process-tree-by-hash
    description: Retrieves the process tree on an endpoint for a specified process hash. The applied policy must allow Live Search and the endpoint must be online.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    polling: true
    arguments:
    - name: id
      isArray: false
      description: The ID of the targeted endpoint.
      required: true
      secret: false
      default: false
    - name: process_hash
      isArray: false
      description: The process hash to search for.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Command.ProcessTreeForHash.EndpointID
      description: The endpoint ID.
      type: String
    - contextPath: GravityZone.Command.ProcessTreeForHash.PID
      description: The process ID.
      type: Number
    - contextPath: GravityZone.Command.ProcessTreeForHash.Path
      description: The process path.
      type: String
    - contextPath: GravityZone.Command.ProcessTreeForHash.Cmdline
      description: The command line used to start the process.
      type: String
    - contextPath: GravityZone.Command.ProcessTreeForHash.ParentPID
      description: The parent process ID.
      type: Number

  - name: gz-incident-get
    description: Retrieves incident details by ID.
    compliantpolicies:
    - EndPoint Isolation
    - User Hard Remediation
    arguments:
    - name: id
      isArray: false
      description: The incident ID to fetch.
      required: true
      secret: false
      default: false
    outputs:
    - contextPath: GravityZone.Incident.ID
      description: The incident ID.
      type: String
    - contextPath: GravityZone.Incident.Type
      description: The incident type ('incident' / 'extendedIncident').
      type: String
    - contextPath: GravityZone.Incident.Company.Name
      description: The GravityZone company name where the incident is located.
      type: String
    - contextPath: GravityZone.Incident.Company.ID
      description: The GravityZone company ID where the incident is located.
      type: String
    - contextPath: GravityZone.Incident.Number
      description: The incident number (specific to the company).
      type: Number
    - contextPath: GravityZone.Incident.Severity.Score
      description: The incident severity score (0 - 100).
      type: Number
    - contextPath: GravityZone.Incident.Status
      description: The incident status.
      type: Number
    - contextPath: GravityZone.Incident.ActionTaken
      description: The action taken by the detection logic ('reported' / 'blocked' / 'partially_blocked').
      type: String
    - contextPath: GravityZone.Incident.Created
      description: The date the incident was detected on the endpoint / sensor.
      type: Date
    - contextPath: GravityZone.Incident.LastUpdated
      description: The date the incident was last updated in GravityZone or by the endpoint / sensor.
      type: Date
    - contextPath: GravityZone.Incident.LastProcessed
      description: The date the incident was last processed by GravityZone services.
      type: Date
    - contextPath: GravityZone.Incident.Permalink
      description: The incident URL in the GravityZone console.
      type: String
    - contextPath: GravityZone.Incident.AssignedPriority
      description: The priority assigned to the incident ('unknown' / 'low' / 'medium' / 'high' / 'critical').
      type: String
    - contextPath: GravityZone.Incident.Notes.Text
      description: The note contents.
      type: String
    - contextPath: GravityZone.Incident.Notes.User
      description: The username (email) of the user who wrote the note.
      type: String
    - contextPath: GravityZone.Incident.Notes.Date
      description: The note creation date.
      type: Date
    - contextPath: GravityZone.Incident.Alerts.Name
      description: The alert name.
      type: String
    - contextPath: GravityZone.Incident.Alerts.Date
      description: The date the alert was generated.
      type: Date
    - contextPath: GravityZone.Incident.Alerts.Sensors
      description: The list of sensors that generated the alert. Available only for 'extendedIncident'-type incidents.
      type: String
    - contextPath: GravityZone.Incident.Alerts.Tactic
      description: The list of tactics that generated the alert. Available only for 'extendedIncident'-type incidents.
      type: String
    - contextPath: GravityZone.Incident.Alerts.Resources
