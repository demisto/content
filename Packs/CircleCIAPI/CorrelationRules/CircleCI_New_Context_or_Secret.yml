name: CircleCI - New Context or Context Secret - by GoCortexIO
severity: SEV_040_HIGH
xql_query: |-
  datamodel dataset = circleci_context_envvars_raw
  | filter xdm.event.original_event_type in ("context_created", "context_envvar_created")
  | fields xdm.observer.vendor, xdm.observer.product, xdm.event.id, xdm.event.type, xdm.event.tags, xdm.event.operation, xdm.event.original_event_type, xdm.event.description, xdm.source.cloud.project, xdm.target.resource.type, xdm.target.resource.id, xdm.target.resource.name, xdm.target.resource.sub_type, xdm.*
alert_name: CircleCI new $xdm.target.resource.type $xdm.target.resource.name
alert_category: User Defined
user_defined_category: xdm.alert.category
alert_description: A new CircleCI $xdm.target.resource.type ($xdm.target.resource.name) appeared in organisation $xdm.source.cloud.project. New shared contexts and context secret names can indicate credential staging or access in the CI/CD environment, which was the data class exfiltrated in the January 2023 CircleCI incident. Verify who created it.
alert_domain: DOMAIN_SECURITY
mitre_defs:
  TA0006 - Credential Access:
  - T1552 - Unsecured Credentials
suppression_fields:
- xdm.event.id
global_rule_id: e36428f0-07d3-4669-b0c9-a3d0add31182
is_enabled: true
alert_type: null
alert_fields: {}
execution_mode: SCHEDULED
search_window: 2 hours
timezone: Australia/Melbourne
crontab: '45 * * * *'
suppression_enabled: true
suppression_duration: 24 hours
dataset: alerts
investigation_query_link: ''
drilldown_query_timeframe: ALERT
mapping_strategy: AUTO
action: ALERTS
fromversion: 8.4.0
