commonfields:
  id: CircleCI Contexts Event Collector
  version: -1
name: CircleCI Contexts Event Collector
display: CircleCI Contexts Event Collector
category: Analytics & SIEM
description: Collect the shared-context and context environment-variable name inventory from the CircleCI v2 API and ingest it into Cortex XSIAM. Environment-variable values are masked by the API; only names are collected.
configuration:
- display: Server URL
  name: url
  type: 0
  required: true
  defaultvalue: https://circleci.com/api/v2
  additionalinfo: The CircleCI API v2 base URL.
- display: API Token
  name: credentials
  type: 9
  required: true
  displaypassword: API Token
  hiddenusername: true
  additionalinfo: A CircleCI personal API token. Provide the token in the password field; it is sent as the Circle-Token header.
- display: Organisation slugs
  name: org_slugs
  type: 0
  required: true
  additionalinfo: 'A comma-separated list of CircleCI organisation slugs that own the contexts (e.g. "gh/MyOrg" or "circleci/<org-id>"). List yours via the /me/collaborations endpoint.'
- display: Maximum number of records per fetch
  name: max_fetch
  type: 0
  required: false
  defaultvalue: "5000"
  advanced: true
  additionalinfo: The maximum number of context and environment-variable records to fetch per organisation on each run.
- display: Events Fetch Interval
  name: eventFetchInterval
  type: 19
  required: false
  defaultvalue: "60"
  additionalinfo: How often the collector runs, in minutes. Contexts are current configuration (a snapshot), so an hourly interval suits snapshot-over-snapshot comparison.
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
  advanced: true
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
  advanced: true
script:
  script: ''
  type: python
  subtype: python3
  dockerimage: demisto/python3:3.12.13.10404775
  isfetchevents: true
  commands:
  - name: circleci-contexts-get-events
    description: Manual command to retrieve and preview the CircleCI context and environment-variable inventory. Used for testing and development.
    arguments:
    - name: org_slugs
      description: A comma-separated list of CircleCI organisation slugs. Defaults to the instance-configured organisation slugs.
      isArray: true
    - name: limit
      description: The maximum number of records to return per organisation.
      defaultValue: "50"
    - name: should_push_events
      description: If true, the fetched records are also pushed to the XSIAM dataset. Defaults to false.
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      defaultValue: "false"
    outputs: []
fromversion: 6.8.0
defaultEnabled: true
marketplaces:
- marketplacev2
- platform
supportedModules:
- C1
- C3
- X1
- X3
- X5
- ENT_PLUS
tests:
- No tests (auto formatted)
