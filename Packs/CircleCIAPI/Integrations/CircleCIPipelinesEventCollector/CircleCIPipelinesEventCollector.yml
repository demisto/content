commonfields:
  id: CircleCI Pipelines Event Collector
  version: -1
name: CircleCI Pipelines Event Collector
display: CircleCI Pipelines Event Collector
category: Analytics & SIEM
description: Collect pipeline activity from the CircleCI v2 API and ingest it into Cortex XSIAM.
configuration:
- display: Server URL
  name: url
  type: 0
  required: true
  defaultvalue: https://circleci.com/api/v2
  additionalinfo: The CircleCI API v2 base URL.
- display: API Token
  name: credentials
  type: 9
  required: true
  displaypassword: API Token
  hiddenusername: true
  additionalinfo: A CircleCI personal API token. Provide the token in the password field; it is sent as the Circle-Token header.
- display: Organisation slugs
  name: org_slugs
  type: 0
  required: true
  additionalinfo: 'A comma-separated list of CircleCI organisation slugs to collect pipelines from (e.g. "gh/MyOrg" or "circleci/<org-id>"). List yours via the /me/collaborations endpoint.'
- display: First fetch time
  name: first_fetch
  type: 0
  required: false
  defaultvalue: 3 days
  additionalinfo: 'The time range to fetch on the first run (e.g. "3 days", "12 hours").'
- display: Maximum number of pipelines per organisation per fetch
  name: max_fetch_per_org
  type: 0
  required: false
  defaultvalue: "5000"
  advanced: true
  additionalinfo: The maximum number of pipeline records to fetch per organisation on each run.
- display: Events Fetch Interval
  name: eventFetchInterval
  type: 19
  required: false
  defaultvalue: "5"
  additionalinfo: How often the collector runs, in minutes.
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
  advanced: true
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
  advanced: true
script:
  script: ''
  type: python
  subtype: python3
  dockerimage: demisto/python3:3.12.13.10404775
  isfetchevents: true
  commands:
  - name: circleci-pipelines-get-events
    description: Manual command to retrieve and preview CircleCI pipeline events. Used for testing and development.
    arguments:
    - name: org_slugs
      description: A comma-separated list of CircleCI organisation slugs. Defaults to the instance-configured organisation slugs.
      isArray: true
    - name: since
      description: 'The time range to fetch events from (e.g. "3 days", "12 hours").'
      defaultValue: 3 days
    - name: limit
      description: The maximum number of events to return per organisation.
      defaultValue: "50"
    - name: should_push_events
      description: If true, the fetched events are also pushed to the XSIAM dataset. Defaults to false.
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      defaultValue: "false"
    outputs: []
fromversion: 6.8.0
defaultEnabled: true
marketplaces:
- marketplacev2
- platform
supportedModules:
- C1
- C3
- X1
- X3
- X5
- ENT_PLUS
tests:
- No tests (auto formatted)
