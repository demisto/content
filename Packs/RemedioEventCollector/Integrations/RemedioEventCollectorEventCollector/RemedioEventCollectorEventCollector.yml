script:
  commands:
  - name: remedio-get-events
    arguments:
    - name: should_push_events
      required: true
      auto: PREDEFINED
      predefined:
      - "True"
      - "False"
      description: Set this argument to True in order to push events to XSIAM, otherwise the command will only display them.
      defaultValue: "False"
    - name: limit
      description: Maximum number of misconfigurations to return.
      defaultValue: "100"
    description: Manual command to fetch misconfiguration events and display them.
  script: ''
  type: python
  subtype: python3
  dockerimage: demisto/python3:3.12.8.3296088
  isfetchevents: true
  runonce: false
