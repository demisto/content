commonfields:
  id: RemedioEventCollectorEventCollector
  version: -1
vcShouldKeepItemLegacyProdMachine: false
name: RemedioEventCollectorEventCollector
display: Remedio Event Collector
category: Analytics & SIEM
description: Fetches misconfiguration events from Remedio (Gytpol) and ingests them into XSIAM.
detaileddescription: |-
  ## Remedio Event Collector
  Fetches all active misconfigurations from the Remedio Customer API and ingests them into XSIAM.
  ---
  ### Configuration
  - **Server URL** - Your Remedio tenant URL (e.g., https://acme.gytpol.com)
  - **API Key** - Generated from the Remedio portal (Settings > API Keys) with read access to the Customer API
  - **Maximum misconfigurations per fetch** - Leave empty to fetch all. Set a number to cap results per run.
  ---
  ### Notes
  - Each fetch performs a full snapshot of all active misconfigurations.
  - Configure the fetch interval to run 1-2 times per day.

  ### Datasets

  | Name | Dataset |
  |------|---------|
  | Misconfigurations | `remedio_misconfigurations_raw` |
sectionorder:
- Connect
- Collect
configuration:
- section: Connect
  display: Server URL
  name: url
  defaultvalue: https://acme.gytpol.com
  type: 0
  required: true
- section: Connect
  display: ""
  displaypassword: API Key
  name: api_key
  type: 9
  required: true
  hiddenusername: true
- section: Collect
  display: Maximum misconfigurations per fetch
  name: max_fetch
  defaultvalue: "1000"
  type: 0
  required: false
- section: Connect
  advanced: true
  display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
- section: Connect
  advanced: true
  display: Use system proxy settings
  name: proxy
  type: 8
