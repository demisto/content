category: IT Services
commonfields:
  id: CriblSearch
  version: -1
provider: Cribl
configuration:
- defaultvalue: https://${workspaceName}-${organizationId}.cribl.cloud
  display: Base URL
  name: url
  required: true
  type: 0
  additionalinfo: 'The base URL assigned to your organization: https://${workspaceName}-${organizationId}.cribl.cloud'
  section: Connect
- name: credentials
  display: Client ID
  displaypassword: Client Secret
  type: 9
  required: true
  section: Connect
- display: Trust any certificate (not secure)
