commonfields:
  id: Gurucul-GRA
  version: -1
name: Gurucul-GRA
display: Gurucul-GRA
sectionorder:
- Connect
- Collect
category: Data Enrichment & Threat Intelligence
provider: Gurucul
description: Gurucul Risk Analytics (GRA) is a Unified Security and Risk Analytics platform.
configuration:
- display: Server URL (e.g. https://example.net)
  name: url
  defaultvalue: https://example.net
  type: 0
  section: Connect
  required: true
- display: Authorization Key
  name: apikey
  type: 4
  section: Connect
  required: true
- display: Trust any certificate (not secure)
  name: insecure
  defaultvalue: "false"
  type: 8
  section: Connect
  advanced: true
  required: false
- display: Use system proxy settings
  name: proxy
  defaultvalue: "false"
  type: 8
  section: Connect
  advanced: true
  required: false
- display: Fetch incidents
  name: isFetch
  type: 8
  section: Collect
  required: false
- display: Incident type
  name: incidentType
  type: 13
  section: Collect
  required: false
- display: First fetch time
  name: first_fetch
  defaultvalue: 3 days
  type: 0
  section: Collect
  required: false
  additionalinfo: Used only on the first fetch when no maxIncidentId/maxAlertId cursor exists yet. Later fetches use the ID cursor only.
- display: Maximum number of incidents per fetch
  name: max_fetch
  defaultvalue: "25"
  type: 0
  section: Collect
  required: false
- display: Fetch type
  name: fetch_type
  type: 15
  section: Collect
  required: false
  defaultvalue: Incidents
  options:
  - Incidents
  - Alerts
  additionalinfo: What to import from GRA. Cases are no longer fetched. Legacy GRACase incidents remain actionable via gra-case-* commands. Use a separate instance for Alerts. On the Alerts instance set Classifier to GRAAlert-Classifier, Mapper (incoming) to GRAAlert-Mapper, and Incident type to GRAAlert. The integration defaults (GRAIncident-Classifier / GRAIncident-Mapper) apply to the Incidents instance. After the first bootstrap, fetch continues with maxIncidentId or maxAlertId only.
