id: Rasterize isArray Test
version: -1
name: Rasterize isArray Test
description: |-
  Tests the difference between isArray=true (old, <=8.14.0) and isArray:platform=false (new, >=8.15.0)
  by setting a list of 10 heavy news websites in context and running the rasterize command on them.
  Check integration logs to observe the behavior difference.
starttaskid: '0'
fromversion: 5.0.0
tasks:
  '0':
    id: '0'
    taskid: a0000000-0000-0000-0000-000000000000
    type: start
    task:
      id: a0000000-0000-0000-0000-000000000000
      version: -1
      name: ''
      iscommand: false
      brand: ''
      description: ''
    nexttasks:
      '#none#':
      - '1'
    separatecontext: false
    view: |-
      {
        "position": {
          "x": 480,
          "y": 50
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
    continueonerrortype: ""

  '1':
    id: '1'
    taskid: a1000000-0000-0000-0000-000000000001
    type: regular
    task:
      id: a1000000-0000-0000-0000-000000000001
      version: -1
      name: Set list of 10 heavy news websites in context
      description: Sets a list of 10 heavy news/media websites into the context under the key "RasterizeTest.URLs".
      scriptName: SetAndHandleEmpty
      type: regular
      iscommand: false
      brand: ''
    nexttasks:
      '#none#':
      - '2'
    scriptarguments:
      key:
        simple: RasterizeTest.URLs
      value:
        simple: |-
          https://www.cnn.com,https://www.bbc.com,https://www.nytimes.com,https://www.theguardian.com,https://www.reuters.com,https://www.washingtonpost.com,https://www.bloomberg.com,https://www.forbes.com,https://www.nbcnews.com,https://www.foxnews.com
      append:
        simple: "false"
    separatecontext: false
    view: |-
      {
        "position": {
          "x": 480,
          "y": 195
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
    continueonerrortype: ""

  '2':
    id: '2'
    taskid: a2000000-0000-0000-0000-000000000002
    type: regular
    task:
      id: a2000000-0000-0000-0000-000000000002
      version: -1
      name: Rasterize list of URLs
      description: |-
        Runs rasterize on the list of 10 heavy news websites stored in context.
        On servers <=8.14.0: isArray=true means the integration receives all URLs as a list in a single call.
        On servers >=8.15.0: isArray:platform=false means the platform iterates and calls the integration once per URL.
        Check integration logs to observe the difference in behavior.
      script: '|||rasterize'
      type: regular
      iscommand: true
      brand: ''
    nexttasks:
      '#none#':
      - '3'
    scriptarguments:
      url:
        complex:
          root: RasterizeTest
          accessor: URLs
          transformers:
          - operator: split
            args:
              delimiter:
                value:
                  simple: ','
      type:
        simple: png
      wait_time:
        simple: "2"
      max_page_load_time:
        simple: "30"
    separatecontext: false
    view: |-
      {
        "position": {
          "x": 480,
          "y": 370
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
    continueonerrortype: ""

