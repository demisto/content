id: Rasterize Heavy News Websites
version: -1
name: Rasterize Heavy News Websites
description: |-
  This playbook demonstrates the lightweight rasterize integration capability by:
  1. Storing 20 heavy news websites in the incident context data as a JSON array.
  2. Running the rasterize command to capture screenshots of all 20 websites in parallel.
starttaskid: '0'
fromversion: 6.10.0
tasks:
