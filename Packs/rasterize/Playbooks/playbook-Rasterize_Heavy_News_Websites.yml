    continueonerrortype: ""

  '1':
    id: '1'
    taskid: a1b2c3d4-0000-0000-0000-000000000002
    type: regular
    task:
      id: a1b2c3d4-0000-0000-0000-000000000002
      version: -1
      name: Store 20 heavy news websites in context
      description: |-
        Sets a JSON array of 20 heavy news websites into the incident context under the key
        RasterizeURLs.NewsWebsites. The rasterize integration's process_urls() function
        detects the leading "[" and calls argToList() to split the array into individual URLs.
      scriptName: Set
      type: regular
      iscommand: false
      brand: ''
    nexttasks:
      '#none#':
      - '2'
    scriptarguments:
      key:
        simple: RasterizeURLs.NewsWebsites
      value:
        simple: >-
          ["https://www.cnn.com","https://www.bbc.com","https://www.nytimes.com","https://www.theguardian.com","https://www.dw.com","https://www.washingtonpost.com","https://www.bloomberg.com","https://www.forbes.com","https://www.nbcnews.com","https://www.foxnews.com","https://www.apnews.com","https://www.usatoday.com","https://www.wsj.com","https://www.latimes.com","https://www.abcnews.go.com","https://www.cbsnews.com","https://www.politico.com","https://www.theatlantic.com","https://www.huffpost.com","https://www.aljazeera.com"]
      append:
        simple: "false"
    separatecontext: false
    view: |-
      {
        "position": {
          "x": 480,
          "y": 195
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
    continueonerrortype: ""

  '2':
    id: '2'
    taskid: a1b2c3d4-0000-0000-0000-000000000003
    type: regular
    task:
      id: a1b2c3d4-0000-0000-0000-000000000003
      version: -1
      name: Rasterize the 20 news websites
      description: |-
        Captures screenshots of all 20 heavy news websites stored in context using the
        Rasterize integration. The url argument reads the JSON array from context;
        process_urls() in the integration detects the "[" prefix and splits it into
        individual URLs, rasterizing each in parallel using Chrome tabs.
      script: Rasterize|||rasterize
      type: regular
      iscommand: true
      brand: Rasterize
    nexttasks:
      '#none#':
      - '3'
    scriptarguments:
      url:
        complex:
          root: RasterizeURLs
          accessor: NewsWebsites
      type:
        simple: png
      width:
        simple: 1280px
      height:
        simple: 1024px
      full_screen:
        simple: "False"
      include_url:
        simple: "True"
      file_name:
        simple: news_website_screenshot
    separatecontext: false
    view: |-
      {
        "position": {
          "x": 480,
          "y": 370
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
    continueonerrortype: ""

