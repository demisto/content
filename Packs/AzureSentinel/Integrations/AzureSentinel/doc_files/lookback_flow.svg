<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 720" font-family="Arial, Helvetica, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="525" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Lookback Fetch Flow (lookback = X minutes)</text>

  <!-- Start: Incident Modified/Created -->
  <rect x="400" y="50" width="250" height="40" rx="8" ry="8" fill="#e8d5f5" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="525" y="75" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Incident Modified / Created</text>

  <!-- Branch arrows from Incident Modified -->
  <line x1="450" y1="90" x2="200" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="90" x2="770" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left: Not Satisfying Conditions -->
  <rect x="100" y="140" width="200" height="40" rx="8" ry="8" fill="#e9ecef" stroke="#6c757d" stroke-width="1.5"/>
  <text x="200" y="157" text-anchor="middle" fill="#333" font-size="12">Not Satisfying Conditions</text>
  <text x="200" y="172" text-anchor="middle" fill="#333" font-size="12">(e.g., severity filter)</text>

  <!-- Right: Satisfying Conditions -->
  <rect x="670" y="140" width="200" height="40" rx="8" ry="8" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1.5"/>
  <text x="770" y="165" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Satisfying Conditions</text>

  <!-- Left result: Won't be fetched -->
  <line x1="200" y1="180" x2="200" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="100" y="220" width="200" height="35" rx="8" ry="8" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="200" y="242" text-anchor="middle" fill="#333" font-size="12">Won't be fetched</text>

  <!-- Arrow to Found by Regular Fetch with Created label -->
  <line x1="710" y1="180" x2="500" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="585" y="205" font-size="11" fill="#6f42c1" font-weight="bold">Created</text>

  <!-- Arrow to Found by Lookback with Modified label -->
  <line x1="830" y1="180" x2="880" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="875" y="205" font-size="11" fill="#6f42c1" font-weight="bold">Modified</text>

  <!-- Found by Regular Fetch -->
  <rect x="400" y="240" width="200" height="40" rx="8" ry="8" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1.5"/>
  <text x="500" y="265" text-anchor="middle" fill="#333" font-size="12">Found by Regular Fetch</text>

  <!-- Found by Lookback -->
  <rect x="780" y="240" width="200" height="40" rx="8" ry="8" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1.5"/>
  <text x="880" y="265" text-anchor="middle" fill="#333" font-size="12">Found by Lookback</text>

  <!-- Arrow from Found by Regular Fetch -->
  <line x1="500" y1="280" x2="500" y2="330" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result: Fetched regularly -->
  <rect x="350" y="330" width="300" height="80" rx="8" ry="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="500" y="350" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Fetched by regular fetch</text>
  <text x="500" y="367" text-anchor="middle" fill="#333" font-size="12">Added to the dedup dict.</text>
  <text x="500" y="384" text-anchor="middle" fill="#333" font-size="12">Won't be fetched again by lookback.</text>
  <text x="500" y="401" text-anchor="middle" fill="#333" font-size="12">Added to the lookback dict.</text>

  <!-- Branch from Found by Lookback -->
  <line x1="830" y1="280" x2="730" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="930" y1="280" x2="960" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Not found by lookback before -->
  <rect x="645" y="340" width="175" height="40" rx="8" ry="8" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1.5"/>
  <text x="733" y="357" text-anchor="middle" fill="#333" font-size="12">Not found by</text>
  <text x="733" y="372" text-anchor="middle" fill="#333" font-size="12">lookback before</text>

  <!-- Found by lookback before -->
  <rect x="875" y="340" width="175" height="40" rx="8" ry="8" fill="#e9ecef" stroke="#6c757d" stroke-width="1.5"/>
  <text x="963" y="357" text-anchor="middle" fill="#333" font-size="12">Found by</text>
  <text x="963" y="372" text-anchor="middle" fill="#333" font-size="12">lookback before</text>

  <!-- Arrow from Not found by lookback before -->
  <line x1="733" y1="380" x2="733" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result: Fetched by lookback -->
  <rect x="638" y="430" width="190" height="50" rx="8" ry="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="733" y="452" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Fetched by lookback</text>
  <text x="733" y="467" text-anchor="middle" fill="#333" font-size="12">Added to the lookback dict</text>

  <!-- Arrow from Found by lookback before -->
  <line x1="963" y1="380" x2="963" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result: Skipped -->
  <rect x="893" y="430" width="140" height="40" rx="8" ry="8" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="963" y="455" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Skipped</text>

  <!-- Separator line -->
  <line x1="50" y1="520" x2="1020" y2="520" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Every Loop note -->
  <rect x="145" y="540" width="760" height="130" rx="10" ry="10" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="2"/>
  <text x="525" y="570" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Every Fetch Cycle:</text>
  <text x="525" y="605" text-anchor="middle" font-size="13" fill="#2c3e50">1. Go over the lookback dict and remove IDs whose lastModifiedTimeUtc</text>
  <text x="525" y="625" text-anchor="middle" font-size="13" fill="#2c3e50">has expired (older than 2x the lookback window).</text>
  <text x="525" y="655" text-anchor="middle" font-size="13" fill="#2c3e50">2. Keep the remaining IDs for the next run to prevent re-ingestion.</text>
</svg>
