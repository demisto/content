category: Data Enrichment & Threat Intelligence
provider: Sysdig
sectionorder:
- Connect
- Collect
commonfields:
  id: SysdigResponseActions
  version: -1
configuration:
- defaultvalue: https://us2.app.sysdig.com
  display: Your server URL
  name: url
  required: true
  type: 0
  section: Connect
- displaypassword: API Key
  name: credentials
  required: true
  type: 9
  hiddenusername: true
  section: Connect
- display: Trust any certificate (not secure)
  name: insecure
  required: false
  type: 8
  section: Connect
- display: Use system proxy settings
  name: proxy
  required: false
  type: 8
  section: Connect
- display: Classifier
  name: classifier
  type: 13
  required: false
  section: Collect
- defaultvalue: Sysdig Mapper Runtime Event
  display: Mapper (incoming)
  name: mapper
  required: false
  type: 13
  section: Collect
- display: Fetch incidents
  name: isFetch
  type: 8
  section: Collect
- display: Incident type
  name: incidentType
  type: 13
  section: Collect
- defaultvalue: '50'
  display: The maximum number of incidents per fetch
  name: max_fetch
  type: 0
  section: Collect
- defaultvalue: 7 days
  display: First fetch timestamp (<number> <time unit>, e.g., 12 hours, 7 days)
  name: first_fetch
  required: false
  type: 0
