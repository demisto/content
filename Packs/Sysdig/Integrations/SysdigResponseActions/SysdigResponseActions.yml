description: 'This is an integration that will use Sysdig agent to respond to malicious activity by triggering different actions at the host or container level like killing a container, quarantine a file or perform a system capture.'
display: Sysdig Response Actions
name: SysdigResponseActions
script:
  commands:
  - arguments:
    - auto: PREDEFINED
      description: |-
        Action type to perform. Required parameters per action:
        - KILL_PROCESS: host_id, process_id (startTime defaults to -1)
        - KILL_CONTAINER: host_id, container_id
        - STOP_CONTAINER: host_id, container_id
        - PAUSE_CONTAINER: host_id, container_id
        - UNPAUSE_CONTAINER: host_id, container_id
        - START_CONTAINER: host_id, container_id
        - FILE_QUARANTINE: host_id, path_absolute (optional: container_id)
        - FILE_ACQUIRE: host_id, path_absolute (optional: container_id)
        - FILE_UNQUARANTINE: host_id, path_absolute, quarantined_file_path (optional: container_id)
        - DELETE_POD: k8s_cluster_name, k8s_namespace_name, k8s_pod_name
        - ROLLOUT_RESTART: k8s_cluster_name, k8s_namespace_name, k8s_workload_type, k8s_workload_name
        - ISOLATE_NETWORK: k8s_cluster_name, k8s_namespace_name, k8s_workload_type, k8s_workload_name (optional: network_protocol, network_port, network_cidr, network_direction)
        - DELETE_NETWORK_POLICY: k8s_cluster_name, k8s_namespace_name, network_policy_name
        - GET_LOGS: k8s_cluster_name, k8s_namespace_name (optional: k8s_workload_type, k8s_workload_name, k8s_pod_name, k8s_container_name, previous, all_containers)
        - KUBERNETES_VOLUME_SNAPSHOT: k8s_cluster_name, k8s_namespace_name (optional: k8s_pvc_name, k8s_workload_type, k8s_workload_name)
        - KUBERNETES_DELETE_VOLUME_SNAPSHOT: k8s_cluster_name, k8s_namespace_name, k8s_pvc_name, k8s_volume_snapshot_name
        - CAPTURE: host_id, capture_storage_config_id, capture_duration_ns, capture_past_duration_ns (optional: capture_filters, capture_max_size, container_id, capture_token)
        - IAM_QUARANTINE: cloud_provider, cloud_account_id (optional: ct_user_arn, ct_user_identity_type, ct_user)
        - IAM_UNQUARANTINE: cloud_provider, cloud_account_id, iam_policy_name, ct_user_identity_type, ct_user
        - MAKE_PRIVATE_CLOUD_RESOURCE: cloud_provider, cloud_account_id, cloud_resource_type, cloud_resource_name (optional: cloud_region)
        - UNDO_MAKE_PRIVATE_CLOUD_RESOURCE: cloud_provider, cloud_account_id, cloud_resource_type, cloud_resource_name, previous_public_access_settings (optional: cloud_region)
        - CLOUD_VOLUME_SNAPSHOT: cloud_provider, cloud_account_id, cloud_region, aws_instance_id
        - UNDO_CLOUD_VOLUME_SNAPSHOT: cloud_provider, cloud_account_id, cloud_region, snapshot_ids, aws_instance_id
        - FETCH_CLOUD_LOGS: cloud_provider, cloud_account_id, cloud_region, from_timestamp, to_timestamp (optional: ct_original_user, ct_name, ct_src)
      name: actionType
      required: true
      predefined:
      - KILL_PROCESS
      - KILL_CONTAINER
      - STOP_CONTAINER
      - PAUSE_CONTAINER
      - UNPAUSE_CONTAINER
      - START_CONTAINER
      - FILE_QUARANTINE
      - FILE_ACQUIRE
      - FILE_UNQUARANTINE
      - DELETE_POD
      - ROLLOUT_RESTART
      - ISOLATE_NETWORK
      - DELETE_NETWORK_POLICY
      - GET_LOGS
      - KUBERNETES_VOLUME_SNAPSHOT
      - KUBERNETES_DELETE_VOLUME_SNAPSHOT
      - CAPTURE
      - IAM_QUARANTINE
      - IAM_UNQUARANTINE
      - MAKE_PRIVATE_CLOUD_RESOURCE
      - UNDO_MAKE_PRIVATE_CLOUD_RESOURCE
      - CLOUD_VOLUME_SNAPSHOT
      - UNDO_CLOUD_VOLUME_SNAPSHOT
      - FETCH_CLOUD_LOGS
    - description: Unique caller identifier for audit trail.
      name: callerId
      required: true
      type: String
    - description: 'Host ID where the agent runs. Required for: KILL_PROCESS, KILL_CONTAINER, STOP_CONTAINER, PAUSE_CONTAINER, UNPAUSE_CONTAINER, START_CONTAINER, FILE_QUARANTINE, FILE_ACQUIRE, FILE_UNQUARANTINE, CAPTURE.'
      name: host_id
      type: String
      required: false
    - description: 'Container ID. Required for: KILL_CONTAINER, STOP_CONTAINER, PAUSE_CONTAINER, UNPAUSE_CONTAINER, START_CONTAINER. Optional for: FILE_QUARANTINE, FILE_ACQUIRE, FILE_UNQUARANTINE, CAPTURE.'
      name: container_id
      type: String
      required: false
    - description: 'Process ID to kill. Required for: KILL_PROCESS.'
      name: process_id
      type: Number
      required: false
    - description: 'Absolute file path. Required for: FILE_QUARANTINE, FILE_ACQUIRE, FILE_UNQUARANTINE.'
      name: path_absolute
      type: String
      required: false
    - description: 'Path of the quarantined file. Required for: FILE_UNQUARANTINE.'
      name: quarantined_file_path
      type: String
      required: false
    - description: 'Kubernetes cluster name. Required for: DELETE_POD, ROLLOUT_RESTART, ISOLATE_NETWORK, DELETE_NETWORK_POLICY, GET_LOGS, KUBERNETES_VOLUME_SNAPSHOT, KUBERNETES_DELETE_VOLUME_SNAPSHOT.'
      name: k8s_cluster_name
      type: String
      required: false
    - description: 'Kubernetes namespace. Required for: DELETE_POD, ROLLOUT_RESTART, ISOLATE_NETWORK, DELETE_NETWORK_POLICY, GET_LOGS, KUBERNETES_VOLUME_SNAPSHOT, KUBERNETES_DELETE_VOLUME_SNAPSHOT.'
      name: k8s_namespace_name
      type: String
      required: false
    - description: 'Kubernetes pod name. Required for: DELETE_POD. Optional for: GET_LOGS.'
      name: k8s_pod_name
      type: String
      required: false
    - description: 'Kubernetes workload type (e.g. Deployment, StatefulSet, DaemonSet). Required for: ROLLOUT_RESTART, ISOLATE_NETWORK. Optional for: GET_LOGS, KUBERNETES_VOLUME_SNAPSHOT.'
      name: k8s_workload_type
      type: String
      required: false
    - description: 'Kubernetes workload name. Required for: ROLLOUT_RESTART, ISOLATE_NETWORK. Optional for: GET_LOGS, KUBERNETES_VOLUME_SNAPSHOT.'
      name: k8s_workload_name
      type: String
      required: false
    - description: 'PVC name. Optional for: KUBERNETES_VOLUME_SNAPSHOT. Required for: KUBERNETES_DELETE_VOLUME_SNAPSHOT.'
      name: k8s_pvc_name
      type: String
      required: false
    - description: 'Volume snapshot name. Required for: KUBERNETES_DELETE_VOLUME_SNAPSHOT.'
      name: k8s_volume_snapshot_name
      type: String
      required: false
    - description: 'Container name for log retrieval. Optional for: GET_LOGS.'
      name: k8s_container_name
      type: String
      required: false
    - description: 'Network policy name. Required for: DELETE_NETWORK_POLICY.'
      name: network_policy_name
      type: String
      required: false
    - description: 'Network protocol (TCP, UDP). Optional for: ISOLATE_NETWORK.'
      name: network_protocol
      type: String
      required: false
    - description: 'Port number. Optional for: ISOLATE_NETWORK.'
      name: network_port
      type: String
      required: false
    - description: 'CIDR range. Optional for: ISOLATE_NETWORK.'
      name: network_cidr
      type: String
      required: false
    - description: 'Traffic direction (ingress, egress). Optional for: ISOLATE_NETWORK.'
      name: network_direction
      type: String
      required: false
    - description: 'Retrieve logs from previous container instance. Optional for: GET_LOGS.'
      name: previous
      type: Boolean
      required: false
    - description: 'Retrieve logs from all containers. Optional for: GET_LOGS.'
      name: all_containers
      type: Boolean
      required: false
    - description: 'Remote storage configuration ID. Required for: CAPTURE.'
      name: capture_storage_config_id
      type: String
      required: false
    - description: 'Capture duration in nanoseconds. Required for: CAPTURE.'
      name: capture_duration_ns
      type: Number
      required: false
    - description: 'How far back to capture in nanoseconds. Required for: CAPTURE.'
      name: capture_past_duration_ns
      type: Number
      required: false
    - description: 'Syscall filter expression. Optional for: CAPTURE.'
      name: capture_filters
      type: String
      required: false
    - description: 'Max capture file size in bytes (0 = no limit). Optional for: CAPTURE.'
      name: capture_max_size
      type: Number
      required: false
    - description: 'Base name of capture file. Optional for: CAPTURE.'
      name: capture_token
      type: String
      required: false
    - description: 'Cloud provider name (e.g. aws). Required for: IAM_QUARANTINE, IAM_UNQUARANTINE, MAKE_PRIVATE_CLOUD_RESOURCE, UNDO_MAKE_PRIVATE_CLOUD_RESOURCE, CLOUD_VOLUME_SNAPSHOT, UNDO_CLOUD_VOLUME_SNAPSHOT, FETCH_CLOUD_LOGS.'
      name: cloud_provider
      type: String
      required: false
    - description: 'Cloud account ID. Required for: IAM_QUARANTINE, IAM_UNQUARANTINE, MAKE_PRIVATE_CLOUD_RESOURCE, UNDO_MAKE_PRIVATE_CLOUD_RESOURCE, CLOUD_VOLUME_SNAPSHOT, UNDO_CLOUD_VOLUME_SNAPSHOT, FETCH_CLOUD_LOGS.'
      name: cloud_account_id
      type: String
      required: false
    - description: 'Cloud region. Required for: CLOUD_VOLUME_SNAPSHOT, UNDO_CLOUD_VOLUME_SNAPSHOT, FETCH_CLOUD_LOGS. Optional for: MAKE_PRIVATE_CLOUD_RESOURCE, UNDO_MAKE_PRIVATE_CLOUD_RESOURCE.'
      name: cloud_region
      type: String
      required: false
    - description: 'AWS identity ARN. Optional for: IAM_QUARANTINE.'
      name: ct_user_arn
      type: String
      required: false
    - description: 'AWS identity type (IAMUser, Role, AssumedRole). Required for: IAM_UNQUARANTINE. Optional for: IAM_QUARANTINE.'
      name: ct_user_identity_type
      type: String
      required: false
    - description: 'AWS identity name. Required for: IAM_UNQUARANTINE. Optional for: IAM_QUARANTINE.'
      name: ct_user
      type: String
      required: false
    - description: 'CloudTrail original user. Optional for: FETCH_CLOUD_LOGS.'
      name: ct_original_user
      type: String
      required: false
    - description: 'CloudTrail event name. Optional for: FETCH_CLOUD_LOGS.'
      name: ct_name
      type: String
      required: false
    - description: 'CloudTrail source. Optional for: FETCH_CLOUD_LOGS.'
      name: ct_src
      type: String
      required: false
    - description: 'IAM policy name to remove. Required for: IAM_UNQUARANTINE.'
      name: iam_policy_name
      type: String
      required: false
    - description: 'Cloud resource type (rds, s3). Required for: MAKE_PRIVATE_CLOUD_RESOURCE, UNDO_MAKE_PRIVATE_CLOUD_RESOURCE.'
      name: cloud_resource_type
      type: String
      required: false
    - description: 'Cloud resource name. Required for: MAKE_PRIVATE_CLOUD_RESOURCE, UNDO_MAKE_PRIVATE_CLOUD_RESOURCE.'
      name: cloud_resource_name
      type: String
      required: false
    - description: 'Previous public access settings. Required for: UNDO_MAKE_PRIVATE_CLOUD_RESOURCE.'
      name: previous_public_access_settings
      type: String
      required: false
    - description: 'AWS instance ID. Required for: CLOUD_VOLUME_SNAPSHOT, UNDO_CLOUD_VOLUME_SNAPSHOT.'
      name: aws_instance_id
      type: String
      required: false
    - description: 'Comma-separated snapshot IDs. Required for: UNDO_CLOUD_VOLUME_SNAPSHOT.'
      name: snapshot_ids
      type: String
      required: false
    - description: 'Start timestamp for log search. Required for: FETCH_CLOUD_LOGS.'
      name: from_timestamp
      type: String
      required: false
    - description: 'End timestamp for log search. Required for: FETCH_CLOUD_LOGS.'
      name: to_timestamp
      type: String
      required: false
    description: |-
      Execute response actions through the Sysdig API. Each action type requires a specific set of parameters.
      Use the actionType description to see which parameters are required for each action.
    name: execute-response-action
    outputs:
    - contextPath: execute_response_action.Output
      description: Output of the response-actions API.
      type: Dict
  - arguments:
    - description: 'The container ID to apply the action. Example "container.id": "123456789123".'
      name: container_id
      type: String
      required: true
    - description: 'The host name. Example "ip-1-1-1-1.us-west-1.compute.internal".'
      name: host_name
      type: String
      required: true
    - description: 'The capture name.'
      name: capture_name
      type: String
      required: true
    - description: 'The agent ID.'
      name: agent_id
      type: String
      required: true
    - description: 'The customer ID.'
      name: customer_id
      type: String
      required: true
    - description: 'The machine ID/MAC. Example "01:aa:02:bb:03:cc".'
      name: machine_id
      type: String
      required: true
    - description: 'Capture duration in seconds.'
      name: scan_duration
      type: Number
      required: false
    - description: 'Filter the scope of the capture to take. Example: (proc.name=ncat or proc.name=vi).'
      name: scap_filter
      type: String
      required: false
    description: Command to trigger a system capture, it will record all system calls at the host level.
    name: create-system-capture
    outputs:
    - contextPath: create_system_capture.Output
      description: Output of the system capture created.
      type: Dict
  - arguments:
    - description: System Capture ID.
      name: capture_id
      type: Number
      required: true
    description: Command to get a system capture based on the capture ID.
    name: get-capture-file
    outputs:
    - contextPath: get_capture_file.Output
      description: Output of the system capture downloaded.
      type: Dict
  - arguments:
    - description: The action exection ID.
      name: action_execution_id
      type: String
      required: true
    description: Get the status and information of a triggered action execution.
    name: get-action-execution
    outputs:
    - contextPath: get_action_execution.Output
      description: Output of the action execution info.
      type: Dict
  - arguments:
    - description: The MAC address (machineId) of the host to look up.
      name: machine_id
      type: String
      required: true
    - description: Force refresh the cached agent info from the Sysdig API.
      name: force_refresh
      type: Boolean
      required: false
      defaultValue: 'false'
    description: Resolve a host MAC address to its Sysdig agent details (agent ID, customer ID, hostname). Result is cached per MAC address.
    name: sysdig-get-agent-info
    outputs:
    - contextPath: Sysdig.Agent.agentId
      description: The Sysdig agent ID.
      type: String
    - contextPath: Sysdig.Agent.customerId
      description: The Sysdig customer ID.
      type: String
    - contextPath: Sysdig.Agent.hostName
      description: The agent hostname.
      type: String
    - contextPath: Sysdig.Agent.machineId
      description: The host MAC address.
      type: String
    - contextPath: Sysdig.Agent.hostId
      description: The opaque host identifier.
      type: String
    - contextPath: Sysdig.Agent.clusterName
      description: The Kubernetes cluster name.
      type: String
  - arguments:
    - description: Force refresh the cached customer info from the Sysdig API.
      name: force_refresh
      type: Boolean
      required: false
      defaultValue: 'false'
    description: Get the Sysdig customer ID and name. Result is cached per integration instance.
    name: sysdig-get-customer-info
    outputs:
    - contextPath: Sysdig.Customer.customerId
      description: The Sysdig customer ID.
      type: String
    - contextPath: Sysdig.Customer.customerName
      description: The Sysdig customer name.
      type: String
  dockerimage: demisto/python3:3.12.11.3982393
  isfetch: true
  isFetchSamples: true
  runonce: false
  script: ''
  subtype: python3
  type: python
marketplaces:
- xsoar
- marketplacev2
- xsoar_saas
- platform
tests:
- No tests (auto formatted)
fromversion: 6.10.0
