args:
- description: Comma-separated list of email addresses to send the email to.
  name: to
  required: true
- description: The subject of the email.
  name: subject
  required: true
- description: The email body content. Accepts HTML, Markdown, or plain text. Markdown and plain text are automatically converted to HTML for proper rendering in email clients.
  name: htmlBody
  required: true
- description: Comma-separated list of CC email addresses.
  name: cc
  required: false
- description: Comma-separated list of BCC email addresses.
  name: bcc
  required: false
- description: Email address for replies.
  name: replyTo
  required: false
- description: Comma-separated list of War Room entry IDs to attach to the email.
  name: attachIDs
  required: false
- description: A JSON string of key-value pairs to populate dynamic variables in email templates.
  name: templateParams
  required: false
comment: |
  Sends an email with automatic Markdown-to-HTML conversion. Accepts email body in any format (HTML, Markdown, or plain text) and ensures it is properly rendered as HTML in all email clients. Wraps the send-mail command.
commonfields:
  id: SendEmailAgentix
  version: -1
name: SendEmailAgentix
enabled: true
script: ''
scripttarget: 0
subtype: python3
isInternal: true
