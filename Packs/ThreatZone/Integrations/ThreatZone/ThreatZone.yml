commonfields:
  id: ThreatZone
  version: -1
name: ThreatZone
display: ThreatZone
category: Forensics & Malware Analysis
provider: Malwation
description: ThreatZone malware analysis sandboxing.
configuration:
- display: Server URL (e.g. https://app.threat.zone)
  name: url
  type: 0
  required: true
  section: Connect
  additionalinfo: Required ThreatZone instance root or /public-api URL. The integration appends the suffix exactly once.
- display: ThreatZone API Key
  name: apikey
  type: 4
  required: true
  section: Connect
  additionalinfo: API key generated for the ThreatZone workspace.
- display: Source Reliability
  name: integrationReliability
  type: 15
  additionalinfo: Reliability of the source.
  defaultvalue: A - Completely reliable
  options:
  - A+ - 3rd party enrichment
  - A - Completely reliable
  - B - Usually reliable
  - C - Fairly reliable
  - D - Not usually reliable
  - E - Unreliable
  - F - Reliability cannot be judged
  required: false
  section: Collect
- display: Trust any certificate (not secure)
  name: insecure
  defaultvalue: "false"
  type: 8
  required: false
  section: Connect
  additionalinfo: Disables TLS certificate validation when enabled.
- display: Use system proxy settings
  name: proxy
  defaultvalue: "false"
  type: 8
  required: false
  section: Connect
  additionalinfo: Routes SDK requests through the system proxy when enabled.
script:
  script: "-"
  type: python
  commands:
  - name: tz-sandbox-upload-sample
    arguments:
    - name: entry_id
      description: Entry ID of the file to submit.
      required: true
    - name: environment
      required: false
      auto: PREDEFINED
      predefined:
      - w7_x64
      - w10_x64
      - w11_x64
      - linux-ubuntu_2204
      - macos-ventura
      - android9
      description: Choose what environment you want to run your submission.
      defaultValue: w7_x64
    - name: private
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Privacy of the submission. If omitted, the current ThreatZone API-provided default is used.
    - name: extension_check
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Enforce MIME-based extension correction before sandbox execution. If omitted, the current ThreatZone API-provided default is used.
      required: false
    - name: auto
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: When true, automatically selects a sandbox environment based on the uploaded file type and ignores the environment argument.
      defaultValue: "false"
      required: false
    - name: modules
      description: Legacy compatibility argument. ThreatZone v3.2 does not support per-submission module selection, so this value is validated but not forwarded.
      required: false
    - name: analyze_config
      description: Provide raw analyzeConfig JSON to override/add sandbox metafields.
      required: false
    - name: timeout
      auto: PREDEFINED
      predefined:
      - "60"
      - "120"
      - "180"
      - "300"
      description: Duration of the submission analysis. If omitted, the current ThreatZone API-provided default is used.
    - name: work_path
      auto: PREDEFINED
      predefined:
      - "desktop"
      - "root"
      - appdata
      - windows
      - temp
      description: The working path of the submission. If omitted, the current ThreatZone API-provided default is used.
    - name: mouse_simulation
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Enable mouse simulation. If omitted, the current ThreatZone API-provided default is used.
    - name: https_inspection
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Enable HTTPS inspection for encrypted traffic. If omitted, the current ThreatZone API-provided default is used.
    - name: internet_connection
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Enable internet connection. If omitted, the current ThreatZone API-provided default is used.
    - name: raw_logs
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Legacy compatibility argument. ThreatZone v3.2 does not accept this metafield, so it is not forwarded.
    - name: snapshot
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Enable Fast Bootup. If omitted, the current ThreatZone API-provided default is used.
    - name: entrypoint
      required: false
      description: For archives, specify the filename inside the archive to execute.
    - name: password
      required: false
      description: Password for password-protected archives.
    - name: configurations
      required: false
      description: Advanced execution configuration as a JSON object (for example preScript, startArguments, or networkConfig).
    outputs:
    - contextPath: ThreatZone.Submission.Sandbox.UUID
      description: UUID of sample.
      type: String
    - contextPath: ThreatZone.Limits.E_Mail
      description: The owner e-mail of current plan.
      type: String
    - contextPath: ThreatZone.Limits.API_Limit
      description: The remaining/total API request limits of the current plan.
      type: String
    - contextPath: ThreatZone.Limits.Concurrent_Limit
      description: The remaining/total concurrent analysis limits of the current plan.
      type: String
    - contextPath: ThreatZone.Limits.Daily_Submission_Limit
      description: The remaining/total daily submission limits of the current plan.
      type: String
    description: Submits a sample to ThreatZone for sandbox analysis.
  - name: tz-static-upload-sample
    arguments:
    - name: entry_id
      description: Entry ID of the file to submit.
      required: true
    - name: private
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: When false, the submission is visible to everyone. When true, it is visible only to members of your workspace.
      defaultValue: "true"
    - name: extension_check
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Enforce MIME-based extension correction before static scan.
      defaultValue: "false"
    - name: entrypoint
      required: false
      description: For archives, specify the filename inside the archive to analyze.
    - name: password
      required: false
      description: Password for password-protected archives.
    outputs:
    - contextPath: ThreatZone.Submission.Static.UUID
      description: UUID of sample.
      type: String
    - contextPath: ThreatZone.Limits.E_Mail
      description: The owner e-mail of current plan.
      type: String
    - contextPath: ThreatZone.Limits.API_Limit
      description: The remaining/total API request limits of the current plan.
      type: String
    - contextPath: ThreatZone.Limits.Concurrent_Limit
      description: The remaining/total concurrent analysis limits of the current plan.
      type: String
    - contextPath: ThreatZone.Limits.Daily_Submission_Limit
      description: The remaining/total daily submission limits of the current plan.
      type: String
    description: Submits a sample to ThreatZone for static analysis.
  - name: tz-cdr-upload-sample
    arguments:
    - name: entry_id
      description: Entry ID of the file to submit.
      required: true
    - name: private
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: When false, the submission is visible to everyone. When true, it is visible only to members of your workspace.
      defaultValue: "true"
    - name: extension_check
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Enforce MIME-based extension correction before sanitization.
      defaultValue: "true"
    - name: entrypoint
      required: false
      description: For archives, specify the filename inside the archive to sanitize.
    - name: password
      required: false
      description: Password for password-protected archives.
    outputs:
    - contextPath: ThreatZone.Submission.CDR.UUID
      description: UUID of sample.
      type: String
    - contextPath: ThreatZone.Limits.E_Mail
      description: The owner e-mail of current plan.
      type: String
    - contextPath: ThreatZone.Limits.API_Limit
      description: The remaining/total API request limits of the current plan.
      type: String
    - contextPath: ThreatZone.Limits.Concurrent_Limit
      description: The remaining/total concurrent analysis limits of the current plan.
      type: String
    - contextPath: ThreatZone.Limits.Daily_Submission_Limit
      description: The remaining/total daily submission limits of the current plan.
      type: String
    description: Submits a sample to ThreatZone for CDR.
  - name: tz-url-analysis
    compliantpolicies:
    - Domain Blockage
    arguments:
    - name: url
      required: true
      description: URL to analyze.
    - name: private
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Mark the submission as workspace-private.
      defaultValue: "true"
    - name: safe_browsing
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Start an isolated safe-browsing session alongside URL analysis.
      defaultValue: "false"
    outputs:
    - contextPath: ThreatZone.Submission.URL.UUID
      description: UUID of the URL submission.
      type: String
    - contextPath: ThreatZone.Submission.URL.URL
      description: The URL submitted for analysis.
      type: String
    - contextPath: ThreatZone.Limits.E_Mail
      description: The owner e-mail of current plan.
      type: String
    - contextPath: ThreatZone.Limits.API_Limit
      description: The remaining/total API request limits of the current plan.
      type: String
    - contextPath: ThreatZone.Limits.Concurrent_Limit
      description: The remaining/total concurrent analysis limits of the current plan.
      type: String
    - contextPath: ThreatZone.Limits.Daily_Submission_Limit
      description: The remaining/total daily submission limits of the current plan.
      type: String
    description: Submits a URL to ThreatZone for analysis.
  - name: tz-get-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    - name: details
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: When true, include inline Indicators, IOCs, YARA matches, artifacts, and configuration data in the readable output.
      defaultValue: "false"
    - name: download_sanitized
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: When true and the submission is a CDR analysis, download the sanitized file after the analysis completes.
      defaultValue: "false"
    description: Retrieve the analysis result from ThreatZone.
    outputs:
    - contextPath: ThreatZone.Submission
      type: Unknown
      description: Raw submission data returned by ThreatZone.
    - contextPath: ThreatZone.Analysis.STATUS
      type: Number
      description: The status of the submission scanning process.
    - contextPath: ThreatZone.Analysis.LEVEL
      type: Number
      description: Threat Level of the scanned file. (malicious, suspicious or informative).
    - contextPath: ThreatZone.Analysis.INFO
      type: String
      description: Contains submission metadata such as file name/URL and privacy status.
    - contextPath: ThreatZone.Analysis.REPORT
      type: String
      description: The analysis report of the submission.
    - contextPath: ThreatZone.Analysis.URL
      type: String
      description: The result page url of the submission.
    - contextPath: ThreatZone.Analysis.MD5
      type: String
      description: The md5 hash of the submission.
    - contextPath: ThreatZone.Analysis.SHA1
      type: String
      description: The sha1 hash of the submission.
    - contextPath: ThreatZone.Analysis.SHA256
      type: String
      description: The sha256 hash of the submission.
    - contextPath: ThreatZone.Analysis.UUID
      type: String
      description: The UUID of the submission.
    - contextPath: ThreatZone.Analysis.SANITIZED
      description: The url of the sanitized file.
      type: String
    - contextPath: ThreatZone.IOC.URL
      description: The URL data extracted from IOC.
      type: List
    - contextPath: ThreatZone.IOC.IP
      description: The IP data extracted from IOC.
      type: List
    - contextPath: ThreatZone.IOC.DOMAIN
      description: The DOMAIN data extracted from IOC.
      type: List
    - contextPath: ThreatZone.IOC.EMAIL
      description: The EMAIL data extracted from IOC.
      type: List
    - contextPath: DBotScore.Indicator
      type: String
      description: The indicator that was tested.
    - contextPath: DBotScore.Reliability
      type: String
      description: The reliability of the source providing the intelligence data.
    - contextPath: DBotScore.Score
      type: Number
      description: The actual score.
    - contextPath: DBotScore.Type
      type: String
      description: The indicator type.
    - contextPath: DBotScore.Vendor
      description: The vendor used to calculate the score.
  - name: tz-get-indicator-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    - name: level
      required: false
      auto: PREDEFINED
      predefined:
      - benign
      - suspicious
      - malicious
      description: Filter by indicator severity.
    - name: category
      required: false
      description: Filter by indicator category.
    - name: pid
      required: false
      description: Filter by process ID.
    - name: attack_code
      required: false
      description: Filter by MITRE ATT&CK technique code.
    description: Retrieves dynamic behaviour indicators for a submission from ThreatZone.
    outputs:
    - contextPath: ThreatZone.Submission.Indicators.UUID
      description: The UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.Indicators.Data
      description: Dynamic behaviour indicators returned by ThreatZone.
      type: Unknown
  - name: tz-get-ioc-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    - name: type
      required: false
      description: Filter by IOC type.
    outputs:
    - contextPath: ThreatZone.Submission.IOCs.UUID
      description: The UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.IOCs.Data
      description: Indicators of Compromise returned by ThreatZone.
      type: Unknown
    description: Retrieves Indicators of Compromise for a submission from ThreatZone.
  - name: tz-get-yara-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    - name: category
      required: false
      description: Filter by matched YARA rule category.
    outputs:
    - contextPath: ThreatZone.Submission.YaraMatches.UUID
      description: The UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.YaraMatches.Data
      description: Matched YARA rules returned by ThreatZone.
      type: Unknown
    description: Retrieves YARA rules matched during analysis. Use tz-download-yara-rule for the generated rule file.
  - name: tz-get-artifact-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    outputs:
    - contextPath: ThreatZone.Submission.Artifacts.UUID
      description: The UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.Artifacts.Data
      description: Analysis artifacts returned by ThreatZone.
      type: Unknown
    description: Retrieves analysis artifacts for a submission from ThreatZone.
  - name: tz-get-config-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    outputs:
    - contextPath: ThreatZone.Submission.Config.UUID
      description: The UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.Config.Data
      description: Configuration extractor results returned by ThreatZone.
      type: Unknown
    description: Retrieves configuration extractor results for a submission from ThreatZone.
  - name: tz-get-sanitized
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Downloads a sanitized file from the ThreatZone API and uploads it to the War Room.
    outputs:
    - contextPath: InfoFile.Extension
      type: String
      description: Extension of the file sanitized by CDR.
    - contextPath: InfoFile.Name
      type: String
      description: The name of the file sanitized by CDR.
    - contextPath: InfoFile.Size
      type: Number
      description: Size of the file sanitized by CDR.
    - contextPath: InfoFile.EntryID
      type: String
      description: EntryID of the file sanitized by CDR.
    - contextPath: InfoFile.Info
      type: String
      description: Info of the file sanitized by CDR.
    - contextPath: InfoFile.MD5
      type: String
      description: MD5 hash of the file sanitized by CDR.
    - contextPath: InfoFile.SHA1
      type: String
      description: SHA1 hash of the file sanitized by CDR.
    - contextPath: InfoFile.SHA256
      type: String
      description: SHA256 hash of the file sanitized by CDR.
    - contextPath: InfoFile.SHA512
      type: String
      description: SHA512 hash of the file sanitized by CDR.
    - contextPath: InfoFile.SSDeep
      type: String
      description: SSDeep hash of the file sanitized by CDR.
  - name: tz-download-html-report
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Downloads the HTML report for a submission and uploads it to the War Room.
    outputs:
    - contextPath: InfoFile.Extension
      type: String
      description: Extension of the HTML report.
    - contextPath: InfoFile.Name
      type: String
      description: The name of the downloaded HTML report.
    - contextPath: InfoFile.Size
      type: Number
      description: Size of the downloaded HTML report.
    - contextPath: InfoFile.EntryID
      type: String
      description: EntryID of the downloaded HTML report.
    - contextPath: InfoFile.Info
      type: String
      description: Info for the downloaded HTML report.
    - contextPath: InfoFile.MD5
      type: String
      description: MD5 hash of the downloaded HTML report.
    - contextPath: InfoFile.SHA1
      type: String
      description: SHA1 hash of the downloaded HTML report.
    - contextPath: InfoFile.SHA256
      type: String
      description: SHA256 hash of the downloaded HTML report.
    - contextPath: InfoFile.SHA512
      type: String
      description: SHA512 hash of the downloaded HTML report.
    - contextPath: InfoFile.SSDeep
      type: String
      description: SSDeep hash of the downloaded HTML report.
  - name: tz-get-metafields
    arguments:
    - name: scan_type
      description: Optional scan type to filter metafields.
      required: false
      auto: PREDEFINED
      predefined:
      - sandbox
      - static
      - cdr
      - url
      - open_in_browser
    description: Retrieves available ThreatZone metafields, optionally filtered by scan type.
    outputs:
    - contextPath: ThreatZone.Configuration.Metafields.ScanType
      description: Scan type used to filter the metafields.
      type: String
    - contextPath: ThreatZone.Configuration.Metafields.Data
      description: Metafield definitions returned by ThreatZone.
      type: Unknown
  - name: tz-get-environments
    description: Retrieves available ThreatZone sandbox environments.
    outputs:
    - contextPath: ThreatZone.Configuration.Environments.Data
      description: Sandbox environment definitions returned by ThreatZone.
      type: Unknown
  - name: tz-list-network-configs
    description: Lists network configurations available to the current ThreatZone workspace.
    outputs:
    - contextPath: ThreatZone.Configuration.NetworkConfigurations.Data
      description: Network configuration summaries returned by ThreatZone.
      type: Unknown
  - name: tz-open-in-browser
    arguments:
    - name: url
      required: true
      description: URL to open in an isolated browser environment.
    - name: environment
      required: false
      description: Sandbox environment key for browser execution.
    - name: auto
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      defaultValue: "false"
      description: Let ThreatZone select the browser environment.
    - name: metafields
      required: false
      description: Open-in-browser metafields as a JSON object.
    - name: private
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      defaultValue: "true"
      description: Mark the submission as workspace-private.
    - name: configurations
      required: false
      description: Advanced execution configuration as a JSON object.
    description: Creates a ThreatZone open-in-browser submission.
    outputs:
    - contextPath: ThreatZone.Submission.OpenInBrowser.UUID
      description: UUID of the open-in-browser submission.
      type: String
    - contextPath: ThreatZone.Submission.OpenInBrowser.URL
      description: URL submitted to ThreatZone.
      type: String
  - name: tz-list-submissions
    arguments:
    - name: page
      required: false
      defaultValue: "1"
      description: Page number, starting at 1.
    - name: limit
      required: false
      defaultValue: "20"
      description: Number of submissions per page (1-100).
    - name: level
      required: false
      description: Comma-separated threat levels.
    - name: type
      required: false
      auto: PREDEFINED
      predefined:
      - file
      - url
      description: Submission type.
    - name: sha256
      required: false
      description: SHA256 hash filter.
    - name: filename
      required: false
      description: Partial filename filter.
    - name: start_date
      required: false
      description: Include submissions created on or after this ISO 8601 date.
    - name: end_date
      required: false
      description: Include submissions created on or before this ISO 8601 date.
    - name: private
      required: false
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      description: Filter by privacy status.
    - name: tags
      required: false
      description: Comma-separated tag filters.
    - name: sort
      required: false
      description: Field used to sort results, such as createdAt.
    - name: order
      required: false
      auto: PREDEFINED
      predefined:
      - asc
      - desc
      description: Sort order.
    description: Lists ThreatZone submissions with optional filters.
    outputs:
    - contextPath: ThreatZone.SubmissionList
      description: Paginated ThreatZone submission results.
      type: Unknown
  - name: tz-search-submissions-by-sha256
    arguments:
    - name: sha256
      required: true
      description: SHA256 hash to search for.
    description: Searches ThreatZone submissions by SHA256 hash.
    outputs:
    - contextPath: ThreatZone.SubmissionSearch.Data
      description: Matching submissions.
      type: Unknown
  - name: tz-get-overview-summary
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Retrieves aggregate analysis counts for a submission.
    outputs:
    - contextPath: ThreatZone.Submission.OverviewSummary.UUID
      description: UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.OverviewSummary.Data
      description: Aggregate analysis summary.
      type: Unknown
  - name: tz-get-eml-analysis
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Retrieves parsed EML analysis results.
    outputs:
    - contextPath: ThreatZone.Submission.EMLAnalysis.UUID
      description: UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.EMLAnalysis.Data
      description: Parsed EML analysis data.
      type: Unknown
  - name: tz-get-mitre-techniques
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Retrieves MITRE ATT&CK techniques matched during analysis.
    outputs:
    - contextPath: ThreatZone.Submission.MITRE.UUID
      description: UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.MITRE.Data
      description: Matched MITRE ATT&CK techniques.
      type: Unknown
  - name: tz-get-static-scan-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Retrieves the static scan result for a submission.
    outputs:
    - contextPath: ThreatZone.Submission.StaticScan.UUID
      description: UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.StaticScan.Data
      description: Static scan result.
      type: Unknown
  - name: tz-get-cdr-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Retrieves the CDR transformation result for a submission.
    outputs:
    - contextPath: ThreatZone.Submission.CDRResult.UUID
      description: UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.CDRResult.Data
      description: CDR transformation result.
      type: Unknown
  - name: tz-get-signature-check-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Retrieves authenticode and signature-check results.
    outputs:
    - contextPath: ThreatZone.Submission.SignatureCheck.UUID
      description: UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.SignatureCheck.Data
      description: Signature-check result.
      type: Unknown
  - name: tz-get-processes
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Retrieves processes captured during dynamic analysis.
    outputs:
    - contextPath: ThreatZone.Submission.Processes.UUID
      description: UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.Processes.Data
      description: Captured processes.
      type: Unknown
  - name: tz-get-process-tree
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    description: Retrieves the process tree captured during dynamic analysis.
    outputs:
    - contextPath: ThreatZone.Submission.ProcessTree.UUID
      description: UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.ProcessTree.Data
      description: Captured process tree.
      type: Unknown
  - name: tz-get-url-analysis-result
    arguments:
    - name: uuid
      required: true
      description: UUID of the URL or open-in-browser submission.
    description: Retrieves the full URL analysis report.
    outputs:
    - contextPath: ThreatZone.Submission.URLAnalysis.UUID
      description: UUID of the submission.
      type: String
    - contextPath: ThreatZone.Submission.URLAnalysis.Data
      description: URL analysis report.
      type: Unknown
  - name: tz-get-behaviours
    arguments:
    - name: uuid
      required: true
      description: UUID of the submission.
    - name: type
      required: false
      description: Behaviour event type filter.
    - name: pid
