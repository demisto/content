    - contextPath: PaloAltoNetworksDeviceSecurity.Device.Access_Point_Name
      description: The name of the access point this device is connected to.
      type: String
    - contextPath: PaloAltoNetworksDeviceSecurity.Device.SSID
      description: The SSID of the wireless network this device is connected to.
      type: String
    - contextPath: PaloAltoNetworksDeviceSecurity.Device.MAC
      description: The device MAC address.
      type: Date
    - contextPath: PaloAltoNetworksDeviceSecurity.Device.display_tags
      description: The user tags of the device.
      type: String
    - contextPath: PaloAltoNetworksDeviceSecurity.Device.mac_address
      description: The device MAC address.
      type: String
    description: Device security get device command - get a single device's details.
  - name: device-security-list-devices
    arguments:
    - name: offset
      description: The offset in the pagination.
    - name: limit
      description: The maximum size of the list of the devices.
    outputs:
    - contextPath: PaloAltoNetworksDeviceSecurity.DeviceList
      description: List of devices.
      type: unknown
    description: Device security list devices command.
  - name: device-security-list-alerts
    arguments:
    - name: start_time
      description: The start time in the format of ISO 8601 in UTC, e.g. 2018-11-06T08:56:41Z.
    - name: offset
      description: The offset in the pagination.
    - name: limit
      description: The maximum size of the list of the alerts.
    outputs:
    - contextPath: PaloAltoNetworksDeviceSecurity.Alerts
      description: List of alerts.
      type: unknown
    description: Device security list alerts command.
  - name: device-security-list-vulns
    arguments:
    - name: start_time
      description: The start time in the format of ISO 8601 in UTC, e.g. 2018-11-06T08:56:41Z.
    - name: offset
      description: The offset in the pagination.
    - name: limit
      description: The maximum size of the list of the vulnerabilities.
    outputs:
    - contextPath: PaloAltoNetworksDeviceSecurity.Vulns
      description: List of vulnerabilities.
      type: unknown
    description: Device security list vulnerabilities command.
  - name: device-security-resolve-alert
    arguments:
    - name: id
      required: true
      description: The alert ID.
    - name: reason
      description: The alert resolution reason.
    - name: reason_type
      auto: PREDEFINED
      predefined:
      - No Action Needed
      - Issue Mitigated
      description: The alert resolution reason type (No Action Needed, Issue Mitigated).
    description: Resolving a device security alert.
  - name: device-security-resolve-vuln
    arguments:
    - name: id
      required: true
      description: The vulnerability ID.
    - name: full_name
      required: true
      description: The vulnerability full name.
    - name: reason
      description: The vulnerability resolution reason.
    description: Resolving a device security vulnerability.
  isfetch: true
  runonce: false
