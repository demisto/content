      name: GCP - VM Instance Firewall Rule Remediation
      description: This playbook adds VPC firewall rules to restrict access to private IP address ranges and blocks public internet exposure. It targets only the exposed asset by creating specific Allow and Deny rules to remediate the exposure (for example, for RDP).
      playbookName: GCP - VM Instance Firewall Rule Remediation
      type: playbook
      iscommand: false
      brand: ""     
    nexttasks:
      '#none#':
      - "5"
    scriptarguments:
      AssetID:
        simple: ${issue.asset_ids}
      RemediationAllowRanges:
        simple: 172.16.0.0/12,10.0.0.0/8,192.168.0.0/16
      RemotePort:
        simple: ${Core.IssueRecommendations.network_reachability.externalProbeResults.[0].port}
      RemoteProtocol:
