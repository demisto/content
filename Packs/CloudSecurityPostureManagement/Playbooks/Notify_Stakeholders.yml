                                  { "type": "TableCell", "items": [{ "type": "TextBlock", "text": "**Field**", "weight": "Bolder" }] },
                                  { "type": "TableCell", "items": [{ "type": "TextBlock", "text": "**Value**", "weight": "Bolder" }] }
                              ]
                          },
                          {
                              "type": "TableRow",
                              "cells": [
                                  { "type": "TableCell", "items": [{ "type": "TextBlock", "text": "**Issue Name**" }] },
                                  { "type": "TableCell", "items": [{ "type": "TextBlock", "text": "${issue.name}", "wrap": true }] }
                              ]
                          },
                          {
