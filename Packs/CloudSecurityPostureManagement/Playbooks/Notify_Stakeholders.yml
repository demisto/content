                              "cells": [
                                  { "type": "TableCell", "items": [{ "type": "TextBlock", "text": "**Severity**" }] },
                                  { "type": "TableCell", "items": [{ "type": "TextBlock", "text": "${IssueSeverityText}" }] }
                              ]
                          },
                          {
                              "type": "TableRow",
                              "cells": [
