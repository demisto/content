          font-weight: bold;\">Asset Name</td>\n        <td style=\"padding: 10px;
          border: 1px solid #e0e0e0;\">${inputs.AssetName}</td>\n      </tr>\n      <tr>\n
          \       <td style=\"padding: 10px; border: 1px solid #e0e0e0; background-color:
