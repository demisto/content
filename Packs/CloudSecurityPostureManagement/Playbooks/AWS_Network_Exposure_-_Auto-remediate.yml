id: AWS Network Exposure - Auto-remediate
version: -1
name: AWS Network Exposure - Auto-remediate
description: |-
  This playbook remediates AWS Network Exposure detections, specifically Amazon EC2 instances with management ports exposed to the public internet. It updates the AWS asset with a new security group that mirrors the original but excludes the security rule causing public exposure.
