id: Darkmon - EDR Alert Enrichment
version: -1
name: Darkmon - EDR Alert Enrichment
description: "Designed to be invoked from CrowdStrike / SentinelOne / Defender alert playbooks. Takes the alert's IOCs, enriches each via Darkmon, and if any are scored Bad, escalates incident severity and notifies the SOC. Endpoint containment is left to the EDR-specific playbook."
fromversion: 6.5.0
marketplaces:
  - xsoar
  - marketplacev2
tags:
  - darkmon
  - edr
  - ir
