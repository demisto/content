view: '{"linkLabelsPosition": {"3_5_#default#": 0.1, "3_8_yes": 0.5, "8_4_yes": 0.1, "8_9_#default#": 0.5, "9_5_#default#": 0.1, "9_4_yes": 0.5}, "paper": {"dimensions": {"height": 2375, "width": 1980, "x": -500, "y": 0}}}'
inputs:
- key: AutoBlock
  value:
    simple: 'false'
  required: false
  description: When true, indicators scored Bad by Darkmon are sent to Darkmon - Generic Block Indicator without an analyst approval task. Defaults to false (a manual approval is presented before any block).
  playbookInputQuery:
outputs:
- contextPath: ExtractedIndicators
  description: IOCs extracted from the phishing email body.
  type: unknown
- contextPath: DBotScore
  description: Reputation scores from Darkmon enrichment per IOC.
  type: unknown
tests:
- No tests
