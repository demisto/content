      playbookName: "Darkmon - Generic Notify"
      type: playbook
      iscommand: false
      brand: ""
    scriptarguments:
      Subject:
        simple: "Your phishing report has been triaged"
      Body:
        simple: "Thanks - we triaged your report. ${DBotScore.length:0} indicators evaluated."
    nexttasks:
