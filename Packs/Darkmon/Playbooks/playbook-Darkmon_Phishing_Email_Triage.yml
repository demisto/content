    ignoreworker: false
    skipunavailable: true
    quietmode: 0
  '6':
    id: '6'
    taskid: a1dfdd29-aa80-4c30-b0c8-c335e0f8a65c
    type: playbook
    task:
      id: a1dfdd29-aa80-4c30-b0c8-c335e0f8a65c
      version: -1
