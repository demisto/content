    type: playbook
    task:
      id: 361b9161-619e-4a94-a629-4590a974c293
      version: -1
      name: Notify reporter
      description: ''
      playbookName: Darkmon - Generic Notify
      type: playbook
      iscommand: false
      brand: ''
    scriptarguments:
      Subject:
        simple: Your phishing report has been triaged
      Body:
