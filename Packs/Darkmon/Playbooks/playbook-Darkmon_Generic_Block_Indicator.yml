id: Darkmon - Generic Block Indicator
version: -1
name: Darkmon - Generic Block Indicator
description: "Provider-agnostic indicator-block dispatcher. Reads the 'Darkmon - Block Provider' List for the configured block target (panos | fortinet | umbrella | cloudflare) and routes to the matching command. Falls back to logging the block intent in the War Room when no provider is configured."
fromversion: 6.5.0
marketplaces:
  - xsoar
  - marketplacev2
tags:
  - darkmon
  - generic
  - block
starttaskid: "0"
tasks:
  "0":
    id: "0"
    taskid: 9bb536c3-5e97-456e-ac40-1d6f00e1cf83
    type: start
    task:
      id: 9bb536c3-5e97-456e-ac40-1d6f00e1cf83
      version: -1
      name: ""
      type: start
      iscommand: false
      brand: ""
    nexttasks:
      '#none#':
        - "1"
    separatecontext: false
    continueonerrortype: ""
    view: |-
      {"position": {"x": 50, "y": 50}}
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: true
    quietmode: 0
  "1":
    id: "1"
    taskid: d1c9f0b8-1f1f-4877-bd12-82b48d94db3b
    type: condition
    task:
      id: d1c9f0b8-1f1f-4877-bd12-82b48d94db3b
      version: -1
      name: "Provider switch"
      type: condition
      iscommand: false
      brand: ""
    conditions:
      - label: "panos"
        condition:
          -   - operator: isEqualString
                left:
                  value:
                    complex: {"root": "lists.Darkmon - Block Provider"}
                  iscontext: true
                ignorecase: true
                right:
                  value:
                    simple: panos
      - label: "fortinet"
        condition:
          -   - operator: isEqualString
                left:
                  value:
                    complex: {"root": "lists.Darkmon - Block Provider"}
                  iscontext: true
                ignorecase: true
                right:
                  value:
                    simple: fortinet
      - label: "umbrella"
        condition:
          -   - operator: isEqualString
                left:
                  value:
                    complex: {"root": "lists.Darkmon - Block Provider"}
                  iscontext: true
                ignorecase: true
                right:
                  value:
                    simple: umbrella
      - label: "cloudflare"
        condition:
          -   - operator: isEqualString
                left:
                  value:
                    complex: {"root": "lists.Darkmon - Block Provider"}
                  iscontext: true
                ignorecase: true
                right:
                  value:
                    simple: cloudflare
    separatecontext: false
    continueonerrortype: ""
    view: |-
      {"position": {"x": 50, "y": 195}}
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: true
    nexttasks:
      panos:
        - "2"
      fortinet:
        - "3"
      umbrella:
        - "4"
      cloudflare:
        - "5"
      "#default#":
        - "6"

  "2":
    id: "2"
    taskid: b321b7e2-3563-4ba2-b73d-3f1b9d3132e0
    type: regular
    task:
      id: b321b7e2-3563-4ba2-b73d-3f1b9d3132e0
      version: -1
      name: "Palo Alto: block on EDL"
      description: "Adds the indicator to the Darkmon-Block external dynamic list on the Palo Alto firewall."
      script: "pan-os-create-edl"
      type: regular
      iscommand: true
      brand: ""
    scriptarguments:
      name:
        simple: "Darkmon-Block"
      ip-list:
        simple: "${inputs.Indicator}"
      description:
        simple: "${inputs.Reason}"
    nexttasks:
      '#none#':
