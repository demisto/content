    type: regular
    task:
      id: d24fa4a6-7095-406a-bacd-df73c4bbe169
      version: -1
      name: "Fortinet: add to address group"
      script: "fortigate-create-address"
      type: regular
      iscommand: true
      brand: ""
    scriptarguments:
      name:
        simple: "${inputs.Indicator}"
      address:
        simple: "${inputs.Indicator}"
    nexttasks:
      '#none#':
        - "7"
    separatecontext: false
