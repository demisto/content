view: '{"linkLabelsPosition": {"3_4_#default#": 0.82, "3_5_approval-required": 0.82, "3_6_auto-disable": 0.82, "100_1_yes": 0.1, "100_101_#default#": 0.5}, "paper": {"dimensions": {"height": 1895, "width": 1460, "x": -500, "y": 0}}}'
inputs:
- key: DisableMode
  value:
    simple: notify-only
  required: false
  description: |-
    Controls how the playbook reacts when a new compromised employee account is observed. Allowed values:
    - notify-only       : creates an incident and notifies; no directory action. (DEFAULT, safe)
    - approval-required : creates an incident with a manual approval task; on approve, runs the disable.
    - auto-disable      : disables the account immediately, then notifies.
    Accounts in the 'Darkmon - Auto-Disable Allowlist' list are NEVER auto-disabled regardless of this input.
  playbookInputQuery:
outputs:
- contextPath: NewAccounts
  description: Compromised employee accounts that triggered action this run.
  type: unknown
tests:
- No tests
issilent: true
