inputs:
- key: URL
  value:
    complex:
      root: URL
      accessor: Data
  required: true
  description: The URL indicator value to enrich. Defaults to ${URL.Data}.
  playbookInputQuery:
outputs:
- contextPath: DBotScore.Indicator
  description: The indicator value.
  type: string
- contextPath: DBotScore.Type
  description: The indicator type.
  type: string
- contextPath: DBotScore.Vendor
  description: The vendor reporting the score (Darkmon).
  type: string
- contextPath: DBotScore.Score
  description: The reputation score (0=Unknown, 1=Good, 2=Suspicious, 3=Bad).
  type: number
- contextPath: DBotScore.Reliability
  description: Source reliability per the Admiralty code.
  type: string
- contextPath: URL.Data
  description: The URL value.
  type: string
- contextPath: URL.Malicious.Vendor
  description: The vendor that flagged this URL as malicious (Darkmon).
  type: string
- contextPath: URL.Malicious.Description
  description: Reason this URL was flagged as malicious.
  type: string
- contextPath: Darkmon.SearchResult
  description: Full search result records returned by Darkmon for this indicator.
  type: unknown
