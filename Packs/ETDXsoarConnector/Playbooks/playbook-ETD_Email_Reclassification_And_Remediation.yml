name: ETD Email Reclassification And Remediation
description: |-
  Review the Cisco ETD email before taking action.

  Message ID:
  ${incident.etdmessageid}

  Select a new verdict for the email.

  Available verdicts:
  • BEC
  • Scam
  • Malicious
  • Phishing
  • Spam
  • Graymail
  • Neutral

  Select a remediation action.

  Available actions:
  • Inbox
  • Junk
  • Quarantine
  • Trash
  • Delete

  Warning:
  Delete permanently removes the email and cannot be undone.
