name: ETDXsoarConnector
display: Cisco ETD Connector
category: Analytics & SIEM
commonfields:
  id: ETDXsoarConnector
  version: -1
description: Fetches Cisco Email Threat Defense (ETD) message events and creates incidents.
provider: Cisco
script:
  script: '-'
  type: python
  subtype: python3
  dockerimage: demisto/python3:3.11.10.111039
  isfetch: true
  commands:
  - name: cisco-etd-move-message
    description: Reclassifies and remediates an ETD message.
    arguments:
    - name: message_id
      description: The ETD message ID.
      required: true
    - name: verdict
      description: The new verdict.
      required: true
    - name: folder
      description: The new folder action.
      required: true
    outputs:
    - contextPath: ETD.Message.ID
      description: The message ID.
      type: String
    - contextPath: ETD.Message.Verdict
      description: The updated verdict.
      type: String
    - contextPath: ETD.Message.Folder
      description: The updated folder.
      type: String
configuration:
- display: ETD Base URL
  name: etd_base_url
  type: 0
  required: true
- displaypassword: API Key
  name: api_key
  type: 9
  required: true
- display: Client ID
  name: client_id
  type: 0
  required: true
- displaypassword: Client Secret
  name: client_secret
  type: 9
  required: true
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
- name: insecure
  display: Trust any certificate (not secure)
  required: false
  type: 8
  advanced: true
- display: First Fetch Time
  name: first_fetch
  type: 0
  defaultvalue: 3 days
  required: false
- display: Fetch incidents
  name: isFetch
  type: 8
  defaultvalue: 'true'
- display: Incidents Fetch Interval
  name: incidentFetchInterval
  type: 19
  defaultvalue: 60
- display: Incident type
  name: incidentType
  type: 13
  defaultvalue: ETD Malicious Email
  required: false
- display: Max fetch
  name: max_fetch
  type: 0
  required: false
  defaultvalue: '100'
fromversion: 6.10.0
marketplaces:
- marketplacev2
- platform
tests:
- Test ETDXsoarConnector
