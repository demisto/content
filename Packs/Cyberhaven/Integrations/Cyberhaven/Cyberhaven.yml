commonfields:
  id: Cyberhaven
  version: -1
name: Cyberhaven
display: Cyberhaven
category: Data Enrichment & Threat Intelligence
fromversion: 6.10.0
provider: Cyberhaven
description: Fetches DLP incidents from the Cyberhaven data security platform and enables investigation of events and data lineage.
defaultmapperin: Cyberhaven - Incoming Mapper
sectionorder:
- Connect
- Collect
configuration:
- section: Connect
  display: Server URL (e.g., https://example.cyberhaven.io)
  name: url
  additionalinfo: URL of the Cyberhaven tenant.
  type: 0
  required: true
- section: Connect
  display: ""
  displaypassword: Refresh Token
  name: credentials
  additionalinfo: Provide the Refresh Token for authentication.
  type: 9
  required: true
  hiddenusername: true
- section: Collect
  display: Fetch incidents
  name: isFetch
  type: 8
  required: false
- section: Collect
  display: Incident type
  name: incidentType
  defaultvalue: "Cyberhaven Incident"
  type: 13
  required: false
- section: Collect
  display: First fetch time
  name: first_fetch
  defaultvalue: '3 days'
  additionalinfo: "The date or relative timestamp from which to begin fetching DLP Incidents. Default value is '3 days'. The maximum is '30 days'.\n\nIf the value is greater than '30 days', it will be considered as '30 days'.\n\nSupported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ.\n\nFor example: 01 May 2026, 01 May 2026 04:45:33, 2026-05-17T14:05:44Z."
  type: 0
  required: false
- section: Collect
  display: Max Fetch
  name: max_fetch
  additionalinfo: "The maximum number of DLP Incidents to fetch each time. Default value is 100. The maximum is 200.\n\nIf the value is greater than 200, it will be considered as 200."
  defaultvalue: "100"
  type: 0
  required: false
- section: Collect
  display: Status of incidents to fetch
  name: status_filter
  additionalinfo: Filter the DLP incidents by Status.
  type: 16
  required: false
  defaultvalue: "Open"
  options:
  - Open
  - Closed
- section: Collect
  display: Severity of incidents to fetch
  name: severity_filter
  additionalinfo: Filter the DLP incidents by Severity.
  type: 16
  required: false
  defaultvalue: "Informational,Low,Medium,High,Critical"
  options:
  - Informational
  - Low
  - Medium
  - High
  - Critical
- section: Collect
  display: Enable Outgoing Mirroring (from XSOAR to Cyberhaven)
  name: outgoing_mirroring
  additionalinfo: "When enabled, updates to the following fields in XSOAR are synchronized to Cyberhaven: Status, Owner, Close Reason, and Close Notes."
  type: 8
  required: false
- section: Collect
  display: Incidents Fetch Interval
  name: incidentFetchInterval
  defaultvalue: "5"
  type: 19
  required: false
- section: Connect
  advanced: true
  display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
- section: Connect
  advanced: true
  display: Use system proxy settings
  name: proxy
  type: 8
  required: false
script:
  commands:
  - name: cyberhaven-incident-list
    arguments:
    - name: limit
      description: Max incidents to return.
      defaultValue: "25"
    - name: start_time
      description: "Filter the incidents by start on or after the provided time. Supported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ."
    - name: end_time
      description: "Filter the incidents by end on or before the provided time. Supported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months, 2 years, yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ."
    - name: severity
      description: A comma-separated list of severity by which to filter the incidents.
      isArray: true
      auto: PREDEFINED
      predefined:
      - Informational
      - Low
      - Medium
      - High
      - Critical
    - name: status
      description: A comma-separated list of status by which to filter the incidents.
      isArray: true
      auto: PREDEFINED
      predefined:
      - Open
      - Closed
    - name: assignee
      description: Filter the incidents by assigned analyst email.
    - name: user
      description: Filter the incidents by user who triggered the incident.
    - name: incident_ids
      description: A comma-separated list of incident IDs to filter the results.
      isArray: true
    - name: page_id
      description: Page ID to retrieve the next set of the incidents.
    description: List and search Cyberhaven DLP incidents with optional filters.
    outputs:
    - contextPath: Cyberhaven.Incident.id
      description: The unique identifier of the incident.
      type: String
    - contextPath: Cyberhaven.Incident.user.id
      description: The identifier of the user who triggered the incident.
      type: String
    - contextPath: Cyberhaven.Incident.user.local_username
      description: The local machine username of the user who triggered the incident.
      type: String
    - contextPath: Cyberhaven.Incident.user.local_id
      description: The local identifier of the user who triggered the incident.
      type: String
    - contextPath: Cyberhaven.Incident.event_lineage_id.start_event_id
      description: The ID of the first event in the lineage chain.
      type: String
    - contextPath: Cyberhaven.Incident.event_lineage_id.end_event_id
      description: The ID of the last event in the lineage chain.
      type: String
    - contextPath: Cyberhaven.Incident.blocked
      description: Whether the action that triggered the incident was blocked.
      type: Boolean
    - contextPath: Cyberhaven.Incident.event_time
      description: The timestamp of the event that triggered the incident.
      type: Date
    - contextPath: Cyberhaven.Incident.trigger_time
      description: The timestamp when the incident was triggered.
      type: Date
    - contextPath: Cyberhaven.Incident.dataset.id
      description: The identifier of the dataset involved in the incident.
      type: String
    - contextPath: Cyberhaven.Incident.dataset.name
      description: The name of the dataset involved in the incident.
      type: String
    - contextPath: Cyberhaven.Incident.dataset.sensitivity
      description: The sensitivity classification of the dataset involved.
      type: String
    - contextPath: Cyberhaven.Incident.user_risk_groups
      description: The list of risk groups the user belongs to.
      type: String
    - contextPath: Cyberhaven.Incident.policy.id
      description: The identifier of the DLP policy that was triggered.
      type: String
    - contextPath: Cyberhaven.Incident.policy.name
      description: The name of the DLP policy that was triggered.
      type: String
    - contextPath: Cyberhaven.Incident.policy.severity
      description: The severity level defined in the triggering DLP policy.
      type: String
    - contextPath: Cyberhaven.Incident.risk_score
      description: The numeric risk score assigned to the incident.
      type: Number
    - contextPath: Cyberhaven.Incident.screenshot_guid
      description: The GUID of the screenshot associated with the incident.
      type: String
    - contextPath: Cyberhaven.Incident.warning_status
      description: The warning acknowledgement status of the incident.
