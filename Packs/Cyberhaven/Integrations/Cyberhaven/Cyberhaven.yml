      auto: PREDEFINED
      predefined:
      - Open
      - Closed
    - name: close_reason
      description: Specify the close reason while closing the incident.
      auto: PREDEFINED
      predefined:
      - Resolved
      - False Positive
      - False Positive - Destination Not at Risk
      - False Positive - User Exempt
      - Other
    - name: close_note
