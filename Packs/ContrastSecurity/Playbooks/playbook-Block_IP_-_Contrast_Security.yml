      name: Block IP
      description: Block an IP address for a Contrast Security Incident.
      script: '|||contrastsecurity-ip-block'
      type: regular
      iscommand: true
      brand: ""
    nexttasks:
      '#none#':
      - "8"
    scriptarguments:
      expiration_date:
        complex:
          root: inputs
          accessor: expiration_date
      extend-context:
        simple: ip_data=IpAddresses.ips::incident_id=id::expiration_time=IpAddresses.expiration_date
      incident_id:
        complex:
          root: inputs.incident_id
          transformers:
          - operator: SetIfEmpty
            args:
              applyIfEmpty: {}
              defaultValue:
                value:
                  simple: incident.contrastsecurityincidentid
                iscontext: true
      ip_addresses:
        complex:
          root: inputs.ip_addresses
          transformers:
          - operator: splitAndTrim
            args:
              delimiter:
                value:
                  simple: ','
          - operator: join
            args:
              separator:
                value:
                  simple: ','
          - operator: SetIfEmpty
            args:
              applyIfEmpty: {}
              defaultValue:
                value:
                  simple: ${ip_address_list}
                iscontext: true
