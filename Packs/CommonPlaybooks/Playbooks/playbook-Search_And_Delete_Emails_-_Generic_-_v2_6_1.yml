inputs:
- key: From
  value:
    complex:
      root: incident
      accessor: emailfrom
  required: false
  description: The value of the malicious email's "From" attribute.
  playbookInputQuery:
- key: Subject
  value:
    complex:
      root: incident
      accessor: emailsubject
  required: false
  description: The value of the malicious email's "Subject" attribute.
  playbookInputQuery:
- key: AttachmentName
  value:
    complex:
      root: incident
      accessor: attachmentname
  required: false
  description: The value of the malicious email's "AttachmentName" attribute.
  playbookInputQuery:
- key: SearchAndDeleteIntegration
  value: {}
  required: true
  description: The integration in which to run the search and delete action. Can be MS Graph, Gmail, EWS, or Agari Phishing Defense.
  playbookInputQuery:
- key: SearchThisWeek
  value:
    simple: "true"
  required: false
  description: Whether to limit the search to the current week. Disabling this may increase search scope, execution time, and risk of timeout for large mailboxes.
  playbookInputQuery:
- key: MsgCase
  value:
    simple: XSOAR Auto Phishing
  required: false
  description: Used only with Microsoft Graph Security. The eDiscovery case name to use. Looked up by name and created if missing.
  playbookInputQuery:
- key: MsgKQL
  value: {}
  required: false
  description: Used only with Microsoft Graph Security. KQL query identifying the emails to search and delete. Built automatically from the From, Subject, and AttachmentName inputs if left empty.
  playbookInputQuery:
- key: MsgRecipients
  value:
    complex:
      root: incident
      accessor: emailto
  required: false
  description: Used only with Microsoft Graph Security. CSV of recipient email addresses to scope the search when MsgMailboxScope is recipientsOnly.
  playbookInputQuery:
- key: MsgMailboxScope
  value: {}
  required: false
  description: 'Used only with Microsoft Graph Security. Determines which mailboxes to search. Use recipientsOnly to limit to specific recipients, allTenantMailboxes to search the entire tenant.'
  playbookInputQuery:
- key: MsgDeleteType
  value: {}
  required: false
  description: Used only with Microsoft Graph Security. The delete type to perform on the search results. Possible values are Hard or Soft, or leave empty to select manually (Hard = unrecoverable, Soft = recoverable).
  playbookInputQuery:
- key: MsgMailboxExclusion
  value: {}
  required: false
  description: 'Used only with Microsoft Graph Security. CSV of mailboxes to exclude from the search. Honored only when MsgMailboxScope is allTenantMailboxes. Note: exclusion works at the message level, not the mailbox level — see subplaybook description for details.'
  playbookInputQuery:
