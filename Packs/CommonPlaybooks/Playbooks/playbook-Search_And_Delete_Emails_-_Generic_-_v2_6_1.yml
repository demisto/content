    isoversize: false
    isautoswitchedtoquietmode: false
    continueonerrortype: ""
    scriptarguments:
      case:
        simple: ${inputs.MsgCase}
      cleanup:
        simple: auto
      delete_type:
        simple: ${inputs.MsgDeleteType}
      export_format:
        simple: msg
      force:
        simple: "false"
      kql:
        simple: ${KQLQuery}
      mailbox_exclusion:
