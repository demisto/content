description: This playbook adds new VPC Firewall rules with access only from private IP address range and blocks traffic that’s exposed to public internet. For example, if RDP is exposed this playbook adds new firewall rules that only allows traffic from private IP address and blocks rest of the RDP traffic. New Allow and Block rules created by this playbook target only the exposed asset.
id: GCP - VM Instance Firewall Rule Remediation
inputSections:
- description: Generic group for inputs
  inputs:
  - AssetID
  - RemotePort
  - RemoteProtocol
  - IntegrationInstance
  - RemediationAllowRanges
  name: General (Inputs group)
inputs:
- description: The Asset ID of the VM Instance
  key: AssetID
  playbookInputQuery:
  required: true
  value: {}
- description: The remote port that is publicly exposed.
  key: RemotePort
  playbookInputQuery:
  required: true
  value: {}
- description: The remote protocol that is publicly exposed.
  key: RemoteProtocol
  playbookInputQuery:
  required: true
  value: {}
- description: GCP integration instance to use if multiple instances are configured (optional).
  key: IntegrationInstance
  playbookInputQuery:
  required: false
  value: {}
- description: Comma-separated list of IPv4 network ranges to be used as source addresses for the `cortex-remediation-allow-port-<port#>-<tcp|udp>` rule to be created.  Typically this will be private IP ranges (to allow access within the VPC and bastion hosts) but other networks can be added as needed.
  key: RemediationAllowRanges
  playbookInputQuery:
  required: false
  value:
    simple: 172.16.0.0/12,10.0.0.0/8,192.168.0.0/16
name: GCP - VM Instance Firewall Rule Remediation
outputSections:
- description: Generic group for outputs
  name: General (Outputs group)
  outputs:
  - remediatedFlag
  - remediation_action
outputs:
- contextPath: remediatedFlag
  description: Output key to determine if remediation was successfully done.
  type: boolean
- contextPath: remediation_action
  description: Textual summary of remediation action(s) that were performed.
  type: string
