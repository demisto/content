id: GCP - VM Instance Firewall Rule Remediation
version: -1
contentitemexportablefields:
  contentitemfields: {}
name: GCP - VM Instance Firewall Rule Remediation
description: This playbook adds new VPC Firewall rules with access only from private IP address range and blocks traffic that’s exposed to public internet. For example, if RDP is exposed this playbook adds new firewall rules that only allows traffic from private IP address and blocks rest of the RDP traffic. New Allow and Block rules created by this playbook target only the exposed asset.
