id: Azure - VM Instance Network Security Group Remediation
version: -1
contentitemexportablefields:
  contentitemfields: {}
name: Azure - VM Instance Network Security Group Remediation
description: "This playbook adds new Azure Network Security Group (NSG) rules to NSGs attached to a NIC. The new rules give access to only a private IP address range and block traffic exposed to the public internet using the private IP of the VM, as explained in the ([Azure documentation](https://learn.microsoft.com/en-us/azure/virtual-network/network-security-groups-overview)). For example, if RDP is exposed to the public internet, this playbook adds new firewall rules that only allow traffic from private IP addresses and blocks the rest of the RDP traffic.\n\nConditions and limitations:\n- Limited to a single resource group.\n- Identifies the NSG rule exposing the VM to the public internet via IPv4/IPv6 (service tags are not supported).\n- Requires at least two available priority slots lower than the offending rule.\n- Applies only to NSGs associated with NICs."
