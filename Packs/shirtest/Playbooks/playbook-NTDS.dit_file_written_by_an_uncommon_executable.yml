id: shirtestname
version: -1
name: shirtestname
description: |-
  This playbook addresses the following alerts:
  - NTDS.dit file written by an uncommon executable
  - shirtestname to a suspicious path

  Playbook Stages:

  Data Collection and Analysis:

  - Gathers additional alert data and enriches the involved host with its attributes.
  - Retrieves the risk score for the user account that performed the action.

  Investigation:

  - Analyzes command lines in the causality chain for malicious or suspicious patterns.
  - Determines if the write operation occurred on a workstation, which is highly anomalous.
  - Checks if the initiating process or its parents are unsigned or common LOLbins.
  - Verifies if the process or the NTDS.dit file is located in a non-standard, suspicious path.
  - Assesses if the file was written by a non-Domain Controller server with a high risk level.
  - Searches for other related malicious or suspicious alerts on the same host to build context.
  - Investigates if a remote actor was involved, checking if the IP is new, external, or high-risk.
  - Checks if the file was written to a remote share, assessing the destination's risk level.

  Verdict:

  - Calculates a final score based on all collected evidence to determine a verdict.
  - If the automated verdict is inconclusive, it prompts an analyst for a manual decision.

  Remediation:

  - Terminates the entire process causality chain associated with the malicious activity.
  - Disables the involved user account and logs them out from the host, pending analyst approval.
  - Isolates the source endpoint and potentially a remote destination, pending analyst approval.
  - Retrieves the written NTDS.dit file's hash and quarantines the malicious file on the endpoint.
  - Blocks any identified external or internal malicious IP addresses at the network level.
  - Closes the alert as a True Positive or False Positive based on the final verdict.
tags:
- TA0006 - Credential Access
- T1003 - OS Credential Dumping
