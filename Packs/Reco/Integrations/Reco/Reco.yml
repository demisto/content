- additionalinfo: 'Severity filter for fetched incidents. Accepts a single value or a comma-separated list. Supported values: LOW, MEDIUM, HIGH, CRITICAL (or numeric equivalents 10, 20, 30, 40). Example: "HIGH,CRITICAL" fetches only high and critical severity alerts.'
