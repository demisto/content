      type: String
    - contextPath: Reco.Events.application
      description: SaaS application the event belongs to.
      type: String
    - contextPath: Reco.Events.actorEmail
      description: Email of the actor who triggered the event.
      type: String
    - contextPath: Reco.Events.actorName
      description: Name of the actor who triggered the event.
      type: String
    - contextPath: Reco.Events.eventTime
      description: Timestamp of the event.
      type: Date
    - contextPath: Reco.Events.outcomeString
      description: Outcome description of the event.
      type: String
  - arguments:
    - description: 'SCIM v2 filter expression (e.g. "severity eq \"HIGH\"").'
      name: filters
      required: false
    - description: Maximum number of posture issues to return (default 1000).
      name: limit
      required: false
      defaultValue: '1000'
    description: List posture issues from Reco using the external API.
    name: reco-list-posture-issues
