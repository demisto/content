script:
  commands:
  - name: aws-securityhub-security-hub-enable
    description: "Enables AWS Security Hub V2 for the configured account and region. Required IAM Permission: securityhub:EnableSecurityHubV2."
    arguments:
    - name: tags
      description: "The tags to assign to the Security Hub V2 resource, in the format: key=key1,value=value1;key=key2,value=value2."
      required: false
    outputs:
    - contextPath: AWS.SecurityHub.Hub.HubV2Arn
      description: The ARN of the enabled Security Hub V2 resource.
      type: String
  - name: aws-securityhub-security-hub-disable
    description: "Disables AWS Security Hub V2 for the configured account and region. Required IAM Permission: securityhub:DisableSecurityHubV2."
    arguments: []
  - name: aws-securityhub-findings-get
    description: "Retrieves a list of OCSF-formatted findings from AWS Security Hub V2. Required IAM Permission: securityhub:GetFindingsV2."
    arguments:
    - name: string_filters
      description: 'String field filters. Each entry: "fieldname=<OCSF field>,value=<value>,comparison=<EQUALS|PREFIX|NOT_EQUALS|PREFIX_NOT_EQUALS|CONTAINS|NOT_CONTAINS|CONTAINS_WORD>", multiple entries separated by ";". Comparison defaults to EQUALS. Example: fieldname=severity,value=High,comparison=EQUALS;fieldname=finding_info.title,value=root,comparison=CONTAINS.'
      required: false
    - name: date_filters
      description: 'Date field filters. Each entry: "fieldname=<OCSF field>,start=<ISO8601>,end=<ISO8601>", multiple entries separated by ";". Example: fieldname=finding_info.created_time_dt,start=2024-01-01T00:00:00Z,end=2024-02-01T00:00:00Z.'
      required: false
    - name: boolean_filters
      description: 'Boolean field filters. Each entry: "fieldname=<OCSF field>,value=<true|false>", multiple entries separated by ";".'
      required: false
    - name: number_filters
      description: 'Number field filters. Each entry: "fieldname=<OCSF field>,operator=<eq|gt|gte|lt|lte>,value=<number>", multiple entries separated by ";". Operator defaults to eq.'
      required: false
    - name: map_filters
      description: 'Map field filters. Each entry: "fieldname=<OCSF field>,key=<key>,value=<value>,comparison=<EQUALS|NOT_EQUALS|CONTAINS|NOT_CONTAINS>", multiple entries separated by ";". Comparison defaults to EQUALS.'
      required: false
    - name: ip_filters
      description: 'IP/CIDR field filters. Each entry: "fieldname=<OCSF field>,cidr=<CIDR>", multiple entries separated by ";".'
      required: false
    - name: filter_operator
      description: The logical operator used to combine the filter conditions within the composite filter.
      required: false
      auto: PREDEFINED
      predefined:
      - AND
      - OR
      defaultValue: AND
    - name: composite_operator
      description: The logical operator used to combine multiple composite filters.
      required: false
      auto: PREDEFINED
      predefined:
      - AND
      - OR
      defaultValue: AND
    - name: sort_field
      description: The finding field to sort the results by.
      required: false
    - name: sort_order
      description: The order to sort the results by.
      required: false
      auto: PREDEFINED
      predefined:
      - asc
      - desc
    - name: limit
      description: The maximum number of findings to return.
      required: false
      defaultValue: '50'
    - name: next_token
      description: The pagination token returned from a previous request, used to retrieve the next set of results.
      required: false
    outputs:
    - contextPath: AWS.SecurityHub.Findings
      description: The list of OCSF-formatted findings returned by Security Hub V2. Each finding is a free-form OCSF object containing fields such as metadata, finding_info, severity, status, cloud, resources, and time.
      type: Unknown
    - contextPath: AWS.SecurityHub.FindingsNextToken
      description: The pagination token to use when requesting the next set of findings.
      type: String
  - name: aws-securityhub-findings-batch-update
    description: "Updates one or more AWS Security Hub V2 findings in a single batch request. Findings are targeted by metadata_uids and/or finding_identifiers. Required IAM Permission: securityhub:BatchUpdateFindingsV2."
    arguments:
    - name: metadata_uids
      description: A comma-separated list of OCSF finding metadata UIDs to update.
      required: false
      isArray: true
    - name: finding_identifiers
      description: 'Composite finding identifiers to update. Each entry: "cloud_account_uid=<id>,finding_info_uid=<id>,metadata_product_uid=<id>", multiple entries separated by ";".'
      required: false
    - name: comment
      description: The reason for updating the findings.
      required: false
    - name: severity_id
      description: The new OCSF severity ID to assign to the findings (e.g., 1=Informational, 2=Low, 3=Medium, 4=High, 5=Critical, 6=Fatal).
      required: false
    - name: status_id
      description: The new OCSF status ID to assign to the findings (e.g., 1=New, 2=In Progress, 3=Suppressed, 4=Resolved).
      required: false
    outputs:
    - contextPath: AWS.SecurityHub.BatchUpdateFindings.ProcessedFindings
      description: The list of findings that were successfully updated.
      type: Unknown
    - contextPath: AWS.SecurityHub.BatchUpdateFindings.UnprocessedFindings
      description: The list of findings that could not be updated, including the error for each.
      type: Unknown
  dockerimage: demisto/boto3py3:1.0.0.7704170
  runonce: false
  script: '-'
  subtype: python3
  type: python
