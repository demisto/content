- Collect
commonfields:
  id: IBM Storage Scale
  version: -1
name: IBM Storage Scale
display: IBM Storage Scale Beta
description: |
  Collects Command Line Interface (CLI) audit log records from IBM Storage Scale.
detaileddescription: ''
configuration:
- name: server_url
  display: Server URL
  additionalinfo: The base URL of the IBM Storage Scale API server (e.g., https://192.168.1.100:443).
  type: 0
  required: true
  section: Connect
- name: credentials
  display: Username
  additionalinfo: Username and password for API access. The user should have the ProtocolAdmin role.
  type: 9
  required: true
  section: Connect
- name: isFetch
  display: Fetch events
  type: 8
  required: false
  section: Collect
- name: max_fetch
  display: Maximum number of events per fetch
  additionalinfo: The maximum number of events to pull in a single fetch-events cycle.
  defaultvalue: '10000'
  type: 0
  required: false
  section: Collect
- name: server_timezone
  display: Server Timezone
  additionalinfo: "Timezone of the IBM Storage Scale server. Accepts IANA names (e.g., 'UTC', 'America/New_York') or fixed offsets (e.g., '+03:00', '-0500', 'UTC-7'). Used to build time filters with the correct local time."
  defaultvalue: UTC
  type: 0
  required: false
  section: Collect
- name: insecure
  display: Trust any certificate (not secure)
  type: 8
  required: false
  section: Connect
- name: proxy
  display: Use system proxy settings
  type: 8
  required: false
  section: Connect
fromversion: 6.8.0
script:
  script: ''
  type: python
  subtype: python3
  dockerimage: demisto/fastapi:0.125.0.7704170
  isfetchevents: true
  commands:
  - name: ibm-storage-scale-get-events
    description: Gets audit log events for interactive investigation. This command is used for developing/ debugging and is to be used with caution, as it can create events, leading to events duplication and API request limitation exceeding.
    arguments:
    - name: limit
      default: true
      defaultValue: 10
      description: The maximum number of events to return.
      required: false
    - name: should_push_events
      default: false
      description: Indicates whether or not to push the collected events into XSIAM.
      required: false
    outputs:
    - contextPath: IBMStorageScale.AuditLog.oid
      description: The unique identifier for the audit record.
      type: Number
    - contextPath: IBMStorageScale.AuditLog.entryTime
      description: The timestamp when the command was logged.
      type: String
    - contextPath: IBMStorageScale.AuditLog.user
      description: The user who executed the command.
      type: String
    - contextPath: IBMStorageScale.AuditLog.command
      description: The command that was executed.
      type: String
    - contextPath: IBMStorageScale.AuditLog.node
      description: The node where the command was executed.
      type: String
    - contextPath: IBMStorageScale.AuditLog.returnCode
      description: The return code of the command.
      type: Number
    - contextPath: IBMStorageScale.AuditLog.originator
      description: The origin of the command (e.g., GUI, CLI).
      type: String
  - name: ibm-storage-scale-debug-connection
    description: Provides comprehensive debugging information for troubleshooting the IBM Storage Scale integration. Please use this command only when instructed by support.
    outputs:
    - contextPath: IBMStorageScale.Debug.connection_status
      description: Status of the connection to IBM Storage Scale API (success/failed).
      type: String
    - contextPath: IBMStorageScale.Debug.server_url
      description: The configured server URL.
      type: String
    - contextPath: IBMStorageScale.Debug.api_endpoint
      description: The API endpoint being used.
      type: String
    - contextPath: IBMStorageScale.Debug.current_time
      description: Current timestamp when debug info was collected.
      type: String
    - contextPath: IBMStorageScale.Debug.last_run_info
      description: Information from the last run object including fetch times and stored hashes.
      type: Unknown
    - contextPath: IBMStorageScale.Debug.time_filter_info
      description: Time filtering information including constructed query parameters.
      type: Unknown
    - contextPath: IBMStorageScale.Debug.deduplication_info
      description: Event deduplication statistics and configuration.
      type: Unknown
    - contextPath: IBMStorageScale.Debug.configuration
      description: Integration configuration details (without sensitive data).
      type: Unknown
    - contextPath: IBMStorageScale.Debug.sample_api_response
      description: Sample API response data for validation.
      type: Unknown
    - contextPath: IBMStorageScale.Debug.error_details
      description: Error details if connection failed.
      type: String
  - name: ibm-storage-scale-acl-list
    description: Returns a list of all REST API access control lists (ACLs). If a user group is provided, returns only the ACLs defined for that user group.
    arguments:
    - name: user_group
      description: The name of the user group by which to filter results. When provided, returns the ACLs for that user group. When omitted, lists all ACLs.
      required: false
      isArray: false
    outputs:
    - contextPath: IBMStorageScale.ACL.acls
      description: The list of ACL objects returned by the API.
      type: Unknown
    - contextPath: IBMStorageScale.ACL.acls.userGroup
      description: The user group for which the access control list is defined.
      type: String
    - contextPath: IBMStorageScale.ACL.acls.entries
      description: The access control entries for the user group.
      type: Unknown
    - contextPath: IBMStorageScale.ACL.acls.entries.entryId
      description: The ID of the REST API access control list entry.
      type: Number
    - contextPath: IBMStorageScale.ACL.acls.entries.type
      description: The type of access provided (ALLOW or DENY).
      type: String
    - contextPath: IBMStorageScale.ACL.acls.entries.method
      description: The REST API request method (GET, PUT, POST, or DELETE).
      type: String
    - contextPath: IBMStorageScale.ACL.acls.entries.uri
      description: The resource URL the access control entry applies to.
      type: String
  - name: ibm-storage-scale-filesystem-acl-get
    description: Returns information about the access control list (ACL) for a file or directory in a file system.
    arguments:
    - name: file_system_name
      description: The name of the file system (for example, gpfs0).
      required: true
      isArray: false
    - name: path
      description: 'The file path relative to the file system mount point. Use forward slashes (for example, mnt/gpfs0/rest01).'
      required: true
      isArray: false
    - name: fields
      description: "A comma-separated list of fields to include in the response. To include all available fields, use ":all:". When omitted, the API applies its own default behavior."
      required: false
      isArray: true
    outputs:
    - contextPath: IBMStorageScale.FileSystemACL.acl.type
      description: The type of the ACL (for example, NFSv4).
      type: String
    - contextPath: IBMStorageScale.FileSystemACL.acl.entries
      description: The access control entries for the file or directory.
      type: Unknown
    - contextPath: IBMStorageScale.FileSystemACL.acl.entries.type
      description: The entry type. Can be 'allow', 'deny', 'alarm', or 'audit'.
      type: String
    - contextPath: IBMStorageScale.FileSystemACL.acl.entries.who
      description: "The name of the user or group to which the ACL applies (for example, 'special:owner@', 'special:group@', 'special:everyone@', 'user:{name}', 'group:{name}')."
      type: String
    - contextPath: IBMStorageScale.FileSystemACL.acl.entries.permissions
      description: The access permissions string (for example, 'rxancs').
      type: String
    - contextPath: IBMStorageScale.FileSystemACL.acl.entries.flags
      description: The special flags and inheritance definition string (for example, 'fd').
      type: String
  - name: ibm-storage-scale-acl-delete
    description: Deletes all REST API access control lists (ACL) defined for a user group. This is a potentially destructive operation.
    execution: true
    arguments:
    - name: user_group
      description: The name of the user group from which to delete the ACLs.
      required: true
      isArray: false
    outputs: []
  - name: ibm-storage-scale-acl-entry-delete
    description: Deletes a specific REST API access control list (ACL) entry for a user group. This is a potentially destructive operation.
    execution: true
    arguments:
    - name: user_group
      description: The user group name the ACL entry belongs to.
      required: true
      isArray: false
    - name: entry_id
      description: The ID of the ACL entry to delete.
      required: true
      isArray: false
    outputs: []
beta: true
tests:
- No tests (auto formatted)