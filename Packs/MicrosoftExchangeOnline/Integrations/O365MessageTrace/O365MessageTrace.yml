description: Ingest Exchange Online Message Trace events into Cortex XSIAM. Message Trace enables tenant administrators to track the lifecycle of an email, determine its delivery status (delivered, pending, failed, or quarantined), and understand the actions applied to it.
display: O365 Message Trace
name: O365 Message Trace
script:
  commands:
  - name: o365-message-trace-get-events
    description: Manually retrieve Message Trace events. Intended for development and debugging. Use with caution as it may cause event duplication when push to XSIAM is enabled.
    arguments:
    - name: limit
      description: The maximum number of events to return.
      defaultValue: '50'
    - name: start_time
      description: Filter events received at or after this time. Supports ISO 8601 format or relative time expressions (e.g., "10 minutes ago", "2024-01-01T00:00:00Z").
    - name: end_time
      description: Filter events received at or before this time. Supports ISO 8601 format or relative time expressions (e.g., "now", "2024-01-01T00:00:00Z").
    - name: should_push_events
      description: If true, the command sends the retrieved events to XSIAM. Otherwise, it only displays them.
      auto: PREDEFINED
      predefined:
      - 'true'
      - 'false'
      defaultValue: 'false'
    outputs:
    - contextPath: O365MessageTrace.Event.id
      description: The unique identifier of the message trace event.
      type: String
    - contextPath: O365MessageTrace.Event.receivedDateTime
      description: The timestamp when the message was received.
      type: Date
    - contextPath: O365MessageTrace.Event.senderAddress
      description: The sender email address.
      type: String
    - contextPath: O365MessageTrace.Event.recipientAddress
      description: The recipient email address.
      type: String
    - contextPath: O365MessageTrace.Event.subject
      description: The subject of the message.
      type: String
    - contextPath: O365MessageTrace.Event.status
      description: The delivery status of the message (e.g., Delivered, Pending, Failed, Quarantined).
      type: String
    - contextPath: O365MessageTrace.Event._time
      description: The XSIAM event timestamp (ISO 8601).
      type: Date
  isfetchevents: true
  runonce: false
  script: '-'
  type: python
  subtype: python3
  dockerimage: demisto/fastapi:0.125.0.7178097
fromversion: 8.4.0
