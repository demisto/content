description: Use the O365 Message Trace Event Collector to fetch message trace logs from the Office 365 Reporting Web Service into Cortex XSIAM.

name: O365 Message Trace Event Collector
script:
  commands:
  - name: o365-message-trace-get-events
    description: Returns message trace events from the Office 365 Reporting Web Service. Used for development/debugging and should be used with caution, as setting should_push_events to true can create duplicate events and consume the API quota.
    deprecated: false
    arguments:
    - name: should_push_events
      auto: PREDEFINED
      defaultValue: 'False'
      description: Set to True to create events in Cortex XSIAM; otherwise the command only displays them.
      predefined:
      - 'True'
      - 'False'
      required: true
    - name: limit
      description: The maximum number of events to return.
      required: false
      isArray: false
      defaultValue: '50'
    - name: start_date
      description: 'The earliest event time. Time format is "{yyyy}-{mm}-{dd}T{hh}:{mm}:{ss}Z" (e.g., "2024-05-18T13:45:14Z").'
      required: false
      isArray: false
    - name: end_date
      description: 'The latest event time. Time format is "{yyyy}-{mm}-{dd}T{hh}:{mm}:{ss}Z" (e.g., "2024-05-18T13:45:14Z").'
      required: false
      isArray: false
    outputs: []
  runonce: false
  isfetchevents: true
  dockerimage: demisto/python3:3.12.8.3296088
  feed: false
fromversion: 6.0.0
toversion: 5.0.0
