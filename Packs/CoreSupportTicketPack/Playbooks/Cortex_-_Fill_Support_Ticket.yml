- contextPath: Core.SupportTicket.DateTimeOfIssue
  description: The timestamp of the issue occurrence.
  type: string
- contextPath: Core.SupportTicket.smeArea
  description: The issue category assigned to the ticket.
  type: string
- contextPath: Core.SupportTicket.subGroupName
  description: The problem concentration assigned to the ticket.
