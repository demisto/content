inputs:
- key: description
  value: {}
  required: true
  description: A detailed description of the issue. Include error messages/codes or
    other identifying details. Limited to 25-32000 chars.
  playbookInputQuery: null
- key: contact_number
  value: {}
  required: false
  description: The preferred contact number for follow-up.
  playbookInputQuery: null
- key: issue_impact
  value: {}
  required: false
  description: The impact of the issue on the system or business.
  playbookInputQuery: null
- key: issue_frequency
  value: {}
  required: false
  description: The frequency of the issue.
  playbookInputQuery: null
- key: most_recent_issue_start_time
  value: {}
  required: false
  description: The start date and time of the most recent occurrence of the issue.
    Flexible formats are supported, including relative dates (e.g., "7 days ago",
    "yesterday") and absolute dates (e.g., "2023-01-01T00:00:00Z").
  playbookInputQuery: null
