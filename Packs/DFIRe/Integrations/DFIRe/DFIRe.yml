    - contextPath: DFIRe.CaseIndicator.case_count
      description: Total cases this indicator appears in.
      type: Number
  - name: dfire-case-indicator-add
    description: Add an indicator to a case. Creates the indicator if it does not exist.
    arguments:
    - name: case_id
      description: The case ID.
      required: true
    - name: value
      description: The IOC value.
      required: true
    - name: stix_type
      description: STIX 2.1 SCO type.
      required: true
      predefined:
      - ipv4-addr
      - ipv6-addr
      - domain-name
      - url
      - email-addr
      - email-message
      - file
      - process
      - windows-registry-key
      - network-traffic
      - user-account
      - mac-addr
      - software
      - artifact
      - autonomous-system
      - directory
      - mutex
      - x509-certificate
    - name: classification
      description: IOC classification.
      defaultValue: unknown
      predefined:
      - unknown
      - benign
      - suspicious
      - malicious
    - name: confidence
      description: Confidence level.
      defaultValue: low
      predefined:
      - low
      - medium
      - high
    - name: tlp
      description: TLP designation.
      defaultValue: amber
      predefined:
      - clear
      - green
      - amber
      - amber_strict
      - red
    - name: context
      description: Case-private notes about this IOC.
    - name: tags
      description: Comma-separated tags.
      isArray: true
    - name: source
      description: How this IOC was obtained.
      predefined:
      - manual
      - automated
      - threat_intel
      - sandbox
      - enrichment
      - import
    - name: source_reference
      description: Free-form reference identifying the source (URL, ticket, report name, etc.).
    - name: valid_until
      description: Auto-revoke after this ISO-8601 datetime (e.g. "2026-12-31T00:00:00Z").
    - name: decompose
      description: Whether to auto-decompose the indicator (URL→domain, email→domain).
      defaultValue: 'true'
      predefined:
      - 'true'
      - 'false'
    - name: publish
      description: Whether to publish the indicator immediately after creation.
      defaultValue: 'false'
      predefined:
      - 'true'
      - 'false'
    outputs:
    - contextPath: DFIRe.CaseIndicator.id
      description: The association ID.
      type: Number
    - contextPath: DFIRe.CaseIndicator.indicator.id
      description: The indicator ID.
      type: Number
    - contextPath: DFIRe.CaseIndicator.indicator.value
      description: The IOC value.
      type: String
