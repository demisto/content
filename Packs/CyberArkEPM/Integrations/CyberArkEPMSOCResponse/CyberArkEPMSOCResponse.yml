name: CyberArkEPMSOCResponse
script:
  commands:
  - arguments:
    - description: The name of the risk plan to activate.
      name: risk_plan
      required: true
    - description: The name of the endpoint to target.
      name: endpoint_name
      required: true
    - description: Logged in user name.
      name: logged_in_user
      required: false
