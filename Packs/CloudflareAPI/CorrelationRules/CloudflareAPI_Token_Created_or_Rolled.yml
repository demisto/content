name: Cloudflare - API Token Created or Rolled - by GoCortexIO
description: Detects creation or rolling of a Cloudflare API token, a persistence vector after account compromise.
severity: SEV_040_HIGH
xql_query: |-
  datamodel dataset = cloudflare_account_audit_raw
  | filter xdm.event.original_event_type in ("token_create", "token_roll")
  | fields xdm.observer.vendor, xdm.observer.product, xdm.event.id, xdm.event.type, xdm.event.tags, xdm.event.operation, xdm.event.operation_sub_type, xdm.event.original_event_type, xdm.event.outcome, xdm.event.description, xdm.auth.service, xdm.network.ip_protocol, xdm.source.ipv4, xdm.source.port, xdm.target.ipv4, xdm.target.port, xdm.source.user.username, xdm.source.user.identifier, xdm.source.user.upn, xdm.source.user.user_type, xdm.source.user.identity_type, xdm.source.cloud.project, xdm.target.cloud.project, xdm.target.resource.type, xdm.target.resource.id, xdm.target.resource.name, xdm.target.resource.sub_type, xdm.target.resource.value, xdm.*
alert_name: Cloudflare API token $xdm.event.original_event_type by $xdm.source.user.username
alert_category: User Defined
user_defined_category: xdm.alert.category
alert_description: A Cloudflare API token was created or rolled by $xdm.source.user.username, which may indicate establishment of persistence via new API credentials.
alert_domain: DOMAIN_SECURITY
mitre_defs:
  TA0003 - Persistence:
  - T1098 - Account Manipulation
suppression_fields:
- xdm.event.id
- xdm.source.user.username
global_rule_id: ce3a232b-e2e7-496f-8256-1575a77e9191
is_enabled: true
alert_type: null
alert_fields: {}
execution_mode: SCHEDULED
search_window: 1 hours
timezone: Australia/Melbourne
crontab: '*/10 * * * *'
suppression_enabled: true
suppression_duration: 1 hours
dataset: alerts
investigation_query_link: ''
drilldown_query_timeframe: ALERT
mapping_strategy: AUTO
action: ALERTS
fromversion: 8.4.0
