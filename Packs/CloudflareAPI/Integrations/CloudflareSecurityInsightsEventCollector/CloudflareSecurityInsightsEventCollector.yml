commonfields:
  id: Cloudflare Security Insights Event Collector
  version: -1
name: Cloudflare Security Insights Event Collector
display: Cloudflare Security Insights Event Collector
category: Analytics & SIEM
description: Collect Cloudflare Security Center insights (findings) and ingest them into Cortex XSIAM.
configuration:
- display: Server URL
  name: url
  type: 0
  required: true
  defaultvalue: https://api.cloudflare.com/client/v4
  additionalinfo: The Cloudflare API base URL.
- display: API Token
  name: credentials
  type: 9
  required: true
  displaypassword: API Token
  hiddenusername: true
  additionalinfo: A Cloudflare API Token with the "Account Security Insights" (Security Center Insights Read) permission. Provide the token in the password field.
- display: Account IDs
  name: account_ids
  type: 0
  required: true
  additionalinfo: A comma-separated list of Cloudflare account IDs to collect Security Center insights from.
- display: Maximum number of insights per fetch
  name: max_fetch
  type: 0
  required: false
  defaultvalue: "5000"
  advanced: true
  additionalinfo: The maximum number of insight records to fetch per run.
- display: Events Fetch Interval
  name: eventFetchInterval
  type: 19
  required: false
  defaultvalue: "60"
  additionalinfo: How often the collector runs, in minutes. Insights are current findings (a snapshot), so a longer interval (default 1 hour) is appropriate.
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
  advanced: true
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
  advanced: true
script:
  script: ''
  type: python
  subtype: python3
  dockerimage: demisto/python3:3.12.13.10404775
  isfetchevents: true
  commands:
  - name: cloudflare-security-insights-get-events
    description: Manual command to retrieve and preview Cloudflare Security Center insights. Used for testing and development.
    arguments:
    - name: account_ids
      description: A comma-separated list of Cloudflare account IDs. Defaults to the instance-configured account IDs.
      isArray: true
    - name: limit
      description: The maximum number of insight records to return.
      defaultValue: "50"
    - name: should_push_events
      description: If true, the fetched records are also pushed to the XSIAM dataset. Defaults to false.
      auto: PREDEFINED
      predefined:
      - "true"
      - "false"
      defaultValue: "false"
    outputs: []
fromversion: 6.8.0
marketplaces:
- marketplacev2
- platform
supportedModules:
- C1
- C3
- X1
- X3
- X5
- ENT_PLUS
tests:
- No tests (auto formatted)
