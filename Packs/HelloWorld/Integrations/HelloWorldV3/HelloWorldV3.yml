category: Utilities
commonfields:
  id: HelloWorldV3
  version: -1
configuration:
- name: url
  display: Server URL (e.g., https://api.dummy-example.com)
  defaultvalue: https://api.dummy-example.com
  type: 0
  required: true
- name: credentials
  displaypassword: API Key
  type: 9
  required: true
  hiddenusername: true
- name: insecure
  display: Trust any certificate (not secure)
  type: 8
  required: false
- name: proxy
  display: Use system proxy settings
  type: 8
  required: false
- name: ip_threshold
  display: IP Threshold
  additionalinfo: The minimum score for an IP to be considered malicious (0-100).
  defaultvalue: "65"
  type: 0
  required: false
- name: integrationReliability
  display: Source Reliability
  additionalinfo: Reliability of the source providing the intelligence data.
  defaultvalue: C - Fairly reliable
  type: 15
  required: false
  options:
  - A+ - 3rd party enrichment
  - A - Completely reliable
  - B - Usually reliable
  - C - Fairly reliable
  - D - Not usually reliable
  - E - Unreliable
  - F - Reliability cannot be judged
description: A dummy Hello World v3 integration used to demonstrate building Cortex integrations.
display: Hello World v3
name: HelloWorldV3
script:
  commands:
  - name: helloworldv3-say-hello
    description: Prints a greeting to the specified name.
    arguments:
    - name: name
      description: The name of the person you want to say hello to.
      required: false
      defaultValue: World
    outputs:
    - contextPath: HelloWorldV3.Hello.name
      description: The name that was greeted.
      type: String
    - contextPath: HelloWorldV3.Hello.message
      description: The greeting message returned by the command.
      type: String
  - name: helloworldv3-alert-list
    description: Lists mocked alerts, optionally filtered by severity.
    arguments:
    - name: limit
      description: The maximum number of alerts to return. Default is 10.
      required: false
      defaultValue: "10"
    - name: severity
      description: The severity by which to filter the alerts.
      required: false
      auto: PREDEFINED
      predefined:
      - low
      - high
    outputs:
    - contextPath: HelloWorldV3.Alert.id
      description: The ID of the alert.
      type: Number
    - contextPath: HelloWorldV3.Alert.name
      description: The name of the alert.
      type: String
    - contextPath: HelloWorldV3.Alert.severity
      description: The severity of the alert.
      type: String
  - name: helloworldv3-alert-get
    description: Retrieves a single mocked alert by its ID.
    arguments:
    - name: alert_id
      description: The ID of the alert to retrieve.
      required: true
    outputs:
    - contextPath: HelloWorldV3.Alert.id
      description: The ID of the alert.
      type: Number
    - contextPath: HelloWorldV3.Alert.name
      description: The name of the alert.
      type: String
    - contextPath: HelloWorldV3.Alert.severity
      description: The severity of the alert.
      type: String
    - contextPath: HelloWorldV3.Alert.status
      description: The status of the alert.
      type: String
  - name: ip
    description: Returns IP reputation information for the given IP addresses.
    arguments:
    - name: ip
      description: A comma-separated list of IP addresses to check.
      required: true
      isArray: true
      default: true
    - name: threshold
      description: If the IP reputation score is greater than or equal to this threshold, the IP is considered malicious. If not specified, the default integration threshold is used.
      required: false
    outputs: []
  dockerimage: demisto/fastapi:0.125.0.9094740
  runonce: false
  script: '-'
  subtype: python3
  type: python
fromversion: 6.8.0
tests:
- No tests (auto formatted)
