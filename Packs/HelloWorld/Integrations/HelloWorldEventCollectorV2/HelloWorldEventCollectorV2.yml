name: HelloWorldEventCollectorV2
display: HelloWorld Event Collector V2
category: Analytics & SIEM
provider: Open Source
description: Fetches events from the Hello World service into Cortex XSIAM.
sectionorder:
- Connect
- Collect
commonfields:
  id: HelloWorldEventCollectorV2
  version: -1
configuration:
- defaultvalue: https://test.com
  display: Server URL
  name: url
  required: false
  type: 0
  section: Connect
- display: Trust any certificate (not secure)
  name: insecure
  required: false
  type: 8
  section: Connect
- display: Use system proxy settings
  name: proxy
  required: false
  type: 8
  section: Connect
- defaultvalue: ACTIVE
  display: Fetch alerts with status (ACTIVE, CLOSED)
  name: alert_status
  options:
  - ACTIVE
  - CLOSED
  required: false
  type: 15
  section: Collect
- defaultvalue: '10000'
  display: Max number of events per fetch
  name: max_events_per_fetch
  required: false
  type: 0
  section: Collect
script:
  commands:
  - arguments:
    - auto: PREDEFINED
      defaultvalue: 'false'
      description: Whether to create events. If "false", the command will only display them.
      isArray: false
      name: should_push_events
      predefined:
      - 'true'
      - 'false'
      required: true
    - auto: PREDEFINED
      default: false
      description: The alert status to filter the events by.
      isArray: false
      name: status
      predefined:
      - ACTIVE
      - CLOSED
      required: false
      secret: false
    - default: false
      description: The maximum number of results to return.
      isArray: false
      name: limit
      required: true
      secret: false
    - default: false
      description: The date from which to get events.
      name: from_date
      required: false
    deprecated: false
    description: Gets events from Hello World. This command is used for developing and debugging. It is not part of the automatic events fetch cycle.
    execution: false
    name: hello-world-get-events
  dockerimage: demisto/python3:3.12.8.3296088
  isfetchevents: true
  runonce: false
  script: '-'
  subtype: python3
  type: python
marketplaces:
- marketplacev2
- platform
fromversion: 8.4.0
tests:
- No tests (auto formatted)
supportedModules:
- xsiam
