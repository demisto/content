  - Events
  required: true
  section: Collect
- name: first_fetch
  display: First fetch time
  defaultvalue: now
  additionalinfo: 'How far back to fetch events on the first run. Defaults to "now" (do not back-fill). Examples: "1 day", "12 hours".'
  required: false
  type: 0
  section: Collect
- name: max_events_per_fetch
  display: Maximum events per fetch
  defaultvalue: '1000'
  additionalinfo: 'Per source. Maximum allowed: 10000.'
  required: false
  type: 0
  section: Collect
script:
  script: '-'
  type: python
  subtype: python3
  dockerimage: demisto/auth-utils:1.0.0.6111183
  isfetchevents: true
  runonce: false
  commands:
  - name: akamai-prolexic-get-events
    description: Manually retrieve events from Akamai Prolexic for development and debugging. May produce duplicate events when used alongside automatic fetching.
    arguments:
    - name: limit
      description: Maximum number of events to retrieve per source.
      defaultValue: '50'
      required: false
    - name: event_type
      description: Comma-separated list of event types to retrieve. If empty, uses the integration configuration.
      auto: PREDEFINED
      predefined:
      - Critical Events
      - Events
      isArray: true
      required: false
    - name: start_time
      description: 'The lower-bound timestamp for events to retrieve. Supports ISO 8601 (e.g., "2026-04-20T10:00:00Z") or relative time expressions (e.g., "3 days ago"). If omitted, the integration''s "First fetch time" value is used.'
      required: false
    - name: should_push_events
      description: If true, push retrieved events to Cortex XSIAM. Otherwise only display them.
      auto: PREDEFINED
      defaultValue: 'false'
      predefined:
      - 'true'
      - 'false'
      required: true
    outputs: []
marketplaces:
- marketplacev2
- platform
supportedModules:
- xsiam
tests:
- No tests (auto formatted)
