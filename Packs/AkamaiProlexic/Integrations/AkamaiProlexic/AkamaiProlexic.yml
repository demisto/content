commonfields:
  id: AkamaiProlexic
  version: -1
description: Collects DDoS detection critical events and general events from Akamai Prolexic Analytics for Cortex XSIAM.
fromversion: 8.4.0
configuration:
- name: url
  display: Server URL
  additionalinfo: 'Your Akamai API host (the value of the "host" field in your .edgerc file). Example: https://akab-h05tnam3wl42son7nktnlnnx-kbob3i3v.luna.akamaiapis.net'
  required: true
  type: 0
  section: Connect
- name: contract_id
  display: Contract ID
  additionalinfo: The policy domain name of the data center or proxy that the events belong to.
  required: true
  type: 0
  section: Connect
- name: client_token_creds
  displaypassword: Client Token
  hiddenusername: true
  required: true
  type: 9
  section: Connect
- name: client_secret_creds
  displaypassword: Client Secret
  hiddenusername: true
  required: true
  type: 9
  section: Connect
- name: access_token_creds
  displaypassword: Access Token
  hiddenusername: true
  required: true
  type: 9
  section: Connect
- name: account_switch_key
  display: Account Switch Key
  additionalinfo: 'For customers managing more than one account; runs the operation against another account. The Identity and Access Management API provides a list of available account switch keys.'
  required: false
  type: 0
