      name: payload
      required: true
    description: Create a new custom data entry (POST /api/v2/custom_data_management).
    name: axonius-create-custom-data
    outputs:
    - contextPath: Axonius.CustomData
      description: The created custom data entry.
      type: Unknown
  - arguments:
    - description: ID of the custom data entry to delete.
      name: id
      required: true
    description: Delete a custom data entry by ID (DELETE /api/v2/custom_data_management/{id}).
    name: axonius-delete-custom-data
    outputs:
    - contextPath: Axonius.CustomData.id
      description: ID of the deleted custom data entry.
      type: String
    - contextPath: Axonius.CustomData.deleted
      description: Whether the entry was deleted.
      type: Boolean
  - arguments:
    - defaultValue: "50"
      description: Maximum number of enforcements to return.
      name: limit
    - defaultValue: "0"
      description: Offset for pagination.
      name: offset
    description: List enforcement sets (GET /api/v2/enforcements).
    name: axonius-get-enforcements
    outputs:
    - contextPath: Axonius.Enforcements.uuid
      description: Enforcement unique identifier.
      type: String
    - contextPath: Axonius.Enforcements.name
      description: Enforcement name.
      type: String
    - contextPath: Axonius.Enforcements
      description: Full enforcement objects list.
      type: Unknown
  - arguments:
    - description: UUID of the enforcement to run.
      name: enforcement_id
      required: true
    description: Trigger an enforcement run (POST /api/v2/enforcements/{enforcement_id}/run).
    name: axonius-run-enforcement
    outputs:
    - contextPath: Axonius.Enforcements.enforcement_id
      description: ID of the enforcement that was triggered.
      type: String
    - contextPath: Axonius.Enforcements.triggered
      description: Whether the enforcement was triggered successfully.
      type: Boolean
  - arguments:
    - description: Filter queries by asset type (e.g. devices, users).
      name: asset_type
    - defaultValue: "50"
      description: Maximum number of queries to return.
      name: limit
    - defaultValue: "0"
      description: Offset for pagination.
      name: offset
    description: List saved queries (GET /api/v2/queries).
    name: axonius-get-queries
    outputs:
    - contextPath: Axonius.Queries.uuid
      description: Query unique identifier.
      type: String
    - contextPath: Axonius.Queries.name
      description: Query name.
      type: String
    - contextPath: Axonius.Queries
      description: Full query objects list.
      type: Unknown
  - arguments:
    - description: Name for the new saved query.
      name: name
      required: true
    - description: AQL filter string for the query.
      name: query
      required: true
    - defaultValue: devices
      description: Asset type this query applies to.
      name: asset_type
    - description: Optional description for the query.
      name: description
    description: Create a new saved query (POST /api/v2/queries).
    name: axonius-create-query
    outputs:
    - contextPath: Axonius.Queries.uuid
      description: UUID of the created query.
      type: String
    - contextPath: Axonius.Queries.name
      description: Name of the created query.
      type: String
    - contextPath: Axonius.Queries
      description: The created query object.
      type: Unknown
  - arguments:
    - description: UUID of the query to delete.
      name: query_id
      required: true
    description: Delete a saved query (DELETE /api/v2/queries/{query_id}).
    name: axonius-delete-query
    outputs:
    - contextPath: Axonius.Queries.query_id
      description: ID of the deleted query.
      type: String
    - contextPath: Axonius.Queries.deleted
      description: Whether the query was deleted.
      type: Boolean
  - arguments:
    - description: Optional AQL filter applied before grouping.
      name: query
    - description: Filter vulnerability instances by team name.
      name: team_name
    - auto: PREDEFINED
      description: Filter by the urgent flag on vulnerability instances.
      name: urgent
      predefined:
      - "true"
      - "false"
    - defaultValue: "10"
      description: Number of top CVEs to return (sorted by affected_hosts_count descending).
      name: top_n
    - defaultValue: "100"
      description: Number of records per page when fetching all instances.
      name: page_size
    description: >
      Fetch all vulnerability instances, flatten them, group by CVE ID, and
      return the Top N CVEs sorted by affected host count. Computes
      average_cvss_score per CVE. Outputs as Axonius.GroupedVulnerabilities
      keyed by cve_id.
    name: axonius-get-grouped-vulnerabilities
    outputs:
    - contextPath: Axonius.GroupedVulnerabilities.cve_id
      description: CVE identifier.
      type: String
    - contextPath: Axonius.GroupedVulnerabilities.affected_hosts_count
      description: Number of hosts affected by this CVE.
      type: Number
    - contextPath: Axonius.GroupedVulnerabilities.average_cvss_score
      description: Average CVSS score across all instances of this CVE.
      type: Number
