      isArray: true
      name: ids
      required: true
    - auto: PREDEFINED
      description: Type of Asset. Device or User.
      name: type
      predefined:
      - devices
      - users
      required: true
    description: Add note to assets.
    name: axonius-add-note
    outputs:
    - contextPath: Axonius.assets.updates
      description: Number of assets updated.
      type: Number
  - arguments:
    - description: >
        The asset type to fetch (e.g. devices, users, vulnerability_instances, security_findings).
        See axonius-get-asset-types for all supported values.
      name: asset_type
      required: true
    - description: AQL filter string to narrow the returned assets.
      name: query
    - description: Comma-separated list of fields to include in the response.
      isArray: true
      name: fields
    - description: Comma-separated list of fields to exclude from the response.
      isArray: true
      name: fields_to_exclude
    - defaultValue: "50"
      description: >
        Maximum number of assets to return per page (1–2000). Use next_page to
        paginate. Keep this value small for large asset types (e.g. vulnerability_instances)
        to avoid XSOAR context size limits (~10 MB).
      name: page_limit
    - description: >
        Pagination cursor returned from a previous call as Axonius.Assets.next_page.
        Pass this value to retrieve the next page of results.
      name: next_page
    - auto: PREDEFINED
      defaultValue: "false"
      description: Include metadata in the response.
      name: include_metadata
      predefined:
      - "true"
      - "false"
    - auto: PREDEFINED
      defaultValue: "false"
      description: Include detailed asset data in the response.
      name: include_details
      predefined:
      - "true"
      - "false"
    - auto: PREDEFINED
      defaultValue: "false"
      description: Use a cached response entry if available.
      name: use_cache_entry
      predefined:
      - "true"
      - "false"
    description: >
      Fetch assets of any type using the Axonius v2 API
      (POST /api/v2/assets/{asset_type}). Supports all asset types including
      security_findings and vulnerability_instances. Use next_page for
      pagination. Large responses (>10 MB) may be stored as a downloadable
      file by XSOAR instead of being written to the context.
      NOTE: All calls write to the fixed context key Axonius.Assets regardless
      of asset_type. If a playbook calls this command more than once with
      different asset types, each call overwrites the previous result.
      To avoid data loss, store or transform the context output
      (e.g. using Set) before issuing a second call with a different type.
    name: axonius-get-assets
    outputs:
    - contextPath: Axonius.Assets.asset_type
      description: The asset type that was queried.
      type: String
    - contextPath: Axonius.Assets.assets
      description: List of asset records returned by the query.
      type: Unknown
    - contextPath: Axonius.Assets.count
      description: Number of assets returned in this page.
      type: Number
    - contextPath: Axonius.Assets.total_count
      description: Total number of assets matching the query (when available).
      type: Number
    - contextPath: Axonius.Assets.next_page
      description: Pagination cursor for the next page of results. Pass this as next_page in the next call.
      type: String
  - arguments: []
    description: Return the list of all available asset types in the Axonius instance (GET /api/v2/assets/asset_types).
    name: axonius-get-asset-types
    outputs:
    - contextPath: Axonius.AssetTypes
      description: List of available asset types.
      type: Unknown
  - arguments:
    - defaultValue: "50"
      description: Maximum number of entries to return.
      name: limit
    - defaultValue: "0"
      description: Offset for pagination.
      name: offset
    description: List custom data management entries (GET /api/v2/custom_data_management).
    name: axonius-get-custom-data
    outputs:
    - contextPath: Axonius.CustomData
      description: List of custom data entries.
      type: Unknown
  - arguments:
    - description: >
