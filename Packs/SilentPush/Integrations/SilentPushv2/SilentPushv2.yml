      description: match mode for first_seen_min parameter, strict (default) - select A records that do not have any timestamps before first_seen_min, any - select A records that have at least one timestamp after first_seen_min.
      required: false
      secret: false
      default: false
    - name: first_seen_max_mode
      isArray: false
      description: match mode for first_seen_max parameter, strict (default) - select A records that do not have any timestamps after first_seen_max, any - select A records that have at least one timestamp before first_seen_max.
      required: false
      secret: false
      default: false
    - name: last_seen_min
      isArray: false
      description: only domains that have A records last seen more recently than the given date.
      required: false
      secret: false
      default: false
    - name: last_seen_max
      isArray: false
      description: only domains that have A records last seen earlier than the given date.
      required: false
      secret: false
      default: false
    - name: last_seen_min_mode
      isArray: false
      description: match mode for last_seen_min parameter, strict - select A records that do not have any timestamps before last_seen_min, any (default) - select A records that have at least one timestamp after first_seen_min.
      required: false
      secret: false
      default: false
    - name: last_seen_max_mode
      isArray: false
      description: match mode for last_seen_max parameter, strict (default) - select A records that do not have any timestamps after last_seen_max, any - select A records that have at least one timestamp before last_seen_max.
      required: false
      secret: false
      default: false
    - name: asnum
      isArray: false
      description: Autonomous System (AS) number to filter domains.
      required: false
      secret: false
      default: false
    - name: asname
      isArray: false
      description: Search for all AS numbers where the AS Name begins with the specified value.
      required: false
      secret: false
      default: false
    - name: network
      isArray: false
      description: additional network and net mask, give option as 1.1.1.1/24, network parameter may be given multiple times and the search will be performed as an ‘or’ condition.
      required: false
      secret: false
      default: false
    - name: timeline
      isArray: false
      description: include details of IPs, ASNs, first_seen and last_seen for each domain, 0 (default) = do not include, 1 = include timeline
      required: false
      secret: false
      default: false
    - name: ip_diversity_all_min
      isArray: false
      description: Minimum IP diversity limit to filter domains.
      required: false
      secret: false
      default: false
    - name: registrar
      isArray: false
      description: Name or partial name of the registrar used to register domains.
      required: false
      secret: false
      default: false
    - name: email
      isArray: false
      description: email used to register domains - no wildcards, the given string is used in exact match - this is a slow search option and should only be used in combination with the domain match option.
      required: false
      secret: false
      default: false
    - name: nschange_from_ns
      isArray: false
      description: domain has changed name server from nsname, exact match, wildcards and ‘self’ options supported.
      required: false
      secret: false
      default: false
    - name: nschange_to_ns
      isArray: false
      description: domain has changed name server to nsname, exact match, wildcards and ‘self’ options supported.
      required: false
      secret: false
      default: false
    - name: nschange_date_after
      isArray: false
      description: only domains with name server changes that occurred after the given date, if nschange_date_after is not given, the default is to find name server changes in the last 30 days, if nschange_date_before is not given.
      required: false
      secret: false
      default: false
    - name: nschange_date_before
      isArray: false
      description: only domains with name server changes that occurred before the given date.
      required: false
      secret: false
      default: false
    - name: cert_date_min
      isArray: false
      description: only domains that have had ssl certificates issued on or after the given date.
      required: false
      secret: false
      default: false
    - name: cert_date_max
      isArray: false
      description: only domains that have had ssl certificates issued on or before the given date.
      required: false
      secret: false
      default: false
    - name: cert_issuer
      isArray: false
      description: Filter domains that had SSL certificates issued by the specified certificate issuer. Wildcards supported.
      required: false
      secret: false
      default: false
    - name: infratag
      isArray: false
      description: search by infratag, infratag must include mx part, ns part, asname part, or registrar part, overrides mxname, nsname and registrar parameters, if infratag contains these parts, can be combined with all other parameters.
      required: false
      secret: false
      default: false
    - name: asn_diversity_min
      isArray: false
      description: Minimum ASN diversity limit to filter domains.
      required: false
      secret: false
      default: false
    - name: ip_diversity_all_min
      isArray: false
      description: minimum diversity limit, default = 1.
      required: false
      secret: false
      default: false
    - name: ip_diversity_groups_min
      isArray: false
      description: minimum diversity limit.
      required: false
      secret: false
      default: false
    - name: whois_date_after
      isArray: false
      description: Filter domains with a WHOIS creation date after this date (YYYY-MM-DD).
      required: false
      secret: false
      default: false
