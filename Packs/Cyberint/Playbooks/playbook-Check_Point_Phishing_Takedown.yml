inputs:
- key: URL
  value:
    simple: ${incident.cyberintalertdata.url}
  required: false
  description: 'The phishing website URL to submit for takedown. Expected format: full URL including the scheme, e.g. ``http://evil.example.com/login``. Defaults to the URL from the Cyberint alert data.'
  playbookInputQuery:
- key: CustomerID
  value: {}
  required: true
  description: 'The Cyberint customer ID, as configured in the Cyberint Takedown integration. Expected format: customer identifier string, e.g. ``acme-corp``. Used to submit and track the takedown request.'
  playbookInputQuery:
- key: Reason
  value:
    simple: phishing
  required: false
  description: 'The takedown reason. One of: phishing, brand_abuse, impersonating_application, unofficial_application_distribution, malicious_content, social_media_impersonation, social_media_employee_impersonation, fake_job_post, sensitive_file_on_antivirus_repository, instant_messaging_impersonation, other. Default is phishing.'
  playbookInputQuery:
- key: AlertID
  value:
    simple: ${incident.cyberintalertid}
  required: false
  description: 'The Cyberint alert ID associated with the phishing website. Expected format: numeric alert ID, e.g. ``123456``. Used to correlate the takedown request with the alert.'
  playbookInputQuery:
- key: Confidence
  value:
    simple: ${incident.cyberintconfidence}
  required: false
  description: 'The confidence score (0-100) of the phishing website alert. Accepts a single number 0-100, e.g. ``80`` or ``95``. Defaults to the Cyberint alert confidence field.'
  playbookInputQuery:
- key: ConfidenceThreshold
  value:
    simple: "80"
  required: false
  description: 'Minimum confidence score (0-100) required to initiate a takedown. Accepts a single number 0-100, e.g. ``80``. Default is 80.'
  playbookInputQuery:
- key: Severity
  value:
    simple: ${incident.severity}
  required: false
  description: 'The severity of the incident. Accepts a single integer 1-4: ``1`` Low, ``2`` Medium, ``3`` High, ``4`` Critical. Defaults to the incident severity.'
  playbookInputQuery:
- key: MinSeverity
  value:
    simple: "3"
  required: false
  description: 'Minimum incident severity required to initiate a takedown. Accepts a single integer 1-4 (Low/Medium/High/Critical), e.g. ``3``. Default is 3 (High).'
  playbookInputQuery:
- key: AutoTakedown
  value:
    simple: "no"
  required: false
  description: 'Whether to submit the takedown request automatically (``yes``) or to require analyst approval first (``no``). Default is ``no``.'
  playbookInputQuery:
- key: PollingInterval
  value:
    simple: "5"
  required: false
  description: 'How often, in minutes, to poll the Cyberint takedown request status. Accepts a positive integer, e.g. ``5`` or ``15``. Default is 5.'
  playbookInputQuery:
- key: PollingTimeout
  value:
    simple: "1440"
  required: false
  description: 'How long, in minutes, to keep polling the takedown request status before timing out. Accepts a positive integer, e.g. ``1440`` (24 hours). Default is 1440.'
  playbookInputQuery:
- key: Note
  value:
    simple: Submitted automatically by the Check Point - Phishing Takedown SOAR playbook.
  required: false
  description: 'Optional free-text note attached to the Cyberint takedown request. Accepts a single string, e.g. ``Ticket ABC-1234`` or the default value. Use this to embed an internal ticket reference into the takedown request without editing the playbook.'
  playbookInputQuery:
outputs:
- contextPath: Cyberint.takedowns_submit
  description: The submitted Cyberint takedown request.
  type: unknown
- contextPath: Cyberint.takedowns_list
  description: The polled Cyberint takedown request, including its current status.
  type: unknown
tests:
- Check Point - Phishing Takedown - Test
