inputs:
- key: CompanyDomain
  value: {}
  required: true
  description: The company domain to look up leaked credentials for (for example, example.com).
  playbookInputQuery:
- key: LastSeenFrom
  value: {}
  required: false
  description: Only validate credentials last seen on or after this ISO-formatted date (YYYY-MM-DDTHH:MM:SSZ). Use this when running the playbook on a recurring schedule to process only newly leaked credentials.
  playbookInputQuery:
- key: Limit
  value: {}
  required: false
  description: Maximum number of leaked credential records to retrieve.
  playbookInputQuery:
- key: AutoRemediate
  value:
    simple: "no"
  required: false
  description: Whether to remediate exposed accounts automatically (yes) or to require analyst review and approval first (no). Default is no.
  playbookInputQuery:
outputs:
- contextPath: Cyberint.LeakedCredential
  description: The leaked credentials returned by the Cyberint lookup, split into employee and customer records, each with username, exposure entries and first/last-seen dates.
  type: unknown
