description: Fetches directory, system, alert, and object storage events from JumpCloud Directory Insights.
display: Jumpcloud
name: Jumpcloud
script:
  commands:
  - name: jumpcloud-get-events
    description: Gets events from JumpCloud. This command is used for developing/debugging and is to be used with caution, as it can create events, leading to events duplication and API request limitation exceeding.
    arguments:
    - name: event_type
      description: 'The type of events to retrieve. If not specified, uses the value configured in the integration parameters.'
      auto: PREDEFINED
      predefined:
      - 'Directory Events'
      - 'System Events'
      - 'Alert Events'
      - 'Object Storage Events'
      isArray: true
    - name: limit
      description: The maximum number of events to return per type.
      defaultValue: '50'
    - name: start_time
      description: 'Filter events created at or after this time. Supports ISO 8601 format or relative time expressions (e.g., "3 days ago", "2024-01-01T00:00:00Z").'
    - name: end_time
      description: 'Filter events created at or before this time. Supports ISO 8601 format or relative time expressions (e.g., "now", "2024-01-01T00:00:00Z").'
    - name: should_push_events
      auto: PREDEFINED
      defaultValue: 'false'
      description: If true, the command creates events in XSIAM; otherwise, it only displays them.
      predefined:
      - 'true'
      - 'false'
    outputs:
    - contextPath: Jumpcloud.Event.id
      description: The unique identifier of the event.
      type: String
    - contextPath: Jumpcloud.Event.source_log_type
      description: The source log type of the event.
      type: String
    - contextPath: Jumpcloud.Event._time
      description: The timestamp of the event in ISO 8601 format.
      type: Date
    - contextPath: Jumpcloud.Event.timestamp
      description: The timestamp of the event.
      type: Date
  runonce: false
  script: '-'
  type: python
  subtype: python3
  isfetchevents: true
  dockerimage: demisto/fastapi:0.125.0.7178097
fromversion: 8.2.0
tests:
- No tests (auto formatted)
marketplaces:
- marketplacev2
- platform
