      - item_id
      - version
      - marketplace
      - endpoint_count
      - risk
      - risk_level
      - status
      - installs_count
      - released_at
      - publisher_name
    - name: sort_direction
      description: Sort direction.
      auto: PREDEFINED
      defaultValue: desc
      predefined:
      - asc
      - desc
