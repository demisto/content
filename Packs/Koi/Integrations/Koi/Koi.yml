      predefined:
      - low
      - medium
      - high
      - critical
      - pending
    - name: software_category_koi
      description: Filter by software category (Koi classification).
    - name: sort_by
      description: Column to sort by.
      auto: PREDEFINED
      defaultValue: first_seen
      predefined:
      - first_seen
      - last_seen
      - item_display_name
      - item_id
      - version
      - marketplace
      - endpoint_count
      - risk
