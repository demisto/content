category: Endpoint
provider: KOI
sectionorder:
- Connect
- Collect
commonfields:
  id: KOI
  version: -1
configuration:
- name: url
  display: Server URL
  required: true
  defaultvalue: https://api.prod.koi.security/
  type: 0
  additionalinfo: 'The KOI API server URL.'
  section: Connect
- name: api_key
  display: API Key
  required: true
  type: 14
  additionalinfo: 'The API key for authenticating with the KOI API. See the help section for instructions on creating an API key.'
  section: Connect
- name: insecure
  display: Trust any certificate (not secure)
  type: 8
  additionalinfo:
  section: Connect
  advanced: true
  required: false
- name: proxy
  display: Use system proxy settings
  type: 8
  additionalinfo:
  section: Connect
  advanced: true
  required: false
- name: isFetchEvents
  display: Fetch events
  type: 8
  section: Collect
  required: false
- name: event_types_to_fetch
  display: Fetch event types
  required: true
  defaultvalue: Alerts,Audit
  type: 16
  options:
  - Alerts
  - Audit
  additionalinfo: 'Select which event types to fetch from KOI.'
  section: Collect
- name: audit_types_filter
  display: Audit log type filter
  required: false
  type: 16
  options:
  - approval_requests
  - devices
  - endpoints
  - extensions
  - firewall
  - guardrails
  - notifications
  - policies
  - remediation
  - requests
  - settings
  - vetting
