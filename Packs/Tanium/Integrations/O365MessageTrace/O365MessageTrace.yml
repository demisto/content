description: Message Trace enables tenant administrators to track the lifecycle of an email, determine its delivery status (delivered, pending, failed, or quarantined), and understand the actions applied to it.
script:
  commands:
  - arguments: []
    description: Generates the login URL for the authorization code flow.
    execution: false
    name: o365-message-trace-generate-login-url
  - arguments: []
    description: Tests connectivity to Microsoft.
    execution: false
    name: o365-message-trace-auth-test
  - arguments: []
    description: Clears the saved access token / refresh token from the integration context, so on the next run a fresh authorization code (or client-credentials token) is requested. Used to rerun the authentication process.
    execution: false
    name: o365-message-trace-auth-reset
  - name: o365-message-trace-get-events
    description: Retrieves Exchange Online Message Trace events. Use this command for development and debugging only, as it may produce duplicate events, exceed API rate limits, or disrupt the fetch mechanism.
    arguments:
    - name: limit
      description: The maximum number of events to return.
      defaultValue: '50'
    - name: start_time
      description: Filter events received at or after this time. Supports ISO 8601 format or relative time expressions (e.g., "10 minutes ago", "2024-01-01T00:00:00Z").
    - name: end_time
      description: Filter events received at or before this time. Supports ISO 8601 format or relative time expressions (e.g., "now", "2024-01-01T00:00:00Z").
    - name: should_push_events
      description: Whether the command sends the retrieved events to Cortex XSIAM. If false, it only displays them.
      auto: PREDEFINED
      predefined:
      - 'true'
      - 'false'
      defaultValue: 'false'
    outputs:
    - contextPath: O365MessageTrace.Event.id
      description: The unique identifier of the message trace event.
      type: String
    - contextPath: O365MessageTrace.Event.receivedDateTime
      description: The timestamp when the message was received (e.g., "2020-01-01T00:11:22Z").
      type: Date
    - contextPath: O365MessageTrace.Event.senderAddress
      description: The sender email address.
      type: String
    - contextPath: O365MessageTrace.Event.recipientAddress
      description: The recipient email address.
      type: String
    - contextPath: O365MessageTrace.Event.subject
      description: The subject of the message.
      type: String
    - contextPath: O365MessageTrace.Event.status
      description: The delivery status of the message (e.g., Delivered, Pending, Failed, Quarantined).
      type: String
    - contextPath: O365MessageTrace.Event._time
      description: The Cortex XSIAM event timestamp in ISO 8601 format (e.g., "2020-01-01T00:11:22Z").
      type: Date
  isfetchevents: true
  runonce: false
  script: '-'
  type: python
  subtype: python3
  dockerimage: demisto/crypto:1.0.0.8187750
fromversion: 8.4.0
marketplaces:
- marketplacev2
- platform
supportedModules:
- xsiam
tests:
- No tests (auto formatted)
