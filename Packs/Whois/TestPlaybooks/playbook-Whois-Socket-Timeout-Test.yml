      version: -1
      name: "Run domain command on google.com (playbook context)"
      description: |-
        Runs the Whois domain command on google.com from playbook context
        (non-time-sensitive execution).

        With the fix (XSUP-70632), a 30-second socket timeout is enforced.
        This prevents indefinite hangs when whois servers are unreachable.

        Verify this task completes in a reasonable time (< 30 seconds).
