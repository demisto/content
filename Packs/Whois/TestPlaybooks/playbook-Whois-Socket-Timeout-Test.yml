id: Whois_Socket_Timeout_Test
version: -1
name: Whois - Socket Timeout Test
description: |-
  Test playbook to verify the fix for XSUP-70632 (socket timeout in playbook context).

  This playbook verifies that the domain command works correctly in playbook context
  (non-time-sensitive execution) and completes within a reasonable time.

  The fix (XSUP-70632) adds a 30-second socket timeout for playbook executions.
  Previously, if a whois server was unreachable, the command would hang for ~127 seconds
  (Linux OS TCP connect timeout) due to no socket timeout being set.

  To manually verify the timeout fix:
  1. On the engine host, block outbound TCP port 43:
     iptables -I OUTPUT -p tcp --dport 43 -j DROP
  2. Run this playbook — with the fix, task 1 should fail within ~30 seconds.
     Without the fix, it would hang for ~127 seconds.
  3. Remove the rule after testing:
     iptables -D OUTPUT -p tcp --dport 43 -j DROP

  Note: The automated unit test (test_whois_request_socket_timeout_always_set)
  in Whois_test.py is the primary regression test for XSUP-70632.
