name: FeedSOCRadarThreatFeedV2
display: SOCRadar Threat Feed v2
category: Data Enrichment & Threat Intelligence
provider: SOCRadar
commonfields:
  id: FeedSOCRadarThreatFeedV2
  version: -1
sectionorder:
- Connect
- Collect
configuration:
- name: apikey
  displaypassword: API Key
  required: true
  type: 9
  hiddenusername: true
  additionalinfo: API Key to access the SOCRadar service.
  section: Connect
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
  section: Connect
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
  section: Connect
- additionalinfo: Comma-separated list of SOCRadar Collection UUIDs to fetch IOCs from. You can find your collection UUIDs in the SOCRadar platform under Threat Intelligence > Feeds section.
  display: Collection UUIDs
  name: collection_uuids
  required: true
  type: 0
  section: Collect
- defaultvalue: 'true'
  display: Fetch indicators
  name: feed
  type: 8
  required: false
  section: Collect
- additionalinfo: Indicators from this integration instance will be marked with this reputation.
  defaultvalue: Good
  display: Indicator Reputation
  name: feedReputation
  options:
  - None
  - Good
  - Suspicious
  - Bad
  type: 18
  required: false
  section: Collect
- additionalinfo: Reliability of the source providing the intelligence data.
  defaultvalue: A - Completely reliable
  display: Source Reliability
  name: feedReliability
  options:
  - A - Completely reliable
  - B - Usually reliable
  - C - Fairly reliable
  - D - Not usually reliable
  - E - Unreliable
  - F - Reliability cannot be judged
  required: true
  type: 15
  section: Collect
- name: feedExpirationPolicy
  display: ''
  options:
  - never
  - interval
  - indicatorType
  type: 17
  required: false
  section: Collect
- defaultvalue: '20160'
  name: feedExpirationInterval
  display: ''
  type: 1
  required: false
  section: Collect
- defaultvalue: '1440'
  display: Feed Fetch Interval
  name: feedFetchInterval
  type: 19
  required: false
  section: Collect
- additionalinfo: When selected, the exclusion list is ignored for indicators from this feed. This means that if an indicator from this feed is on the exclusion list, the indicator might still be added to the system.
  display: Bypass exclusion list
  name: feedBypassExclusionList
  type: 8
  required: false
  section: Collect
- additionalinfo: The Traffic Light Protocol (TLP) designation to apply to indicators fetched from the feed.
  defaultvalue: GREEN
  display: Traffic Light Protocol Color
  name: tlp_color
  options:
  - RED
  - AMBER
  - GREEN
  - WHITE
  type: 15
  required: false
  section: Collect
- additionalinfo: Supports CSV values.
  display: Tags
  name: feedTags
  type: 0
  required: false
  section: Collect
- additionalinfo: Incremental feeds pull only new or modified indicators that have been sent from the integration. As the determination if the indicator is new or modified happens on the 3rd-party vendor's side, and only indicators that are new or modified are sent to Cortex XSOAR, all indicators coming from these feeds are labeled new or modified.
  display: Incremental Feed
  name: feedIncremental
  defaultvalue: 'true'
  type: 8
  hidden: true
  required: false
  section: Collect
description: Retrieve indicators provided by SOCRadar Collection Based IOC Feed using collection UUIDs. Users can create custom feed collections on the SOCRadar platform and use their UUIDs to fetch IOCs via this integration.
script:
  commands:
  - arguments:
    - description: The maximum number of indicators to be retrieved.
      name: limit
    - description: Comma-separated list of collection UUIDs to retrieve indicators from.
      isArray: true
      name: collection_uuids
      required: true
    description: Retrieves indicators from SOCRadar Collection Based IOC Feed.
    name: socradar-get-indicators
    outputs:
    - contextPath: SOCRadarThreatFeed.Indicators[0].Indicator
      description: The value of the indicator.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].IndicatorType
      description: The type of the indicator.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].FeedMaintainerName
      description: Name of the maintainer that the indicator found from.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].FirstSeenDate
      description: The date that the indicator was in SOCRadar collections for the first time.
      type: Date
    - contextPath: SOCRadarThreatFeed.Indicators[0].LastSeenDate
      description: The latest date that the indicator was seen in SOCRadar collections.
      type: Date
    - contextPath: SOCRadarThreatFeed.Indicators[0].SeenCount
      description: Number of times this IoC has been observed.
      type: Number
    - contextPath: SOCRadarThreatFeed.Indicators[0].Score
      description: Confidence score of the IoC.
      type: Number
    - contextPath: SOCRadarThreatFeed.Indicators[0].rawJSON
      description: Raw JSON object that contains the value and type of the indicator.
      type: JSON
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.ASN
      description: ASN field Geographical location information of the IP type indicator.
      type: Number
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.AsnCode
      description: ASN code field Geographical location information of the IP type indicator.
      type: Number
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.AsnName
      description: ASN name field Geographical location information of the IP type indicator.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.Cidr
      description: CIDR field Geographical location information of the IP type indicator.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.CityName
      description: City name field Geographical location information of the IP type indicator.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.CountryCode
      description: Country code field Geographical location information of the IP type indicator.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.CountryName
      description: Country name field Geographical location information of the IP type indicator.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.Latitude
      description: Latitude field Geographical location information of the IP type indicator.
      type: Number
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.Longitude
      description: Longitude field Geographical location information of the IP type indicator.
      type: Number
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.RegionName
      description: Region name field Geographical location information of the IP type indicator.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.Timezone
      description: Timezone field Geographical location information of the IP type indicator.
      type: String
    - contextPath: SOCRadarThreatFeed.Indicators[0].GeoLocation.ZipCode
      description: Zip code field Geographical location information of the IP type indicator.
      type: String
  - description: Resets the indicator fetch history.
    name: socradar-reset-fetch-indicators
  dockerimage: demisto/python3:3.12.13.9059085
  feed: true
  runonce: false
  script: '-'
  subtype: python3
  type: python
tests:
- FeedSOCRadarThreatFeed-Test
fromversion: 6.10.0
