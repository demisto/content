category: Data Enrichment & Threat Intelligence
provider: CYFIRMA
sectionorder:
  - Connect
  - Collect
commonfields:
  id: decyfir
  version: -1
configuration:
- display: Incident type
  name: incidentType
  type: 13
  section: Connect
- defaultvalue: https://decyfir.cyfirma.com
  display: DeCYFIR Server URL (e.g. https://decyfir.cyfirma.com)
  name: url
  required: true
  type: 0
  section: Connect
- displaypassword: DeCYFIR API Key
  name: api_key
  type: 9
  required: true
  hiddenusername: true
  display: ''
  section: Connect
- display: Fetch incidents
  name: isFetch
  required: false
  type: 8
  section: Collect
- display: Trust any certificate (not secure)
  name: insecure
  required: false
  type: 8
