  name: first_fetch
  options:
  - 10 days
  - 15 days
  - 30 days
  - 60 days
  - 90 days
  required: false
  type: 15
  hidden: false
  section: Collect
- defaultvalue: '50'
  display: Maximum number of incidents per fetch
  name: max_fetch
  required: false
  type: 0
