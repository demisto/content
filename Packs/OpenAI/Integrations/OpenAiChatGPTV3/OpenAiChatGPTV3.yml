category: Messaging and Conferencing
provider: OpenAI
sectionorder:
- Connect
- Collect
name: OpenAi ChatGPT v3
display: OpenAI GPT
description: Designed to assist security professionals with security investigations, threat hunting, and anomaly detection, leveraging OpenAI GPT models' natural language conversational capabilities.
commonfields:
  id: OpenAi ChatGPT v3
  version: -1
configuration:
- display: Server URL
  name: url
  required: true
  defaultvalue: https://api.openai.com/
  section: Connect
  type: 0
- displaypassword: API Key
  name: apikey
  type: 9
  required: true
  section: Connect
  hiddenusername: true
- display: Model
  additionalinfo: The model that will process the inputs and generate the completion.
  name: model-select
  type: 15
  required: false
  section: Connect
  defaultvalue: gpt-3.5-turbo
  options:
  - gpt-5
  - gpt-5-mini
  - gpt-5-nano
  - gpt-5-chat-latest
  - o4-mini-deep-research
  - o4-mini
  - o3-pro
  - o3
  - o3-deep-research
  - o3-mini
  - o1-pro
  - o1
  - o1-mini
  - gpt-4.1
  - gpt-4.1-mini
  - gpt-4.1-nano
  - gpt-4o
  - gpt-4o-2024-05-13
  - gpt-4o-mini
  - gpt-4o-mini-search-preview
  - gpt-4o-search-preview
- display: Model (Optional - overrides selected choice)
  additionalinfo: The model that will process the inputs and generate the completion.
  name: model-freetext
  type: 0
  required: false
  section: Connect
- display: Max tokens
  name: max_tokens
  additionalinfo: The maximum number of tokens that can be generated for the response. (Allows controlling tokens' consumption).
  type: 0
  required: false
  section: Collect
  advanced: true
- display: Temperature
  name: temperature
  additionalinfo: Sets the randomness in responses. Lower values (closer to 0) produce more deterministic and consistent outputs, while higher values (up to 2) increase randomness and variety. It is generally recommended altering this or top_p but not both.
  type: 0
  required: false
  section: Collect
  advanced: true
- display: Top P
  name: top_p
  additionalinfo: "Enables nucleus sampling where only the top 'p' percent (0 to 1) of probable tokens are considered. Lower values result in more focused outputs, while higher values increase diversity. It is generally recommended altering this or temperature but not both."
  type: 0
  required: false
  section: Collect
  advanced: true
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
  section: Connect
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
  section: Connect
- displaypassword: Admin API Key
  name: admin_api_key
  type: 9
  required: false
  section: Connect
  hiddenusername: true
  additionalinfo: 'Admin API key from the OpenAI Platform. Required when fetching the "OpenAI Audit logs" event type. Not used by any other event type.'
- displaypassword: Compliance API Key
  name: compliance_api_key
  type: 9
  required: false
  section: Connect
  hiddenusername: true
  additionalinfo: 'Compliance API key from the ChatGPT Platform. Required when fetching any of the following Compliance event types: Conversation Messages, Apps, Apps Auth, Compliance Audit, Auth, Codex, ChatGPT, Codex Security, Workspace Agents.'
- display: Compliance Server URL
  name: compliance_url
  type: 0
  required: false
  defaultvalue: https://api.chatgpt.com
  section: Connect
  advanced: true
  additionalinfo: 'Base URL for the ChatGPT Platform Compliance APIs.'
- display: Workspace ID
  name: workspace_id
  type: 0
  required: false
  section: Collect
  additionalinfo: 'The Compliance workspace UUID (e.g., "4a4676f3-3d74-4723-b696-c93e6d01078a"). Required when fetching Compliance event types.'
- display: Fetch events
  name: isFetchEvents
  type: 8
  required: false
  section: Collect
- display: Events types to fetch
  name: event_types_to_fetch
  type: 16
  required: false
  section: Collect
  options:
  - OpenAI Audit logs
  - Conversation Messages
  - Apps
  - Apps Auth
  - Compliance Audit
  - Auth
  - Codex
  - ChatGPT
  - Codex Security
  - Workspace Agents
  additionalinfo: 'Select which event streams to fetch. "OpenAI Audit logs" uses the Admin API; all other selections use the Compliance API and require a Workspace ID.'
- display: Maximum number of OpenAI Audit events per fetch
  name: audit_max_fetch
  type: 0
  required: false
  defaultvalue: '1000'
  section: Collect
  additionalinfo: 'Maximum number of Audit events fetched per cycle (default: 1000).'
- display: Maximum number of Compliance events per fetch
  name: compliance_max_fetch
  type: 0
  required: false
  defaultvalue: '900'
  section: Collect
  additionalinfo: 'Maximum number of Compliance events fetched per cycle (default: 900).'
- display: First fetch time
  name: first_fetch
  type: 0
  required: false
  defaultvalue: '1 day'
  section: Collect
  advanced: true
  additionalinfo: 'How far back to look on the first fetch (e.g., "1 day", "12 hours"). Subsequent fetches resume from the last seen event.'
- defaultvalue: '1'
  display: Events Fetch Interval
  name: eventFetchInterval
  type: 19
  section: Collect
  advanced: true
  required: false
script:
  commands:
  - name: gpt-send-message
    description: Send a plain message to the selected GPT model and receive the generated response.
    arguments:
    - name: message
      required: true
      description: The message that the GPT model will respond to.

    - name: reset_conversation_history
      required: false
      description: Whether to keep previously sent messages in a conversation context or start a new conversation.
      predefined:
      - "yes"
      - "no"
    - name: max_tokens
      required: false
      description: The maximum number of tokens that can be generated for the response.

    - name: temperature
      required: false
      description: Sets the randomness in responses. Lower values (closer to 0) produce more deterministic and consistent outputs, while higher values (up to 2) increase randomness and variety. It is generally recommended altering this or top_p but not both.

    - name: top_p
      required: false
      description: (0-1) Enables nucleus sampling where only the top 'p' percent of probable tokens are considered. Lower values result in more focused outputs, while higher values increase diversity. It is generally recommended altering this or temperature but not both.

    outputs:
    - contextPath: OpenAiChatGPTV3.Conversation
      description: Entire conversation (if not reset) between the user and the GPT model.
      type: Dictionary

  - name: gpt-check-email-header
    description: Checking email header for possible security issues. It is possible to keep asking questions on the provided info using 'gpt-send-message'. Resets conversation context by default.
    arguments:
    - name: entry_id
      description: Entry ID of an uploaded '.eml' file.
      required: true

    - name: additional_instructions
      description: Additional instructions or security issue to focus on.
      required: false

    - name: max_tokens
      required: false
      description: The maximum number of tokens that can be generated for the response.

    - name: temperature
      required: false
      description: Sets the randomness in responses. Lower values (closer to 0) produce more deterministic and consistent outputs, while higher values (up to 2) increase randomness and variety. It is generally recommended altering this or top_p but not both.

    - name: top_p
      required: false
      description: Enables nucleus sampling where only the top 'p' percent of probable tokens are considered. Lower values result in more focused outputs, while higher values increase diversity. It is generally recommended altering this or temperature but not both.
    outputs:
    - contextPath: OpenAiChatGPTV3.Conversation
      description: Entire conversation (if not reset) between the user and the GPT model.
      type: Dictionary

  - name: gpt-check-email-body
    description: Check email body for possible security issues. It is possible to keep asking questions on the provided info using 'gpt-send-message'. Resets conversation context by default.
    arguments:
    - name: entry_id
      description: Entry ID of an uploaded '.eml' file.
      required: true

    - name: additional_instructions
      description: Additional instructions or security issue to focus on.
      required: false

    - name: max_tokens
      required: false
      description: The maximum number of tokens that can be generated for the response.

    - name: temperature
      required: false
      description: Sets the randomness in responses. Lower values (closer to 0) produce more deterministic and consistent outputs, while higher values (up to 2) increase randomness and variety. It is generally recommended altering this or top_p but not both.

    - name: top_p
      required: false
      description: Enables nucleus sampling where only the top 'p' percent of probable tokens are considered. Lower values result in more focused outputs, while higher values increase diversity. It is generally recommended altering this or temperature but not both.
    outputs:
    - contextPath: OpenAiChatGPTV3.Conversation
      description: Entire conversation (if not reset) between the user and the GPT model.
      type: Dictionary

  - name: openai-get-events
    description: Manually retrieves events from OpenAI for development/debugging. Use with caution - it can ingest events when 'should_push_events' is true, leading to event duplication.
    arguments:
    - name: event_type
      description: 'Event type(s) to retrieve. If not specified, uses the value configured in the integration parameters.'
      auto: PREDEFINED
      isArray: true
      predefined:
      - 'OpenAI Audit logs'
      - 'Conversation Messages'
      - 'Apps'
      - 'Apps Auth'
      - 'Compliance Audit'
      - 'Auth'
      - 'Codex'
      - 'ChatGPT'
      - 'Codex Security'
      - 'Workspace Agents'
    - name: limit
      description: 'Maximum number of events to return per stream.'
      defaultValue: '50'
    - name: start_time
      description: 'Lookback start time for the fetch. Supports ISO 8601 or relative time (e.g., "3 days ago", "2099-01-01T00:00:00Z").'
    - name: should_push_events
      description: 'If true, retrieved events are also sent to XSIAM ingestion. Defaults to false.'
      auto: PREDEFINED
      defaultValue: 'false'
      predefined:
      - 'true'
      - 'false'
    outputs:
    - contextPath: OpenAI.Event.id
      description: The unique identifier of the event.
      type: String
    - contextPath: OpenAI.Event._event_type
      description: Upstream event_type (Compliance) or empty for Audit events.
      type: String
    - contextPath: OpenAI.Event.source_log_type
      description: The source log type used by downstream parsing rules.
      type: String
    - contextPath: OpenAI.Event._time
      description: The event timestamp in ISO 8601 format.
      type: Date
  - name: gpt-create-soc-email-template
    description: Create an email template out of the conversation context to be sent from the SOC.
    arguments:
    - name: additional_instructions
      description: Additional instructions or security issue to focus on.
      required: false

    - name: max_tokens
      required: false
      description: The maximum number of tokens that can be generated for the response.

    - name: temperature
      required: false
      description: Sets the randomness in responses. Lower values (closer to 0) produce more deterministic and consistent outputs, while higher values (up to 2) increase randomness and variety. It is generally recommended altering this or top_p but not both.

    - name: top_p
      required: false
      description: Enables nucleus sampling where only the top 'p' percent of probable tokens are considered. Lower values result in more focused outputs, while higher values increase diversity. It is generally recommended altering this or temperature but not both.
    outputs:
    - contextPath: OpenAiChatGPTV3.Conversation
      description: Entire conversation (if not reset) between the user and the GPT model.
      type: Dictionary
  runonce: false
  script: ''
  type: python
  subtype: python3
  dockerimage: demisto/parse-emails:0.1.48.8794134
  isfetchevents: true
fromversion: 6.0.0
tests:
- No tests (auto formatted)
marketplaces:
- xsoar
- marketplacev2
- platform
