category: Utilities
commonfields:
  id: PANOS-HA
  version: -1
configuration:
- display: Hostname or IP Address
  name: hostname
  required: true
  type: 0
- display: API Key
  name: api_key
  required: true
  type: 9
  displaypassword: API Key
  hiddenusername: true
- defaultvalue: Firewall
  display: Device Type
  name: device_type
  options:
  - Firewall
  - Panorama
  required: true
  type: 15
- display: VSYS
  name: vsys
  required: false
  type: 0
- display: Trust any certificate (not secure)
  name: insecure
  required: false
  type: 8
description: Manage and orchestrate High Availability (HA) features on Palo Alto Networks Firewalls and Panorama.
display: PANOS-HA
name: PANOS-HA
script:
  commands:
  - arguments: []
    description: Retrieves the current High Availability state of a firewall.
    name: panos-ha-get-state
    outputs:
    - contextPath: PANOS-HA.State.enabled
      description: Whether HA is enabled.
      type: String
    - contextPath: PANOS-HA.State.mode
      description: The current HA mode (e.g., active-passive).
      type: String
    - contextPath: PANOS-HA.State.LocalState
      description: The HA state of the local device (e.g., active, passive, suspended).
      type: String
    - contextPath: PANOS-HA.State.LocalSerial
      description: The serial number of the local device.
      type: String
    - contextPath: PANOS-HA.State.LocalPriority
      description: The priority of the local device.
      type: String
    - contextPath: PANOS-HA.State.LocalPreemptive
      description: Whether preemption is enabled on the local device.
      type: String
    - contextPath: PANOS-HA.State.PeerState
      description: The HA state of the peer device.
      type: String
    - contextPath: PANOS-HA.State.PeerSerial
      description: The serial number of the peer device.
      type: String
    - contextPath: PANOS-HA.State.PeerConnStatus
      description: The connection status of the peer device.
      type: String
  - arguments: []
    description: Suspends the local firewall in an HA pair, forcing a failover to the peer.
    name: panos-ha-suspend-peer
  - arguments: []
    description: Brings a suspended firewall back to a functional state.
    name: panos-ha-make-peer-functional
  - arguments: []
    description: Forces the active firewall to synchronize its running configuration with the passive peer.
    name: panos-ha-sync-config
  - arguments: []
    description: Forces the active firewall to synchronize its state (session table) with the passive peer.
    name: panos-ha-sync-state
  - arguments: []
    description: Issues a revert to running HA state command to a Panorama peer.
    name: panos-panorama-ha-reconfigure
  - arguments:
    - defaultValue: "1"
      description: The HA Group ID (1-255).
      name: group_id
    - description: The IP address of the peer firewall's primary HA1 control link.
      name: peer_ip
      required: true
    - description: The IP address of the peer firewall's backup HA1 control link.
      name: peer_ip_backup
    - auto: PREDEFINED
      defaultValue: auto
      description: For Active/Passive mode, specifies the link state of the passive device.
      name: passive_link_state
      predefined:
      - auto
      - shutdown
    - defaultValue: "100"
      description: Device priority for HA election (0-255). Higher priority becomes active.
      name: device_priority
    - auto: PREDEFINED
      defaultValue: "false"
      description: Enable backup heartbeat monitoring (recommended for production HA).
      name: heartbeat_backup
      predefined:
      - "true"
      - "false"
    - description: The primary control link (HA1) interface port (e.g., ha1-a, ethernet1/1).
      name: ha1_port
    - description: The IP address for the primary control link (HA1) interface.
      name: ha1_ip_address
    - description: The netmask for the primary control link (HA1) interface.
      name: ha1_netmask
    - description: The gateway for the primary control link (HA1) interface.
      name: ha1_gateway
    - description: The backup control link (HA1-Backup) interface port.
      name: ha1_backup_port
    - description: The IP address for the backup control link (HA1-Backup) interface.
      name: ha1_backup_ip_address
    - description: The netmask for the backup control link (HA1-Backup) interface.
      name: ha1_backup_netmask
    - description: The primary data link (HA2) interface port for session synchronization.
      name: ha2_port
    - description: The IP address for the primary data link (HA2) interface.
      name: ha2_ip_address
    - description: The netmask for the primary data link (HA2) interface.
      name: ha2_netmask
    - description: The backup data link (HA2-Backup) interface port.
      name: ha2_backup_port
    - description: The IP address for the backup data link (HA2-Backup) interface.
      name: ha2_backup_ip_address
    - description: The netmask for the backup data link (HA2-Backup) interface.
      name: ha2_backup_netmask
    - auto: PREDEFINED
      defaultValue: "false"
      description: Enable state (session) synchronization over the HA2 data link.
      name: state_sync
      predefined:
      - "true"
      - "false"
    - auto: PREDEFINED
      defaultValue: "false"
      description: Enable HA2 keep-alive monitoring to detect failures on the HA2 data link.
      name: ha2_keepalive
      predefined:
      - "true"
      - "false"
    - defaultValue: "10000"
      description: HA2 keep-alive threshold in milliseconds (5000-60000).
      name: ha2_keepalive_threshold
    - auto: PREDEFINED
      defaultValue: log-only
      description: Action to take when HA2 keep-alive fails.
      name: ha2_keepalive_action
      predefined:
      - log-only
      - log-and-reboot
    - auto: PREDEFINED
      defaultValue: "false"
      description: Commit the configuration change immediately.
      name: commit
      predefined:
      - "true"
      - "false"
    description: Enables and configures a detailed High Availability setup on a firewall.
    name: panos-ha-configure
  - arguments:
    - defaultValue: "false"
      description: Set to true to automatically commit the configuration changes.
      name: commit
    description: Disables the HA functionality on a firewall.
    name: panos-ha-disable
  - arguments: []
    description: Retrieves the current High Availability configuration from a firewall.
    name: panos-ha-get-config
    outputs:
    - contextPath: PANOS-HA.Config.enabled
      description: Whether HA is enabled on the device.
      type: String
    - contextPath: PANOS-HA.Config.GroupId
      description: The Group ID for the HA pair.
      type: String
    - contextPath: PANOS-HA.Config.mode
      description: The HA mode (e.g., Active/Passive).
      type: String
    - contextPath: PANOS-HA.Config.PeerIp
      description: The IP address of the HA peer.
      type: String
    - contextPath: PANOS-HA.Config.PeerIpBackup
      description: The backup IP address of the HA peer.
      type: String
    - contextPath: PANOS-HA.Config.Ha1Port
      description: The interface port for the HA1 (Control) link.
      type: String
    - contextPath: PANOS-HA.Config.Ha1Ip
      description: The IP address for the HA1 (Control) link.
      type: String
    - contextPath: PANOS-HA.Config.Ha1BackupPort
      description: The interface port for the HA1-Backup link.
      type: String
    - contextPath: PANOS-HA.Config.Ha1BackupIp
      description: The IP address for the HA1-Backup link.
      type: String
    - contextPath: PANOS-HA.Config.Ha2Port
      description: The interface port for the HA2 (Data) link.
      type: String
    - contextPath: PANOS-HA.Config.Ha2Ip
      description: The IP address for the HA2 (Data) link.
      type: String
    - contextPath: PANOS-HA.Config.Ha2BackupPort
      description: The interface port for the HA2-Backup link.
      type: String
    - contextPath: PANOS-HA.Config.Ha2BackupIp
      description: The IP address for the HA2-Backup link.
      type: String
    - contextPath: PANOS-HA.Config.LinkMonitoring
      description: A list of Link Monitoring group configurations.
      type: Unknown
  - arguments:
    - defaultValue: "false"
      description: Set to true to automatically commit the configuration changes.
      name: commit
    description: Enables the HA functionality on a firewall from previous configuration.
    name: panos-ha-enable
  - arguments: []
    description: Lists all available network interfaces on the firewall.
    name: panos-ha-list-interfaces
    outputs:
    - contextPath: PANOS-HA.AvailableInterfaces.Hostname
      description: The hostname of the firewall.
      type: String
    - contextPath: PANOS-HA.AvailableInterfaces.InterfaceCount
      description: Total number of interfaces found.
      type: Number
    - contextPath: PANOS-HA.AvailableInterfaces.Interfaces
      description: List of all available interface names.
      type: Unknown
  - arguments:
    - description: Comma-separated list of interface names to validate (e.g., ha1-a,ha2-a,ethernet1/1).
      name: interfaces
      required: true
    description: Validates that specified interfaces exist on the firewall before HA configuration.
    name: panos-ha-validate-interfaces
    outputs:
    - contextPath: PANOS-HA.InterfaceValidation.Hostname
      description: The hostname of the firewall.
      type: String
    - contextPath: PANOS-HA.InterfaceValidation.AllValid
      description: Whether all specified interfaces were found.
      type: Boolean
    - contextPath: PANOS-HA.InterfaceValidation.ValidatedInterfaces
      description: List of interfaces that were validated.
      type: Unknown
    - contextPath: PANOS-HA.InterfaceValidation.MissingInterfaces
      description: List of interfaces that were not found on the device.
      type: Unknown
  dockerimage: demisto/pan-os-python:1.0.0.4889421
  runonce: false
  script: ''
  subtype: python3
  type: python
fromversion: 6.10.0
tests:
- No tests (auto formatted)
