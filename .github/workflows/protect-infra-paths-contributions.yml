name: Protect Infrastructure Directories (Contributions)

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  protect-non-packs:
    runs-on: ubuntu-latest
    if: 'startsWith(github.head_ref, ''contrib'') || (github.event.pull_request.head.repo.fork == true && contains(github.event.pull_request.base.ref, ''contrib''))'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323  # v46.0.3 disable-secrets-detection

      - name: Check for changes in protected paths
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
              python .github/github_workflow_scripts/check_protected_paths.py "$CHANGED_FILES"
