name: Check Devcontainer
on:
  pull_request:
    paths:
      - .devcontainer/**
      - pyproject.toml
      - poetry.lock
      - .github/workflows/check-devcontainer.yml
  push:
    branches:
      - master
    paths:
      - .devcontainer/**
      - pyproject.toml
      - poetry.lock
      - .github/workflows/check-devcontainer.yml
jobs:
  Build-Devcontainer:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Run demisto-sdk in devcontainer
      uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3 disable-secrets-detection
      with:    
        push: never
        runCmd: demisto-sdk --version
