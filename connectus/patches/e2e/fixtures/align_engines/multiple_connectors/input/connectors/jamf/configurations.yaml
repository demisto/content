metadata:
  title: Configuration
  description: Adjust and refine your configuration settings
view_groups:
- id: jamf-protect-event-collector
  label: Jamf Protect Event Collector
  help_text: |
    To fetch computer assets, enable the *Fetch assets and vulnerabilities* option. To retrieve audit logs and alert events, enable the *Fetch events* option.

    Computer assets dataset name: **jamf_protect_computers_raw**
    Events dataset name: **jamf_protect_raw**
- id: jamf-v2
  label: JAMF v2
general_configurations:
  configurations:
  - view_group: jamf-protect-event-collector
    fields:
    - id: integrationLogLevel
      title: Log Level
      field_type: select
      metadata:
        xsoar:
          config_type: backend
      options:
        description: Set the log level for xsoar-jamf-protect-event-collector.
        placeholder: Select log level
        default_value: 'Off'
        searchable: true
        clearable: true
        values:
        - key: 'Off'
          label: 'Off'
        - key: Debug
          label: Debug
        - key: Verbose
          label: Verbose
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - view_group: jamf-v2
    fields:
    - id: xsoar-jamf-v2_integrationLogLevel
      title: Log Level
      field_type: select
      metadata:
        xsoar:
          config_type: backend
      options:
        description: Set the log level for xsoar-jamf-v2.
        placeholder: Select log level
        default_value: 'Off'
        searchable: true
        clearable: true
        values:
        - key: 'Off'
          label: 'Off'
        - key: Debug
          label: Debug
        - key: Verbose
          label: Verbose
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
configurations:
- id: fetch-assets-and-vulnerabilities_jamf-protect-event-collector
  configurations:
  - fields:
    - id: assetsFetchInterval
      field_type: duration
      title: Fetch Computer Assets Interval
      options:
        description: The fetch interval. It is recommended to set it to 12 hours. The minimum interval is 1 hour.
        default_value:
          hours: 12
        create_modifiers:
          hidden: false
        edit_modifiers:
          hidden: false
        units:
        - days
        - hours
        - minutes
        output_format: minutes
  view_group: jamf-protect-event-collector
- id: log-collection_jamf-protect-event-collector
  configurations:
  - fields:
    - id: eventFetchInterval
      title: Events Fetch Interval
      field_type: duration
      options:
        units:
        - days
        - hours
        - minutes
        output_format: minutes
        default_value:
          minutes: 1
        create_modifiers:
          hidden: false
        edit_modifiers:
          hidden: false
  - fields:
    - id: max_fetch_alerts
      field_type: input
      title: Max alert events per fetch
      options:
        help_text: Maximum number of alert events to fetch at a time.
        default_value: '1000'
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: max_fetch_audits
      field_type: input
      title: Max audit events per fetch
      options:
        help_text: Maximum number of audit events to fetch at a time.
        default_value: '20000'
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  view_group: jamf-protect-event-collector
- id: automation-and-remediation_jamf-v2
  view_group: jamf-v2
  configurations:
  - fields:
    - id: defaultIgnore
      title: Do not use in CLI by default
      field_type: checkbox
      metadata:
        xsoar:
          config_type: backend
      options:
        default_value: false
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
