# yaml-language-server: $schema=../../schema/triggers.schema.json
triggers:
- conditions:
    id: engine_mode
    behavior: value
    operator: neq
    value: engine
  effects:
  - id: engine
    action:
      hidden: true
- conditions:
    id: engine_mode
    behavior: value
    operator: neq
    value: engine_group
  effects:
  - id: engine_group
    action:
      hidden: true
- conditions:
    operator: OR
    children:
    - id: engine
      behavior: value
      operator: is_not_empty
    - id: engine_group
      behavior: value
      operator: is_not_empty
  effects:
  - id: proxy
    action:
      read_only: false
- conditions:
    id: plain_protectwise_engine_mode
    behavior: value
    operator: neq
    value: engine
  effects:
  - id: plain_protectwise_engine
    action:
      hidden: true
- conditions:
    id: plain_protectwise_engine_mode
    behavior: value
    operator: neq
    value: engine_group
  effects:
  - id: plain_protectwise_engine_group
    action:
      hidden: true
- conditions:
    operator: OR
    children:
    - id: plain_protectwise_engine
      behavior: value
      operator: is_not_empty
    - id: plain_protectwise_engine_group
      behavior: value
      operator: is_not_empty
  effects:
  - id: plain_protectwise_proxy
    action:
      read_only: false
- conditions:
    id: fetch-issues_protectwise
    behavior: selected
    operator: eq
    value: true
  effects:
  - id: automation-and-remediation_protectwise
    action:
      read_only: true
      enabled: true
    message: A selected capability enables this setting. Clear the active dependency
      to disable it
