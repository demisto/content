- id: automation-and-remediation_cisco-umbrella-investigate
  view_group: cisco-umbrella-investigate
  configurations:
  - fields:
    - id: xsoar-cisco-umbrella-investigate_defaultIgnore
      title: Do not use in CLI by default
      field_type: checkbox
      metadata:
        xsoar:
          config_type: backend
      options:
        default_value: false
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: integrationReliability
      field_type: select
      options:
        values:
        - key: A+ - 3rd party enrichment
          label: A+ - 3rd party enrichment
        - key: A - Completely reliable
          label: A - Completely reliable
        - key: B - Usually reliable
          label: B - Usually reliable
        - key: C - Fairly reliable
          label: C - Fairly reliable
        - key: D - Not usually reliable
          label: D - Not usually reliable
        - key: E - Unreliable
          label: E - Unreliable
        - key: F - Reliability cannot be judged
          label: F - Reliability cannot be judged
        searchable: true
        clearable: true
        default_value: B - Usually reliable
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
      title: Source Reliability
  - fields:
    - id: suspicious_threshold
      field_type: input
      title: DBot Score Suspicious Threshold (-100 to 100)
      options:
        help_text: Make sure the suspicious threshold is greater than the malicious threshold.
        default_value: '0'
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: dboscore_threshold
      field_type: input
      title: Score Malicious Threshold (-100 to 100)
      options:
        help_text: Make sure the malicious threshold is less than the suspicious threshold.
        default_value: '-90'
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
