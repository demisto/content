# yaml-language-server: $schema=../../schema/triggers.schema.json
triggers:
- conditions:
    id: engine_mode
    behavior: value
    operator: neq
    value: engine
  effects:
  - id: engine
    action:
      hidden: true
- conditions:
    id: engine_mode
    behavior: value
    operator: neq
    value: engine_group
  effects:
  - id: engine_group
    action:
      hidden: true
- conditions:
    operator: OR
    children:
    - id: engine
      behavior: value
      operator: is_not_empty
    - id: engine_group
      behavior: value
      operator: is_not_empty
  effects:
  - id: proxy
    action:
      read_only: false
- conditions:
    id: fetch-assets-and-vulnerabilities_jamf-protect-event-collector
    behavior: selected
    operator: eq
    value: true
  effects:
  - id: log-collection_jamf-protect-event-collector
    action:
      read_only: true
    message: Select only one fetch option.
- conditions:
    id: log-collection_jamf-protect-event-collector
    behavior: selected
    operator: eq
    value: true
  effects:
  - id: fetch-assets-and-vulnerabilities_jamf-protect-event-collector
    action:
      read_only: true
    message: Select only one fetch option.
- conditions:
