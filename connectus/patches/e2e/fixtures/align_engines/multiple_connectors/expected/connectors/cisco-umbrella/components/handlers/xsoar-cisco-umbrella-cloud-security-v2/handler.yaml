# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-cisco-umbrella-cloud-security-v2
metadata:
  version: 1.0.0
  description: XSOAR handler for Cisco Umbrella Cloud Security v2.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: Cisco Umbrella Cloud Security v2
    xsoar-pack-id: Cisco-umbrella-cloud-security
  args: {}
capabilities:
- id: automation-and-remediation_cisco-umbrella-cloud-security-v2
  auth_options:
  - id: passthrough.cisco_umbrella_cloud_security_v2
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
test_connection_metro:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
