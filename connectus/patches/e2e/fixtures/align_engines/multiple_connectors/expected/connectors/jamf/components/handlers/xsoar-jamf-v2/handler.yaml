# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-jamf-v2
metadata:
  version: 1.0.0
  description: XSOAR handler for jamf v2.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: jamf v2
    xsoar-pack-id: jamf
  args: {}
capabilities:
- id: automation-and-remediation_jamf-v2
  auth_options:
  - id: passthrough.jamf_v2
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
  - id: plain.jamf_v2
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
test_connection_metro:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
