# yaml-language-server: $schema=../../schema/connection.schema.json
metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
view_groups:
- id: fidelis-edr
  label: Fidelis EDR
  help_text: |
    To create an instance enter your Fidelis username and password.

    The account must have appropriate permissions to execute API calls. While you could use an administrator account, use an account designated for executing API calls. To get the appropriate permissions navigate to __Configuration__ > __Roles__ > __Create a role__ > __Permissions__.
- id: fidelis-elevate-network
  label: Fidelis Elevate Network
profiles:
- id: plain.fidelis_edr
  type: plain
  view_group: fidelis-edr
  title: API Credentials
  metadata:
    xsoar:
      interpolated: true
      interpolation_mapping: username:credentials.identifier,password:credentials.password
  configurations:
  - fields:
    - id: credentials_username
      title: Username
      field_type: input
      metadata:
        auth:
          parameter: username
      options:
        mask: false
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: credentials_password
      title: Password
      field_type: input
      metadata:
        auth:
          parameter: password
      options:
        mask: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: url
      field_type: input
      title: Server URL (e.g. https://abcde.fideliscloud.com/)
      options:
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: proxy
      title: Use system proxy settings
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: true
        edit_modifiers:
          required: false
          hidden: false
          read_only: true
  - fields:
    - id: insecure
      title: Trust any certificate (not secure)
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: false
        edit_modifiers:
          required: false
          hidden: false
          read_only: false
  - fields:
    - id: engine_mode
      title: Engine
      field_type: radio
      options:
        mask: false
        orientation: horizontal
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engineGroup
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: Fidelis EDR
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        empty_values_message: No engines available
        searchable: true
        clearable: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
    - id: engineGroup
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: Fidelis EDR
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        empty_values_message: No engine groups available
        searchable: true
        clearable: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
