# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-jamf-protect-event-collector
metadata:
  version: 1.0.0
  description: XSOAR handler for Jamf Protect Event Collector.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: Jamf Protect Event Collector
    xsoar-pack-id: JamfProtect
  args: {}
capabilities:
- id: fetch-assets-and-vulnerabilities_jamf-protect-event-collector
  auth_options:
  - id: passthrough.jamf_protect_event_collector
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
  actions:
  - type: reset_assets_last_run
- id: log-collection_jamf-protect-event-collector
  auth_options:
  - id: passthrough.jamf_protect_event_collector
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
  actions:
  - type: reset_events_last_run
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
test_connection_metro:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
