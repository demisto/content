metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
view_groups:
- id: topdesk
  label: TOPdesk
  help_text: |
    This integration supports SupportingFilesAPI version `1.38.0` and higher. See the integration documentation for additional information on version support and more.

    *Person* and *operator* are TOPdesk's user types. Each user type has a different set of actions that he is allowed to perform. For example, a *person* can only update issues he created, while an *operator* can update a wider range of issues.

    In general, if an account is able to perform the requested command in TOPdesk's UI, it should be able to perform it using this integration. Make sure you use the right account for your needs and that the account used has all the required permissions. For more details on permissions specific to commands visit the TOPdesk integration documentation.

    ### Setup TOPdesk's application password

    1. Login to TOPdesk with the designated account.
    2. In TOPdesk, click **Open user menu** (top right side of the front page) > Choose **My settings**
    3. At the bottom of the page should be an **Application passwords** section. You can view all application passwords that are configured for the logged in account.
    4. At the bottom right corner, click **Add**.
    5. A window should open requesting a name for the application. Choose any convenient name (e.g., XSOAR-key) and click **Create**.
    6. The application password should be shown - copy it to a safe location. This is the password that will be used for the integration in XSOAR.
    7. Once copied for further usage you can click **Close**.

    ### Configure Username and Password
    **Username**: Use the account username from which the application password was generated. (*Not* the key name)

    **Password**: Use the application password generated in step 6 of the **Setup TOPdesk's application password** procedure.

    ### Troubleshooting
    Make sure the application password is not expired by logging in TOPdesk and viewing it as described in step 3 of the **Setup TOPdesk's application password** procedure.

    ---
    [View Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/to-pdesk)
profiles:
- id: plain.topdesk
  type: plain
  view_group: topdesk
  title: Basic Auth
  metadata:
    xsoar:
      interpolated: true
      interpolation_mapping: username:credentials.identifier,password:credentials.password
  configurations:
  - fields:
    - id: credentials_username
      title: Username
      field_type: input
      metadata:
        auth:
          parameter: username
      options:
        mask: false
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: credentials_password
      title: Password
      field_type: input
      metadata:
        auth:
          parameter: password
      options:
        mask: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: url
      field_type: input
      title: Server URL (e.g., https://topdesk.mydomain/tas/)
      options:
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: proxy
      title: Use system proxy settings
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: true
        edit_modifiers:
          required: false
          hidden: false
          read_only: true
  - fields:
    - id: insecure
      title: Trust any certificate (not secure)
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: false
        edit_modifiers:
          required: false
          hidden: false
          read_only: false
  - fields:
    - id: engine_mode
      title: Engine
      field_type: radio
      options:
        mask: false
        orientation: horizontal
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engineGroup
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: TOPdesk
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        empty_values_message: No engines available
        searchable: true
        clearable: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
    - id: engineGroup
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: TOPdesk
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        empty_values_message: No engine groups available
        searchable: true
        clearable: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
