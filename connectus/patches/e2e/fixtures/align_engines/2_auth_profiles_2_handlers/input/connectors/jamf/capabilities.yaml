# yaml-language-server: $schema=../../schema/capabilities.schema.json
metadata:
  title: Capabilities
  description: Name and configure the instance capabilities
general_configurations:
  description: General configurations for all capabilities
  configurations:
  - fields:
    - id: instance_name
      title: Instance name
      field_type: input
      metadata:
        connector:
          parameter: instance_name
      validations:
      - trigger: change
        rules:
        - type: pattern
          value: ^[a-zA-Z0-9 _-]+$
          message: Only alphanumeric characters, spaces, underscores, and hyphens are allowed.
        - type: async
          validation_type: uniqueness
      options:
        placeholder: Enter a unique name for this instance
        create_modifiers:
          required: true
          read_only: false
          hidden: false
        edit_modifiers:
          required: true
          read_only: false
          hidden: false
capabilities:
- id: fetch-assets-and-vulnerabilities
  title: Fetch Assets and Vulnerabilities
  description: Fetch assets and vulnerabilities from the connected service into the Unified Asset Inventory.
  default_enabled: false
  required: false
  sub_capabilities:
  - id: fetch-assets-and-vulnerabilities_jamf-protect-event-collector
    title: Jamf Protect Event Collector
    default_enabled: false
    required: false
    config:
      required_license:
      - xsiam
      - agentix
  config:
    required_license:
    - agentix
    - xsiam
- id: log-collection
  title: Log Collection
  description: Collect and ingest logs and events from the connected service.
  default_enabled: false
  required: false
  sub_capabilities:
  - id: log-collection_jamf-protect-event-collector
    title: Jamf Protect Event Collector
    default_enabled: false
    required: false
    config:
      required_license:
      - xsiam
      - agentix
  config:
    required_license:
    - agentix
    - xsiam
- id: automation-and-remediation
  title: Automation and Remediation
  description: Run automated actions and remediation commands against the connected service.
  default_enabled: false
  required: false
  sub_capabilities:
  - id: automation-and-remediation_jamf-v2
    title: jamf v2
    default_enabled: false
    required: false
    config:
      required_license:
      - xsiam
      - agentix
  config:
    required_license:
    - agentix
    - xsiam
