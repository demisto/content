metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
view_groups:
- id: jamf-protect-event-collector
  label: Jamf Protect Event Collector
  help_text: |
    Use this integration to fetch audit logs, alerts events and computer assets from Jamf Protect to Cortex XSIAM.

    ## Creating an API Client in Jamf Protect
    Before you configure the integration, retrieve the API Client and Password from your Jamf Protect environment:

    1. In Jamf Protect, click **Administrative** > **API Clients**.
    2. Click **Create API Client**.
    3. Enter a name for your API client.
    4. Assign the Full Access role to the API client.
    5. Copy the API client password for later use.
        Your API client configuration and endpoint information displays.

    6. Copy the API client and password into the integration configuration.

    # Notes:
        You can assign a custom role that limits permissions by editing the API client.
        The minimum required permissions are:

        - Read access Computers.
        - Read access Alert endpoints.
        - Read access Audit Logs.
        - Read access Compliance.
        - Read access Plans.
    For more information refer to Jamf Protect [Documentation](https://learn.jamf.com/en-US/bundle/jamf-protect-documentation/page/Jamf_Protect_API.html).
- id: jamf-v2
  label: JAMF v2
  help_text: |
    This integration supports three authentication methods:

    1. **Basic Authentication:** Deprecated starting from version 10.35.0 of Jamf.
    Use `username and password` - the credentials of a user with relevant permissions in your Jamf Pro admin console.
    Basic Authentication needs to be enabled by the user in the Jamf Pro admin console (not recommended). For more information, click [here](https://developer.jamf.com/jamf-pro/docs/classic-api-authentication-changes).

    2. **Bearer Token based on Basic Authentication:** This method applies to Jamf versions 10.35.0 and above.
    Use `username and password` - the credentials of a user with relevant permissions in your Jamf Pro admin console.

    3. **Bearer Token based on Client Credentials:** This method applies to Jamf versions 10.49.0 and above.
    Use `client ID` and `client secret`. Refer to this [link](https://learn.jamf.com/en-US/bundle/jamf-pro-documentation-current/page/API_Roles_and_Clients.html) for instructions on retrieving a client ID and client secret.

    *Important Note:* Before creating an API client, ensure that you create an API role with all the required privileges as mentioned in the integration documentation. Then, associate the API client with that role.

    *Note:* If the second method is used, the system will automatically attempt to generate a token. If this attempt fails, it will then revert to using the first method.
profiles:
- id: passthrough.jamf_protect_event_collector
  type: passthrough
  view_group: jamf-protect-event-collector
  title: OAuth 2.0 Client Credentials
  vault_mappings:
  - id: client
    map:
      user: client_id
      password: client_secret
  metadata:
    xsoar:
      interpolated: true
      interpolation_mapping: client_id:client.identifier,client_secret:client.password
  configurations:
  - fields:
    - id: client_username
      title: Client ID
      field_type: input
      metadata:
        auth:
          parameter: client_id
      options:
        mask: false
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: client_password
      title: Password
      field_type: input
      metadata:
        auth:
          parameter: client_secret
      options:
        mask: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: base_url
      field_type: input
      title: Server URL (e.g., https://example.protect.jamfcloud.com)
      options:
        help_text: REST API Endpoint of Jamf Protect server.
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: proxy
      title: Use system proxy settings
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: true
        edit_modifiers:
          required: false
          hidden: false
          read_only: true
  - fields:
    - id: insecure
      title: Trust any certificate (not secure)
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: false
        edit_modifiers:
          required: false
          hidden: false
          read_only: false
  - fields:
    - id: engine_mode
      title: Engine
      field_type: radio
      options:
        mask: false
        orientation: horizontal
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engine_group
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: Jamf Protect Event Collector
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        empty_values_message: No engines available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: engine_group
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: Jamf Protect Event Collector
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        empty_values_message: No engine groups available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
