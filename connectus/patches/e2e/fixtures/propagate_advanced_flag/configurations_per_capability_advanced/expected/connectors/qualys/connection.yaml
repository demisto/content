# yaml-language-server: $schema=../../schema/connection.schema.json
metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
profiles:
- id: api_key.qualys
  type: api_key
  title: API Key
  description: API key authentication profile for Qualys.
  configurations:
  - fields:
    - id: api_key
      title: API Key
      field_type: input
      metadata:
        auth:
          parameter: apikey
      options:
        mask: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
