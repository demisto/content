# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-gamma
metadata:
  version: 1.0.0
  description: XSOAR handler for Gamma.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: Gamma
    xsoar-pack-id: Gamma
  args: {}
capabilities:
- id: automation-and-remediation_gamma
  auth_options:
  - id: api_key.gamma
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
- id: fetch-issues_gamma
  auth_options:
  - id: api_key.gamma
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
  actions:
  - type: reset_incidents_last_run
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
test_connection_metro:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
