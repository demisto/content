metadata:
  title: Configuration
  description: Adjust and refine your configuration settings
view_groups:
- id: acme-creds
  label: Acme Creds
general_configurations:
  configurations:
  - view_group: acme-creds
    fields:
    - id: integrationLogLevel
      title: Log Level
      field_type: select
      metadata:
        xsoar:
          config_type: backend
      options:
        default_value: 'Off'
        values:
        - key: 'Off'
          label: 'Off'
        - key: Debug
          label: Debug
        - key: Verbose
          label: Verbose
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
