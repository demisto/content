# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-awake-security
metadata:
  version: 1.0.0
  description: XSOAR handler for Awake Security.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: Awake Security
    xsoar-pack-id: AwakeSecurity
  args: {}
capabilities:
- id: automation-and-remediation_awake-security
  auth_options:
  - id: plain.awake_security
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
- id: fetch-issues_awake-security
  auth_options:
  - id: plain.awake_security
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
  actions:
  - type: reset_incidents_last_run
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
test_connection_metro:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
