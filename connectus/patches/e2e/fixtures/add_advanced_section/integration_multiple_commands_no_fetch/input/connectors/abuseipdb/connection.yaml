metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
view_groups:
- id: abuseipdb
  label: AbuseIPDB
  help_text: |
    To authenticate, provide your AbuseIPDB **API Key (v2)**. To use the Abuse.ch hunting features, also provide the **Abuse.ch Hunting API Key** and, if needed, the **Abuse.ch Hunting API URL** (default: https://hunting-api.abuse.ch/api/v1/). Test the connection to validate the API key.

    - [Report Categories](https://www.abuseipdb.com/categories).

    ---
    [View Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/abuse-ipdb)
profiles:
- id: passthrough.abuseipdb
  type: passthrough
  view_group: abuseipdb
  title: API Key
  vault_mappings:
  - id: credentials
    map:
      password: api_key
  - id: hunting_credentials
    map:
      password: hunting_api_key
  metadata:
    xsoar:
      interpolated: true
      interpolation_mapping: api_key:credentials.password,hunting_api_key:hunting_credentials.password
  configurations:
  - fields:
    - id: credentials
      title: API Key (v2)
      field_type: input
      metadata:
        auth:
          parameter: api_key
      options:
        mask: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: hunting_credentials
      title: Abuse.ch Hunting API Key
      field_type: input
      metadata:
        auth:
          parameter: hunting_api_key
      options:
        mask: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: abusech_hunting_url
      field_type: input
      title: Abuse.ch Hunting API URL
      options:
        default_value: https://hunting-api.abuse.ch/api/v1/
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: server
      field_type: input
      title: AbuseIP server URL
      options:
        default_value: https://api.abuseipdb.com/api/v2/
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: proxy
      title: Use system proxy settings
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: true
        edit_modifiers:
          required: false
          hidden: false
          read_only: true
  - fields:
    - id: insecure
      title: Trust any certificate (not secure)
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: false
        edit_modifiers:
          required: false
          hidden: false
          read_only: false
  - fields:
    - id: engine_mode
      title: Engine
      field_type: radio
      options:
        mask: false
        orientation: horizontal
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engineGroup
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: AbuseIPDB
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        empty_values_message: No engines available
        searchable: true
        clearable: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
    - id: engineGroup
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: AbuseIPDB
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        empty_values_message: No engine groups available
        searchable: true
        clearable: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
