# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-abuseipdb
metadata:
  version: 1.0.0
  description: XSOAR handler for AbuseIPDB.
  module: xsoar
  tags:
  - Free Enricher
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: AbuseIPDB
    xsoar-pack-id: AbuseDB
  args: {}
capabilities:
- id: automation-and-remediation_abuseipdb
  auth_options:
  - id: passthrough.abuseipdb
    workloads:
    - xsoar-pod
    - xsoar-automationhub-runner
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
test_connection_metro:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
