# yaml-language-server: $schema=../../schema/connection.schema.json
metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
view_groups:
- id: fraudwatch
  label: FraudWatch
  help_text: |
    ### Retrieve FraudWatch API token

    1. Navigate to the [Phishportal site](https://www.phishportal.com/).
    2. Enter your Username and Password.
    3. On the left sidebar, click on 'Portal API'.
    4. On the top of the page, you should see your API Token.
    5. If the API token is out of date, click on the **Regenerate Token** button adjacent to the API token, to generate a new token.
    6. Enter the API token in the API token **Password** field.

    **NOTE**: No need to enter a value in the **API Token** field. It can be left blank (visible only on 6.0.2 and lower versions).
profiles:
- id: api_key.fraudwatch
  type: api_key
  view_group: fraudwatch
  title: API Token
  metadata:
    xsoar:
      interpolated: true
      interpolation_mapping: api_key:credentials.password
  configurations:
  - fields:
    - id: credentials
      title: API Token
      field_type: input
      metadata:
        auth:
          parameter: api_key
      options:
        mask: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: base_url
      field_type: input
      title: Server URL
      options:
        help_text: URL of the server.
        default_value: https://www.phishportal.com
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: proxy
      title: Use system proxy settings
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: true
        edit_modifiers:
          required: false
          hidden: false
          read_only: true
  - fields:
    - id: insecure
      title: Trust any certificate (not secure)
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: false
        edit_modifiers:
          required: false
          hidden: false
          read_only: false
  - fields:
    - id: engine_mode
      title: Engine
      field_type: radio
      options:
        mask: false
        orientation: horizontal
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engineGroup
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: FraudWatch
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        empty_values_message: No engines available
        searchable: true
        clearable: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
    - id: engineGroup
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: FraudWatch
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        empty_values_message: No engine groups available
        searchable: true
        clearable: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
