# yaml-language-server: $schema=../../schema/connection.schema.json
metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
profiles:
- id: passthrough.github_iam
  type: passthrough
  view_group: github-iam
  title: Connection
  description: Authentication profile for GitHub (passthrough).
  metadata:
    xsoar:
      interpolated: true
  configurations:
  - fields:
    - id: engine_mode
      title: Engine
      field_type: radio
      options:
        mask: false
        orientation: horizontal
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engine_group
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: GitHub IAM
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        empty_values_message: No engines available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: engine_group
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: GitHub IAM
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        empty_values_message: No engine groups available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
view_groups:
- id: github-iam
  label: GitHub IAM
  help_text: Connection settings for GitHub IAM.
