# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-github
metadata:
  version: 1.0.0
  description: XSOAR handler for GitHub.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: GitHub
    xsoar-pack-id: connectus
  args: {}
capabilities:
- id: automation-and-remediation_github
  auth: none
  workloads:
  - xsoar-pod
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
