metadata:
  title: Configuration
  description: Adjust and refine your configuration
view_groups:
- id: github
  label: GitHub
  help_text: Configurations settings for GitHub.
general_configurations:
  configurations:
  - view_group: github
    fields:
    - id: integrationLogLevel
      title: Log Level
      field_type: select
      metadata:
        xsoar:
          config_type: backend
      options:
        description: Set the log level for xsoar-github.
        placeholder: Select log level
        default_value: 'Off'
        values:
        - key: 'Off'
          label: 'Off'
        - key: Debug
          label: Debug
        - key: Verbose
          label: Verbose
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - view_group: github
    fields:
    - id: first_fetch
      field_type: input
      title: First fetch time
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
configurations:
- id: fetch-issues_github
  configurations:
  - fields:
    - id: incidentType
      title: Issue Type
      field_type: select
      metadata:
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: GitHub
            dynamicField: incident-type
      options:
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
        help_text: select if classifier doesn't exist
        placeholder: Select an issue type
  - fields:
    - id: incidentFetchInterval
      field_type: duration
      title: Issues Fetch Interval
      options:
        default_value:
          minutes: 30
        create_modifiers:
          hidden: false
        edit_modifiers:
          hidden: false
        units:
        - days
        - hours
        - minutes
        output_format: minutes
  - fields:
    - id: incomingMapperId
      title: Incoming Mapper
      field_type: select
      metadata:
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: GitHub
            dynamicField: mapper-incoming
        xsoar:
          config_type: backend
      options:
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: mappingId
      title: Classifier
      field_type: select
      metadata:
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: GitHub
            dynamicField: classifier
        xsoar:
          config_type: backend
      options:
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: max_fetch
      field_type: input
      title: Maximum number of incidents per fetch
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  view_group: github
- id: threat-intelligence-and-enrichment_github
  configurations:
  - fields:
    - id: feedFetchInterval
      title: Feed Fetch Interval
      field_type: duration
      options:
        units:
        - days
        - hours
        - minutes
        output_format: minutes
        default_value:
          hours: 4
        create_modifiers:
          hidden: false
        edit_modifiers:
          hidden: false
  - fields:
    - id: feedReliability
      field_type: select
      options:
        values:
        - key: A - Completely reliable
          label: A - Completely reliable
        - key: B - Usually reliable
          label: B - Usually reliable
        - key: C - Fairly reliable
          label: C - Fairly reliable
        - key: D - Not usually reliable
          label: D - Not usually reliable
        - key: E - Unreliable
          label: E - Unreliable
        - key: F - Reliability cannot be judged
          label: F - Reliability cannot be judged
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
        default_value: A - Completely reliable
        description: Reliability of the source providing the intelligence data
      title: Source Reliability
  - fields:
    - id: feedExpirationPolicy
      field_type: select
      options:
        values:
        - key: indicatorType
          label: indicatorType
        - key: Time Interval
          label: Time Interval
        - key: Never Expire
          label: Never Expire
        - key: When removed from the feed
          label: When removed from the feed
        default_value: indicatorType
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: feedExpirationInterval
      field_type: duration
      options:
        units:
        - days
        - hours
        - minutes
        output_format: minutes
        default_value:
          days: 14
        create_modifiers:
          hidden: true
        edit_modifiers:
          hidden: true
  - fields:
    - id: feedReputation
      title: Indicator Verdict
      field_type: select
      options:
        values:
        - key: Unknown
          label: Unknown
        - key: Benign
          label: Benign
        - key: Suspicious
          label: Suspicious
        - key: Malicious
          label: Malicious
        default_value: ''
        description: Indicators from this integration instance will be marked with
          this verdict
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: feedBypassExclusionList
      title: Bypass exclusion list
      field_type: checkbox
      options:
        description: When selected, the exclusion list is ignored for indicators from
          this feed. This means that if an indicator from this feed is on the exclusion
          list, the indicator might still be added to the system.
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: feedTags
      field_type: input
      title: Tags
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  view_group: github
