# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-github
metadata:
  version: 1.0.0
  description: XSOAR handler for GitHub.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: GitHub
    xsoar-pack-id: fixtures
  args: {}
capabilities:
- id: fetch-issues_github
  auth_options:
  - id: passthrough.github
    workloads:
    - xsoar-pod
  actions:
  - type: reset_incidents_last_run
- id: threat-intelligence-and-enrichment_github
  auth_options:
  - id: passthrough.github
    workloads:
    - xsoar-pod
  actions:
  - type: reset_feed_last_run
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
