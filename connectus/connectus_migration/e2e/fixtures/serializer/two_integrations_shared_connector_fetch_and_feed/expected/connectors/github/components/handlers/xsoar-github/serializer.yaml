# yaml-language-server: $schema=../../../../../schema/serializer.schema.json
computed_fields:
- output:
  - id: feed
    value: true
  any_of:
  - conditions:
    - type: capability
      options:
        capability_id: threat-intelligence-and-enrichment_github
        value: 'on'
- output:
  - id: isFetch
    value: true
  any_of:
  - conditions:
    - type: capability
      options:
        capability_id: fetch-issues_github
        value: 'on'
