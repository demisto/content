  field_name: feedExpirationInterval
- id: xsoar-github-iam_feedReputation
  field_name: feedReputation
- id: xsoar-github-iam_feedBypassExclusionList
  field_name: feedBypassExclusionList
- id: xsoar-github-iam_incidentType
  field_name: incidentType
