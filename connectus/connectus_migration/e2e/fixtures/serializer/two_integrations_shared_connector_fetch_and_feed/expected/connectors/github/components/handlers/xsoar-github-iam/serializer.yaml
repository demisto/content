computed_fields:
- output:
  - id: feed
    value: true
  any_of:
  - conditions:
    - type: capability
      options:
        capability_id: threat-intelligence-and-enrichment_github-iam
        value: 'on'
- output:
  - id: isFetch
    value: true
  any_of:
  - conditions:
    - type: capability
      options:
        capability_id: fetch-issues_github-iam
        value: 'on'
- output:
  - id: first_fetch
    value: '10'
  any_of:
  - conditions:
    - type: capability
      options:
        capability_id: fetch-issues_github-iam
        value: 'on'
    - type: capability
      options:
        capability_id: threat-intelligence-and-enrichment_github-iam
        value: 'on'
- output:
  - id: incidentFetchInterval
    value: '30'
  any_of:
  - conditions:
    - type: capability
      options:
        capability_id: fetch-issues_github-iam
        value: 'on'
