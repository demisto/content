# yaml-language-server: $schema=../../schema/triggers.schema.json
triggers:
- conditions:
    id: feedExpirationPolicy
    behavior: value
    operator: eq
    value: interval
  effects:
  - id: feedExpirationInterval
    action:
      hidden: false
- conditions:
    id: engine_mode
    behavior: value
    operator: neq
    value: engine
  effects:
  - id: engine
    action:
      hidden: true
- conditions:
    id: engine_mode
    behavior: value
    operator: neq
    value: engine_group
  effects:
  - id: engine_group
    action:
      hidden: true
- conditions:
    operator: OR
    children:
    - id: engine
      behavior: value
      operator: is_not_empty
    - id: engine_group
      behavior: value
      operator: is_not_empty
  effects:
  - id: proxy
    action:
      read_only: false
- conditions:
    id: fetch-issues_github
    behavior: selected
    operator: eq
    value: true
  effects:
  - id: threat-intelligence-and-enrichment_github
    action:
      read_only: true
    message: Select only one fetch option.
- conditions:
    id: threat-intelligence-and-enrichment_github
    behavior: selected
    operator: eq
    value: true
  effects:
  - id: fetch-issues_github
    action:
      read_only: true
    message: Select only one fetch option.
- conditions:
