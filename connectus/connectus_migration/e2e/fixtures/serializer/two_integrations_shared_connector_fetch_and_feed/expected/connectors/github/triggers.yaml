    action:
      hidden: false
- conditions:
    id: passthrough_github_iam_engine_mode
    behavior: value
    operator: neq
    value: engine
  effects:
  - id: passthrough_github_iam_engine
    action:
      hidden: true
- conditions:
    id: passthrough_github_iam_engine_mode
    behavior: value
    operator: neq
    value: engine_group
  effects:
  - id: passthrough_github_iam_engine_group
    action:
      hidden: true
- conditions:
    operator: OR
    children:
    - id: passthrough_github_iam_engine
      behavior: value
      operator: is_not_empty
    - id: passthrough_github_iam_engine_group
      behavior: value
      operator: is_not_empty
  effects:
  - id: passthrough_github_iam_proxy
    action:
      read_only: false
- conditions:
    id: fetch-issues_github-iam
    behavior: selected
    operator: eq
    value: true
  effects:
  - id: threat-intelligence-and-enrichment_github-iam
    action:
      read_only: true
