# yaml-language-server: $schema=../../schema/connection.schema.json
metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
view_groups:
- id: active-directory-query-v2
  label: Active Directory Query v2
  help_text: Connection settings for Active Directory Query v2.
profiles:
- id: plain.active_directory_query_v2
  type: plain
  view_group: active-directory-query-v2
  title: plain
  description: Authentication profile for Microsoft Active Directory (plain).
  metadata:
    xsoar:
      interpolated: true
      interpolation_mapping: username:credentials.identifier,password:credentials.password
  configurations:
  - fields:
    - id: credentials_username
      title: Username
      field_type: input
      metadata:
        auth:
          parameter: username
      options:
        mask: false
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: credentials_password
      title: Password
      field_type: input
      metadata:
        auth:
          parameter: password
      options:
        mask: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: server_ip
      field_type: input
      title: Server IP address (for example, 192.168.0.1)
      options:
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: port
      field_type: input
      title: Server port. If not specified, the default port is 389 for LDAP, 636
        for LDAPS, or 3268 for global catalog servers.
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: ntlm
      field_type: checkbox
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
        mask: false
      title: NTLM authentication
      metadata:
        event:
          publish: true
  - fields:
    - id: ssl_version
      field_type: select
      options:
        values:
        - key: None
          label: None
        - key: TLS
          label: TLS
        - key: TLSv1
          label: TLSv1
        - key: TLSv1_1
          label: TLSv1_1
        - key: TLSv1_2
          label: TLSv1_2
        - key: TLS_CLIENT
          label: TLS_CLIENT
        searchable: true
        clearable: true
        description: The SSL\TLS version to use in SSL or Start TLS connections types.
          Default is None. It is recommended to select the TLS_CLIENT option, which
          auto-negotiate the highest protocol version that both the client and server
          support, and configure the context client-side connections.
        default_value: None
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
        mask: false
      title: SSL Version
      metadata:
        event:
          publish: true
  - fields:
    - id: secure_connection
      title: Secure Connection
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: false
        edit_modifiers:
          required: false
          hidden: false
          read_only: false
  - fields:
    - id: engine_mode
      title: Engine
      field_type: radio
      options:
        mask: false
        orientation: horizontal
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engine_group
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: Active Directory Query v2
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        empty_values_message: No engines available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: engine_group
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: Active Directory Query v2
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        empty_values_message: No engine groups available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
