# yaml-language-server: $schema=../../schema/connection.schema.json
metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
view_groups:
- id: zoom
  label: Zoom
  help_text: Connection settings for Zoom.
profiles:
- id: passthrough.zoom
  type: passthrough
  view_group: zoom
  title: OAuth (Server-to-Server)
  description: Authentication profile for Zoom (passthrough).
  metadata:
    xsoar:
      interpolated: true
      interpolation_mapping: account_id:account_id,bot_client_id:bot_credentials.identifier,bot_client_secret:bot_credentials.password,client_id:credentials.identifier,client_secret:credentials.password
  configurations:
  - fields:
    - id: account_id
      title: Account ID (OAuth)
      field_type: input
      metadata:
        auth:
          parameter: account_id
      options:
        mask: false
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: bot_credentials_username
      title: Bot Client ID (Team Chat App)
      field_type: input
      metadata:
        auth:
          parameter: bot_client_id
      options:
        mask: false
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: bot_credentials_password
      title: Bot Client Secret (Team Chat App)
      field_type: input
      metadata:
        auth:
          parameter: bot_client_secret
      options:
        mask: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: credentials_username
      title: Client ID (OAuth)
      field_type: input
      metadata:
        auth:
          parameter: client_id
      options:
        mask: false
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: credentials_password
      title: Client Secret (OAuth)
      field_type: input
      metadata:
        auth:
          parameter: client_secret
      options:
        mask: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: botJID
      field_type: input
      title: Bot JID
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: certificate
      field_type: text_area
      title: Certificate (Required for HTTPS)
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: key
      field_type: input
      options:
        mask: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
      title: Private Key (Required for HTTPS)
      metadata:
        event:
          publish: true
  - fields:
    - id: mirroring
      field_type: checkbox
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
        mask: false
      title: Enable Incident Mirroring
      metadata:
        event:
          publish: true
  - fields:
    - id: secret_token
      title: Secret Token (Team Chat App)
      field_type: input
      options:
        mask: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
      metadata:
        event:
          publish: true
  - fields:
    - id: url
      field_type: input
      title: Server URL (e.g. 'https://api.zoom.us/v2/')
      options:
        default_value: https://api.zoom.us/v2/
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: verification_token
      title: Verification Token (Team Chat App)
      field_type: input
      options:
        mask: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
      metadata:
        event:
          publish: true
  - fields:
    - id: proxy
      title: Use system proxy settings
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: true
        edit_modifiers:
          required: false
          hidden: false
          read_only: true
  - fields:
    - id: insecure
      title: Trust any certificate (not secure)
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: false
        edit_modifiers:
          required: false
          hidden: false
          read_only: false
  - fields:
    - id: engine_mode
      title: Engine
      field_type: radio
      options:
        mask: false
        orientation: horizontal
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engine_group
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: Zoom
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        empty_values_message: No engines available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: engine_group
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: Zoom
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        empty_values_message: No engine groups available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
