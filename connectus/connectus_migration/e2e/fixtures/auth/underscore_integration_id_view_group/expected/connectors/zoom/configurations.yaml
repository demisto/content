metadata:
  title: Configuration
  description: Adjust and refine your configuration
view_groups:
- id: zoom_iam
  label: Zoom IAM
  help_text: Configurations settings for Zoom IAM.
general_configurations:
  configurations:
  - view_group: zoom_iam
    fields:
    - id: integrationLogLevel
      title: Log Level
      field_type: select
      metadata:
        xsoar:
          config_type: backend
      options:
        description: Set the log level for xsoar-zoom_iam.
        placeholder: Select log level
        default_value: 'Off'
        searchable: true
        clearable: true
        values:
        - key: 'Off'
          label: 'Off'
        - key: Debug
          label: Debug
        - key: Verbose
          label: Verbose
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
configurations:
- id: automation-and-remediation_zoom_iam
  configurations:
  - fields:
    - id: defaultIgnore
      title: Do not use in CLI by default
      field_type: checkbox
      metadata:
        xsoar:
          config_type: backend
      options:
        default_value: false
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: disable-user-enabled
      field_type: checkbox
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
      title: Allow disabling users
  - fields:
    - id: enable-user-enabled
      field_type: checkbox
      options:
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
      title: Allow enabling users
  - fields:
    - id: mapper_in
      field_type: input
      title: Incoming Mapper
      options:
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  view_group: zoom_iam
