category: Authentication & Identity Management
provider: Zoom
commonfields:
  id: Zoom_IAM
  version: -1
configuration:
- display: Server URL (e.g., 'https://api.zoom.us/v2/')
  name: url
  type: 0
  defaultvalue: "https://api.zoom.us/v2/"
  required: true
- display: Account ID (OAuth)
  name: account_id
  type: 0
  required: true
- display: Client ID (OAuth)
  name: credentials
  type: 9
  displaypassword: Client Secret (OAuth)
  required: true
- display: Allow disabling users
  name: disable-user-enabled
  type: 8
  required: false
- display: Allow enabling users
  name: enable-user-enabled
  type: 8
  required: false
- display: Incoming Mapper
  name: mapper_in
  type: 0
  required: true
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
description: Zoom IAM integration for user lifecycle management.
display: Zoom IAM
name: Zoom_IAM
script:
  script: ''
  type: python
  subtype: python3
  commands:
  - name: iam-disable-user
    description: Disable a user.
    arguments:
    - name: user-profile
      description: User profile.
      required: true
