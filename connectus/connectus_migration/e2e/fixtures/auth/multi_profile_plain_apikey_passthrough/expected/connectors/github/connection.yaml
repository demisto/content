# yaml-language-server: $schema=../../schema/connection.schema.json
metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
view_groups:
- id: github
  label: GitHub
  help_text: Connection settings for GitHub.
- id: github-iam
  label: GitHub IAM
  help_text: Connection settings for GitHub IAM.
- id: github-mcp
  label: GitHub MCP
  help_text: Connection settings for GitHub MCP.
profiles:
- id: plain.github
  type: plain
  view_group: github
  title: plain
  description: Authentication profile for GitHub (plain).
  metadata:
    xsoar:
      interpolated: true
      interpolation_mapping: username:credentials.identifier,password:credentials.password
  configurations:
  - fields:
    - id: credentials_username
      title: Username / Password
      field_type: input
      metadata:
        auth:
          parameter: username
      options:
        mask: false
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: credentials_password
      title: Username / Password
      field_type: input
      metadata:
        auth:
          parameter: password
      options:
        mask: true
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: url
      field_type: input
      title: Server URL
      options:
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: engine_mode
      title: Engine
      field_type: select
      options:
        mask: false
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engine_group
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: GitHub
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: engine_group
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: GitHub
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
