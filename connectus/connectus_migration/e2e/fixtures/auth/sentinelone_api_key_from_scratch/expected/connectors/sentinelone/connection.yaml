# yaml-language-server: $schema=../../schema/connection.schema.json
metadata:
  title: Connection
  description: Enter the credentials to securely authorize the connection
view_groups:
- id: sentinelone-v2
  label: SentinelOne v2
  help_text: Connection settings for SentinelOne v2.
profiles:
- id: api_key.sentinelone_v2
  type: api_key
  view_group: sentinelone-v2
  title: API Token
  description: Authentication profile for SentinelOne (api_key).
  metadata:
    xsoar:
      interpolated: true
      interpolation_mapping: api_key:credentials.password
  configurations:
  - fields:
    - id: credentials
      title: API Token
      field_type: input
      metadata:
        auth:
          parameter: api_key
      options:
        mask: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: url
      field_type: input
      title: Server URL (e.g., https://usea1.sentinelone.net)
      options:
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
        mask: false
      metadata:
        event:
          publish: true
  - fields:
    - id: proxy
      title: Use system proxy settings
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: true
        edit_modifiers:
          required: false
          hidden: false
          read_only: true
  - fields:
    - id: insecure
      title: Trust any certificate (not secure)
      field_type: checkbox
      metadata:
        event:
          publish: true
      options:
        mask: false
        default_value: false
        create_modifiers:
          required: false
          hidden: false
          read_only: false
        edit_modifiers:
          required: false
          hidden: false
          read_only: false
  - fields:
    - id: engine_mode
      title: Engine
      field_type: radio
      options:
        mask: false
        orientation: horizontal
        default_value: no_engine
        values:
        - key: no_engine
          label: No engine
        - key: engine
          label: Engine
        - key: engine_group
          label: Engine Group
        create_modifiers:
          required: true
          hidden: false
        edit_modifiers:
          required: true
          hidden: false
  - fields:
    - id: engine
      title: Engine
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: SentinelOne V2
            dynamicField: engine
      options:
        mask: false
        placeholder: Select an engine
        empty_values_message: No engines available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  - fields:
    - id: engine_group
      title: Engine Group
      field_type: select
      metadata:
        event:
          publish: true
        xsoar:
          config_type: backend
        dynamic_values:
          provider: xsoar
          trigger:
          - on_create
          - on_edit
          params:
            integrationID: SentinelOne V2
            dynamicField: engine-group
      options:
        mask: false
        placeholder: Select an engine group
        empty_values_message: No engine groups available
        searchable: true
        clearable: true
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
