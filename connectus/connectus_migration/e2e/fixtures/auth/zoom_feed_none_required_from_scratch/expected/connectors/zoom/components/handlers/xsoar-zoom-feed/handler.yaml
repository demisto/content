# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-zoom-feed
metadata:
  version: 1.0.0
  description: XSOAR handler for Zoom Feed.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: Zoom Feed
    xsoar-pack-id: auth
  args: {}
capabilities:
- id: threat-intelligence-and-enrichment_zoom-feed
  auth_options:
  - id: external_auth.zoom_feed
    workloads:
    - xsoar-pod
  actions:
  - type: reset_feed_last_run
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
