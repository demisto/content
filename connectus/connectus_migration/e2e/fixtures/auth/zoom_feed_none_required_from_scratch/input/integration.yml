category: Data Enrichment & Threat Intelligence
provider: Zoom
commonfields:
  id: Zoom Feed
  version: -1
configuration:
- display: Fetch indicators
  name: feed
  defaultvalue: "true"
  type: 8
  required: false
- display: Indicator Reputation
  name: feedReputation
  defaultvalue: Good
  type: 18
  options:
  - None
  - Good
  - Suspicious
  - Bad
  required: false
- display: Source Reliability
  name: feedReliability
  defaultvalue: A - Completely reliable
  type: 15
  required: true
  options:
  - A - Completely reliable
  - B - Usually reliable
  - C - Fairly reliable
  - D - Not usually reliable
  - E - Unreliable
  - F - Reliability cannot be judged
- display: Trust any certificate (not secure)
  name: insecure
  type: 8
  required: false
- display: Use system proxy settings
  name: proxy
  type: 8
  required: false
description: Use the Zoom Feed integration to fetch Zoom's published IP ranges and domains as indicators.
display: Zoom Feed
name: Zoom Feed
script:
  script: ''
  type: python
  subtype: python3
  feed: true
  commands:
  - name: zoom-get-indicators
    description: Gets indicators from the feed.
    arguments:
    - name: limit
      description: The maximum number of results to return. The default value is 10.
      defaultValue: "10"
