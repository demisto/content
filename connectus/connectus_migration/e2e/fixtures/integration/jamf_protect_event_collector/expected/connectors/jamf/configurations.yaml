metadata:
  title: Configuration
  description: Adjust and refine your configuration
view_groups:
- id: jamf-protect-event-collector
  label: Jamf Protect Event Collector
  help_text: Configurations settings for Jamf Protect Event Collector.
general_configurations:
  configurations:
  - view_group: jamf-protect-event-collector
    fields:
    - id: integrationLogLevel
      title: Log Level
      field_type: select
      metadata:
        xsoar:
          config_type: backend
      options:
        description: Set the log level for xsoar-jamf-protect-event-collector.
        placeholder: Select log level
        default_value: 'Off'
        searchable: true
        clearable: true
        values:
        - key: 'Off'
          label: 'Off'
        - key: Debug
          label: Debug
        - key: Verbose
          label: Verbose
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
configurations:
- id: log-collection_jamf-protect-event-collector
  configurations:
  - fields:
    - id: eventFetchInterval
      title: Events Fetch Interval
      field_type: duration
      options:
        units:
        - days
        - hours
        - minutes
        output_format: minutes
        default_value:
          minutes: 1
        create_modifiers:
          hidden: false
        edit_modifiers:
          hidden: false
  view_group: jamf-protect-event-collector
- id: fetch-assets-and-vulnerabilities_jamf-protect-event-collector
  configurations:
  - fields:
    - id: assetsFetchInterval
      field_type: duration
      title: Fetch Computer Assets Interval
      options:
        description: The fetch interval. It is recommended to set it to 12 hours.
          The minimum interval is 1 hour.
        default_value:
          hours: 12
        create_modifiers:
          hidden: false
        edit_modifiers:
          hidden: false
        units:
        - days
        - hours
        - minutes
        output_format: minutes
  view_group: jamf-protect-event-collector
