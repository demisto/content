# yaml-language-server: $schema=../../schema/capabilities.schema.json
metadata:
  title: Capabilities
  description: Configure the capabilities for this instance
general_configurations:
  description: General configurations for all capabilities
  configurations:
  - fields:
    - id: instance_name
      title: Instance name
      field_type: input
      metadata:
        connector:
          parameter: instance_name
      validations:
      - trigger: change
        rules:
        - type: pattern
          value: ^[a-zA-Z0-9 _-]+$
          message: Only alphanumeric characters, spaces, underscores, and hyphens
            are allowed.
        - type: async
          validation_type: uniqueness
      options:
        placeholder: Enter a unique name for this instance
        create_modifiers:
          required: true
          read_only: false
          hidden: false
        edit_modifiers:
          required: true
          read_only: false
          hidden: false
capabilities:
- id: automation-and-remediation
  title: Automation and Remediation
  description: Run automation and remediation commands for this connector.
  default_enabled: false
  required: false
  sub_capabilities:
  - id: automation-and-remediation_jamf-protect-event-collector
    title: Jamf Protect Event Collector
    default_enabled: false
    required: false
    config:
      required_license:
      - cloud_posture
      - cloud
      - cloud_runtime_security
      - edr
      - xsiam
      - agentix
  config:
    required_license:
    - agentix
    - cloud
    - cloud_posture
    - cloud_runtime_security
    - edr
    - xsiam
