# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-qradar-v3
metadata:
  version: 1.0.0
  description: XSOAR handler for QRadar v3.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: QRadar v3
    xsoar-pack-id: integration
  args: {}
capabilities:
- id: automation-and-remediation_qradar-v3
  auth_options:
  - id: plain.qradar_v3
    workloads:
    - xsoar-pod
- id: fetch-issues_qradar-v3
  auth_options:
  - id: plain.qradar_v3
    workloads:
    - xsoar-pod
  actions:
  - type: reset_incidents_last_run
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
