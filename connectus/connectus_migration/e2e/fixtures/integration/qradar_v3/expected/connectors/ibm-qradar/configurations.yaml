metadata:
  title: Configuration
  description: Adjust and refine your configuration
view_groups:
- id: qradar-v3
  label: IBM QRadar v3
  help_text: Configurations settings for IBM QRadar v3.
general_configurations:
  configurations:
  - view_group: qradar-v3
    fields:
    - id: integrationLogLevel
      title: Log Level
      field_type: select
      metadata:
        xsoar:
          config_type: backend
      options:
        description: Set the log level for xsoar-qradar-v3.
        placeholder: Select log level
        default_value: 'Off'
        values:
        - key: 'Off'
          label: 'Off'
        - key: Debug
          label: Debug
        - key: Verbose
          label: Verbose
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
configurations:
- id: automation-and-remediation_qradar-v3
  configurations:
  - fields:
    - id: defaultIgnore
      title: Do not use in CLI by default
      field_type: checkbox
      metadata:
        xsoar:
          config_type: backend
      options:
        default_value: false
        create_modifiers:
          required: false
          hidden: false
        edit_modifiers:
          required: false
          hidden: false
  view_group: qradar-v3
