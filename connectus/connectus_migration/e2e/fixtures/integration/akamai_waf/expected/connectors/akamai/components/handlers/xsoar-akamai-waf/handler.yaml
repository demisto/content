# yaml-language-server: $schema=../../../../../schema/handler.schema.json
id: xsoar-akamai-waf
metadata:
  version: 1.0.0
  description: XSOAR handler for Akamai WAF.
  module: xsoar
  tags: []
  ownership:
    team: xsoar
    maintainers:
    - '@xsoar-content'
enabled: true
triggering:
  type: PUB_SUB
  labels:
    xsoar-integration-id: Akamai WAF
    xsoar-pack-id: integration
  args: {}
capabilities:
- id: automation-and-remediation_akamai-waf
  auth_options:
  - id: plain.akamai_waf
    workloads:
    - xsoar-pod
test_connection:
  type: service
  service: xsoar
  endpoint: /settings/integration/connector/verification
