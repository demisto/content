# yaml-language-server: $schema=../../schema/capabilities.schema.json
metadata:
  title: Capabilities
  description: Configure the capabilities for this instance
general_configurations:
  description: General configurations for all capabilities
  configurations:
  - fields:
    - id: instance_name
      title: Instance name
      field_type: input
      metadata:
        connector:
          parameter: instance_name
      validations:
      - trigger: change
        rules:
        - type: pattern
          value: ^[a-zA-Z0-9 _-]+$
          message: Only alphanumeric characters, spaces, underscores, and hyphens
            are allowed.
        - type: async
          validation_type: uniqueness
      options:
        placeholder: Please Enter Name for an Instance
        create_modifiers:
          required: true
          read_only: false
          hidden: false
        edit_modifiers:
          required: true
          read_only: false
          hidden: false
capabilities:
- id: fetch-issues
  title: Fetch Issues
  description: Fetch issues from this connector.
  default_enabled: true
  required: false
  config:
    required_license:
    - agentix
    - xsiam
  sub_capabilities:
  - id: xsoar-azure-sentinel-fetch-issues
    title: Fetch Issues
    default_enabled: false
    required: true
- id: automation-and-remediation
  title: Automation and Remediation
  description: Run automation and remediation commands for this connector.
  default_enabled: true
  required: false
  config:
    required_license: []
  sub_capabilities:
  - id: xsoar-azure-sentinel-automation-and-remediation
    title: Automation and Remediation
    default_enabled: false
    required: true
