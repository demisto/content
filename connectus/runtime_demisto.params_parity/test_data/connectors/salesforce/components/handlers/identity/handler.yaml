id: "saas-identity-salesforce"

metadata:
  version: 1.0.0
  description: "Identity handler for Salesforce connector"
  tags:
    - "identity-security"
    - "salesforce"
  ownership:
    team: "identity"
    maintainers:
      - "@identity-team"
  module: "identity"

enabled: true

triggering:
  type: "PUB_SUB"
  args: {}

capabilities:
  - id: "identity"
    auth_options:
      - id: "oauth2_client_credentials.salesforce"
        scopes:
        - "api"
        - "id"
        workloads:
          - "identity-saas-discovery-ctrl"
          - "identity-saas-discovery"

test_connection:
  type: "endpoint"
  host: "identity-saas-discovery-ctrl-svc.xdr-st.svc.cluster.local:8080"
  endpoint: "/api/v1/test-connection"
  headers:
    Content-Type: "application/json"