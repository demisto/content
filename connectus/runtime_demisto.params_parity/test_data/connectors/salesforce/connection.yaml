# yaml-language-server: $schema=../../schema/connection.schema.json
metadata:
  title: "Connection"
  description: "Enter the credentials to securely authorize the connection"
  help: |
    ### Set the Domain URL
    The Domain URL must be identical to the domain URL defined in the Cortex Gateway egress configuration in the Path field. If you did not configure egress in Cortex Gateway, you will get an error during verification. You can continue with instance configuration without verifying and set up egress at a later point. For more information, see the [documentation.](https://docs-cortex.paloaltonetworks.com/r/Cortex-XSIAM/Cortex-XSIAM-3.x-Documentation/Ingest-and-run-Salesforce-automation-and-remediation)

    ### IMPORTANT:
    You cannot proceed with the authentication configuration until you provide a domain URL and click Apply.
    When you click Apply, the instance is connected to a unique URL in Salesforce, and it cannot be changed. To change it, you need to exit the wizard and start over.

    ### Choose your preferred authentication setup
    Select Recommended to use the suggested authentication method for all selected capabilities. Select Advanced to configure your preferred authentication methods separately for each capability.

    ### Choose one of the following authentication methods
    **Authenticate using OAuth 2.0 Web Server Flow**
    To authenticate using **OAuth 2.0 Web Server Flow** (recommended), click the Connect button and log in to Salesforce. Authentication occurs automatically.

    **Authenticate using  OAuth 2.0 Client Credentials**
    To authenticate using **Client Credentials** and **Client Secrets**, you need to configure them in Salesforce. 

    For the list of required Salesforce permissions and more information, see the [documentation.](https://docs-cortex.paloaltonetworks.com/r/Cortex-XSIAM/Cortex-XSIAM-3.x-Documentation/Ingest-and-run-Salesforce-automation-and-remediation)


general_configurations:
  description: "General configurations"
  configurations:
    - fields:
        - id: "domain"
          title: "Domain URL"
          field_type: "input"
          behavior:
            type: "apply"
            label: "Apply"
          validations:
            - trigger: "change"
              rules:
                - type: "pattern"
                  value: "^\\S+(\\s+\\S+)*$"
                  message: "Domain URL must not contain leading or trailing whitespace"
          options:
            mask: false
            placeholder: "https://<my_domain>"
            help_text: |
              **Find your domain:**
              Copy the URL from your browser's address bar while logged into Salesforce.
            create_modifiers:
              required: true
              hidden: false
            edit_modifiers:
              required: true
              hidden: false
              read_only: true

profiles:
  - id: "oauth2_client_credentials.salesforce"
    type: "oauth2_client_credentials"
    title: "OAuth 2.0 Client Credentials Flow"
    discovery_url: "https://{{domain}}/.well-known/openid-configuration"
    configurations:
      - fields:
          - id: "client_key"
            metadata:
              auth:
                parameter: "client_key"
            title: "Consumer Key (Client ID)"
            field_type: "input"
            options:
              mask: false
              create_modifiers:
                required: true
                hidden: false
              edit_modifiers:
                required: true
                hidden: true
          - id: "client_secret"
            metadata:
              auth:
                parameter: "client_secret"
            title: "Consumer Secret"
            field_type: "input"
            options:
              mask: true
              create_modifiers:
                required: true
                hidden: false
              edit_modifiers:
                required: true
                hidden: true

  - id: "oauth2_client_credentials.salesforce2"
    type: "oauth2_client_credentials"
    title: "OAuth 2.0 Client Credentials Flow"
    discovery_url: "https://{{domain}}/.well-known/openid-configuration"
    configurations:
      - fields:
          - id: "client_key"
            metadata:
              auth:
                parameter: "client_key"
            title: "Consumer Key (Client ID)"
            field_type: "input"
            options:
              mask: false
              create_modifiers:
                required: true
                hidden: false
              edit_modifiers:
                required: true
                hidden: true
          - id: "client_secret"
            metadata:
              auth:
                parameter: "client_secret"
            title: "Consumer Secret"
            field_type: "input"
            options:
              mask: true
              create_modifiers:
                required: true
                hidden: false
              edit_modifiers:
                required: true
                hidden: true

  - id: "oauth2_authorization_code.salesforce"
    type: "oauth2_authorization_code"
    title: "OAuth 2.0 Authorization Web Server Flow"
    client_id: "{SAAS_REGISTRY.SALESFORCE_CORE_CLIENT_ID}"
    client_secret: "{SAAS_REGISTRY.SALESFORCE_CORE_CLIENT_SECRET}"
    discovery_url: "https://{{domain}}/.well-known/openid-configuration"
    refresh_token_scope: "refresh_token"
